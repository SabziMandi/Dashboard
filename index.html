    const _eodN=SECTIONS.filter(s=>!s.isUpcoming&&!s.hidden).reduce((a,s)=>a+(state.sections[s.key]||[]).filter(st=>!st._deleted&&!['completed','not-done','shelved','on-hold','postponed'].includes(st.status)).length,0);
    html+=`<div style="background:rgba(99,102,241,.06);border:0.5px solid rgba(99,102,241,.25);border-radius:8px;padding:9px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;">
      <span style="font-size:12.5px;color:#3730A3;font-family:var(--font);">${_eodN} stor${_eodN===1?'y':'ies'} still active — end of day approaching (${eodH}:00 IST)</span>
      <div style="display:flex;gap:6px;flex-shrink:0;">
        <button class="btn btn-ghost btn-sm" style="color:#4F46E5;border-color:rgba(99,102,241,.3)" onclick="ui.openSections.add('ibu');render();setTimeout(()=>document.getElementById('acc-ibu')?.scrollIntoView({behavior:'smooth',block:'start'}),80)">Review</button>
        <button class="btn btn-ghost btn-sm" onclick="dismissEOD()">Dismiss</button>
      </div>
    </div>`;
  }
  // On desktop and mobile: all main sections + Upcoming show on Today page
  // Tasks/Meetings/Leaves/Notes are behind bottom nav tabs on mobile
  SECTIONS.filter(s=>!s.isUpcoming&&!s.hidden).forEach(sec=>{ html+=renderAccordion(sec,null); });
  html+=renderAccordion(SECTIONS.find(s=>s.isUpcoming),null);
  // On desktop: tasks/meetings/notes/leaves in a hidden-on-mobile div
  // On mobile: show them all inline (below upcoming) without the hide wrapper
  html+=renderTasksSection();
  html+=renderRemarksAccordion();
  html+=renderMeetingsSection();
  html+=renderLeavesSection();
  html+=renderTravelSection();
  return html;
}

function renderUpcomingView(){
  const today=todayStr();
  const sec=SECTIONS.find(s=>s.key==='upcoming');
  const archKeyJS='null';
  let html='';
  const cur=ui.upcomingDate||today;

  if(cur!==today){
    // Past date — show archived entries with full CRUD
    const entries=((state.archive[cur]?.sections?.upcoming)||[]).filter(s=>!s._deleted);
    if(!entries.length){
      html+=`<div class="empty-state"><div class="empty-icon">🗓</div><div class="empty-msg">No upcoming events on this date</div></div>`;
    } else {
      html+=`<div style="font-size:11px;font-family:var(--font);color:var(--text3);margin-bottom:8px;letter-spacing:.6px">${entries.length} upcoming event${entries.length===1?'':'s'} archived on this date</div>`;
      entries.forEach(s=>{ html+=renderUpcomingRow('upcoming',s,cur); });
    }
  } else {
    // Today — render entries directly (no accordion wrapper needed on dedicated tab)
    const stories=getStories('upcoming',null);
    const fKey='upcoming';
    const isFormOpen=ui.openForms.has(fKey);

    html+=`<div class="acc-header" style="border-radius:10px 10px 0 0;border:0.5px solid var(--border);border-bottom:0">
      <span class="acc-icon">🗓</span>
      <span class="acc-name">Upcoming Events</span>
      <div class="acc-meta">
        <span class="sbadge sb-in-progress">${stories.filter(s=>s.status!=='completed'&&(!s.expected_date||s.expected_date>=today)).length} pending</span>
      </div>
    </div>
    <div style="border:0.5px solid var(--border);border-top:0;border-radius:0 0 10px 10px;padding:12px 16px 14px;margin-bottom:14px;">
      <div class="fi-form-footer">
        <button class="btn btn-ghost btn-sm" onclick="doEmailSection('upcoming',null)">✉ Email</button>
        <button class="btn btn-ghost btn-sm" onclick="doExportSectionTxt('upcoming',null)">↓ Export</button>
        <button class="btn btn-accent btn-sm" onclick="toggleForm('upcoming',null)">+ Add</button>
      </div>`;

    if(isFormOpen) html+=renderForm('upcoming',null);

    // Bucket logic — same as renderAccordion for upcoming
    const activeUpcoming = stories.filter(s=>
      s.status!=='completed' &&
      (!s.expected_date || s.expected_date >= today)
    );
    const completedUpcoming = stories.filter(s=>s.status==='completed');
    const expiredUpcoming = stories
      .filter(s=>s.expected_date && s.expected_date < today && s.status!=='completed')
      .sort((a,b)=>(b.expected_date||'').localeCompare(a.expected_date||''));

    const allActive=[...activeUpcoming,...completedUpcoming];

    if(!allActive.length && !isFormOpen && !expiredUpcoming.length){
      html+=`<div class="empty-state"><div class="empty-icon">🗓</div><div class="empty-msg">No upcoming events yet — click <strong>+ Add</strong></div></div>`;
    } else {
      allActive.forEach(s=>{ html+=renderCard('upcoming',s,null); });
    }

    if(expiredUpcoming.length){
      const isExpOpen=ui_expiredUpcomingOpen['today']===true;
      html+=`<div style="border-top:1px dashed var(--border);margin-top:8px">
        <div style="display:flex;align-items:center;gap:6px;padding:6px 4px;cursor:pointer;user-select:none" onclick="ui_expiredUpcomingOpen['today']=!ui_expiredUpcomingOpen['today'];render()">
          <span style="font-size:11px;font-weight:500;color:var(--text3);font-family:var(--font)">${expiredUpcoming.length} expired</span>
          <span style="font-size:10px;color:var(--text3);margin-left:auto">${isExpOpen?'▾':'▸'}</span>
        </div>
        ${isExpOpen?expiredUpcoming.map(s=>renderCard('upcoming',s,null)).join(''):''}
      </div>`;
    }
  }
  if(html.includes('border-top:0;border-radius:0 0')) html+='</div>'; // close content wrapper
  return`<div style="padding-bottom:80px">${html}</div>`;
}

    html+=`<div class="accordion">
      <div class="acc-header" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.acc-chevron').classList.toggle('open')">
        <span class="acc-icon">📝</span>
        <span class="acc-name">Notes on this day</span>
        <span style="font-size:10px;font-family:var(--font);color:var(--text3);margin-left:8px">${notesLog.length} note${notesLog.length===1?'':'s'}</span>
        <span class="acc-chevron">▾</span>
      </div>
      <div class="acc-body" style="display:flex;flex-direction:column;gap:6px">
        ${notesLog.map(n=>{
          // Use live note from state.notes if it still exists, else use snapshot
          const live=(state.notes||[]).find(x=>x.id===n.id);
          const nd=live||n;
          const isLive=!!live&&!nd._deleted;
          const sLabel=statusLabel(nd);
          const cCls=cardCls(nd);
          const created=nd.created?new Date(nd.created).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})+' · ':'';
          return`<div class="note-card ${cCls}" style="margin-bottom:0">
            <div class="note-text" style="text-decoration:${nd.status==='done'||nd._deleted?'line-through':''};white-space:pre-wrap">${esc(nd.text)}</div>
            <div class="note-meta">
              <span>${created}${sLabel}</span>
              ${nd.deadline_date?`<span>📅 ${fmtDate(nd.deadline_date)}</span>`:''}
            </div>
            ${isLive?`<div class="note-btns" style="margin-top:6px">
              ${nd.status!=='done'?`<button class="btn btn-done-active btn-sm" onclick="setNoteStatus('${nd.id}','done')">✅ Done</button>`:''}
              ${nd.status==='active'?`<button class="btn btn-ghost btn-sm" style="color:var(--text3)" onclick="setNoteStatus('${nd.id}','pass')">↪ Pass</button>`:''}
              ${nd.status!=='active'?`<button class="btn btn-ghost btn-sm" onclick="updateNote('${nd.id}',{status:'active',resolvedOn:null});render()">↩ Restore</button>`:''}

        }).join('')}
        ${tasksLog.map(t=>{
          const live=(state.tasks||[]).find(x=>x.id===t.id);
          const td=live||t;
          const isLive=!!live&&!td._deleted;
          const isOpen2=ui_openTasks.has(td.id);
          const st2=td._deleted?'🗑 Deleted':td.taskStatus==='done'?'✅ Done':td.taskStatus==='not-done'?'⚫ Not Done':td.taskStatus==='transferred'?'⇄ Transferred':'⏳ Pending';
          const strike=td._deleted||td.taskStatus==='done'?'text-decoration:line-through;':'';

          if(isLive){
            return renderTaskCard(td,todayStr());

          return`<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:7px;${op2}">
            <span style="font-size:12px">${td._deleted?'🗑':td.taskStatus==='done'?'✅':td.taskStatus==='not-done'?'⚫':'⏳'}</span>

              <div style="font-size:10.5px;color:var(--text3);font-family:var(--font)">Task · ${st2}${td.deadline_date?' · '+fmtDate(td.deadline_date):''}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  html+=`<div class="accordion"><div class="acc-header" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.acc-chevron').classList.toggle('open')"><span class="acc-icon">📓</span><span class="acc-name">Free notes</span><span class="acc-chevron">▾</span></div><div class="acc-body"><textarea class="remarks-area" style="min-height:120px" placeholder="Notes for this entry…" oninput="updateArchiveNotes('${key}',this.value)">${esc(state.archive[key]?.notes||'')}</textarea></div></div>`;
  return html;
}

function setMigrateSource(key){
  ui.migrateSourceKey=key||null;
  ui.selectedStories.clear();
  ui.migrateOpenSecs=new Set(SECTIONS.map(s=>s.key));
  render(); // full re-render to update origin buttons
}
function getMigrateSourceSections(){
  // Returns {sectionKey: [stories]} for the current origin
  const sk=ui.migrateSourceKey;
  const result={};
  SECTIONS.forEach(sec=>{
    if(sk){
      result[sec.key]=(state.archive[sk]?.sections?.[sec.key]||[]).filter(s=>!s._deleted);
    } else {
      result[sec.key]=(state.sections[sec.key]||[]).filter(s=>!s._deleted);
    }
  });
  return result;
}
function buildMigrateSourceHTML(){

  SECTIONS.forEach(sec=>{

    const sectionKey=sec.isCombined?'ibu_combined':sec.key;

    const isOpen=ui.migrateOpenSecs.has(sectionKey);
    html+=`<div style="margin-bottom:10px">

        <div style="display:flex;gap:7px;align-items:center">
          ${stories.length?`<button class="btn btn-xs btn-ghost" onclick="selectAllSec('${sectionKey}');event.stopPropagation()">${selCnt===stories.length&&stories.length?'Deselect all':'Select all'}</button>`:''}
          <span id="msec-chev-${sectionKey}" style="color:var(--text3);font-size:13px;transition:transform .2s;${isOpen?'transform:rotate(180deg)':''}">▾</span>
        </div>
      </div>
      <div id="msec-body-${sectionKey}" style="display:${isOpen?'block':'none'}">`;
    if(!stories.length){
      html+=`<div class="empty-state" style="padding:14px 13px"><div class="empty-msg">No stories</div></div>`;
    } else {
      stories.forEach(s=>{
        const actualSec=s._subsec||sec.key;
        const k=actualSec+'::'+s.id;
        const sel=ui.selectedStories.has(k);
        const sk2=k.replace(/[^a-z0-9]/gi,'-');
        const sbL=s.status==='urgent'?'🔴':s.status==='in-progress'?'🟡':s.status==='completed'?'🟢':s.status==='on-hold'?'🟣':s.status==='not-done'?'⚫':s.status==='postponed'?'🔵':s.status==='shelved'?'🗄':'⚪';
        const carry='';
        html+=`<div class="migrate-story-row${sel?' msr-selected':''}" id="msr-${sk2}" onclick="toggleMigrateStory('${k}')">
          <div class="migrate-cb"><span class="migrate-cb-check" style="display:${sel?'block':'none'}">✓</span></div>
          <div class="migrate-story-info">
            <div class="migrate-story-title">${esc(s.title||'Untitled')}${carry}</div>
            <div class="migrate-story-meta">${sbL} ${s.status||'no status'}${s.correspondent?' · 👤 '+esc(s.correspondent):''}</div>
          </div>
        </div>`;
      });
    }
    html+='</div></div>';
  });
  return html||'<div class="empty-state"><div class="empty-msg">No stories on this date</div></div>';
}


/* ─── ACCORDION ─── */

function renderAccordion(sec,archKey){
  const secObj=SECTIONS.find(s=>s.key===sec.key)||sec;
  // Skip hidden sections (they're rendered inside the combined accordion)
  if(secObj.hidden) return '';

  if(secObj.isCombined) return renderCombinedAccordion(archKey);

  const displayName=secName(sec.key);
  const all=((archKey?state.archive[archKey]?.sections[sec.key]:state.sections[sec.key])||[]).filter(s=>!s._deleted);
  const stories=secObj.hasWW?getStoriesWW(sec.key,archKey):getStories(sec.key,archKey);
  const isOpen=ui.openSections.has(sec.key);
  const fKey=sec.key+(archKey?'::'+archKey:'');
  const isFormOpen=ui.openForms.has(fKey);
  const activeStories=all.filter(s=>s.status!=='shelved');
  let summary;
  if(secObj.isUpcoming&&activeStories.length>0){
    // Collapsed ribbon: "X pending · Y done · Z expired"
    const today2=todayStr();
    const pendingCnt=activeStories.filter(s=>s.status!=='completed'&&s.status!=='passed'&&s.status!=='not-done'&&(!s.expected_date||s.expected_date>=today2)).length;
    const doneCnt=activeStories.filter(s=>s.status==='completed').length;
    const expiredCnt=activeStories.filter(s=>s.expected_date&&s.expected_date<today2&&s.status!=='completed').length;
    const parts=[];
    if(pendingCnt) parts.push(pendingCnt+' pending');
    if(doneCnt)    parts.push(doneCnt+' done');
    if(expiredCnt) parts.push(expiredCnt+' expired');
    summary=parts.join(' · ')||'No active events';
  } else {
    summary=activeStories.length>0?activeStories.slice(0,2).map(s=>s.title||'Untitled').join(' · '):'No stories yet';
  }
  const uc=activeStories.filter(s=>s.status==='urgent').length;
  const ic=activeStories.filter(s=>s.status==='in-progress').length;
  const cc=activeStories.filter(s=>s.carriedForward&&s.status!=='completed'&&s.status!=='on-hold').length;
  const shelvedCount=all.filter(s=>s.status==='shelved').length;
  const notDoneCount=all.filter(s=>s.status==='not-done').length;
  const postponedCount=all.filter(s=>s.status==='postponed').length;
  const workCnt=secObj.hasWW?activeStories.filter(s=>s.mode==='working').length:0;
  const watchCnt=secObj.hasWW?activeStories.filter(s=>s.mode==='watching').length:0;
  const showShelved=ui.showShelved.has(sec.key);
  const archKeyJS=archKey?`'${archKey}'`:'null';
  // Build info strip — logic differs per section type
  const _accStrip=(()=>{
    if(!activeStories.length) return '';
    const today=todayStr();

    if(sec.key==='requests'){
      // Newest addition first — exclude on-hold
      const eligible=activeStories.filter(s=>s.status!=='on-hold'&&s.status!=='completed'&&s.status!=='not-done'&&s.status!=='shelved');
      if(!eligible.length) return '';
      eligible.sort((a,b)=>(b.created||0)-(a.created||0));
      const s=eligible[0];
      const ageDays=s.created?Math.round((Date.now()-(typeof s.created==='number'?s.created:parseInt(s.created)))/86400000):0;
      const dotCol=ageDays>=30?'#DC2626':ageDays>=14?'#D97706':'#94a3b8';
      const ageLabel=ageDays===0?'Today':ageDays===1?'1 day old':ageDays+'d old';
      return `<div class="acc-info-strip"><span style="width:5px;height:5px;border-radius:50%;background:${dotCol};flex-shrink:0;display:inline-block"></span><span style="font-size:10px;color:var(--text2);font-style:italic;font-family:var(--font);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-left:5px">${esc(s.title||'')}</span><span style="font-size:10px;font-weight:400;color:#888;font-family:var(--font);flex-shrink:0;margin-left:4px">${ageLabel}</span></div>`;
    }

    if(sec.key==='upcoming'||secObj.isUpcoming){
      // Next upcoming event by date
      const eligible=activeStories.filter(s=>s.expected_date&&s.expected_date>=today&&s.status!=='completed'&&s.status!=='on-hold');
      if(!eligible.length) return '';
      eligible.sort((a,b)=>a.expected_date.localeCompare(b.expected_date));
      const s=eligible[0];
      const diff=Math.round((new Date(s.expected_date+'T00:00:00').getTime()-new Date(today+'T00:00:00').getTime())/86400000);
      const countdown=diff===0?'today':diff===1?'tomorrow':'in '+diff+'d';
      const shortDate=new Date(s.expected_date+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
      const dotCol=diff<=7?'#0D9488':'#2563EB';
      const stripMeta=diff===0?'today':diff===1?'tomorrow':diff===-1?'yesterday':shortDate;
      return `<div class="acc-info-strip"><span style="width:5px;height:5px;border-radius:50%;background:${dotCol};flex-shrink:0;display:inline-block"></span><span style="font-size:10px;color:var(--text2);font-style:italic;font-family:var(--font);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-left:5px">${esc(s.title||'')}</span><span style="font-size:10px;font-weight:400;color:#888;font-family:var(--font);flex-shrink:0;margin-left:4px">${stripMeta}</span></div>`;
    }

    return '';
  })();

  let html=`<div class="accordion${isOpen?' acc-open':''}" id="acc-${sec.key}">
    <div class="acc-header" onclick="toggleAccordion('${sec.key}')">
      <span class="acc-icon">${sec.icon}</span>
      <span class="acc-name">${esc(displayName)}</span>
      ${secObj.renameable&&!archKey?`<button class="btn btn-ghost btn-xs" style="flex-shrink:0;padding:2px 7px;font-size:10px;color:var(--text3)" onclick="event.stopPropagation();startRename('${sec.key}')" title="Rename section">✏ Rename</button>`:''}
      <span class="acc-summary">${(()=>{
  const today=todayStr();
  if(sec.key==='upcoming'||secObj.isUpcoming){
    const eligible=activeStories.filter(s=>s.expected_date&&s.expected_date>=today&&s.status!=='completed'&&s.status!=='on-hold');
    if(!eligible.length) return '';
    eligible.sort((a,b)=>a.expected_date.localeCompare(b.expected_date));
    return esc(eligible[0].title||'');
  }
  const eligible=activeStories.filter(s=>s.status!=='on-hold'&&s.status!=='completed'&&s.status!=='not-done'&&s.status!=='shelved');
  if(!eligible.length) return '';
  eligible.sort((a,b)=>(b.created||0)-(a.created||0));
  return esc(eligible[0].title||'');
})()}</span>
      <div class="acc-meta">
        ${activeStories.length?`<span class="sbadge sb-in-progress">${activeStories.length} pending</span>`:''}
      </div>
      <span class="acc-chevron${isOpen?' open':''}" id="acc-chev-${sec.key}">▾</span>
    </div>
    ${_accStrip}
    <div class="acc-body${isOpen?' open':''}" id="acc-body-${sec.key}">`;
  {
    const wwf=ui.wwFilter[sec.key]||'all';
    const wwTabs=secObj.hasWW&&!archKey
      ? `<button class="ww-tab wt-all${wwf==='all'?' wt-active':''}" data-sec="${sec.key}" data-val="all" onclick="setWWFilter('${sec.key}','all')">All</button>
         <button class="ww-tab wt-working${wwf==='working'?' wt-active':''}" data-sec="${sec.key}" data-val="working" onclick="setWWFilter('${sec.key}','working')">▶ Working</button>
         <button class="ww-tab wt-watching${wwf==='watching'?' wt-active':''}" data-sec="${sec.key}" data-val="watching" onclick="setWWFilter('${sec.key}','watching')">👁 Watching</button>`
      : '';
    html+=`<div class="sec-head" style="flex-wrap:wrap;gap:6px;align-items:center">
      ${wwTabs}
      <div style="margin-left:auto;display:flex;gap:6px;flex-shrink:0">
        <button class="btn btn-ghost btn-sm" onclick="doEmailSection('${sec.key}',${archKeyJS});event.stopPropagation()">✉ Email</button>
        <button class="btn btn-ghost btn-sm" onclick="doExportSectionTxt('${sec.key}',${archKeyJS});event.stopPropagation()">↓ Export</button>
        <button class="btn btn-accent btn-sm" onclick="toggleForm('${sec.key}',${archKeyJS});event.stopPropagation()">+ Add</button>
      </div>
    </div>`;
  }

  html+=`<div id="stories-wrap-${sec.key}">`;
  if(isFormOpen) html+=renderForm(sec.key,archKey);

  if(secObj.isUpcoming){
    const today=todayStr();
    // Buckets:
    // 1. active    — not completed, expected_date >= today (or no date)
    // 2. completed — faded + struck-through at bottom, sorted by completedOn desc
    // 3. expired   — past expected_date, not completed — faded at bottom
    const activeUpcoming = stories.filter(s=>
      s.status!=='completed' &&
      (!s.expected_date || s.expected_date >= today)
    );
    const completedUpcoming = stories
      .filter(s => s.status === 'completed')
      .sort((a,b) => (b.completedOn||b.created||0)-(a.completedOn||a.created||0));
    const expiredUpcoming = stories
      .filter(s => s.expected_date && s.expected_date < today && s.status !== 'completed')
      .sort((a,b) => (b.expected_date||'').localeCompare(a.expected_date||''));

    if(!activeUpcoming.length && !isFormOpen && !completedUpcoming.length && !expiredUpcoming.length){
      html+=`<div class="empty-state"><div class="empty-icon">🗓</div><div class="empty-msg">No upcoming events yet — click <strong>+ Add</strong></div></div>`;
    } else {
      const upcomingLimit=ui_upcomingPage*10;
      const visibleUpcoming=activeUpcoming.slice(0,upcomingLimit);
      visibleUpcoming.forEach(s=>{ html+=renderCard(sec.key,s,archKey); });
      if(activeUpcoming.length>upcomingLimit){
        const upRemaining=activeUpcoming.length-upcomingLimit;
        html+=`<div style="text-align:center;padding:10px 14px;border-top:0.5px dashed var(--border);margin-top:4px">
          <button class="btn btn-ghost btn-sm" onclick="showMoreUpcoming();event.stopPropagation()" style="color:var(--week);border-color:rgba(99,102,241,.3);font-size:12px">
            ↓ Show 10 more <span style="opacity:.6;font-family:var(--mono);font-size:11px">(${upRemaining} remaining)</span>
          </button>
        </div>`;
      }
    }

    // Completed entries — faded, struck-through, sorted newest first
    if(completedUpcoming.length){
      html+=`<div style="border-top:1px dashed var(--border);padding-top:8px;margin-top:8px">
        <div style="font-size:11px;font-family:var(--font);color:var(--done);margin-bottom:6px">✅ ${completedUpcoming.length} completed</div>
        ${completedUpcoming.map(s=>renderCard(sec.key,s,archKey)).join('')}
      </div>`;
    }

    // Expired entries — past date, not completed — collapsed by default
    if(expiredUpcoming.length){
      const _expKey=(archKey||'today')+'-'+sec.key;
      const isExpOpen=ui_expiredUpcomingOpen[_expKey]===true;
      html+=`<div style="border-top:1px dashed var(--border);margin-top:8px">
        <div style="display:flex;align-items:center;gap:6px;padding:6px 4px;cursor:pointer;user-select:none" onclick="ui_expiredUpcomingOpen['${_expKey}']=!ui_expiredUpcomingOpen['${_expKey}'];render()">
          <span style="font-size:11px;font-weight:500;color:var(--text3);font-family:var(--font)">${expiredUpcoming.length} expired</span>
          <span style="font-size:10px;color:var(--text3);margin-left:auto">${isExpOpen?'▾':'▸'}</span>
        </div>
        ${isExpOpen?expiredUpcoming.map(s=>renderCard(sec.key,s,archKey)).join(''):''}
      </div>`;
    }
  } else {
    if(!stories.length&&!isFormOpen) html+=`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-msg">No stories yet — click <strong>+ Add</strong></div></div>`;
    else {
      const _live=stories.filter(s=>!['completed','not-done'].includes(s.status));
      const _done=stories.filter(s=>['completed','not-done'].includes(s.status));
      if(_live.length){ _live.forEach(s=>{ html+=renderCard(sec.key,s,archKey); }); }
      else html+='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-msg">No active entries</div></div>';
      if(_done.length){
        const _secDoneKey=(archKey||'today')+'-'+sec.key;
        const _isDoneOpen=ui_storiesDoneOpen[_secDoneKey]===true;
        html+=`<div style="border-top:1px dashed var(--border);margin-top:4px">
          <div style="display:flex;align-items:center;gap:6px;padding:6px 0;cursor:pointer;user-select:none" onclick="ui_storiesDoneOpen['${_secDoneKey}']=!ui_storiesDoneOpen['${_secDoneKey}'];render()">
            <span style="font-size:11px;font-weight:500;color:var(--text3);font-family:var(--font)">${_done.length} done / not done</span>
            <span style="font-size:10px;color:var(--text3);margin-left:auto">${_isDoneOpen?'▾':'▸'}</span>
          </div>
        </div>`;
        if(_isDoneOpen){ _done.forEach(s=>{ html+=renderCard(sec.key,s,archKey); }); }
      }
    }

    // Shelved ribbon — always visible, displayed below active stories
    if(shelvedCount>0){
      const _isShelvedOpen=ui_storiesShelvedOpen[sec.key]===true;
      html+=`<div style="border-top:1px dashed var(--border);margin-top:4px">
        <div style="display:flex;align-items:center;gap:6px;padding:6px 0;cursor:pointer;user-select:none" onclick="ui_storiesShelvedOpen['${sec.key}']=!ui_storiesShelvedOpen['${sec.key}'];render()">
          <span style="font-size:11px;font-weight:500;color:var(--text3);font-family:var(--font)">${shelvedCount} shelved</span>
          <span style="font-size:10px;color:var(--text3);margin-left:auto">${_isShelvedOpen?'▾':'▸'}</span>
        </div>
      </div>`;
      if(_isShelvedOpen){
        html+=`<div class="shelved-section">`;
        all.filter(s=>s.status==='shelved').forEach(s=>{ html+=renderCard(sec.key,s,archKey); });
        html+=`</div>`;
      }
    }
  }

  html+=`</div></div></div>`;  // close stories-wrap, acc-body, accordion
  return html;
}

function addTask(data){
  if(!state.tasks) state.tasks=[];
  const id=genId();
  const today=todayStr();
  const t={...data, id, created:Date.now(), taskStatus:'pending', carriedForward:false, carriedFromDate:null, carriedDays:0};
  state.tasks.push(t);

  // Log to today's archive so it always appears when browsing that date
  if(!state.archive[today]){
    state.archive[today]={type:'day',label:archiveLabel(today),sections:{},notes:'',created:Date.now()};
    SECTIONS.forEach(s=>{state.archive[today].sections[s.key]=[];});
  }
  if(!state.archive[today].tasksLog) state.archive[today].tasksLog=[];
  if(!state.archive[today].tasksLog.some(x=>x.id===id)){
    state.archive[today].tasksLog.push({...t});
  }
  saveAndPush();
}
function updateTask(id,data){
  if(!state.tasks) return;
  const i=state.tasks.findIndex(t=>t.id===id);
  if(i>=0){ state.tasks[i]={...state.tasks[i],...data, updated:Date.now()}; saveAndPush(); }
}
function deleteTask(id){
  const task=(state.tasks||[]).find(t=>t.id===id); if(!task) return;

  // Archive to creation date before permanent deletion
  const createdDate=task.carriedFromDate||(task.created?dateStr(new Date(typeof task.created==='number'?task.created:parseInt(task.created))):todayStr());
  if(!state.archive[createdDate]){
    state.archive[createdDate]={type:'day',label:archiveLabel(createdDate),sections:{},notes:'',created:Date.now()};
    SECTIONS.forEach(s=>{state.archive[createdDate].sections[s.key]=[];});
  }
  if(!state.archive[createdDate].tasksLog) state.archive[createdDate].tasksLog=[];
  if(!state.archive[createdDate].tasksLog.some(t=>t.id===id)){
    state.archive[createdDate].tasksLog.push({...task, deletedOn:Date.now(), _deleted:true});
  }

  state.tasks=state.tasks.filter(t=>t.id!==id);
  if(!state.deletedIds) state.deletedIds={};
  if(!state.deletedIds.tasks) state.deletedIds.tasks=[];
  if(!state.deletedIds.tasks.includes(id)) state.deletedIds.tasks.push(id);
  ui_openTasks.delete(id);
  saveAndPush(); renderDateStrip(); render();
}
function nextRecurrenceDate(task){
  const base=task.deadline_date||todayStr();
  const d=new Date(base+'T00:00:00');
  if(task.recurFreq==='daily'){
    d.setDate(d.getDate()+1);
  } else if(task.recurFreq==='weekly'){
    d.setDate(d.getDate()+7);
  } else if(task.recurFreq==='monthly'){
    d.setMonth(d.getMonth()+1);
  } else if(task.recurFreq==='custom' && task.recurDays>0){
    d.setDate(d.getDate()+parseInt(task.recurDays));
  }
  return dateStr(d);
}
function recurIntervalDays(task){
  if(task.recurFreq==='daily') return 1;
  if(task.recurFreq==='weekly') return 7;
  if(task.recurFreq==='monthly'){
    // Use actual calendar month length from the task's base date to avoid drift
    const base=task.deadline_date||todayStr();
    const d1=new Date(base+'T00:00:00');
    const d2=new Date(base+'T00:00:00');
    d2.setMonth(d2.getMonth()+1);
    return Math.round((d2.getTime()-d1.getTime())/86400000);
  }
  if(task.recurFreq==='custom'&&task.recurDays>0) return parseInt(task.recurDays);
  return 7; // fallback
}
function mostRecentRecurOccurrence(task, today){
  // Returns the most recent expected occurrence date on or before today
  const base=task.deadline_date||today;
  if(base>=today) return base; // not yet overdue
  const interval=recurIntervalDays(task);
  const baseMs=new Date(base+'T00:00:00').getTime();
  const todayMs=new Date(today+'T00:00:00').getTime();
  const daysDiff=Math.floor((todayMs-baseMs)/86400000);
  const periods=Math.floor(daysDiff/interval);
  const mostRecentMs=baseMs+(periods*interval*86400000);
  return dateStr(new Date(mostRecentMs));
}

function setTaskStatus(id, status, postponeTo){
  const upd={taskStatus:status};
  if(status==='done'){ upd.carriedForward=false; upd.doneAt=Date.now(); }
  if(status==='not-done'){ upd.carriedForward=false; upd.notDoneOn=Date.now(); }
  if(status==='pending'){ upd.carriedForward=false; upd.carriedDays=0; upd.carriedFromDate=null; }
  if(status==='postponed-to'&&postponeTo){ upd.postponeTo=postponeTo; }
  updateTask(id,upd);

  // Update archive log entry for this task on its creation date
  const task=(state.tasks||[]).find(t=>t.id===id);
  if(task){
    const createdDate=task.carriedFromDate||(task.created?dateStr(new Date(typeof task.created==='number'?task.created:parseInt(task.created))):todayStr());
    if(!state.archive[createdDate]){
      state.archive[createdDate]={type:'day',label:archiveLabel(createdDate),sections:{},notes:'',created:Date.now()};
      SECTIONS.forEach(s=>{state.archive[createdDate].sections[s.key]=[];});
    }
    if(!state.archive[createdDate].tasksLog) state.archive[createdDate].tasksLog=[];
    const li=state.archive[createdDate].tasksLog.findIndex(x=>x.id===id);
    const updatedTask={...task,...upd};
    if(li>=0) state.archive[createdDate].tasksLog[li]=updatedTask;
    else state.archive[createdDate].tasksLog.push(updatedTask);
    saveAndPush();
  }

  // If recurring task marked done — auto-create next occurrence and prune older completions
  if(status==='done'){
    const task2=(state.tasks||[]).find(t=>t.id===id);
    if(task2&&task2.isRecurring&&task2.recurFreq){
      const nextDate=nextRecurrenceDate(task2);
      const newTask={
        title:       task2.title,
        notes:       task2.notes||'',
        deadline_date: nextDate,
        reminder:    task2.reminder||'off',
        isRecurring: true,
        recurFreq:   task2.recurFreq,
        recurDays:   task2.recurDays||0,
        recurLabel:       task2.recurLabel||'',
        recurDaysOfWeek:  task2.recurDaysOfWeek||[],
      };
      addTask(newTask);
      toast('✓ Done — next occurrence created for '+nextDate);
      // Prune all OTHER completed occurrences of this recurring chain (same title+isRecurring)
      // from state.tasks — they are already in tasksLog so nothing is lost
      const today2=todayStr();
      state.tasks=state.tasks.filter(t=>{
        if(t.id===id) return true;           // keep the one we just marked done (for the rest of today)
        if(!t.isRecurring) return true;      // one-off: never touch
        if(t.taskStatus!=='done') return true; // still active: keep
        if(t.title!==task2.title) return true; // different task: keep
        const doneDate=t.doneAt?dateStr(new Date(t.doneAt)):null;
        return doneDate===today2;            // only keep if done today
      });
    }
  }
  render();
}

  const task=(state.tasks||[]).find(t=>t.id===id); if(!task) return;

  d.id='task-transfer-dlg';
  d.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px';

    <div style="font-size:12.5px;color:var(--text2);margin-bottom:14px">"${esc(task.title)}"</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
      <button class="btn btn-ghost btn-sm" onclick="setTransferDate('${tomorrow}',this)">Tomorrow</button>
      <button class="btn btn-ghost btn-sm" onclick="setTransferDate('${addDays(todayStr(),2)}',this)">+2 days</button>
      <button class="btn btn-ghost btn-sm" onclick="setTransferDate('${addDays(todayStr(),7)}',this)">Next week</button>
    </div>
    <div class="fgroup" style="margin-bottom:14px">
      <label class="flabel">Or pick a specific date</label>
      <input class="finput" type="date" id="transfer-date-input" value="${tomorrow}">
    </div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:12px">
      <strong>Transfer</strong> moves it to that date's archive and removes it from today.
      <strong>Copy</strong> keeps it here and also adds it to that date.
    </div>
    <div style="display:flex;gap:7px;flex-wrap:wrap">
      <button class="btn btn-accent btn-sm" onclick="confirmTaskTransfer('${id}','move')">→ Transfer</button>
      <button class="btn btn-ghost btn-sm" onclick="confirmTaskTransfer('${id}','copy')">⎘ Copy</button>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('task-transfer-dlg').remove()">Cancel</button>
    </div>
  </div>`;
  d.addEventListener('click',e=>{ if(e.target===d) d.remove(); });
  document.body.appendChild(d);
}

function setTransferDate(dt, btn){
  const inp=document.getElementById('transfer-date-input');
  if(inp) inp.value=dt;
  document.querySelectorAll('#task-transfer-dlg .btn-ghost').forEach(b=>{
    b.style.background=''; b.style.borderColor=''; b.style.color='';
  });
  if(btn){ btn.style.background='var(--accent-bg)'; btn.style.borderColor='var(--accent)'; btn.style.color='var(--accent)'; }
}

function confirmTaskTransfer(id, mode){
  const dt=(document.getElementById('transfer-date-input')||{}).value;
  if(!dt){ toast('Pick a date first'); return; }
  const task=(state.tasks||[]).find(t=>t.id===id); if(!task) return;
  // Create archive entry for that date if needed
  if(!state.archive[dt]){
    state.archive[dt]={ type:'day', label:archiveLabel(dt), sections:{ibu:[],other:[],requests:[],upcoming:[]}, notes:'', created:Date.now() };
    SECTIONS.forEach(s=>{ if(!state.archive[dt].sections[s.key]) state.archive[dt].sections[s.key]=[]; });
  }
  // Store transferred task in the archive entry's notes (simplest approach — tasks live in state.tasks only)
  // We copy the task data as a new task record tagged to that date
  if(!state.archive[dt].tasks) state.archive[dt].tasks=[];
  const alreadyThere=state.archive[dt].tasks.some(t=>t.id===id);
  if(!alreadyThere){
    state.archive[dt].tasks.push({ ...task, transferredFrom:todayStr(), transferredOn:Date.now() });
  }
  if(mode==='move'){
    // Mark original as 'transferred' (keeps record but stops appearing in active list)
    updateTask(id,{ taskStatus:'transferred', transferredTo:dt });
    toast('Task transferred to '+dt+' ✓');
  } else {
    toast('Task copied to '+dt+' ✓');
  }
  document.getElementById('task-transfer-dlg')?.remove();
  render();
}

  // ── Today's tasks ─────────────────────────────────────────────────────────

          </div>`;
        }
        html+=`</div>`;
      }
    }
  }

  html+=`</div>`;
  // Standalone (mobile Tasks tab): render directly — no accordion wrapper
  if(isStandalone){
    // Close the inner content wrapper div we opened in the header
    html+='</div>';
    return`<div style="padding-bottom:80px">${html}</div>`;
  }
  return accHeader+html+'</div></div>';
}

function renderTaskCard(t, today){
  const TASK_DAY_NAMES={mon:'Monday',tue:'Tuesday',wed:'Wednesday',thu:'Thursday',fri:'Friday',sat:'Saturday',sun:'Sunday'};
  const isOpen=ui_openTasks.has(t.id);
  // For recurring tasks, calculate overdue from most recent occurrence, not original deadline
  const _recurDue=t.isRecurring&&t.deadline_date?mostRecentRecurOccurrence(t,today):null;
  // For recurring tasks, compute the true next occurrence to determine overdue state
  const _recurNextDue=(()=>{
    if(!t.isRecurring||!t.deadline_date) return null;
    const mostRecent=_recurDue||t.deadline_date;
    // If the most recent occurrence IS today, the task is due today — don't advance
    if(mostRecent===today) return today;
    const nxt=nextRecurrenceDate({...t,deadline_date:mostRecent});
    // If next occurrence is today or future, use it; otherwise advance one more
    return nxt>=today?nxt:nextRecurrenceDate({...t,deadline_date:nxt});
  })();
  // A recurring task is only overdue if its next scheduled occurrence is already in the past
  // (i.e. it missed today's window — tomorrow's occurrence is also past)
  const isOverdue=t.deadline_date&&t.taskStatus!=='done'&&t.taskStatus!=='not-done'&&t.taskStatus!=='transferred'&&(
    t.isRecurring ? (_recurNextDue&&_recurNextDue<today) : t.deadline_date<today
  );
  const _effectiveDue=t.isRecurring?(_recurNextDue||t.deadline_date):t.deadline_date;
  const isCarried=t.carriedForward&&t.taskStatus!=='done';
  const createdDate=new Date(t.created).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});

  // Card left-border class
  const _daysFromToday=_effectiveDue?Math.round((new Date(_effectiveDue+'T00:00:00').getTime()-new Date(today+'T00:00:00').getTime())/86400000):null;
  let cardCls='task-card ';
  if(t.taskStatus==='done') cardCls+='ts-done';
  else if(t.taskStatus==='not-done'||t.taskStatus==='transferred') cardCls+='ts-postponed';
  else if(isOverdue) cardCls+='ts-overdue';
  else if(t.taskStatus==='postponed-to') cardCls+='ts-postponed';
  else if(isCarried&&!(t.isRecurring&&_daysFromToday!==null&&_daysFromToday<=0)) cardCls+='ts-carried';
  else if(_daysFromToday===0) cardCls+='ts-today';
  else if(_daysFromToday===1) cardCls+='ts-tomorrow';
  else cardCls+='ts-pending';

  // Status badge — single source of truth on the right
  let sbCls='task-status-badge ', sbTxt='';
  const dot=color=>`<span class="badge-dot" style="background:${color}"></span>`;
  if(t.taskStatus==='done'){       sbCls+='tsb-done';      sbTxt=dot('#15803D')+'Done'; }
  else if(t.taskStatus==='not-done'){  sbCls+='tsb-notdone'; sbTxt=dot('#475569')+'Not done'; }
  else if(t.taskStatus==='transferred'){ sbCls+='tsb-postponed'; sbTxt=dot('#7C3AED')+'Transferred'; }
  else if(t.taskStatus==='postponed-to'){ sbCls+='tsb-postponed'; sbTxt=dot('#0369A1')+'Postponed'; }
  else if(isOverdue&&!t.isRecurring){ sbCls+='tsb-notdone'; const od=Math.abs(Math.round((new Date(today+'T00:00:00').getTime()-new Date(_effectiveDue+'T00:00:00').getTime())/86400000)); sbTxt=dot('#B91C1C')+'Overdue '+od+'d'; }
  else if(isOverdue&&t.isRecurring){ sbCls+='tsb-notdone'; const od=Math.abs(Math.round((new Date(today+'T00:00:00').getTime()-new Date(_effectiveDue+'T00:00:00').getTime())/86400000)); sbTxt=dot('#B91C1C')+'Overdue '+od+'d'; }
  else if(isCarried&&!(_daysFromToday!==null&&_daysFromToday<=0)){ sbCls+='tsb-carried'; sbTxt='↻ +'+(t.carriedDays||1)+'d'; }
  else if(t.isRecurring&&_effectiveDue){
    const nd=Math.round((new Date(_effectiveDue+'T00:00:00').getTime()-new Date(today+'T00:00:00').getTime())/86400000);
    sbCls+='tsb-pending';
    sbTxt=nd===0?dot('#B45309')+'Due today':nd===1?dot('#B45309')+'Due tomorrow':nd<0?dot('#B91C1C')+'Overdue '+Math.abs(nd)+'d':dot('#B45309')+'Due in '+nd+'d';
  }
  else if(_daysFromToday===0)  { sbCls+='tsb-today';   sbTxt=dot('#B45309')+'Due today'; }
  else if(_daysFromToday===1)  { sbCls+='tsb-pending';  sbTxt=dot('#B45309')+'Due tomorrow'; }
  else if(_daysFromToday===-1) { sbCls+='tsb-notdone';  sbTxt=dot('#B91C1C')+'Due yesterday'; }
  else if(_daysFromToday!==null&&_daysFromToday<0) { sbCls+='tsb-notdone'; sbTxt=dot('#B91C1C')+'Overdue '+Math.abs(_daysFromToday)+'d'; }
  else if(_daysFromToday!==null&&_daysFromToday>1) { sbCls+='tsb-pending'; sbTxt=dot('#B45309')+'Due in '+_daysFromToday+'d'; }
  else { sbCls+='tsb-pending'; sbTxt=dot('#B45309')+'Upcoming'; }

  // Build recurring schedule label
  let recurSchedule='';
  if(t.isRecurring){
    const TASK_DAY_NAMES2={mon:'Monday',tue:'Tuesday',wed:'Wednesday',thu:'Thursday',fri:'Friday',sat:'Saturday',sun:'Sunday'};
    if(t.recurFreq==='weekly'&&(t.recurDaysOfWeek||[]).length){
      recurSchedule='every '+t.recurDaysOfWeek.map(d=>TASK_DAY_NAMES2[d]||d).join(' / ');
    } else if(t.recurFreq==='daily'){
      recurSchedule='every day';
    } else if(t.recurFreq==='monthly'){
      recurSchedule='every month';
    } else if(t.recurFreq==='custom'&&t.recurDays){
      recurSchedule='every '+t.recurDays+'d';
    } else {
      recurSchedule=t.recurLabel||t.recurFreq||'recurring';
    }
  }

  // Deadline info — recurring tasks show schedule instead of overdue
  let deadlineChip='';
  if(t.deadline_date){
    const diff=new Date(t.deadline_date+'T00:00:00').getTime()-new Date(today+'T00:00:00').getTime();
    const days=Math.round(diff/86400000);
    if(t.taskStatus==='done') deadlineChip=`<span class="task-chip mono">📅 ${fmtDate(t.deadline_date)}</span>`;
    else if(t.isRecurring){
      // No deadline chip for recurring tasks — the 🔁 recur badge shows cadence; specific date is misleading
      deadlineChip='';
    }
    else if(days===-1) deadlineChip=`<span class="task-chip mono">📅 Yesterday</span>`;
    else if(days<0) deadlineChip=`<span class="task-chip mono">📅 ${fmtDate(t.deadline_date)}</span>`;
    else if(days===0) deadlineChip=`<span class="task-chip mono">📅 Today</span>`;
    else { const timeStr=t.deadline_time?(' '+t.deadline_time+' '+ukLabel()+(ukToIST(t.deadline_time)?' / '+ukToIST(t.deadline_time)+' IST':'')):''; deadlineChip=`<span class="task-chip mono">📅 ${fmtDate(t.deadline_date)}${timeStr}</span>`; }
  }
  const postponeChip=t.taskStatus==='postponed-to'&&t.postponeTo?`<span class="task-chip">⏸ Postponed to ${t.postponeTo}</span>`:'';
  const carriedChip='';
  const doneChip=t.taskStatus==='done'&&t.doneAt?`<span class="task-chip" style="color:var(--done)">Done ${new Date(t.doneAt).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}</span>`:'';

  const recurBadge=t.isRecurring?`<span class="recurring-badge">🔁 ${recurSchedule}</span>`:'';
  return`<div class="${cardCls}" data-id="${t.id}">
  <div class="task-top" onclick="toggleTaskOpen('${t.id}')">
    <div style="flex:1;min-width:0">
      <div class="task-title${t.taskStatus==='done'?' done-title':''}">${esc(t.title||'Untitled')}</div>
      <div class="task-chips">
        ${deadlineChip}${postponeChip}${carriedChip}${doneChip}${recurBadge}
      </div>
    </div>
    <div class="task-right">
      <span class="${sbCls}">${sbTxt}</span>
    </div>

    <span class="chevron${isOpen?' open':''}" id="task-chev-${t.id}" style="margin-top:1px">▾</span>
  </div>
  <div class="task-body${isOpen?' open':''}" id="task-body-${t.id}">
    <div style="font-size:10.5px;color:var(--text3);font-family:var(--font);margin-bottom:8px;">🗓 Added ${createdDate}${t.deadline_date?' · 📅 '+fmtDate(t.deadline_date):''}</div>
    ${t.notes?`<div style="font-size:12.5px;color:var(--text2);line-height:1.6;margin-bottom:10px;white-space:pre-wrap">${esc(t.notes)}</div>`:''}
    <div class="task-btns">
      ${t.taskStatus==='done'
        ? `<button class="btn btn-not-done btn-sm" onclick="setTaskStatus('${t.id}','pending');event.stopPropagation()">↩ Reopen</button>`
        : t.taskStatus==='not-done'
        ? `<span style="font-size:11px;color:var(--text3);font-family:var(--font);padding:2px 0">⚫ Marked not done — won't carry forward</span>
           <button class="btn btn-postpone btn-sm" onclick="openTaskTransferDialog('${t.id}');event.stopPropagation()">📅 Transfer / Copy to date…</button>
           <button class="btn btn-ghost btn-sm" onclick="setTaskStatus('${t.id}','pending');event.stopPropagation()">↩ Reopen</button>`
        : t.taskStatus==='transferred'
        ? `<span style="font-size:11px;color:var(--text3);font-family:var(--font)">→ Transferred to ${esc(t.transferredTo||'')}</span>
           <button class="btn btn-ghost btn-sm" onclick="setTaskStatus('${t.id}','pending');event.stopPropagation()">↩ Reopen here</button>`
        : `<button class="btn btn-done-active btn-sm" onclick="setTaskStatus('${t.id}','done');event.stopPropagation()">✅ Mark Done</button>
           <button class="btn btn-not-done btn-sm" onclick="setTaskStatus('${t.id}','not-done');event.stopPropagation()">⚫ Not Done</button>`
      }
      ${t.taskStatus!=='done'&&t.taskStatus!=='not-done'&&t.taskStatus!=='transferred'
        ? `<button class="btn btn-ghost btn-sm" onclick="openPostponeDialog('${t.id}');event.stopPropagation()">⏸ Postpone…</button>`
        : ''
      }
      <button class="btn btn-ghost btn-sm" onclick="editTask('${t.id}');event.stopPropagation()">✏ Edit</button>
      <button class="btn btn-ghost btn-sm btn-danger" onclick="event.stopPropagation();if(confirm('Delete this task?'))deleteTask('${t.id}')">🗑</button>
    </div>
  </div>
</div>`;
}

function renderCombinedAccordion(archKey){
  const isOpen=ui.openSections.has('ibu');
  const archKeyJS=archKey?`'${archKey}'`:'null';
  const ibuAll=((archKey?state.archive[archKey]?.sections?.ibu:state.sections.ibu)||[]).filter(s=>!s._deleted);
  const otherAll=((archKey?state.archive[archKey]?.sections?.other:state.sections.other)||[]).filter(s=>!s._deleted);
  const fKeyIbu='ibu'+(archKey?'::'+archKey:'');
  const fKeyOther='other'+(archKey?'::'+archKey:'');
  const isIBUFormOpen=ui.openForms.has(fKeyIbu);
  const isOtherFormOpen=ui.openForms.has(fKeyOther);

  const TERMINAL_S=['completed','not-done'];
  const ibuLive=ibuAll.filter(s=>!TERMINAL_S.includes(s.status)&&s.status!=='shelved');
  const otherLive=otherAll.filter(s=>!TERMINAL_S.includes(s.status)&&s.status!=='shelved');
  const ibuDone=ibuAll.filter(s=>TERMINAL_S.includes(s.status));
  const otherDone=otherAll.filter(s=>TERMINAL_S.includes(s.status));
  const ibuActive=ibuLive;
  const otherActive=otherLive;
  const allActive=[...ibuActive,...otherActive];
  const shelvedAll=[...ibuAll,...otherAll].filter(s=>s.status==='shelved');
  const uc=allActive.filter(s=>s.status==='urgent').length;
  const ic=allActive.filter(s=>s.status==='in-progress').length;
  const cc=allActive.filter(s=>s.carriedForward&&s.status!=='completed'&&s.status!=='on-hold').length;

  // Apply search + global filter
  const applyFilter=(arr)=>{
    let a=[...arr];
    if(ui.search){ const q=ui.search.toLowerCase(); a=a.filter(s=>(s.title||'').toLowerCase().includes(q)||(s.correspondent||'').toLowerCase().includes(q)||(s.producer||'').toLowerCase().includes(q)||(s.shoot_edit||'').toLowerCase().includes(q)||(s.remarks||'').toLowerCase().includes(q)); }
    if(ui.filter==='working')  return a.filter(s=>s.mode==='working');
    if(ui.filter==='watching') return a.filter(s=>s.mode==='watching');
    if(ui.filter!=='all')      return a.filter(s=>s.status===ui.filter);
    return a;
  };
  const combinedFiltered=[
    ...applyFilter(ibuActive).map(s=>({...s,_subsec:'ibu'})),
    ...applyFilter(otherActive).map(s=>({...s,_subsec:'other'})),
  ];

  // Pre-compute bits that would cause template literal nesting issues
  const _types=[...new Set((ibuActive.concat(otherActive)).flatMap(s=>(s.story_type||'').split(',').map(t=>t.trim()).filter(Boolean)))];
  const _typeBadge=_types.length?_types.map(t=>`<span class="sbadge sb-story-type">${t.charAt(0).toUpperCase()+t.slice(1).toLowerCase()}</span>`).join(''):'';
  const _urgentBadge=uc?`<span class="sbadge sb-urgent">${uc} urgent</span>`:'';
  const _progressBadge=ic?`<span class="sbadge sb-in-progress">${ic} in progress</span>`:'';
  const _carryBadge=cc?`<span class="sbadge" style="background:rgba(234,88,12,.08);color:var(--carry);border:0.5px solid rgba(234,88,12,.25);">↻ ${cc} carried</span>`:'';
  const _filterChip=ui.filter!=='all'?`<span style="font-size:10px;font-family:var(--font);color:var(--accent);cursor:pointer" onclick="setFilter('all',null);event.stopPropagation()">✕ ${ui.filter}</span>`:'';
  const _ibuForm=isIBUFormOpen?renderForm('ibu',archKey):'';
  const _otherForm=isOtherFormOpen?renderForm('other',archKey):'';

  // Stories strip — most urgent active story
  const _storiesStrip=(()=>{
    const candidates=[...allActive].filter(s=>!['completed','not-done','on-hold','shelved'].includes(s.status));
    if(!candidates.length) return '';
    candidates.sort((a,b)=>(b.created||0)-(a.created||0));
    const s=candidates[0];
    const dotCol=s.status==='urgent'?'#DC2626':s.status==='in-progress'?'#D97706':'#94a3b8';
    const _today=todayStr();
    let metaParts=[];
    if(s.deadline_date){
      const diff=Math.round((new Date(s.deadline_date+'T00:00:00').getTime()-new Date(_today+'T00:00:00').getTime())/86400000);
      const dlStr=diff===0?'Due today':diff===1?'Due tomorrow':diff===-1?'Due yesterday':diff<0?'Overdue '+Math.abs(diff)+'d':'Due '+_stripDateWord(s.deadline_date,_today);
      if(s.deadline_uk) metaParts.push(dlStr+' '+s.deadline_uk+' BST');
      else metaParts.push(dlStr);
    } else {
      const statusLbl=s.status==='urgent'?'Urgent':s.status==='in-progress'?'In progress':s.status==='postponed'?'Postponed':'';
      if(statusLbl) metaParts.push(statusLbl);
    }
    if(s.broadcast_times&&s.broadcast_times.length){
      const bt=s.broadcast_times[0];
      const bStr=[bt.prog||bt.plat||'',bt.uk?bt.uk+' BST':''].filter(Boolean).join(' ');
      if(bStr) metaParts.push(bStr);
    }
    const meta=metaParts.join(' · ');
    return `<div class="acc-info-strip"><span style="width:5px;height:5px;border-radius:50%;background:${dotCol};flex-shrink:0;display:inline-block"></span><span style="font-size:10px;color:var(--text2);font-style:italic;font-family:var(--font);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-left:5px">${esc(s.title||'')}</span><span style="font-size:10px;font-weight:400;color:#888;font-family:var(--font);flex-shrink:0;margin-left:4px">${meta}</span></div>`;
  })();

  let html=`<div class="accordion${isOpen?' acc-open':''}" id="acc-ibu">
    <div class="acc-header" onclick="toggleAccordion('ibu')">
      <span class="acc-icon">📡</span>
      <span class="acc-name">Stories</span>
      <span class="acc-summary">${(()=>{ if(!allActive.length)return ''; const c=[...allActive].filter(s=>!['completed','not-done','on-hold','shelved'].includes(s.status)); if(!c.length)return ''; c.sort((a,b)=>(b.created||0)-(a.created||0)); return esc(c[0].title||''); })()}</span>
      <div class="acc-meta">${_urgentBadge}${_progressBadge}${_carryBadge}${_filterChip}</div>
      <span class="acc-chevron${isOpen?' open':''}" id="acc-chev-ibu">▾</span>
    </div>
    ${_storiesStrip}
    <div class="acc-body${isOpen?' open':''}" id="acc-body-ibu">
      <div class="sec-head" style="flex-wrap:wrap;gap:6px;align-items:center">
        <button class="btn btn-ghost btn-sm" onclick="doEmailSection('ibu',${archKeyJS});event.stopPropagation()">✉ Email</button>
        <button class="btn btn-ghost btn-sm" onclick="doExportSectionTxt('ibu',${archKeyJS});event.stopPropagation()">↓ Export</button>
        <button class="btn btn-accent btn-sm" onclick="toggleForm('ibu',${archKeyJS});event.stopPropagation()">+ Add</button>
      </div>
      ${_ibuForm}${_otherForm}`;

  if(ui.filter!=='all'||ui.search){
    html+=`<div style="font-size:11.5px;color:var(--accent);background:rgba(207,102,64,.07);border:1px solid rgba(207,102,64,.2);border-radius:7px;padding:7px 10px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between"><span>🔍 Showing ${combinedFiltered.length} of ${ibuActive.length+otherActive.length}</span><button class="btn btn-ghost btn-xs" onclick="setFilter('all',null);ui.search='';const si=document.getElementById('search-input');if(si)si.value='';render();event.stopPropagation()">Clear ✕</button></div>`;
  }

  html+='<div id="stories-wrap-ibu">';

  const RESOLVED_S=['completed','not-done','on-hold','postponed','shelved'];
  const _today2=todayStr();
  const activeFiltered=combinedFiltered.filter(s=>!RESOLVED_S.includes(s.status));
  // Collect resolved from today
  const _todayResolved=[
    ...ibuAll.filter(s=>RESOLVED_S.includes(s.status)).map(s=>({...s,_subsec:'ibu'})),
    ...otherAll.filter(s=>RESOLVED_S.includes(s.status)).map(s=>({...s,_subsec:'other'})),
  ];
  // Also pull resolved from all archive dates
  const _seenIds=new Set(_todayResolved.map(s=>s.id));
  const _archiveDates=Object.keys(state.archive||{}).sort().reverse(); // newest first
  const _archiveResolved=[];
  _archiveDates.forEach(dateKey=>{
    const arch=state.archive[dateKey];
    if(!arch?.sections) return;
    ['ibu','other'].forEach(sub=>{
      (arch.sections[sub]||[]).filter(s=>!s._deleted&&RESOLVED_S.includes(s.status)&&!_seenIds.has(s.id)).forEach(s=>{
        _seenIds.add(s.id);
        _archiveResolved.push({...s,_subsec:sub,_archiveDate:dateKey});
      });
    });
  });
  const resolvedAll=[..._todayResolved,..._archiveResolved];

  if(!activeFiltered.length && !isIBUFormOpen && !isOtherFormOpen){
    html+='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-msg">No active stories yet — click <strong>+ Add</strong></div></div>';
  } else {
    const _overdue=[], _noDate=[], _byDate={};
    activeFiltered.forEach(s=>{
      const dl=s.deadline_date||'';
      if(!dl){ _noDate.push(s); return; }
      if(dl<_today2){ _overdue.push(s); return; }
      if(!_byDate[dl]) _byDate[dl]=[];
      _byDate[dl].push(s);
    });
    _overdue.sort((a,b)=>(a.deadline_date||'').localeCompare(b.deadline_date||''));
    // Overdue — no label, just render cards directly
    if(_overdue.length) html+=_overdue.map(s=>renderCard(s._subsec||'ibu',s,archKey)).join('');
    // Date buckets — thin label line then cards, no wrapper div
    Object.keys(_byDate).sort().forEach(dl=>{
      const isToday=dl===_today2;
      const isTomorrow=dl===addDays(_today2,1);
      const dlLabel=isToday?'Today · '+new Date(dl+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}):isTomorrow?'Tomorrow · '+new Date(dl+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}):new Date(dl+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
      const grp=_byDate[dl];
      const g_uc=grp.filter(s=>s.status==='urgent').length;
      const g_ip=grp.filter(s=>s.status==='in-progress').length;
      html+=`<div style="font-size:11px;font-weight:600;color:${isToday?'var(--accent)':'var(--text2)'};padding:0 2px 5px;border-bottom:1px solid var(--border);margin:4px 0 8px">${dlLabel}</div>${grp.map(s=>renderCard(s._subsec||'ibu',s,archKey)).join('')}`;
    });
    if(_noDate.length) html+=`<div style="font-size:11px;font-weight:600;color:var(--text3);padding:0 2px 5px;border-bottom:1px solid var(--border);margin:4px 0 8px">No deadline</div>${_noDate.map(s=>renderCard(s._subsec||'ibu',s,archKey)).join('')}`;
  }

  // Resolved — sub-group labels directly, no RESOLVED header
  if(resolvedAll.length){
    const _rDone=resolvedAll.filter(s=>s.status==='completed');
    const _rHold=resolvedAll.filter(s=>s.status==='on-hold');
    const _rNotDone=resolvedAll.filter(s=>s.status==='not-done');
    const _rPostponed=resolvedAll.filter(s=>s.status==='postponed');
    const _rShelved=resolvedAll.filter(s=>s.status==='shelved');
    html+='<div style="margin-top:4px;border-top:1px solid var(--border);padding-top:8px">';
    if(!ui._resolvedGroupOpen) ui._resolvedGroupOpen={};
    const _rGroup=(label,icon,color,arr,key)=>{
      if(!arr.length) return '';
      const isGOpen=ui._resolvedGroupOpen[key]===true; // collapsed by default
      const groupBodyId='rg-body-'+key;

function addNote(data){
  if(!state.notes) state.notes=[];
  const id=genId();
  const today=todayStr();
  const note={...data, id, created:Date.now(), status:'active', carriedForward:false, carriedFromDate:null, carriedDays:0};
  state.notes.push(note);

  // Also log to today's archive so it always appears when browsing that date
  if(!state.archive[today]){
    state.archive[today]={type:'day',label:archiveLabel(today),sections:{},notes:'',created:Date.now()};
    SECTIONS.forEach(s=>{state.archive[today].sections[s.key]=[];});
  }
  if(!state.archive[today].notesLog) state.archive[today].notesLog=[];
  // Store reference — we'll refresh this log when status changes
  const existing=state.archive[today].notesLog.findIndex(n=>n.id===id);
  if(existing<0) state.archive[today].notesLog.push({...note});

  saveAndPush();
}
function updateNote(id, data){
  if(!state.notes) return;
  const i=state.notes.findIndex(n=>n.id===id);
  if(i>=0){
    state.notes[i]={...state.notes[i],...data, updated:Date.now()};
    // Keep archive log entry in sync
    const note=state.notes[i];
    const createdDate=note.carriedFromDate||(note.created?dateStr(new Date(typeof note.created==='number'?note.created:parseInt(note.created))):todayStr());
    if(state.archive[createdDate]?.notesLog){
      const li=state.archive[createdDate].notesLog.findIndex(n=>n.id===id);
      if(li>=0) state.archive[createdDate].notesLog[li]={...state.archive[createdDate].notesLog[li],...data};
    }
    saveAndPush();
  }
}
function deleteNote(id){
  const note=(state.notes||[]).find(n=>n.id===id); if(!note) return;

  // Archive to creation date before permanent deletion
  const createdDate=note.carriedFromDate||(note.created?dateStr(new Date(typeof note.created==='number'?note.created:parseInt(note.created))):todayStr());
  if(!state.archive[createdDate]){
    state.archive[createdDate]={type:'day',label:archiveLabel(createdDate),sections:{},notes:'',created:Date.now()};
    SECTIONS.forEach(s=>{state.archive[createdDate].sections[s.key]=[];});
  }
  if(!state.archive[createdDate].notesLog) state.archive[createdDate].notesLog=[];
  if(!state.archive[createdDate].notesLog.some(n=>n.id===id)){
    state.archive[createdDate].notesLog.push({...note, deletedOn:Date.now(), _deleted:true});
  }

  state.notes=(state.notes||[]).filter(n=>n.id!==id);
  if(!state.deletedIds) state.deletedIds={};
  if(!state.deletedIds.notes) state.deletedIds.notes=[];
  if(!state.deletedIds.notes.includes(id)) state.deletedIds.notes.push(id);
  saveAndPush(); renderDateStrip(); render();
}
function setNoteStatus(id, status){
  if(!state.notes) return;
  const note=state.notes.find(n=>n.id===id);
  if(!note) return;

  // Archive the note to its creation date so it's permanently recorded there
  const createdDate=note.carriedFromDate||(note.created?dateStr(new Date(typeof note.created==='number'?note.created:parseInt(note.created))):todayStr());
  if(!state.archive[createdDate]){
    state.archive[createdDate]={type:'day',label:archiveLabel(createdDate),sections:{},notes:'',created:Date.now()};
    SECTIONS.forEach(s=>{state.archive[createdDate].sections[s.key]=[];});
  }
  // Store resolved note in archive entry's notesLog array
  if(!state.archive[createdDate].notesLog) state.archive[createdDate].notesLog=[];
  const alreadyLogged=state.archive[createdDate].notesLog.some(n=>n.id===id);
  if(!alreadyLogged){
    state.archive[createdDate].notesLog.push({...note, status, resolvedOn:Date.now()});
  } else {
    const i=state.archive[createdDate].notesLog.findIndex(n=>n.id===id);
    if(i>=0) state.archive[createdDate].notesLog[i]={...note, status, resolvedOn:Date.now()};
  }

  updateNote(id,{status, resolvedOn:Date.now()});

  // Also update the archive log entry for this note on its creation date
  if(state.archive[createdDate]?.notesLog){
    const li=state.archive[createdDate].notesLog.findIndex(n=>n.id===id);
    if(li>=0) state.archive[createdDate].notesLog[li]={...state.archive[createdDate].notesLog[li], status, resolvedOn:Date.now()};
  }

  toast(status==='done'?'✅ Note marked Done — saved to '+archiveLabel(createdDate):'↪ Note passed — saved to '+archiveLabel(createdDate));
  renderDateStrip();
  render();
}

/* ── Meeting time helpers (module-level so summary/strip can use them) ── */
function meetingUtcDate(dateStr, timeStr){
  if(!dateStr) return null;
  const parts=(timeStr||'00:00').split(':');
  const ukMin=(+parts[0])*60+(+parts[1]||0);
  const utcMin=((ukMin-ukOffMin())+1440)%1440;
  const utcH=Math.floor(utcMin/60), utcM=utcMin%60;
  return new Date(dateStr+'T'+p2(utcH)+':'+p2(utcM)+':00Z');
}
function nextMeetingOccurrenceMs(m){
  // Returns the UTC ms of the meeting's next occurrence after now.
  // Works for both one-time and recurring meetings.
  const now=new Date();
  const today=dateStr(now);
  if(!m.isRecurring){
    if(!m.date) return Infinity;
    const dt=meetingUtcDate(m.date, m.time);
    return dt>now ? dt.getTime() : Infinity;
  }
  // Recurring — scan forward up to 56 days
  const DAYS=['sun','mon','tue','wed','thu','fri','sat'];
  for(let i=0;i<56;i++){
    const tryDate=addDays(today,i);
    const tryDt=meetingUtcDate(tryDate, m.time);
    if(!tryDt||tryDt<=now) continue;
    if(m.recurFreq==='daily') return tryDt.getTime();
    if(m.recurFreq==='weekly'&&(m.recurDaysOfWeek||[]).length){
      const dow=DAYS[new Date(tryDate+'T12:00:00').getDay()];
      if(m.recurDaysOfWeek.includes(dow)) return tryDt.getTime();
    } else if(m.recurFreq==='weekly'){
      const base=new Date((m.date||today)+'T12:00:00');
      const tryD=new Date(tryDate+'T12:00:00');
      if(Math.round((tryD-base)/86400000)%7===0) return tryDt.getTime();
    } else if(m.recurFreq==='monthly'){
      const baseDay=new Date((m.date||today)+'T12:00:00').getDate();
      if(new Date(tryDate+'T12:00:00').getDate()===baseDay) return tryDt.getTime();
    } else if(m.recurFreq==='custom'&&m.recurDays){
      const base=new Date((m.date||today)+'T12:00:00');
      const tryD=new Date(tryDate+'T12:00:00');
      if(Math.round((tryD-base)/86400000)%m.recurDays===0) return tryDt.getTime();
    }
  }
  return Infinity;
}

function renderMeetingCard(m, isPastOneOff=false){
  const isOpen=ui_openMeetings.has(m.id);
  const DAY_NAMES={sun:'Sunday',mon:'Monday',tue:'Tuesday',wed:'Wednesday',thu:'Thursday',fri:'Friday',sat:'Saturday'};
  const recurDayLabel=m.isRecurring&&m.recurFreq==='weekly'&&(m.recurDaysOfWeek||[]).length
    ? 'every '+m.recurDaysOfWeek.map(d=>DAY_NAMES[d]||d).join(' / ')
    : m.isRecurring&&m.recurFreq==='daily'?'every day'
    : m.isRecurring&&m.recurFreq==='custom'&&m.recurDays?'every '+m.recurDays+'d':'';
  // Detect device local timezone offset vs IST
  const devOffMin=-(new Date().getTimezoneOffset());
  const isDevIST=devOffMin>=325&&devOffMin<=335; // IST = UTC+5:30, allow small variance
  // Always show IST in the icon block for consistency
  const localTime=m.time?ukToIST(m.time):'';
  const localTZ='IST';
  const istTime=m.time?ukToIST(m.time):'';
  const ukDisplayTime=m.time?(m.time+' '+ukLabel()):'';
  const istDisplayTime=istTime?(istTime+' IST'):'';
  const recurTimeStr=m.isRecurring&&recurDayLabel
    ? [ukDisplayTime,istDisplayTime].filter(Boolean).join(' / ')+' '+recurDayLabel
    : [ukDisplayTime,istDisplayTime].filter(Boolean).join(' / ');
  const dateStr2=m.date?new Date(m.date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'}):'';
  const stCls=m.status==='done'?'mc-done':m.status==='cancelled'?'mc-cancelled':isPastOneOff?'mc-done':'';
  // Countdown chip for scheduled meetings
  // Helper: build UTC Date from BST/GMT time string + date string
  function meetingUtcDate(dateStr, timeStr){
    if(!dateStr) return null;
    const parts=(timeStr||'00:00').split(':');
    const ukMin=(+parts[0])*60+(+parts[1]||0);
    const utcMin=((ukMin-ukOffMin())+1440)%1440;
    const utcH=Math.floor(utcMin/60), utcM=utcMin%60;
    return new Date(dateStr+'T'+p2(utcH)+':'+p2(utcM)+':00Z');
  }
  // For recurring: find next occurrence date after now
  function nextRecurringDate(m){
    if(!m.isRecurring) return null;
    const now=new Date();
    const today=dateStr(now);
    // Try up to 8 weeks forward
    for(let i=0;i<56;i++){
      const tryDate=addDays(today,i);
      const tryDt=meetingUtcDate(tryDate, m.time);
      if(tryDt>now){
        if(m.recurFreq==='daily') return tryDate;
        if(m.recurFreq==='weekly'&&(m.recurDaysOfWeek||[]).length){
          const DAYS=['sun','mon','tue','wed','thu','fri','sat'];
          const dow=DAYS[new Date(tryDate+'T12:00:00').getDay()];
          if(m.recurDaysOfWeek.includes(dow)) return tryDate;
        } else if(m.recurFreq==='weekly'){
          const base=new Date((m.date||today)+'T12:00:00');
          const tryD=new Date(tryDate+'T12:00:00');
          const diffDays=Math.round((tryD-base)/86400000);
          if(diffDays%7===0) return tryDate;
        } else if(m.recurFreq==='monthly'){
          const baseDay=new Date((m.date||today)+'T12:00:00').getDate();
          if(new Date(tryDate+'T12:00:00').getDate()===baseDay) return tryDate;
        } else if(m.recurFreq==='custom'&&m.recurDays){
          const base=new Date((m.date||today)+'T12:00:00');
          const tryD=new Date(tryDate+'T12:00:00');
          const diffDays=Math.round((tryD-base)/86400000);
          if(diffDays%m.recurDays===0) return tryDate;
        }
      }
    }
    return null;
  }
  let countdownChip='';
  if(m.status!=='done'&&m.status!=='cancelled'&&m.date){
    const now=new Date();
    const meetDt=meetingUtcDate(m.date, m.time);
    const diff=meetDt-now;
    const absMins=Math.round(Math.abs(diff)/60000);
    if(diff<0){
      // Past — for recurring show next occurrence countdown
      if(m.isRecurring){
        const nxt=nextRecurringDate(m);
        if(nxt){
          const nxtDt=meetingUtcDate(nxt,m.time);
          const nxtDiff=nxtDt-now;
          const nxtMins=Math.round(nxtDiff/60000);
          if(nxtMins<60) countdownChip=`<span class="countdown-chip" style="background:rgba(13,148,136,.09);color:var(--working);border:0.5px solid rgba(13,148,136,.35)">next in ${nxtMins}m</span>`;
          else if(nxtMins<1440) countdownChip=`<span class="countdown-chip" style="background:rgba(13,148,136,.09);color:var(--working);border:0.5px solid rgba(13,148,136,.35)">next in ${Math.round(nxtMins/60)}h</span>`;
          else countdownChip=`<span class="countdown-chip" style="background:rgba(79,70,229,.07);color:var(--week);border:0.5px solid rgba(79,70,229,.3)">next in ${Math.round(nxtMins/1440)}d</span>`;
        }
      } else {
        countdownChip=`<span class="countdown-chip" style="background:rgba(22,163,74,.09);color:var(--done);border:0.5px solid rgba(22,163,74,.3)">ended</span>`;
      }
    } else if(absMins<60){ countdownChip=`<span class="countdown-chip" style="background:rgba(13,148,136,.09);color:var(--working);border:0.5px solid rgba(13,148,136,.35)">in ${absMins}m</span>`; }
    else if(absMins<1440){ countdownChip=`<span class="countdown-chip" style="background:rgba(13,148,136,.09);color:var(--working);border:0.5px solid rgba(13,148,136,.35)">in ${Math.round(absMins/60)}h</span>`; }
    else { const days=Math.round(absMins/1440); countdownChip=`<span class="countdown-chip" style="background:rgba(79,70,229,.07);color:var(--week);border:0.5px solid rgba(79,70,229,.3)">in ${days}d</span>`; }
  }
  const statusChip=m.status==='done'?`<span class="countdown-chip" style="background:var(--done-bg);color:var(--done);border:0.5px solid rgba(22,163,74,.3)">Done</span>`:m.status==='cancelled'?`<span class="countdown-chip" style="background:rgba(148,163,184,.09);color:#64748b;border:0.5px solid rgba(148,163,184,.3)">Cancelled</span>`:'';
  const pCount=(m.participants||[]).length;
  const venueIsLink=m.venue&&m.venue.startsWith('http');
  const venueMapLink=m.venue&&!venueIsLink?`https://maps.google.com/?q=${encodeURIComponent(m.venue)}`:'';
  const showRemarkForm=ui_meetingRemarkForms[m.id];
  const editingRemarkId=ui_editMeetingRemarkId[m.id];

  const _recCls=m.isRecurring&&m.status!=='done'&&m.status!=='cancelled'?' mc-recurring':'';
  return`<div class="meeting-card ${stCls}${_recCls}" data-id="${m.id}">
  <div class="meeting-top" onclick="toggleMeetingOpen('${m.id}')">
    <div class="meeting-time-block">
      <div class="meeting-time-hr">${localTime||'—'}</div>
      <div class="meeting-time-date">${localTZ}</div>
    </div>
    <div class="meeting-title-wrap">
      <div class="meeting-name" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(m.name||'Untitled')}${m.isRecurring?` <span class="recurring-badge">↻</span>`:''}</div>
      <div class="meeting-meta">${m.isRecurring&&recurDayLabel?esc(recurTimeStr):((dateStr2?dateStr2:'')+(pCount?(dateStr2?' · ':'')+pCount+' participant'+(pCount>1?'s':''):'')+(m.venue?(dateStr2||pCount?' · ':'')+esc(m.venue.replace(/^https?:\/\//,'').slice(0,40)):''))}</div>
    </div>
    ${statusChip||countdownChip}
    <span class="chevron${isOpen?' open':''}" id="mc-chev-${m.id}" style="margin-left:4px">▾</span>
  </div>
  <div class="meeting-body${isOpen?' open':''}" id="mb-${m.id}">
    <div class="card-fields" style="margin-top:8px">
      ${m.date?`<div><div class="cfield-label">Date</div><div class="cfield-value">${fmtDate(m.date)}</div></div>`:''}
      ${m.time?`<div><div class="cfield-label">Time</div><div class="cfield-value">${esc(ukDisplayTime)}${istDisplayTime?' / '+esc(istDisplayTime):''}</div></div>`:''}
      ${m.agenda?`<div style="grid-column:1/-1"><div class="cfield-label">Agenda</div><div class="cfield-value" style="white-space:pre-wrap">${esc(m.agenda)}</div></div>`:''}
      ${m.venue?`<div><div class="cfield-label">Venue</div><div class="cfield-value">${venueIsLink?`<a href="${esc(m.venue)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:var(--accent)">🔗 Open link</a>`:venueMapLink?`${esc(m.venue)} <a href="${venueMapLink}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:var(--accent);margin-left:6px;font-size:11px">📍 Map</a>`:esc(m.venue)}</div></div>`:''}
      ${m.reminder&&m.reminder!=='off'?`<div><div class="cfield-label">Reminder</div><div class="cfield-value">⏰ ${esc(m.reminder)}${m.reminderNote?' — '+esc(m.reminderNote):''}</div></div>`:''}
      ${m.isRecurring?`<div><div class="cfield-label">Recurrence</div><div class="cfield-value">🔁 ${recurTimeStr||recurDayLabel||'Recurring'}</div></div>`:''}
    </div>
    ${(m.participants||[]).length?`<div style="margin-top:10px">
      <div class="cfield-label" style="margin-bottom:5px">Participants</div>
      <div class="meeting-participants">
        ${m.participants.map(p=>`<span class="participant-chip${p.isExternal?' ext':''}">${p.isExternal?'👤':'👥'} ${esc(p.name)}</span>`).join('')}
      </div>
    </div>`:''}
    <div class="meeting-remarks-list">
      ${(m.remarks||[]).length?`<div class="cfield-label" style="margin:10px 0 5px">Remarks</div>`:''}
      ${(m.remarks||[]).map(r=>{
        if(editingRemarkId===r.id){
          return`<div style="margin-bottom:6px">
            <textarea class="ftextarea" id="mref-text-${m.id}-${r.id}" style="min-height:52px;white-space:pre-wrap">${esc(r.text)}</textarea>
            <div style="display:flex;gap:6px;margin-top:5px">
              <button class="btn btn-accent btn-sm" onclick="submitMeetingRemarkEdit('${m.id}','${r.id}')">Save</button>
              <button class="btn btn-ghost btn-sm" onclick="delete ui_editMeetingRemarkId['${m.id}'];render()">Cancel</button>
            </div>
          </div>`;
        }
        const dt=new Date(r.created).toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
        return`<div class="mremark">
          <div class="mremark-text">${esc(r.text)}</div>
          <div class="mremark-meta">${dt}${r.edited?' · edited':''}
            <button class="btn btn-ghost btn-xs" style="margin-left:8px" onclick="ui_editMeetingRemarkId['${m.id}']='${r.id}';render()">✏</button>
            <button class="btn btn-ghost btn-xs btn-danger" style="margin-left:4px" onclick="if(confirm('Delete this remark?'))deleteMeetingRemark('${m.id}','${r.id}')">🗑</button>
          </div>
        </div>`;
      }).join('')}
      ${showRemarkForm?`<div style="margin-top:8px">
        <textarea class="ftextarea" id="mrf-text-${m.id}" placeholder="Add a remark…" style="min-height:52px;white-space:pre-wrap"></textarea>
        <div style="display:flex;gap:6px;margin-top:5px">
          <button class="btn btn-accent btn-sm" onclick="submitMeetingRemark('${m.id}')">Save Remark</button>
          <button class="btn btn-ghost btn-sm" onclick="ui_meetingRemarkForms['${m.id}']=false;render()">Cancel</button>
        </div>
      </div>`:`<button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="ui_meetingRemarkForms['${m.id}']=true;render()">+ Add Remark</button>`}
    </div>
    <div style="display:flex;gap:7px;margin-top:12px;flex-wrap:wrap;align-items:center">
      <button class="btn btn-ghost btn-sm" onclick="editMeeting('${m.id}')">✏ Edit</button>
      ${m.status!=='done'?`<button class="btn btn-done-active btn-sm" onclick="updateMeeting('${m.id}',{status:'done'});render()">✅ Mark Done</button>`:''}
      ${m.status==='done'?`<button class="btn btn-ghost btn-sm" onclick="updateMeeting('${m.id}',{status:'scheduled'});render()">↩ Reopen</button>`:''}
      ${m.status!=='cancelled'?`<button class="btn btn-ghost btn-sm" onclick="updateMeeting('${m.id}',{status:'cancelled'});render()">🚫 Cancel</button>`:`<button class="btn btn-ghost btn-sm" onclick="updateMeeting('${m.id}',{status:'scheduled'});render()">↩ Reschedule</button>`}
      <button class="btn btn-ghost btn-sm btn-danger" style="margin-left:auto" onclick="if(confirm('Delete this meeting?'))deleteMeeting('${m.id}')">🗑 Delete</button>
    </div>
  </div>
</div>`;
}

function renderMeetingsSection(){
  if(!state.meetings) state.meetings=[];
  const isStandaloneMeet=ui.view==='meetings';
  const isOpen=ui.openSections.has('meetings');
  const today=todayStr();
  const meetings=[...state.meetings].sort((a,b)=>{
    const da=(a.date||'')+(a.time||'');
    const db=(b.date||'')+(b.time||'');
    return da.localeCompare(db);
  });
  const now_ms=Date.now();
  function _meetingIsPast(m){
    if(!m.date) return false;
    const parts=(m.time||'23:59').split(':');
    const ukMin=(+parts[0])*60+(+parts[1]||0);
    const utcMin=((ukMin-ukOffMin())+1440)%1440;
    const utcH=Math.floor(utcMin/60), utcM=utcMin%60;
    const dt=new Date(m.date+'T'+p2(utcH)+':'+p2(utcM)+':00Z');
    return dt.getTime()<now_ms;
  }
  const _activeMeetings=meetings.filter(m=>m.status!=='done'&&m.status!=='cancelled');
  const _scheduledMeetings=_activeMeetings.filter(m=>m.isRecurring||!_meetingIsPast(m));
  const _pastOneOffMeetings=_activeMeetings.filter(m=>!m.isRecurring&&_meetingIsPast(m));
  const _doneMeetings=meetings.filter(m=>m.status==='done'||m.status==='cancelled');
  const activeCount=_scheduledMeetings.length;

  let body=`<div id="meetings-section">`;
  body+=`${!isStandaloneMeet?`<div style="display:flex;justify-content:flex-end;gap:7px;flex-wrap:wrap;margin-bottom:10px">

  </div>`:''}`;

    body+=`<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-msg">No meetings yet</div></div>`;
  } else {
    _scheduledMeetings.forEach(m=>{ body+=renderMeetingCard(m); });
    const _previousMeetings=[..._pastOneOffMeetings, ..._doneMeetings].sort((a,b)=>((b.date||'')+(b.time||'')).localeCompare((a.date||'')+(a.time||'')));
    if(_previousMeetings.length){
      body+=`<div style="border-top:1px dashed var(--border);margin-top:4px">
        <div style="display:flex;align-items:center;gap:6px;padding:6px 2px;cursor:pointer;user-select:none" onclick="ui_meetPrevOpen=!ui_meetPrevOpen;render()">
          <span style="font-size:11px;font-weight:500;color:var(--text3);font-family:var(--font)">${_previousMeetings.length} previous / done</span>
          <span style="font-size:10px;color:var(--text3);margin-left:auto">${ui_meetPrevOpen?'▾':'▸'}</span>
        </div>
      </div>`;
      if(ui_meetPrevOpen){ _previousMeetings.forEach(m=>{ body+=renderMeetingCard(m, _pastOneOffMeetings.includes(m)); }); }
    }
  }
  body+=`</div>`;

  if(isStandaloneMeet){
    const mCount=(state.meetings||[]).filter(m=>m.status!=='done'&&m.status!=='cancelled').length;
    return`<div style="padding-bottom:80px">
      <div class="acc-header" style="border-radius:10px 10px 0 0;border:0.5px solid var(--border);border-bottom:0">
        <span class="acc-icon">📅</span>
        <span class="acc-name">Meetings</span>
        <div class="acc-meta">${mCount?`<span class="sbadge sb-in-progress">${mCount} scheduled</span>`:''}</div>
      </div>
      <div style="border:0.5px solid var(--border);border-top:0;border-radius:0 0 10px 10px;padding:12px 16px 14px;margin-bottom:14px;">
        <div class="fi-form-footer">
          <button class="btn btn-ghost btn-sm" onclick="doEmailMeetings()">✉ Email</button>
          <button class="btn btn-ghost btn-sm" onclick="doExportMeetingsTxt()">↓ Export</button>
          <button class="btn btn-accent btn-sm" onclick="ui_meetForm=!ui_meetForm;ui_editMeetId=null;render();setTimeout(()=>document.getElementById('mf-name')?.focus(),60)">+ Add</button>
        </div>
        ${body}
      </div>
    </div>`;
  }
  return`<div class="accordion${isOpen?' acc-open':''}" id="acc-meetings">
    <div class="acc-header" onclick="toggleAccordion('meetings')">
      <span class="acc-icon">📅</span>
      <span class="acc-name">Meetings</span>
      <span class="acc-summary">${(()=>{ const active=(state.meetings||[]).filter(m=>m.status!=='done'&&m.status!=='cancelled'); if(!active.length)return ''; const withMs=active.map(m=>({m,ms:nextMeetingOccurrenceMs(m)})).filter(x=>x.ms<Infinity); if(!withMs.length){ const sorted=active.slice().sort((a,b)=>((b.date||'')+(b.time||'')).localeCompare((a.date||'')+(a.time||''))); const m=sorted[0]; const ist=m.time?ukToIST(m.time):''; return esc(m.name||'')+(ist?' · '+ist+' IST':''); } withMs.sort((a,b)=>a.ms-b.ms); const m=withMs[0].m; const ist=m.time?ukToIST(m.time):''; return esc(m.name||'')+(ist?' · '+ist+' IST':''); })()}</span>
      <div class="acc-meta">
        ${activeCount?`<span class="sbadge sb-in-progress">${activeCount} scheduled</span>`:''}

      <span class="acc-chevron${isOpen?' open':''}" id="acc-chev-meetings">▾</span>

      const _nx=(state.meetings||[]).filter(m=>m.status!=='done'&&m.status!=='cancelled').map(m=>({m,ms:nextMeetingOccurrenceMs(m)})).filter(x=>x.ms<Infinity).sort((a,b)=>a.ms-b.ms);

      const _ist=_m.time?ukToIST(_m.time)+' IST':'';
      return `<div class="acc-info-strip"><span style="width:5px;height:5px;border-radius:50%;background:#7C3AED;flex-shrink:0;display:inline-block"></span><span style="font-size:10px;color:var(--text2);font-style:italic;font-family:var(--font);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-left:5px">${esc(_m.name||'')}</span><span style="font-size:10px;font-weight:400;color:#888;font-family:var(--font);flex-shrink:0;margin-left:4px">${_ist}</span></div>`;
    })()}
    <div class="acc-body${isOpen?' open':''}" id="acc-body-meetings">${body}</div>
  </div>`;
}

function renderRemarksAccordion(){
