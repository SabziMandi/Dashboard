/* ════════════════════════════════════════
   TRAVEL & EXPENSES ACCORDION
   Collects entries from all Field stories/requests
════════════════════════════════════════ */
function renderLeaveCard(l,today,isPast){
  const isOpen=ui_openLeaves.has(l.id);
  const days=leaveDays(l.dateFrom,l.dateTo);
  const isOnLeave=l.dateFrom<=today&&l.dateTo>=today;
  const isUpcoming=!isPast&&l.dateFrom>today;
  const typeInfo=LEAVE_TYPES.find(t=>t.key===l.leaveType)||LEAVE_TYPES[0];

  // Days left / days until start
  let durationLabel=days+'d';
  if(isOnLeave){
    const left=Math.round((new Date(l.dateTo+'T00:00:00')-new Date(today+'T00:00:00'))/86400000)+1;
    durationLabel=days+'d · '+left+'d remaining';
  } else if(isUpcoming){
    const until=Math.round((new Date(l.dateFrom+'T00:00:00')-new Date(today+'T00:00:00'))/86400000);
    durationLabel=days+'d · starts in '+until+'d';
  }

  // Format date parts separately for column alignment
  const fmtDateParts=d=>{
    if(!d) return {day:'—',month:'',year:'',weekday:''};
    try{
      const dt=new Date(d+'T00:00:00');
      return {
        day:   dt.toLocaleDateString('en-GB',{day:'2-digit'}),
        month: dt.toLocaleDateString('en-GB',{month:'short'}),
        year:  dt.getFullYear(),
        weekday: dt.toLocaleDateString('en-GB',{weekday:'long'}),
      };
    }catch(e){return {day:d,month:'',year:'',weekday:''};}
  };
  const fmtDate=d=>{
    const p=fmtDateParts(d);
    return `${p.day} ${p.month} ${p.year}, ${p.weekday}`;
  };
  const pFrom=fmtDateParts(l.dateFrom);
  const pTo=fmtDateParts(l.dateTo);
  // Single grid: day | month | year | weekday(desktop only)
  // Each row is one date; columns align vertically across both rows
  const dateGrid=`<div class="leave-date-grid" style="display:grid;grid-template-columns:2.2ch 3.2ch 4.2ch auto;gap:0 8px;font-family:var(--mono);font-size:11.5px;color:var(--text2);flex:1;row-gap:5px;min-width:0;align-items:baseline">
    <span style="text-align:right;font-weight:600">${pFrom.day}</span><span>${pFrom.month}</span><span>${pFrom.year}</span><span class="leave-weekday-col" style="color:var(--text3)">${pFrom.weekday}</span>
    <span style="text-align:right;font-weight:600">${pTo.day}</span><span>${pTo.month}</span><span>${pTo.year}</span><span class="leave-weekday-col" style="color:var(--text3)">${pTo.weekday}</span>
  </div>`;
  const cardCls='leave-card'+(l.status==='approved'?' lc-approved':l.status==='pending'?' lc-pending':'')+(isPast?' lc-past':'')+(isOnLeave?' lc-today':'');
  return`<div class="${cardCls}" data-id="${l.id}">
  <div class="leave-top" onclick="toggleLeaveOpen('${l.id}')" style="flex-wrap:nowrap;align-items:flex-start;gap:10px;">
    <div style="flex:1;min-width:0;">
      <div class="leave-employee" style="overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;">${esc(l.employeeName||'Unknown')}</div>
      ${dateGrid}
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;min-width:90px;">
      <span class="leave-type-badge ${typeInfo.cls}">${typeInfo.label}</span>
      <span class="leave-status-badge ${l.status==='approved'?'lsb-approved':'lsb-pending'}">${l.status==='approved'?`<span class="badge-dot" style="background:#15803D"></span>Approved`:`<span class="badge-dot" style="background:#B45309"></span>Pending`}</span>
      <span class="leave-duration" style="font-size:10px;color:var(--text3);font-family:var(--mono);">${durationLabel}</span>
    </div>
    <span class="chevron${isOpen?' open':''} hide-on-mobile-view" id="lc-${l.id}" style="flex-shrink:0;margin-top:2px;">▾</span>
  </div>
  <div class="leave-body${isOpen?' open':''}" id="lb-${l.id}">
    <div class="card-fields" style="margin-top:8px">
      <div><div class="cfield-label">Employee</div><div class="cfield-value">${esc(l.employeeName||'Unknown')}</div></div>
      <div><div class="cfield-label">Type</div><div class="cfield-value">${typeInfo.label}</div></div>
      <div><div class="cfield-label">Start</div><div class="cfield-value">${fmtDate(l.dateFrom)}</div></div>
      <div><div class="cfield-label">End</div><div class="cfield-value">${fmtDate(l.dateTo)}</div></div>
      <div><div class="cfield-label">Duration</div><div class="cfield-value">${days} day${days!==1?'s':''}</div></div>
      <div><div class="cfield-label">Status</div><div class="cfield-value">${l.status==='approved'?'✅ Approved':'⏳ Pending'}</div></div>
    </div>
    <div class="card-remarks" onclick="event.stopPropagation()">
      ${l.reason?`<span style="white-space:pre-wrap">💬 ${esc(l.reason)}</span> <button class="btn btn-ghost btn-xs" style="font-style:normal" onclick="event.stopPropagation();editLeave('${l.id}')" title="Edit reason">✏</button>`:`<button class="btn btn-ghost btn-xs" style="font-style:normal;color:var(--text3)" onclick="event.stopPropagation();editLeave('${l.id}')">+ Add reason</button>`}
    </div>
    <div class="leave-btns">
      ${l.status==='pending'
        ?`<button class="btn btn-done-active btn-sm" onclick="updateLeave('${l.id}',{status:'approved'});render();event.stopPropagation()">✅ Approve</button>`
        :`<button class="btn btn-ghost btn-sm" onclick="updateLeave('${l.id}',{status:'pending'});render();event.stopPropagation()">↩ Set Pending</button>`
      }
      <button class="btn btn-ghost btn-sm" onclick="editLeave('${l.id}');event.stopPropagation()">✏ Edit</button>
      <button class="btn btn-ghost btn-sm btn-danger" onclick="if(confirm('Delete this leave record?'))deleteLeave('${l.id}');event.stopPropagation()">🗑 Delete</button>
    </div>
  </div>
</div>`;
}

/* ─── CARD ─── */
function renderCard(sec,s,archKey){
  const secObj=SECTIONS.find(ss=>ss.key===sec)||{};
  const isUpcoming=secObj.isUpcoming||false;
  if(isUpcoming) return renderUpcomingRow(sec,s,archKey);
  return renderStoryCard(sec,s,archKey);
}

function renderUpcomingRow(sec,s,archKey){
  const isOpen=ui.openCards.has(s.id);
  const isComplOpen=ui.complForms.has(s.id);
  const archKeyJS=archKey?`'${archKey}'`:'null';
  const today=todayStr();

  const isExpired=s.expected_date&&s.expected_date<today&&s.status!=='completed';
  const isCompleted=s.status==='completed';
  const isOverdue=false; // overdue is now just "expired" — handled by isExpired

  const _dot=col=>`<span class="badge-dot" style="background:${col}"></span>`; const sbL=s.status==='urgent'?_dot('#B91C1C')+'Urgent':s.status==='in-progress'?_dot('#B45309')+'In progress':s.status==='completed'?_dot('#15803D')+'Done':s.status==='on-hold'?_dot('#7C3AED')+'On hold':s.status==='passed'||s.status==='not-done'?_dot('#475569')+'Not done':s.status==='postponed'?_dot('#0369A1')+'Postponed':s.status==='shelved'?_dot('#64748B')+'Shelved':'';
  const sbC=s.status==='urgent'?'sb-urgent':s.status==='in-progress'?'sb-in-progress':s.status==='completed'?'sb-completed':s.status==='on-hold'?'sb-on-hold':s.status==='passed'||s.status==='not-done'?'sb-not-done':s.status==='postponed'?'sb-postponed':s.status==='shelved'?'sb-shelved':'sb-not-started';

  // Build compact date box — short date line 1, countdown line 2
  let dateBoxHtml='';
  if(s.expected_date){
    const diff=Math.round((new Date(s.expected_date+'T00:00:00').getTime()-new Date(today+'T00:00:00').getTime())/86400000);
    const isMonthType=s.expected_type==='month';
    // For month-type: show "May" only (no year, no day); countdown line says "(month) · in Nd"
    // For date-type: show "Fri, 11 May" — no year
    const shortDate=isMonthType
      ? new Date(s.expected_date+'T00:00:00').toLocaleDateString('en-GB',{month:'long'})
      : new Date(s.expected_date+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
    let cntLabel='', isOverdueBox=false;
    if(isExpired)     { cntLabel='past'; isOverdueBox=true; }
    else if(diff===0) { cntLabel='today'; }
    else if(diff===1) { cntLabel='tomorrow'; }
    else if(diff>0)   { cntLabel='in '+diff+'d'; }
    dateBoxHtml=`<div class="uc-date-box${isOverdueBox?' uc-date-box-overdue':''}">
      <div class="uc-date-box-day${isOverdueBox?' overdue':''}">${shortDate}</div>
      ${cntLabel?`<div class="uc-date-box-cnt">${cntLabel}</div>`:''}
      ${isMonthType?`<div class="uc-date-box-type">month</div>`:''}
    </div>`;
  }

  // Border class
  let rowCls='uc-row';
  if(isExpired)                 rowCls+=' ucr-past';
  else if(isCompleted)          rowCls+=' ucr-completed';
  else if(s.status==='on-hold') rowCls+=' ucr-on-hold';
  else if(s.expected_date){
    const _ucDiff=Math.round((new Date(s.expected_date+'T00:00:00').getTime()-new Date(today+'T00:00:00').getTime())/86400000);
    if(_ucDiff>=0&&_ucDiff<=7) rowCls+=' ucr-near';
  }

  const field=(lbl,val)=>val?`<div><div class="cfield-label">${lbl}</div><div class="cfield-value">${esc(val)}</div></div>`:'';
  let linksHtml='';
  if(s.links){ const ls=s.links.split(',').map(l=>l.trim()).filter(Boolean); if(ls.length) linksHtml=`<div class="card-links" style="margin-top:8px">${ls.map(l=>`<a class="link-pill" href="${esc(l)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 ${esc(l.replace(/^https?:\/\//,'').slice(0,36))}</a>`).join('')}</div>`; }
  let clHtml='';
  if(s.completion_links){ const ls=s.completion_links.split(',').map(l=>l.trim()).filter(Boolean); if(ls.length) clHtml=`<div class="completion-links">${ls.map(l=>`<a class="link-pill" href="${esc(l)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 ${esc(l.replace(/^https?:\/\//,'').slice(0,36))}</a>`).join('')}</div>`; }

  return`<div class="${rowCls}${isOpen?' uc-open':''}" data-id="${s.id}">
  <div class="uc-top" onclick="toggleCard('${s.id}')">
    <span class="uc-expand-icon${isOpen?' open':''}">▶</span>
    <div style="flex:1;min-width:0">
      <div class="uc-title${(isExpired||isCompleted)?' uc-title-past':''}" style="${isCompleted?'text-decoration:line-through;opacity:.6;':''}}">${esc(s.title||'Untitled')}</div>
      ${(s.detail||s.correspondent)?`<div class="uc-preview">${esc((s.detail||s.correspondent||'')).replace(/\n/g,' ')}</div>`:''}
    </div>
    <div class="uc-meta-line">
      ${dateBoxHtml}
      ${sbL?`<span class="sbadge ${sbC}" style="font-size:10px;padding:2px 7px">${sbL}</span>`:''}
      ${isCompleted&&s.completedOn?`<span class="uc-chip" style="color:var(--done);font-size:10px">✅ ${new Date(s.completedOn).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}</span>`:''}
    </div>
    <span class="chevron${isOpen?' open':''}" id="ch-${s.id}" style="display:none"></span>
  </div>
  <div class="uc-body${isOpen?' open':''}" id="cb-${s.id}">
    <div class="uc-fields">
      ${s.description?`<div class="uc-field"><span class="uc-flbl">Description</span><span class="uc-fval" style="white-space:pre-wrap;line-height:1.55">${esc(s.description)}</span></div>`:''}
      ${s.detail?`<div class="uc-field"><span class="uc-flbl">Detail</span><span class="uc-fval">${esc(s.detail)}</span></div>`:''}
      ${s.correspondent?`<div class="uc-field"><span class="uc-flbl">Correspondent</span><span class="uc-fval">${esc(s.correspondent)}</span></div>`:''}
      ${(s.expected_date&&(s.expected_date_to||(s.expected_type&&s.expected_type!=='date')))?`<div class="uc-field"><span class="uc-flbl">Expected</span><span class="uc-fval">${esc(fmtDate(s.expected_date)+(s.expected_date_to?' – '+fmtDate(s.expected_date_to):'')+(s.expected_type&&s.expected_type!=='date'?' ('+s.expected_type+')':''))}</span></div>`:''}
      ${s.deadline_date?`<div class="uc-field"><span class="uc-flbl">Deadline</span><span class="uc-fval">${esc(fmtDate(s.deadline_date)+(s.deadline_uk?' · '+s.deadline_uk+' '+ukLabel():'')+(s.deadline_ist?' / '+s.deadline_ist+' IST':'')+'')}</span></div>`:''}
      ${s.reminder&&s.reminder!=='off'?`<div class="uc-field"><span class="uc-flbl">Reminder</span><span class="uc-fval">⏰ ${esc(s.reminder)}</span></div>`:''}
    </div>
    ${buildStoryRemarksHTML(sec, s, archKey)}
    ${linksHtml}
    ${s.completion_note||s.completion_links?`<div class="completion-box"><div class="completion-label">✅ Completion Notes</div>${s.completion_note?`<div class="completion-note">${esc(s.completion_note)}</div>`:''} ${clHtml}</div>`:''}
    <div id="compl-form-${s.id}" style="display:${isComplOpen?'block':'none'}">
      <div class="compl-form">
        <div style="font-size:12px;font-weight:700;color:var(--done);margin-bottom:9px">✅ Completion notes</div>
        <div class="fgroup" style="margin-bottom:8px"><label class="flabel">What was done / outcome</label><textarea class="ftextarea" id="compl-note-${s.id}" style="min-height:52px">${esc(s.completion_note||'')}</textarea></div>
        <div class="fgroup" style="margin-bottom:9px"><label class="flabel">Final links</label><input class="finput" id="compl-links-${s.id}" placeholder="https://…" value="${esc(s.completion_links||'')}"></div>
        <div style="display:flex;gap:7px"><button class="btn btn-done-active btn-sm" onclick="submitComplForm('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">✅ Save &amp; Mark Done</button><button class="btn btn-ghost btn-sm" onclick="toggleComplForm('${s.id}');event.stopPropagation()">Cancel</button></div>
      </div>
    </div>
    <div class="card-btns" style="margin-top:9px">
      <button class="btn btn-ghost btn-sm" onclick="editStory('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">✏ Edit</button>
      ${isCompleted
        ?`<button class="btn btn-done-active btn-sm" disabled>✅ Done</button>
          <button class="btn btn-not-done btn-sm" onclick="markNotDone('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">&#x21a9; Reopen</button>`
        :`<button class="btn btn-done btn-sm" onclick="toggleComplForm('${s.id}');event.stopPropagation()">Mark Done</button>`
      }
      <button class="btn btn-ghost btn-sm btn-danger" onclick="confirmDelete('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">🗑 Delete</button>
    </div>
  </div>
</div>`;
}

function renderStoryCard(sec,s,archKey){
  const secObj=SECTIONS.find(ss=>ss.key===sec)||{};
  const isOpen=ui.openCards.has(s.id);
  const isComplOpen=ui.complForms.has(s.id);
  const _dot=col=>`<span class="badge-dot" style="background:${col}"></span>`; const sbL=s.status==='urgent'?_dot('#B91C1C')+'Urgent':s.status==='in-progress'?_dot('#B45309')+'In progress':s.status==='completed'?_dot('#15803D')+'Done':s.status==='on-hold'?_dot('#7C3AED')+'On hold':s.status==='not-done'?_dot('#475569')+'Not done':s.status==='postponed'?_dot('#0369A1')+'Postponed':s.status==='shelved'?_dot('#64748B')+'Shelved':'';
  const sbC=s.status==='urgent'?'sb-urgent':s.status==='in-progress'?'sb-in-progress':s.status==='completed'?'sb-completed':s.status==='on-hold'?'sb-on-hold':s.status==='not-done'?'sb-not-done':s.status==='postponed'?'sb-postponed':s.status==='shelved'?'sb-shelved':'sb-not-started';
  const reqTime=s.created?new Date(s.created).toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):null;
  let loc=s.location||'';
  if(s.field_location) loc=(s.location?s.location+' — ':'')+s.field_location;
  else if(s.location) loc=s.location;
  const carried=s.carriedForward&&s.status!=='completed'&&s.status!=='on-hold';
  const archKeyJS=archKey?`'${archKey}'`:'null';
  const mode=s.mode||'none';
  const wwLabel=mode==='working'?'▶ Working':mode==='watching'?'👁 Watching':'● Set mode';
  const subsecBadge='';
  const isIBU=sec==='ibu'&&!archKey;
  const cardBorderCls=carried?'c-carried':s.status?'c-'+s.status:'';
  const wwModeCls=mode&&mode!=='none'?' c-'+mode:'';
  // Requests for Future — age tint based on days since created
  let reqAgeCls='';
  if(sec==='requests'&&s.created&&!['completed','not-done','shelved'].includes(s.status)){
    const ageDays=Math.round((Date.now()-(typeof s.created==='number'?s.created:parseInt(s.created)))/86400000);
    if(ageDays>=30)      reqAgeCls=' c-req-stale';
    else if(ageDays>=14) reqAgeCls=' c-req-aging';
  }
  const cardCls='card '+cardBorderCls+wwModeCls+reqAgeCls;
  const field=(lbl,val)=>val?`<div><div class="cfield-label">${lbl}</div><div class="cfield-value">${esc(val)}</div></div>`:'';
  let linksHtml='';
  if(s.links){ const ls=s.links.split(',').map(l=>l.trim()).filter(Boolean); if(ls.length) linksHtml=`<div class="card-links">${ls.map(l=>`<a class="link-pill" href="${esc(l)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 ${esc(l.replace(/^https?:\/\//,'').slice(0,36))}</a>`).join('')}</div>`; }
  let clHtml='';
  if(s.completion_links){ const ls=s.completion_links.split(',').map(l=>l.trim()).filter(Boolean); if(ls.length) clHtml=`<div class="completion-links">${ls.map(l=>`<a class="link-pill" href="${esc(l)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 ${esc(l.replace(/^https?:\/\//,'').slice(0,36))}</a>`).join('')}</div>`; }
  return`<div class="${cardCls}" data-id="${s.id}" draggable="true" ondragstart="onDragStart(event,'${sec}','${s.id}',${archKeyJS})" ondragend="onDragEnd(event)" ondragover="onDragOver(event,'${s.id}')" ondrop="onDrop(event,'${sec}','${s.id}',${archKeyJS})">
  <div class="card-top" onclick="toggleCard('${s.id}')">
    <div class="card-title-wrap">
      <div class="card-title">${esc(s.title||'Untitled')} ${subsecBadge}</div>
      <div class="card-subtitle">
        ${s.correspondent?`<span class="cs-chip">👤 ${esc(s.correspondent)}</span>`:''}
        ${loc?`<span class="cs-chip">📍 ${esc(loc)}</span>`:''}
        ${s.created?`<span class="cs-chip" style="color:var(--text3)">Logged ${new Date(s.created).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</span>`:''}
      </div>
      <div class="card-tags">
        ${secObj.hasWW&&!archKey?`<span class="ww-badge ww-${mode}" id="wwbadge-${s.id}" onclick="toggleWWMode('${sec}','${s.id}',${archKeyJS});event.stopPropagation()" title="Click to cycle: None → Working → Watching">${wwLabel}</span>`:''}

        ${(s.location==='Field'||s.location==='field')&&!archKey&&!(state.travelDismissed||[]).includes(s.id)?(()=>{
          const entries=(state.travelEntries||[]).filter(e=>e.storyId===s.id);
          const tc=entries.length;
          const exp=entries.filter(e=>e.type==='expense');
          const unclaimed=exp.filter(e=>(e.data?.claimed||'no')!=='yes').length;
          const allClaimed=exp.length>0&&unclaimed===0;
          const label=tc?(allClaimed?tc+' entr'+(tc===1?'y':'ies')+' · ✅':unclaimed?tc+' entr'+(tc===1?'y':'ies')+' · ⏳ '+unclaimed:tc+' entr'+(tc===1?'y':'ies')):'+ Travel';
          const bg=allClaimed?'rgba(22,163,74,.09)':unclaimed?'rgba(217,119,6,.09)':'rgba(13,148,136,.09)';
          const col=allClaimed?'var(--done)':unclaimed?'var(--progress)':'var(--working)';
          const bd=allClaimed?'rgba(22,163,74,.3)':unclaimed?'rgba(217,119,6,.3)':'rgba(13,148,136,.3)';
          return`<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;background:${bg};color:${col};border:.5px solid ${bd}" onclick="jumpToTravel('${s.id}');event.stopPropagation()" title="Travel & Expenses">🗺 ${label}</span>`;
        })():''}
        ${s.migratedAt?`<span class="migrated-tag">⇄ Migrated</span>`:''}
        ${s.autoMigratedOn?`<span class="migrated-tag">🗓 Auto-migrated ${s.autoMigratedOn}</span>`:''}
        ${(()=>{
          if(sec!=='requests'||!s.created||['completed','not-done','shelved'].includes(s.status)) return '';
          const ageDays=Math.round((Date.now()-(typeof s.created==='number'?s.created:parseInt(s.created)))/86400000);
          if(ageDays>=30) return `<span style="display:inline-flex;align-items:center;font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;background:rgba(220,38,38,.09);color:#B91C1C;border:0.5px solid rgba(220,38,38,.25)">${ageDays}d old</span>`;
          if(ageDays>=14) return `<span style="display:inline-flex;align-items:center;font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;background:rgba(180,83,9,.09);color:#92400e;border:0.5px solid rgba(180,83,9,.25)">${ageDays}d old</span>`;
          return '';
        })()}
      </div>
    </div>
    <div class="card-right" style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;min-width:80px;">
      ${sbL?`<span class="sbadge ${sbC}">${sbL}</span>`:''}
      ${deadlineBadge(s)}
      ${(s.carriedForward&&s.status!=='completed'&&!s.deadline_date)?`<span class="carry-badge">↻ +${s.carriedDays||1}d</span>`:''}
      ${s.story_type?(()=>{
        const _typeLabel=t=>{const v=t.trim().toLowerCase();if(v==='tv')return 'TV';return v.charAt(0).toUpperCase()+v.slice(1);};
        const _types=s.story_type.split(',').map(t=>t.trim()).filter(Boolean);
        if(!_types.length) return '';
        return `<div class="hide-mobile" style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;margin-top:1px">${_types.map(t=>`<span class="sbadge sb-story-type" style="font-size:10.5px;padding:2px 7px">${_typeLabel(t)}</span>`).join('')}</div>`;
      })():''}
    </div>

    <span class="chevron${isOpen?' open':''}" id="ch-${s.id}">▾</span>
  </div>
  <div class="card-body${isOpen?' open':''}" id="cb-${s.id}">
    ${(()=>{
      // Meta line first, description below
      const metaParts=[];
      if(s.producer)    metaParts.push(`Producer: ${esc(s.producer)}`);
      if(s.shoot_edit)  metaParts.push(`Shoot-Edit: ${esc(s.shoot_edit)}`);
      if(s.req_name||s.req_team) metaParts.push(`By ${esc([s.req_name,s.req_team].filter(Boolean).join('/'))}`)
      if(reqTime)       metaParts.push(`Logged ${new Date(s.created).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`);
      const metaLine=metaParts.length?`<div style="font-size:11px;color:var(--text3);margin-bottom:4px;line-height:1.6;font-family:var(--font)">${metaParts.join(' · ')}</div>`:'';
      const descLine=s.description?`<div style="font-size:12px;color:var(--text2);line-height:1.55;white-space:pre-wrap">${esc(s.description)}</div>`:'';
      if(!descLine&&!metaLine) return '';
      return `<div style="margin-bottom:8px">${metaLine}${descLine}</div>`;
    })()}
    ${(s.broadcast_times&&s.broadcast_times.length)||(s.time_uk||s.time_ist)?(()=>{
      const _slotTagCls=(plat)=>{
        const p=(plat||'').toLowerCase();
        if(p.includes('tv')) return 'slot-tag-tv';
        if(p.includes('radio')) return 'slot-tag-radio';
        if(p.includes('social')) return 'slot-tag-social';
        if(p.includes('text')||p.includes('online')) return 'slot-tag-text';
        if(p.includes('ip')||p.includes('in-person')) return 'slot-tag-ip';
        return 'slot-tag-other';
      };
      const _slotAccentCol=(plat)=>{
        const p=(plat||'').toLowerCase();
        if(p.includes('tv')) return '#16A34A';
        if(p.includes('radio')) return '#2563EB';
        if(p.includes('social')) return '#7C3AED';
        if(p.includes('text')||p.includes('online')) return '#B45309';
        if(p.includes('ip')||p.includes('in-person')) return '#CF6640';
        return 'var(--border2)';
      };
      const editSlotsBtn=!archKey?`<button class="btn btn-ghost btn-xs" style="font-size:10px;padding:2px 8px;margin-left:auto" onclick="editStory('${sec}','${s.id}',null);event.stopPropagation()" title="Edit broadcast slots">✏ Edit slots</button>`:'';
      let slotsHTML=`<div style="display:flex;align-items:center;gap:8px;margin:8px 0"><span style="font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#1d4ed8;font-family:var(--mono);white-space:nowrap">📡 Broadcast slots</span><div style="flex:1;height:1px;background:rgba(37,99,235,.2)"></div>${editSlotsBtn}</div><div class="slot-rows-wrap">`;
      if(s.broadcast_times&&s.broadcast_times.length){
        s.broadcast_times.forEach((t,i)=>{
          const plat=t.plat||t.lbl||('Slot '+(i+1));
          const tagCls=_slotTagCls(plat);
          const accentCol=_slotAccentCol(plat);
          // Air time (centre column — broadcast time, not deadline)
          const airTimeStr=[t.uk?`${t.uk} ${ukLabel()}`:'',t.ist?`${t.ist} IST`:''].filter(Boolean).join(' / ')||'';
          // Deadline — date on line 1, BST/IST on line 2
          const dlDateStr=t.dl_date?fmtDate(t.dl_date):'';
          const dlTimeStr=[t.dl_uk?`${t.dl_uk} ${ukLabel()}`:'',t.dl_ist?`${t.dl_ist} IST`:''].filter(Boolean).join(' / ');
          // Centre: prog name or channel, then airtime below it
          const centreTop=esc(t.prog||'');
          slotsHTML+=`<div class="slot-row-item">
            <div class="slot-row-accent" style="background:${accentCol}"></div>
            <div class="slot-row-tag-cell"><span class="slot-row-tag ${tagCls}">${esc(plat)}</span></div>
            <div class="slot-row-centre">
              ${centreTop?`<span class="slot-row-prog">${centreTop}</span>`:''}
              ${airTimeStr?`<span class="slot-row-airtime">${esc(airTimeStr)}</span>`:''}
            </div>
            <div class="slot-row-dl-cell">
              ${dlDateStr?`<span class="slot-row-dl-date">${esc(dlDateStr)}</span>`:''}
              ${dlTimeStr?`<span class="slot-row-dl-time">${esc(dlTimeStr)}</span>`:''}
            </div>
          </div>`;
        });
      } else {
        const timeStr=[s.time_uk?`${s.time_uk} ${ukLabel()}`:'',s.time_ist?`${s.time_ist} IST`:''].filter(Boolean).join(' / ');
        slotsHTML+=`<div class="slot-row-item">
          <div class="slot-row-accent" style="background:var(--border2)"></div>
          <div class="slot-row-tag-cell"><span class="slot-row-tag slot-tag-other">TX</span></div>
          <div class="slot-row-centre">${timeStr?`<span class="slot-row-airtime">${esc(timeStr)}</span>`:''}</div>
          <div class="slot-row-dl-cell"></div>
        </div>`;
      }
      slotsHTML+='</div>';
      return slotsHTML;
    })():''}
    ${s.deadline_date||s.reminder&&s.reminder!=='off'?`<div class="card-fields" style="margin-top:4px">
      ${s.deadline_date?`<div><div class="cfield-label">Story Deadline</div><div class="cfield-value">${fmtDate(s.deadline_date)}${s.deadline_uk?' · '+esc(s.deadline_uk)+' '+ukLabel():''}${s.deadline_ist?' / '+esc(s.deadline_ist)+' IST':''}</div></div>`:''}
      ${s.reminder&&s.reminder!=='off'?field('Reminder','⏰ '+s.reminder):''}
    </div>`:''}
    ${s.remarks?`<div class="card-remarks" onclick="event.stopPropagation()" style="font-size:12px;color:var(--text3);font-style:italic;padding:6px 0">💬 ${esc(s.remarks)} <span style="font-size:10px;font-family:var(--mono)"></span></div>`:''}
    ${buildStoryRemarksHTML(sec,s,archKey)}
    ${(s.location==='Field'||s.location==='field')&&!archKey?`<div style="font-size:12px;color:var(--text3);padding:6px 0">🗺 Travel & expenses for this story are managed in the <b>Travel &amp; Expenses</b> accordion below.</div>`:''}
    ${linksHtml}
    ${s.completion_note||s.completion_links?`<div class="completion-box"><div class="completion-label">✅ Completion Notes</div>${s.completion_note?`<div class="completion-note">${esc(s.completion_note)}</div>`:''} ${clHtml}</div>`:''}
    <div id="compl-form-${s.id}" style="display:${isComplOpen?'block':'none'}">
      <div class="compl-form">
        <div style="font-size:12px;font-weight:700;color:var(--done);margin-bottom:9px">✅ Completion notes</div>
        <div class="fgroup" style="margin-bottom:8px"><label class="flabel">What was done / outcome</label><textarea class="ftextarea" id="compl-note-${s.id}" style="min-height:52px">${esc(s.completion_note||'')}</textarea></div>
        <div class="fgroup" style="margin-bottom:9px"><label class="flabel">Final links (comma-separated)</label><input class="finput" id="compl-links-${s.id}" placeholder="https://…" value="${esc(s.completion_links||'')}"></div>
        <div style="display:flex;gap:7px"><button class="btn btn-done-active btn-sm" onclick="submitComplForm('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">✅ Save &amp; Mark Done</button><button class="btn btn-ghost btn-sm" onclick="toggleComplForm('${s.id}');event.stopPropagation()">Cancel</button></div>
      </div>
    </div>
    <div class="card-btns">
      <button class="btn btn-ghost btn-sm" onclick="editStory('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">✏ Edit</button>
      ${s.status==='completed'
        ? `<button class="btn btn-done-active btn-sm" disabled>✅ Done</button>
           <button class="btn btn-not-done btn-sm" onclick="markNotDone('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">↩ Reopen</button>`
        : s.status==='not-done'
        ? `<button class="btn btn-ghost btn-sm" style="color:#64748b;border-color:rgba(100,116,139,.3)" disabled>⚫ Not Done</button>
           <button class="btn btn-ghost btn-sm" onclick="markNotDone('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">↩ Reopen</button>`
        : s.status==='postponed'
        ? `<button class="btn btn-postpone btn-sm" disabled>⏸ Postponed${s.postponeTo?' to '+s.postponeTo:''}</button>
           <button class="btn btn-ghost btn-sm" onclick="markNotDone('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">↩ Reopen</button>`
        : s.status==='shelved'
        ? `<button class="btn btn-shelve btn-sm" disabled>🗄 Shelved</button>
           <button class="btn btn-ghost btn-sm" onclick="unshelveStory('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">↩ Unshelf</button>`
        : `<button class="btn btn-done btn-sm" onclick="toggleComplForm('${s.id}');event.stopPropagation()">Mark Done</button>
           <button class="btn btn-not-done btn-sm" onclick="markStoryNotDone('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">⚫ Not Done</button>
           <button class="btn btn-postpone btn-sm" onclick="openStoryPostponeDialog('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">⏸ Postpone…</button>
           <button class="btn btn-shelve btn-sm" onclick="shelveStory('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">🗄 Shelve</button>`
      }
      ${sec==='requests'&&!archKey
        ? `<button class="btn btn-ghost btn-sm" style="color:#0D9488;border-color:rgba(13,148,136,.35);background:rgba(13,148,136,.06)" onclick="openMoveCopyDialog('requests','${s.id}','ibu',null);event.stopPropagation()">📡 Move to Stories</button>`
        : `<div class="move-picker" onclick="event.stopPropagation()" title="Move to another section">
        <select class="fselect" style="padding:4px 24px 4px 8px;font-size:11.5px;height:29px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text3)" id="move-sel-${s.id}" onchange="doMoveSelect('${sec}','${s.id}',${archKeyJS},this)">
          <option value="">Move to…</option>
          ${SECTIONS.filter(ss=>ss.key!==sec&&!ss.isUpcoming&&!ss.hidden).map(ss=>`<option value="${ss.key}">${esc(secName(ss.key))}</option>`).join('')}
        </select>
      </div>`
      }
      <div class="card-delete-row" onclick="event.stopPropagation()">
        <button class="btn btn-ghost btn-sm btn-danger" onclick="confirmDelete('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">🗑 Delete</button>
      </div>
    </div>
  </div>
</div>`;
}

/* ─── FORM (standard + upcoming) ─── */
function renderForm(sec,archKey){
  const secObj=SECTIONS.find(ss=>ss.key===sec)||{};
  const isUpcoming=secObj.isUpcoming||false;
  const isIBU=(sec==='ibu');
  const isEdit=!!(archKey?ui.editMap[sec+'::'+archKey]:ui.editMap[sec]);
  const sfx='-'+sec+(archKey?'-arch':'');
  const archKeyJS=archKey?`'${archKey}'`:'null';
  // Declare editStoryObj before early-return so it is available for both branches
  const editStoryObj=isEdit?(getArr(sec,archKey)||[]).find(s=>s.id===(archKey?ui.editMap[sec+'::'+archKey]:ui.editMap[sec])):null;
  if(isUpcoming) return renderUpcomingForm(sec,archKey,isEdit,sfx,archKeyJS,editStoryObj);

  // For edit, load existing broadcast_times; for new, start with one empty slot
  const existingSlots=editStoryObj?.broadcast_times||[];

  const locPlaceholder=editStoryObj?.location==='Studio'?'Which bureau or studio?':editStoryObj?.location==='Remote'?'Platform / dial-in':'City, country or address';
  return`<div class="form-wrap" id="story-form-${sec}${archKey?'-arch':''}">
  <div class="form-title">${isEdit?'✏ Edit Story':'+ New Story'}</div>
  <div class="form-grid">

    <!-- ── STORY ── -->
    <div class="fsec fs-story">
      <div class="form-divider">Story</div>
      <div class="fgroup full"><label class="flabel">Title / Slug *</label><input class="finput" id="f-title${sfx}" placeholder="Working title or slug…" autocomplete="off" value="${esc(editStoryObj?.title||'')}"></div>
      <div class="fgroup full"><label class="flabel">Description <span class="flabel-hint">(optional)</span></label><textarea class="ftextarea" id="f-description${sfx}" placeholder="Brief description of the story…" style="min-height:60px;resize:vertical;">${esc(editStoryObj?.description||'')}</textarea></div>
      <div class="fgroup full">
        <label class="flabel">Type</label>
        <div style="display:flex;gap:8px;margin-top:4px;flex-wrap:wrap">
          ${['TV','Radio','Social','Text'].map(t=>{
            const vals=(editStoryObj?.story_type||'').split(',').map(x=>x.trim().toLowerCase());
            return`<label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;padding:7px 14px;border:1px solid var(--border);border-radius:7px;background:var(--surface2)">
              <input type="checkbox" class="story-type-cb${sfx}" value="${t.toLowerCase()}" ${vals.includes(t.toLowerCase())?'checked':''} style="accent-color:var(--accent);width:14px;height:14px"> <span>${t}</span>
            </label>`;
          }).join('')}
        </div>
      </div>
    </div>

    <!-- ── PEOPLE → LINKS: accordion sections inside master grid ── -->
    <div class="form-master-grid" style="grid-column:1/-1">

      <!-- ── Accordion 1: People & Request ── -->
      ${(()=>{
        const hasPeople=!!(editStoryObj?.correspondent||editStoryObj?.producer||editStoryObj?.shoot_edit||editStoryObj?.req_name||editStoryObj?.req_team||editStoryObj?.req_location);
        const open=isEdit&&hasPeople;
        const peopleParts=[editStoryObj?.correspondent,editStoryObj?.producer,editStoryObj?.shoot_edit,editStoryObj?.req_name].filter(Boolean);
        const summary=peopleParts.slice(0,3).join(' · ')||'';
        const bid='fsec-people-${sfx}';
        return `<div class="fsec-header" onclick="(function(t){const b=document.getElementById('${bid}');const c=t.querySelector('.fsec-chev');const isHidden=b.classList.contains('hidden');b.classList.toggle('hidden',!isHidden);c.classList.toggle('open',isHidden);})(this)">
            <span class="fsec-label">People &amp; request</span>
            <span class="fsec-summary">${summary}</span>
            <span class="fsec-chev${open?' open':''}">▸</span>
          </div>
          <div id="${bid}" class="fsec-fields${open?'':' hidden'}">
            <div class="fgroup"><label class="flabel">Correspondent</label>
              <div style="display:flex;gap:5px;align-items:center">
                <input class="finput" id="f-correspondent${sfx}" placeholder="Name or leave blank" list="dl-correspondents" autocomplete="off" style="flex:1" value="${esc(editStoryObj?.correspondent||'')}">
                <button type="button" class="btn btn-ghost btn-xs btn-danger" onclick="document.getElementById('f-correspondent${sfx}').value=''" title="Clear">✕</button>
              </div>
            </div>
            <div class="fgroup"><label class="flabel">Producer</label>
              <div style="display:flex;gap:5px;align-items:center">
                <input class="finput" id="f-producer${sfx}" placeholder="Name or leave blank" list="dl-producers" autocomplete="off" style="flex:1" value="${esc(editStoryObj?.producer||'')}">
                <button type="button" class="btn btn-ghost btn-xs btn-danger" onclick="document.getElementById('f-producer${sfx}').value=''" title="Clear">✕</button>
              </div>
            </div>
            <div class="fgroup"><label class="flabel">Shoot-Edit</label>
              <div style="display:flex;gap:5px;align-items:center">
                <input class="finput" id="f-shoot-edit${sfx}" placeholder="Person or team or leave blank" list="dl-shoot" autocomplete="off" style="flex:1" value="${esc(editStoryObj?.shoot_edit||'')}">
                <button type="button" class="btn btn-ghost btn-xs btn-danger" onclick="document.getElementById('f-shoot-edit${sfx}').value=''" title="Clear">✕</button>
              </div>
            </div>
            <div class="fgroup"><label class="flabel">Requested by</label><input class="finput" id="f-req-name${sfx}" placeholder="Name" value="${esc(editStoryObj?.req_name||'')}"></div>
            <div class="fgroup"><label class="flabel">Team</label><input class="finput" id="f-req-team${sfx}" placeholder="Team" value="${esc(editStoryObj?.req_team||'')}"></div>
            <div class="fgroup"><label class="flabel">Location</label><input class="finput" id="f-req-location${sfx}" placeholder="City / office" value="${esc(editStoryObj?.req_location||'')}"></div>
          </div>`;
      })()}

      <!-- ── Accordion 2: Deadline & Location ── -->
      ${(()=>{
        const hasDl=!!(editStoryObj?.deadline_date||editStoryObj?.deadline_uk||editStoryObj?.location||editStoryObj?.field_location);
        const open=isEdit&&hasDl;
        const dlParts=[editStoryObj?.deadline_date?_fmtD(editStoryObj.deadline_date):'',editStoryObj?.deadline_uk||'',editStoryObj?.location||'',editStoryObj?.field_location||''].filter(Boolean);
        const summary=dlParts.slice(0,3).join(' · ')||'';
        const bid='fsec-dl-${sfx}';
        return `<div class="fsec-header" onclick="(function(t){const b=document.getElementById('${bid}');const c=t.querySelector('.fsec-chev');const isHidden=b.classList.contains('hidden');b.classList.toggle('hidden',!isHidden);c.classList.toggle('open',isHidden);})(this)">
            <span class="fsec-label">Deadline &amp; location</span>
            <span class="fsec-summary">${summary}</span>
            <span class="fsec-chev${open?' open':''}">▸</span>
          </div>
          <div id="${bid}" class="fsec-fields${open?'':' hidden'}">
            <div class="fgroup"><label class="flabel">Date</label><input class="finput" type="date" id="f-deadline-date${sfx}" value="${esc(editStoryObj?.deadline_date||'')}"></div>
            <div class="fgroup"><label class="flabel">${ukLabel()}</label><input class="finput" id="f-deadline-uk${sfx}" placeholder="17:00" oninput="onDeadlineUKChange('${sec}',${archKeyJS})" onblur="onDeadlineUKBlur('${sec}',${archKeyJS})" value="${esc(editStoryObj?.deadline_uk||'')}"></div>
            <div class="fgroup"><label class="flabel">IST</label><input class="finput" id="f-deadline-ist${sfx}" placeholder="22:30" oninput="onDeadlineISTChange('${sec}',${archKeyJS})" onblur="onDeadlineISTBlur('${sec}',${archKeyJS})" value="${esc(editStoryObj?.deadline_ist||'')}"></div>
            <div class="fgroup"><label class="flabel">Location type</label>
              <select class="fselect" id="f-location${sfx}" onchange="updateLocationPlaceholder('${sec}',${archKeyJS})">
                <option value="">– Select –</option><option value="Studio"${editStoryObj?.location==='Studio'?' selected':''}>Studio</option><option value="Field"${editStoryObj?.location==='Field'?' selected':''}>Field</option><option value="Remote"${editStoryObj?.location==='Remote'?' selected':''}>Remote</option>
              </select>
            </div>
            <div class="fgroup"><label class="flabel">Detail</label><input class="finput" id="f-field-location${sfx}" placeholder="${locPlaceholder}" value="${esc(editStoryObj?.field_location||'')}"></div>
            <div class="form-field-empty fgroup"><label class="flabel">&nbsp;</label><input class="finput" tabindex="-1"></div>
          </div>`;
      })()}

      <!-- ── Accordion 3: Status & Reminder ── -->
      ${(()=>{
        const summary=[editStoryObj?.status||'',editStoryObj?.reminder&&editStoryObj.reminder!=='off'?'Reminder: '+editStoryObj.reminder:''].filter(Boolean).join(' · ')||'';
        const bid='fsec-sr-${sfx}';
        return `<div class="fsec-header" onclick="(function(t){const b=document.getElementById('${bid}');const c=t.querySelector('.fsec-chev');const isHidden=b.classList.contains('hidden');b.classList.toggle('hidden',!isHidden);c.classList.toggle('open',isHidden);})(this)">
            <span class="fsec-label">Status &amp; reminder</span>
            <span class="fsec-summary">${summary}</span>
            <span class="fsec-chev">▸</span>
          </div>
          <div id="${bid}" class="fsec-fields hidden">
            <div class="fgroup"><label class="flabel">Status</label>
              <select class="fselect" id="f-status${sfx}">
                <option value="">– Select –</option>
                <option value="urgent"${editStoryObj?.status==='urgent'?' selected':''}>🔴 Urgent</option>
                <option value="in-progress"${editStoryObj?.status==='in-progress'?' selected':''}>🟡 In Progress</option>
                <option value="completed"${editStoryObj?.status==='completed'?' selected':''}>🟢 Completed</option>
                <option value="not-done"${editStoryObj?.status==='not-done'?' selected':''}>⚫ Not Done</option>
                <option value="postponed"${editStoryObj?.status==='postponed'?' selected':''}>🔵 Postponed</option>
                <option value="on-hold"${editStoryObj?.status==='on-hold'?' selected':''}>🟣 On Hold</option>
                <option value="shelved"${editStoryObj?.status==='shelved'?' selected':''}>🗄 Shelved</option>
              </select>
            </div>
            <div class="fgroup"><label class="flabel">Reminder</label>
              <select class="fselect" id="f-reminder${sfx}">
                <option value="off"${(editStoryObj?.reminder||'off')==='off'?' selected':''}>Off</option><option value="15min"${editStoryObj?.reminder==='15min'?' selected':''}>15 min</option><option value="30min"${editStoryObj?.reminder==='30min'?' selected':''}>30 min</option><option value="1hr"${editStoryObj?.reminder==='1hr'?' selected':''}>1 hour</option><option value="4hr"${editStoryObj?.reminder==='4hr'?' selected':''}>4 hours</option><option value="1day"${editStoryObj?.reminder==='1day'?' selected':''}>1 day</option><option value="1week"${editStoryObj?.reminder==='1week'?' selected':''}>1 week</option>
              </select>
            </div>
            <div class="form-field-empty fgroup"><label class="flabel">&nbsp;</label><input class="finput" tabindex="-1"></div>
          </div>`;
      })()}

      <!-- ── Accordion 4: Broadcast Times ── -->
      ${(()=>{
        const hasSlots=existingSlots&&existingSlots.length>0;
        const slotSummary=hasSlots?(existingSlots[0].programme||'')+(existingSlots[0].bst?' · '+existingSlots[0].bst+' BST':''):'';
        const bid='fsec-bcast-${sfx}';
        return `<div class="fsec-header" onclick="(function(t){const b=document.getElementById('${bid}');const c=t.querySelector('.fsec-chev');const isOpen=b.classList.contains('open');b.classList.toggle('open',!isOpen);c.classList.toggle('open',!isOpen);})(this)">
            <span class="fsec-label">Broadcast times</span>
            <span class="fsec-summary">${slotSummary}</span>
            <span class="fsec-chev">▸</span>
          </div>
          <div id="${bid}" class="fsec-full">
            <div class="form-slot-wrap" style="padding-bottom:8px">
              <div id="broadcast-slots">${buildBroadcastSlotsHTML(existingSlots)}</div>
              <button class="btn btn-ghost btn-sm" style="align-self:flex-start" onclick="addBroadcastSlot()">+ Add Broadcast Slot</button>
            </div>
          </div>`;
      })()}

      <!-- ── Accordion 5: Remarks & Links ── -->
      ${(()=>{
        const latestRemark=(editStoryObj?.remarks||[]).slice().sort((a,b)=>(b.ts||0)-(a.ts||0))[0]?.text||'';
        const firstLine=latestRemark.split('\n')[0].slice(0,60)+(latestRemark.length>60?'…':'');
        const hasLinks=!!(editStoryObj?.links);
        const summary=firstLine||(hasLinks?'Has links':'');
        const bid='fsec-rl-${sfx}';
        return `<div class="fsec-header" onclick="(function(t){const b=document.getElementById('${bid}');const c=t.querySelector('.fsec-chev');const isOpen=b.classList.contains('open');b.classList.toggle('open',!isOpen);c.classList.toggle('open',!isOpen);})(this)">
            <span class="fsec-label">Remarks &amp; links</span>
            <span class="fsec-summary">${summary}</span>
            <span class="fsec-chev">▸</span>
          </div>
          <div id="${bid}" class="fsec-full">
            <div style="padding-bottom:10px">
              ${isEdit&&editStoryObj
                ? renderFormRemarksList(sec,editStoryObj,archKey)
                : `<textarea class="ftextarea" id="f-remarks-new${sfx}" placeholder="Context, contacts, logistics, previous coverage…" style="min-height:72px;resize:vertical;white-space:pre-wrap"></textarea>`}
              <div style="margin-top:10px">
                <label class="flabel">Reference links</label>
                <input class="finput" id="f-links${sfx}" placeholder="https://… (comma-separated)" value="${esc(editStoryObj?.links||'')}">
              </div>
            </div>
          </div>`;
      })()}

    </div>

  </div>
  <div class="form-footer">
    <button class="btn btn-accent" id="form-submit-${sec}${archKey?'-arch':''}" onclick="submitForm('${sec}',${archKeyJS})" style="transition:opacity .3s">${isEdit?'Update':'Add'}</button>
    <button class="btn btn-ghost" onclick="cancelForm('${sec}',${archKeyJS})">Cancel</button>
  </div>
</div>`;
}

    <div class="fgroup"><label class="flabel">Requested by <span class="flabel-hint">(optional)</span></label><input class="finput" id="f-requested-by${sfx}" placeholder="Name or team requesting coverage…" value="${esc(ev.requested_by||'')}"></div>
    <div class="fsec-header">
      <span class="fsec-label">Deadline</span>
      <span class="fsec-chev" style="margin-left:auto">▸</span>

    <div class="fgroup"><label class="flabel">Date</label><input class="finput" type="date" id="f-deadline-date${sfx}" value="${esc(ev.deadline_date||'')}"></div>

    <div class="fgroup"><label class="flabel">IST</label><input class="finput" id="f-deadline-ist${sfx}" placeholder="22:30" oninput="onDeadlineISTChange('${sec}',${archKeyJS})" onblur="onDeadlineISTBlur('${sec}',${archKeyJS})" value="${esc(ev.deadline_ist||'')}"></div>
    <div class="fsec-header">
      <span class="fsec-label">People &amp; Status</span>
      <span class="fsec-chev" style="margin-left:auto">▸</span>
    </div>
    <div class="fgroup"><label class="flabel">Correspondent</label><input class="finput" id="f-correspondent${sfx}" placeholder="Name" value="${esc(ev.correspondent||'')}"></div>
    <div class="fgroup"><label class="flabel">Status</label>
      <select class="fselect" id="f-status${sfx}">
        <option value="not-started"${(ev.status||'not-started')==='not-started'?' selected':''}>⚪ Not Started</option>
        <option value="in-progress"${ev.status==='in-progress'?' selected':''}>🟡 In Progress</option>
        <option value="urgent"${ev.status==='urgent'?' selected':''}>🔴 Urgent</option>
        <option value="on-hold"${ev.status==='on-hold'?' selected':''}>🟣 On Hold</option>
        <option value="completed"${ev.status==='completed'?' selected':''}>🟢 Completed</option>
      </select>
    </div>
    <div class="fgroup"><label class="flabel">Reminder</label>
      <select class="fselect" id="f-reminder${sfx}">
        <option value="off"${(ev.reminder||'off')==='off'?' selected':''}>Off</option><option value="15min"${ev.reminder==='15min'?' selected':''}>15 min</option><option value="30min"${ev.reminder==='30min'?' selected':''}>30 min</option><option value="1hr"${ev.reminder==='1hr'?' selected':''}>1 hour</option><option value="4hr"${ev.reminder==='4hr'?' selected':''}>4 hours</option><option value="1day"${ev.reminder==='1day'?' selected':''}>1 day</option><option value="1week"${ev.reminder==='1week'?' selected':''}>1 week</option>
      </select>
    </div>
    <div class="fgroup full"><label class="flabel">Remarks &amp; Any Relevant Detail</label><textarea class="ftextarea" id="f-remarks${sfx}" placeholder="Context, previous coverage, contacts, logistics…" style="white-space:pre-wrap;min-height:80px">${esc(ev.remarks||'')}</textarea></div>
    <div class="fgroup full"><label class="flabel">Reference Links <span class="flabel-hint">(comma-separated)</span></label><input class="finput" id="f-links${sfx}" placeholder="https://…" value="${esc(ev.links||'')}"></div>
  </div>
  <div class="form-footer">
    <button class="btn btn-accent" onclick="submitForm('${sec}',${archKeyJS})">${isEdit?'Update':'Add'}</button>
    <button class="btn btn-ghost" onclick="cancelForm('${sec}',${archKeyJS})">Cancel</button>
  </div>
</div>`;
}
function updateExpectedInput(sec,archKey){
  const sfx='-'+sec+(archKey?'-arch':'');
  const t=(document.getElementById('f-expected-type'+sfx)||{}).value||'date';
  const inp=document.getElementById('f-expected-date'+sfx);
  if(inp){ inp.type=t==='month'?'month':'date'; inp.value=''; }
}
function esc(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg, undoFn){
  const w=document.getElementById('toast-wrap'); if(!w) return;
  const el=document.createElement('div'); el.className='toast';
  if(undoFn){
    el.style.cssText='display:flex;align-items:center;gap:10px;pointer-events:all';
    const txt=document.createElement('span'); txt.textContent=msg; el.appendChild(txt);
    const btn=document.createElement('button');
    btn.textContent='Undo';
    btn.style.cssText='background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:inherit;border-radius:5px;padding:2px 9px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);flex-shrink:0';
    btn.onclick=()=>{ clearTimeout(el._timer); el.remove(); undoFn(); };
    el.appendChild(btn);
  } else {
    el.textContent=msg;
  }
  w.appendChild(el);
  el._timer=setTimeout(()=>el.remove(),3800);
}
function confirmDelete(sec,id,archKey){ const arr=getArr(sec,archKey); const s=arr?.find(s=>s.id===id); if(!s) return; if(confirm('Delete "'+s.title+'"?')) deleteStory(sec,id,archKey); }
function updateClock(){
  const el=document.getElementById('live-clock');
  const now=new Date();
  const ukTime=now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/London',hour12:false});
  const ist=now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Kolkata',hour12:false});
  if(el) el.textContent=ukLabel()+' '+ukTime+' · IST '+ist;
  // Mobile times
  const bstEl=document.getElementById('mobile-time-bst');
  const istEl=document.getElementById('mobile-time-ist');
  if(bstEl) bstEl.textContent=ukTime+' '+ukLabel();
  if(istEl) istEl.textContent=ist+' IST';
  // Desktop times (rows 2)
  const dBst=document.getElementById('desktop-time-bst');
  const dIst=document.getElementById('desktop-time-ist');
  if(dBst) dBst.textContent=ukTime+' '+ukLabel();
  if(dIst) dIst.textContent=ist+' IST';
}
function init(){
  loadLocal();
  checkDateChange();
  cleanupStuckNotDone();  // archive any not-done entries stuck in non-combined sections
  cleanupCompletedStories(); // archive completed stories from active board
  sweepStaleTerminalStories(); // sweep terminal stories from previous days on every open

  // ── Service Worker registration ──────────────────────────────
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./service-worker.js', {scope:'./'})
      .then(reg=>{
        navigator.serviceWorker.ready.then(()=>{ scheduleAllReminders(); });
        setInterval(()=>_swMsg({type:'PING'}), 30 * 60 * 1000);
      })
      .catch(()=>{}); // silently skip if SW script not available (e.g. single-file deployment)
  }

  scheduleAllReminders();
  const cfg=getFireConfig();
  if(cfg) initFirebase(cfg, true);
  else if(!window._firebaseAuthLoadFailed && typeof firebase !== 'undefined'){
    // No Firebase config yet — but still try auth so session is ready when user connects
    // (only works if app was previously initialised in this browser)
    try{ firebase.app(); ensureSignedIn().catch(()=>{}); }catch(e){}
  }
  window.addEventListener('online', ()=>{ if(fireDb){ setSyncUI('syncing'); /* onSnapshot will fire automatically on reconnect and merge before we push */ } });
  document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState==='visible'&&fireDb){
      setTimeout(()=>{
        const hasOpenForm=ui.openForms.size>0||_te.open;
        // Also block if a form was very recently opened (iOS keyboard triggers visibilitychange)
        const formJustOpened=(Date.now()-(window._lastFormOpenTs||0))<2000;
        if(!hasOpenForm&&!formJustOpened){ setSyncUI('syncing'); startRealtimeSync(); }
      },500);
    }
  });
  // Fallback: re-establish sync if connection has been idle — but only when no form is open
  setInterval(()=>{
    if(fireDb&&document.visibilityState==='visible'){
      const hasOpenForm=ui.openForms.size>0||_te.open;
      if(!hasOpenForm) startRealtimeSync();
    }
  }, 60000);
  window.addEventListener('offline', ()=>{ if(fireDb) setSyncUI('offline'); });
  updateDateHeader(); renderDateStrip(); render();
  renderOnLeavePill();
  updateMobileDateLabel();
    initMobileScrollCollapse();
  // Show backup banners after render (only on today view)
  setTimeout(()=>renderBackupBanners(), 100);
  updateClock(); setInterval(updateClock, 30000);
  initScrollHeader();
  // Click outside search to close
  document.addEventListener('click', e=>{
    // Mobile
    const mss=document.getElementById('mobile-search-section');
    const msb=document.getElementById('mobile-search-btn');
    const msbC=document.getElementById('mobile-search-btn-collapsed');
    if(mss&&mss.classList.contains('m-search-open')){
      if(!mss.contains(e.target)&&e.target!==msb&&e.target!==msbC){
        toggleMobileSearch();
      }
    }
    // Desktop
    const dbar=document.getElementById('desktop-search-bar');
    const dbtn=document.getElementById('desktop-search-btn');
    if(dbar&&dbar.style.display!=='none'){
      if(!dbar.contains(e.target)&&e.target!==dbtn){
        toggleDesktopSearch();
      }
    }
  });

  // Hide bottom nav when keyboard is open (iOS)
  const bnb=document.getElementById('bottom-nav-bar');
  if(bnb){
    window.addEventListener('resize',()=>{
      // When keyboard opens, window height shrinks significantly
      const keyboardOpen=window.innerHeight<window.screen.height*0.75;
      bnb.style.display=keyboardOpen?'none':'';
    });
  }

  // Global: Enter in any textarea = new paragraph on both desktop and mobile.
  // Stops propagation so it never triggers accordion toggles or form submits.
  document.addEventListener('keydown', e=>{
    if(e.key==='Enter' && e.target.tagName==='TEXTAREA'){
      e.stopPropagation();
      // Don't preventDefault — let the browser insert the newline naturally.
    }
  }, true); // capture phase so it fires before any inline handlers
  setInterval(()=>{
    const today=todayStr();
    if(state.lastActiveDate && state.lastActiveDate !== today){
      // New day detected while app is open — run the full date-change logic
      checkDateChange();
      updateDateHeader();
      renderDateStrip();
      render();
      setTimeout(()=>renderBackupBanners(), 100);
    }
    // Always refresh the date in the header in case it got stale
    updateDateHeader();
  }, 5 * 60 * 1000);
}
document.addEventListener('DOMContentLoaded', init);
</script>
