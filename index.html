  const today=todayStr();
  const active=state.notes.filter(n=>n.status==='active');
  const resolved=state.notes.filter(n=>n.status!=='active');

  let body='';

  // Add-note form
  if(ui_noteForm){
    body+=`<div class="form-wrap">
      <div class="form-title">${ui_editNoteId?'✏ Edit Note':'+ New Note'}</div>
      <div class="form-grid">
        <div class="fgroup full">
          <label class="flabel">Headline *</label>
          <input class="finput" id="nf-headline" placeholder="Short headline for this note…" autocomplete="off">
        </div>
        <div class="fgroup full">
          <label class="flabel">Note body</label>
          <textarea class="ftextarea" id="nf-text" placeholder="Write your note…" style="min-height:72px"></textarea>
        </div>
        <div class="fgroup">
          <label class="flabel">Deadline <span class="flabel-hint">(optional)</span></label>
          <input class="finput" type="date" id="nf-deadline">
        </div>
      </div>
      <div class="form-footer">
        <button class="btn btn-accent btn-sm" onclick="submitNoteForm()">${ui_editNoteId?'Update':'Add'}</button>
        <button class="btn btn-ghost btn-sm" onclick="ui_noteForm=false;ui_editNoteId=null;render()">Cancel</button>
      </div>
    </div>`;
  }

  // Active notes — sort: due today → overdue (closest first) → upcoming (soonest first) → no deadline (newest created first)
  const todayMs=new Date(today+'T00:00:00').getTime();
  const noteSortKey=n=>{
    if(!n.deadline_date) return Infinity;
    const diff=Math.round((new Date(n.deadline_date+'T00:00:00').getTime()-todayMs)/86400000);
    if(diff===0) return -1;           // due today → very top
    if(diff<0)   return (-diff)/100000; // overdue: closest to today first (-1 before -3)
    return diff;                      // upcoming: 1,2,3 … soonest first
  };
  const activeSorted=[...active].sort((a,b)=>{
    const ka=noteSortKey(a), kb=noteSortKey(b);
    if(ka!==kb) return ka-kb;
    return (b.created||0)-(a.created||0); // tie-break: newest created first
  });
  if(!activeSorted.length && !ui_noteForm){
    body+=`<div class="empty-state" style="padding:16px 0"><div class="empty-icon">📝</div><div class="empty-msg">No notes yet — click <strong>+ Add</strong></div></div>`;
  } else {
    activeSorted.forEach(n=>{
      const created=new Date(n.created).toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
      let dlChip='';
      if(n.deadline_date){
        const diff=new Date(n.deadline_date+'T00:00:00').getTime()-new Date(today+'T00:00:00').getTime();
        const days=Math.round(diff/86400000);
        if(days===-1)    dlChip=`<span class="note-deadline-chip">⚠ Due yesterday</span>`;
        else if(days<0)  dlChip=`<span class="note-deadline-chip">⚠ Overdue by ${Math.abs(days)}d</span>`;
        else if(days===0)dlChip=`<span class="note-deadline-chip">⚠ Due today</span>`;
        else             dlChip=`<span class="note-deadline-chip ok">📅 Due in ${days}d (${fmtDate(n.deadline_date)})</span>`;
      }
      const carriedChip=n.carriedForward?`<span class="carry-badge">↻ +${n.carriedDays||1}d</span>`:'';
      body+=`<div class="note-card${n.carriedForward?' note-carried':''}">
        ${n.headline?`<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:5px;font-family:var(--font)">${esc(n.headline)}</div>`:''}
        <div class="note-text">${esc(n.text)}</div>
        <div class="note-meta">
          <span>🗓 ${created}</span>
          ${dlChip}
          ${carriedChip}
        </div>
        <div class="note-btns">
          <button class="btn btn-done-active btn-sm" onclick="setNoteStatus('${n.id}','done');event.stopPropagation()">✅ Done</button>
          <button class="btn btn-ghost btn-sm" style="color:var(--text3)" onclick="setNoteStatus('${n.id}','pass');event.stopPropagation()">↪ Pass</button>
          <button class="btn btn-ghost btn-sm" onclick="editNote('${n.id}');event.stopPropagation()">✏ Edit</button>
          <button class="btn btn-ghost btn-sm btn-danger" onclick="deleteNote('${n.id}');event.stopPropagation()">🗑</button>
        </div>
      </div>`;
    });
  }

  // Resolved notes — collapsed by default, click header to expand
  if(resolved.length){
    const isResOpen=ui.notesResolvedOpen===true;
    body+=`<div style="border-top:1px dashed var(--border);margin-top:10px">
      <div style="display:flex;align-items:center;gap:6px;padding:6px 2px;cursor:pointer;user-select:none" onclick="ui.notesResolvedOpen=!ui.notesResolvedOpen;render()">
        <span style="font-size:11px;font-weight:500;color:var(--text3);font-family:var(--font)">${resolved.length} resolved</span>
        <span style="font-size:10px;color:var(--text3);margin-left:auto">${isResOpen?'▾':'▸'}</span>
      </div>
    </div>`;
    if(isResOpen){
      resolved.forEach(n=>{
        const created=new Date(n.created).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
        body+=`<div class="note-card ${n.status==='done'?'note-done':'note-pass'}">
          <div class="note-text" style="text-decoration:${n.status==='done'?'line-through':''}">${esc(n.text)}</div>
          <div class="note-meta">
            <span>🗓 ${created}</span>
            <span style="color:${n.status==='done'?'var(--done)':'var(--text3)'}">${n.status==='done'?'✅ Done':'↪ Passed'}</span>
          </div>
          <div class="note-btns">
            <button class="btn btn-ghost btn-xs" onclick="updateNote('${n.id}',{status:'active',resolvedOn:null});render()">↩ Restore</button>
            <button class="btn btn-ghost btn-xs" onclick="editNote('${n.id}')">✏ Edit</button>
            <button class="btn btn-ghost btn-xs btn-danger" onclick="if(confirm('Delete this note?'))deleteNote('${n.id}')">🗑</button>
          </div>
        </div>`;
      });
    }
  }

  if(isStandaloneNote){
    const nCount=(active||[]).length;
    return`<div style="padding-bottom:80px">
      <div class="acc-header" style="border-radius:10px 10px 0 0;border:0.5px solid var(--border);border-bottom:0">
        <span class="acc-icon">📝</span>
        <span class="acc-name">Notes</span>
        <div class="acc-meta">${nCount?`<span class="sbadge sb-in-progress">${nCount} active</span>`:''}</div>
      </div>
      <div style="border:0.5px solid var(--border);border-top:0;border-radius:0 0 10px 10px;padding:12px 16px 14px;margin-bottom:14px;">
        <div class="fi-form-footer">
          <button class="btn btn-ghost btn-sm" onclick="doEmailNotes()">✉ Email</button>
          <button class="btn btn-ghost btn-sm" onclick="doExportNotesTxt()">↓ Export</button>
          <button class="btn btn-accent btn-sm" onclick="ui_noteForm=!ui_noteForm;render();setTimeout(()=>document.getElementById('nf-headline')?.focus(),60)">+ Add</button>
        </div>
        ${body}
      </div>
    </div>`;
  }
  return`<div class="accordion${isOpen?' acc-open':''}" id="acc-remarks">
    <div class="acc-header" onclick="toggleAccordion('remarks')">
      <span class="acc-icon">📝</span>
      <span class="acc-name">Notes</span>

      <span class="acc-summary">${(()=>{ if(!active.length)return ''; const today=todayStr(); const sorted=[...active].sort((a,b)=>{ const da=a.deadline_date?Math.abs(new Date(a.deadline_date+'T00:00:00').getTime()-new Date(today+'T00:00:00').getTime()):Infinity; const db=b.deadline_date?Math.abs(new Date(b.deadline_date+'T00:00:00').getTime()-new Date(today+'T00:00:00').getTime()):Infinity; if(da!==db)return da-db; return (b.created||0)-(a.created||0); }); return esc((sorted[0].headline||sorted[0].text||'').slice(0,60)); })()}</span>
      <div class="acc-meta">
        ${active.length?`<span class="sbadge sb-in-progress">${active.length} active</span>`:''}
      </div>
      <span class="acc-chevron${isOpen?' open':''}" id="acc-chev-remarks">▾</span>
    </div>
    ${(()=>{
      if(!active.length) return '';
      const _today=todayStr();
      const _todayMs=new Date(_today+'T00:00:00').getTime();
      const withDl=active.filter(n=>n.deadline_date);
      let n;
      if(withDl.length){
        withDl.sort((a,b)=>{
          const da=Math.round((new Date(a.deadline_date+'T00:00:00').getTime()-_todayMs)/86400000);
          const db=Math.round((new Date(b.deadline_date+'T00:00:00').getTime()-_todayMs)/86400000);
          const wa=da<0?100000+Math.abs(da):da; // overdue: sort by closeness
          const wb=db<0?100000+Math.abs(db):db;
          return wa-wb;
        });
        n=withDl[0];
      } else {
        n=[...active].sort((a,b)=>(b.created||0)-(a.created||0))[0];
      }
      if(!n) return '';
      const title=n.headline||n.text||'';
      let meta='';
      if(n.deadline_date){
        const diff=Math.round((new Date(n.deadline_date+'T00:00:00').getTime()-_todayMs)/86400000);
        meta=diff===0?'Due today':diff===1?'Due tomorrow':diff===-1?'Due yesterday':diff<0?'Overdue '+Math.abs(diff)+'d':'Due '+_stripDateWord(n.deadline_date,_today);
      }
      const dotCol=n.deadline_date&&Math.round((new Date(n.deadline_date+'T00:00:00').getTime()-_todayMs)/86400000)<=3?'#D97706':'#2563EB';
      return `<div class="acc-info-strip"><span style="width:5px;height:5px;border-radius:50%;background:${dotCol};flex-shrink:0;display:inline-block"></span><span style="font-size:10px;color:var(--text2);font-style:italic;font-family:var(--font);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-left:5px">${esc(title.slice(0,80))}</span><span style="font-size:10px;font-weight:400;color:#888;font-family:var(--font);flex-shrink:0;margin-left:4px">${meta}</span></div>`;
    })()}
    <div class="acc-body${isOpen?' open':''}" id="acc-body-remarks">
      <div class="sec-head">
        <button class="btn btn-ghost btn-sm" onclick="doEmailNotes()">✉ Email</button>
        <button class="btn btn-ghost btn-sm" onclick="doExportNotesTxt()">↓ Export</button>
        <button class="btn btn-accent btn-sm" onclick="ui_noteForm=!ui_noteForm;render();setTimeout(()=>document.getElementById('nf-headline')?.focus(),60)">+ Add</button>
      </div>
      ${body}
    </div>
  </div>`;
}

function leaveDays(from,to){
  if(!from||!to) return 0;
  return Math.max(1,Math.round((new Date(to+'T00:00:00')-new Date(from+'T00:00:00'))/86400000)+1);
}
function getOnLeaveToday(){
  const today=todayStr();
  return(state.leaves||[]).filter(l=>l.dateFrom&&l.dateTo&&l.dateFrom<=today&&l.dateTo>=today);
}
function renderOnLeavePill(){
  const wrap=document.getElementById('onleave-pill-wrap');
  if(!wrap) return;
  const onLeave=getOnLeaveToday();
  if(!onLeave.length){ wrap.innerHTML=''; }
  else {
    const hasPending=onLeave.some(l=>l.status==='pending');
    const names=onLeave.map(l=>(l.employeeName||'?').split(' ')[0]).join(', ');
    wrap.innerHTML=`<div class="onleave-pill${hasPending?' has-pending':''}" onclick="jumpToLeaves()" title="Click to view leave details">🌴 On leave: ${esc(names)}</div>`;

function addLeave(data){
  if(!state.leaves)state.leaves=[];
  state.leaves.push({...data,id:genId(),created:Date.now()});
  saveAndPush();
}
function updateLeave(id,data){
  if(!state.leaves)return;
  const i=state.leaves.findIndex(l=>l.id===id);
  if(i>=0){state.leaves[i]={...state.leaves[i],...data, updated:Date.now()};saveAndPush();}
}
function deleteLeave(id){
  state.leaves=(state.leaves||[]).filter(l=>l.id!==id);
  if(!state.deletedIds) state.deletedIds={};
  if(!state.deletedIds.leaves) state.deletedIds.leaves=[];
  if(!state.deletedIds.leaves.includes(id)) state.deletedIds.leaves.push(id);
  ui_openLeaves.delete(id);
  // Remove the DOM element immediately without waiting for full render
  const el=document.querySelector('[data-id="'+id+'"]');
  if(el) el.remove();
  saveAndPush();
  renderOnLeavePill();
  // Full render after a tick to sync state
  setTimeout(()=>render(),0);
}
function submitLeaveForm(){
  const g=id=>(document.getElementById(id)||{}).value||'';
  const empName=g('lf-employee');
  const data={
    employeeName: empName,
    leaveType:    g('lf-type'),
    dateFrom:     g('lf-from'),
    dateTo:       g('lf-to'),
    status:       g('lf-status'),
    reason:       g('lf-reason').trim(),
  };
  if(!data.employeeName){ toast('Please select an employee'); return; }
  if(!data.dateFrom||!data.dateTo){ toast('Please set start and end dates'); return; }

  if(ui_editLeaveId){ updateLeave(ui_editLeaveId,data); toast('Leave updated ✓'); ui_editLeaveId=null; }

  setTimeout(()=>{
    const sec=document.getElementById('leaves-section');
    if(sec){const r=sec.getBoundingClientRect();if(r.top<0||r.top>window.innerHeight) sec.scrollIntoView({behavior:'smooth',block:'start'});}

}

  const toDelete=(state.travelEntries||[]).filter(e=>e.storyId===sid).map(e=>e.id);

    state.travelEntries=(state.travelEntries||[]).filter(e=>e.id!==id);

  const tb=document.getElementById('acc-body-travel');
  if(tb&&tb.classList.contains('open')) tb.innerHTML=_teRenderBody();
  else { ui.openSections.add('travel'); render(); setTimeout(()=>{ const t=document.getElementById('acc-body-travel'); if(t){ t.innerHTML=_teRenderBody(); t.classList.add('open'); } },50); }
  setTimeout(()=>{
    document.getElementById('te-story')?.focus();
    // Ghost-tap guard: disable save button briefly after form opens
    const btn=document.getElementById('te-submit-btn');
    if(btn){ btn.disabled=true; btn.style.opacity='.5'; setTimeout(()=>{ btn.disabled=false; btn.style.opacity=''; },600); }
  },80);
}
function _teCloseForm(){
  _te={open:false,type:'cab',storyId:null,storySec:null,editId:null};
  const tb=document.getElementById('acc-body-travel');
  if(tb&&tb.classList.contains('open')) tb.innerHTML=_teRenderBody();
  if(window._pendingSyncRender){ window._pendingSyncRender=false; render(); }
}
function _teSetType(t){
  _te.type=t;
  const tb=document.getElementById('acc-body-travel');
  if(tb&&tb.classList.contains('open')) tb.innerHTML=_teRenderBody();
}
function _teSubmit(){
  const g=id=>{ const el=document.getElementById('te-'+id); return el?(el.type==='checkbox'?el.checked:(el.value||'').trim()):''; };
  const type=_te.type;
  const storyId=g('story')||null;
  // Find storySec from storyId
  let storySec=null;
  if(storyId){ for(const s of SECTIONS){ if((state.sections[s.key]||[]).find(x=>x.id===storyId)){storySec=s.key;break;} } }

  let data={};
  if(type==='cab') data={from:g('from'),pickDate:g('pickdate'),pickTime:g('picktime'),to:g('to'),dropDate:g('dropdate'),dropTime:g('droptime'),driver:g('driver'),phone:g('phone'),cabNum:g('cabnum'),payment:g('payment'),paidBy:g('paidby')};
  else if(type==='flight') data={direction:g('direction'),airline:g('airline'),flightNum:g('flightnum'),from:g('from'),to:g('to'),flightDate:g('flightdate'),flightTime:g('flighttime'),payment:g('payment'),paidBy:g('paidby')};
  else if(type==='hotel') data={hotelName:g('hotel'),where:g('where'),checkIn:g('checkin'),checkOut:g('checkout'),priceDay:g('priceday'),priceTotal:g('pricetotal'),payment:g('payment'),paidBy:g('paidby')};
  else if(type==='expense') data={what:g('what'),when:g('when'),where:g('where'),amount:g('amount'),paidBy:g('paidby'),payment:g('payment'),claimed:g('claimed')};
  else if(type==='fixer') data={fixerName:g('fixername'),where:g('where'),phone:g('phone'),email:g('email'),startDate:g('startdate'),endDate:g('enddate'),fixerDays:g('fixerdays'),rateDay:g('rateday'),fixerTotal:g('fixertotal'),payment:g('payment'),paidBy:g('paidby'),claimed:g('claimed'),status:g('status'),fixerNotes:(document.getElementById('te-fixernotes')?.value||'').trim()};

  const entry={type,storyId,storySec,data};
  // Basic validation — require at least one meaningful field
  const hasContent=Object.values(data).some(v=>v&&String(v).trim());
  if(!hasContent){ toast('Please fill in at least one field'); return; }
  if(_te.editId) _teUpdate(_te.editId,entry);
  else _teAdd(entry);
  _te={open:false,type:'cab',storyId:null,storySec:null,editId:null};
  const tb=document.getElementById('acc-body-travel');
  if(tb&&tb.classList.contains('open')) tb.innerHTML=_teRenderBody();
  if(window._pendingSyncRender){ window._pendingSyncRender=false; render(); }
}


function _teUpdateHotelTotal(){
  const pd=parseFloat(document.getElementById('te-priceday')?.value)||0;
  const ci=document.getElementById('te-checkin')?.value;
  const co=document.getElementById('te-checkout')?.value;
  const tot=document.getElementById('te-pricetotal');
  if(!tot||tot._edited) return;
  if(pd&&ci&&co){ const n=Math.round((new Date(co)-new Date(ci))/86400000); if(n>0) tot.value=Math.round(pd*n); }
}

function _teUpdateFixerTotal(){
  const sd=document.getElementById('te-startdate')?.value;
  const ed=document.getElementById('te-enddate')?.value;
  const daysEl=document.getElementById('te-fixerdays');
  const totEl=document.getElementById('te-fixertotal');
  if(sd&&ed){
    const n=Math.round((new Date(ed)-new Date(sd))/86400000)+1;
    if(n>0&&daysEl) daysEl.value=n;
    if(totEl&&!totEl._edited){
      const rate=parseFloat(document.getElementById('te-rateday')?.value)||0;
      if(rate&&n>0) totEl.value=Math.round(rate*n);
    }
  }
}

// ── Travel entry remarks CRUD ─────────────────────────────
let _teRemarkEditId={};  // entryId → remarkId currently being edited

function _teAddEntryRemark(eid){
  const el=document.getElementById('ter-input-'+eid); if(!el) return;
  const text=el.value.trim(); if(!text){ toast('Enter a remark'); return; }
  const entry=(state.travelEntries||[]).find(e=>e.id===eid); if(!entry) return;
  if(!Array.isArray(entry.remarks)) entry.remarks=[];
  entry.remarks.push({id:genId(),text,ts:Date.now()});
  entry.updated=Date.now();
  _teSave();
}
function _teUpdateEntryRemark(eid,rid){
  const el=document.getElementById('ter-edit-'+eid+'-'+rid); if(!el) return;
  const text=el.value.trim(); if(!text){ toast('Enter remark text'); return; }
  const entry=(state.travelEntries||[]).find(e=>e.id===eid); if(!entry) return;
  const r=(entry.remarks||[]).find(r=>r.id===rid); if(!r) return;
  r.text=text; r.edited=Date.now();
  entry.updated=Date.now();
  delete _teRemarkEditId[eid];
  _teSave();
}
function _teDeleteEntryRemark(eid,rid){
  const entry=(state.travelEntries||[]).find(e=>e.id===eid); if(!entry) return;
  entry.remarks=(entry.remarks||[]).filter(r=>r.id!==rid);
  entry.updated=Date.now();
  _teSave();
}

function _teBuildEntryRemarksHTML(e){
  const list=e.remarks||[];
  const editingId=_teRemarkEditId[e.id];
  let html=`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
    <div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:7px">🗒 Remarks${list.length?' ('+list.length+')':''}</div>`;
  list.forEach(r=>{
    const dt=new Date(r.ts).toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
    if(editingId===r.id){
      html+=`<div class="sremark" onclick="event.stopPropagation()">
        <div class="sremark-body" style="width:100%">
          <textarea class="ftextarea" id="ter-edit-${e.id}-${r.id}" style="min-height:52px;white-space:pre-wrap;width:100%">${esc(r.text)}</textarea>
          <div style="display:flex;gap:6px;margin-top:5px">
            <button class="btn btn-accent btn-sm" onclick="event.stopPropagation();_teUpdateEntryRemark('${e.id}','${r.id}')">Save</button>
            <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();delete _teRemarkEditId['${e.id}'];_teRefresh()">Cancel</button>
          </div>
        </div>
      </div>`;
    } else {
      html+=`<div class="sremark" onclick="event.stopPropagation()">
        <div class="sremark-body">
          <div class="sremark-text">${esc(r.text)}</div>
          <div class="sremark-meta">${dt}${r.edited?' · edited '+new Date(r.edited).toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):''}</div>
        </div>
        <div style="display:flex;gap:3px;flex-shrink:0">
          <button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();_teRemarkEditId['${e.id}']='${r.id}';_teRefresh()" title="Edit">✏</button>
          <button class="btn btn-ghost btn-xs btn-danger" onclick="event.stopPropagation();if(confirm('Delete this remark?'))_teDeleteEntryRemark('${e.id}','${r.id}')" title="Delete">🗑</button>
        </div>
      </div>`;
    }
  });
  html+=`<div class="sremark-add" onclick="event.stopPropagation()">
    <textarea class="ftextarea" id="ter-input-${e.id}" placeholder="Add a remark… (Enter for new line)" style="flex:1;font-size:12px;min-height:44px;resize:vertical;white-space:pre-wrap"></textarea>
    <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();_teAddEntryRemark('${e.id}')">+ Add</button>
  </div>`;
  html+=`</div>`;
  return html;
}

// ── Entry row rendering ───────────────────────────────────
function _teRenderEntry(e){
  const d=e.data||{};
  const col=_typeCol[e.type]||'var(--border)';
  const isOpen=_teOpen[e.id];

  // Summary line (compact)
  let sum='';
  const payL=_payLabel(d.payment);
  if(e.type==='cab'){
    const pick=(d.pickDate?_fmtDShort(d.pickDate):d.when?.slice(0,10)?_fmtDShort(d.when.slice(0,10)):'')+(d.pickTime?' '+d.pickTime:d.when?.slice(11,16)?' '+d.when.slice(11,16):'');
    sum=esc(d.from||'')+(d.to?' → '+esc(d.to):'')+( pick?' · '+pick:'');
  }
  else if(e.type==='flight'){
    const fl=(d.flightDate?_fmtDShort(d.flightDate):d.when?.slice(0,10)?_fmtDShort(d.when.slice(0,10)):'')+(d.flightTime?' '+d.flightTime:d.when?.slice(11,16)?' '+d.when.slice(11,16):'');
    sum=(d.direction==='inbound'?'↩ In':'→ Out')+': '+esc(d.from||'')+(d.to?' → '+esc(d.to):'')+( fl?' · '+fl:'');
  }
  else if(e.type==='hotel') sum=esc(d.hotelName||d.where||'')+( d.checkIn?' · '+_fmtDShort(d.checkIn):'')+( d.checkOut?' – '+_fmtDShort(d.checkOut):'');
  else if(e.type==='expense') sum=esc(d.what||'')+( d.amount?' · '+esc(d.amount):'')+(_teGetClaimed(e)==='yes'?' · ✅':' · ⏳');
  else if(e.type==='fixer') sum=esc(d.fixerName||d.where||'')+(d.where&&d.fixerName?' · '+esc(d.where):'')+(d.startDate?' · '+_fmtDShort(d.startDate):'')+( d.endDate?' – '+_fmtDShort(d.endDate):'')+(d.fixerTotal?' · '+esc(d.fixerTotal):'')+(_teGetClaimed(e)==='yes'?' · ✅':' · ⏳');

  // Detail block (expanded)
  const fld=(l,v)=>v?`<div style="display:grid;grid-template-columns:110px 1fr;gap:4px;margin-bottom:3px"><span style="font-size:11.5px;color:var(--text3)">${l}</span><span style="font-size:12px;color:var(--text)">${esc(String(v))}</span></div>`:'';
  let det='';
  if(e.type==='cab'){
    const pick=(d.pickDate?_fmtD(d.pickDate):(d.when?.slice(0,10)?_fmtD(d.when.slice(0,10)):''))+(d.pickTime?' '+d.pickTime:d.when?.slice(11,16)?' '+d.when.slice(11,16):'');
    const drop=(d.dropDate?_fmtD(d.dropDate):(d.dropWhen?.slice(0,10)?_fmtD(d.dropWhen.slice(0,10)):''))+(d.dropTime?' '+d.dropTime:d.dropWhen?.slice(11,16)?' '+d.dropWhen.slice(11,16):'');
    det=fld('From',d.from)+fld('Pick-up',pick)+fld('To',d.to)+fld('Drop-off',drop)+fld('Driver',d.driver+(d.phone?' · '+d.phone:''))+fld('Cab no.',d.cabNum)+fld('Payment',_payLabel(d.payment))+fld('Paid by',d.paidBy);
  }
  else if(e.type==='flight'){
    const fl=(d.flightDate?_fmtD(d.flightDate):(d.when?.slice(0,10)?_fmtD(d.when.slice(0,10)):''))+(d.flightTime?' '+d.flightTime:d.when?.slice(11,16)?' '+d.when.slice(11,16):'');
    det=fld('Direction',d.direction==='inbound'?'Inbound / Return':'Outbound')+fld('Airline',d.airline)+fld('Flight no.',d.flightNum)+fld('From',d.from)+fld('To',d.to)+fld('Date & time',fl)+fld('Payment',_payLabel(d.payment))+fld('Paid by',d.paidBy);
  }
  else if(e.type==='hotel') det=fld('Hotel',d.hotelName)+fld('Location',d.where)+fld('Check-in',_fmtD(d.checkIn))+fld('Check-out',_fmtD(d.checkOut))+fld('Price/day',d.priceDay)+fld('Total',d.priceTotal)+fld('Payment',_payLabel(d.payment))+fld('Paid by',d.paidBy);
  else if(e.type==='expense') det=fld('What',d.what)+fld('Date',_fmtD(d.when))+fld('Location',d.where)+fld('Amount',d.amount)+fld('Paid by',d.paidBy)+fld('Payment',_payLabel(d.payment))+fld('Claimed',_teGetClaimed(e)==='yes'?'✅ Yes':'⏳ Not yet');
  else if(e.type==='fixer') det=fld('Name',d.fixerName)+fld('Location',d.where)+fld('Phone',d.phone)+fld('Email',d.email)+fld('Start date',_fmtD(d.startDate))+fld('End date',_fmtD(d.endDate))+fld('Days',d.fixerDays)+fld('Rate / day',d.rateDay)+fld('Total',d.fixerTotal)+fld('Payment',_payLabel(d.payment))+fld('Paid by',d.paidBy)+fld('Status',d.status)+fld('Payment status',_teGetClaimed(e)==='yes'?'✅ Paid':'⏳ Unpaid / pending')+(d.fixerNotes?fld('Notes',d.fixerNotes):'');

  // Remarks — full inline CRUD panel
  const remHTML=_teBuildEntryRemarksHTML(e);

  return`<div style="border:1px solid var(--border);border-left:3px solid ${col};border-radius:7px;margin-bottom:6px">

      <span style="font-size:16px;flex-shrink:0;width:22px;text-align:center">${_typeIco[e.type]}</span>

      ${d.payment==='unpaid'?`<span style="font-size:10px;font-weight:600;color:#B91C1C;flex-shrink:0">UNPAID</span>`:''}
      <span id="te-chev-${e.id}" style="font-size:11px;color:var(--text3);flex-shrink:0">${isOpen?'▲':'▼'}</span>

      <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px">${_typeName[e.type]}</div>
      ${det}
      ${remHTML}
      <div style="display:flex;gap:7px;justify-content:flex-end;margin-top:10px;padding-top:8px;border-top:1px dashed var(--border)">
        <button class="btn btn-ghost btn-sm" onclick="_teOpenForm({type:'${e.type}',storyId:${e.storyId?`'${e.storyId}'`:'null'},storySec:${e.storySec?`'${e.storySec}'`:'null'},editId:'${e.id}'});event.stopPropagation()">✏ Edit</button>
        <button class="btn btn-ghost btn-sm btn-danger" onclick="_teDelete('${e.id}');event.stopPropagation()">🗑 Delete</button>
      </div>
    </div>
  </div>`;
}

function _teToggle(eid){
  _teOpen[eid]=!_teOpen[eid];
  const det=document.getElementById('te-det-'+eid);
  const chev=document.getElementById('te-chev-'+eid);
  const row=det?.previousElementSibling;
  if(det) det.style.display=_teOpen[eid]?'block':'none';
  if(chev) chev.textContent=_teOpen[eid]?'▲':'▼';

  const allBookings=allEntries.filter(e=>['cab','flight','hotel','fixer'].includes(e.type));
  const allBookUnpaid=allBookings.filter(e=>
    e.type==='fixer' ? _teGetClaimed(e)!=='yes' : e.data?.payment==='unpaid'
  ).length;
  const allBookPaid=allBookings.length>0&&allBookUnpaid===0;

  // Header summary: title of first story sorted by overdue→nearest future
  const stories=_teGetStories().filter(({s})=>!(state.travelDismissed||[]).includes(s.id)).sort((a,b)=>{
    const da=a.s.deadline_date||'9999-99-99',db=b.s.deadline_date||'9999-99-99';
    if(da<today&&db<today) return da.localeCompare(db);
    if(da<today) return -1; if(db<today) return 1;
    return da.localeCompare(db);
  });
  const summary=stories.length?esc((stories[0].s.title||'').slice(0,32)):'';

  const travelStrip=(()=>{
    if(!summary) return '';
    const dotCol=notClaimedCount?'#D97706':allClaimed?'#16A34A':'#94a3b8';
    const firstStory=stories[0]?.s;
    let meta='';
    if(firstStory?.deadline_date){
      const dl=firstStory.deadline_date;
      const isOverdue=dl<today;
      const dlWord=_stripDateWord(dl,today);
      const dlLabel=isOverdue?'Overdue':'Due';
      meta=`<span style="font-size:10px;color:#888;font-family:var(--font);flex-shrink:0;margin-left:4px">${dlLabel} ${dlWord}</span>`;
    } else if(stories.length>1){
      meta=`<span style="font-size:10px;color:#888;font-family:var(--font);flex-shrink:0;margin-left:4px">+${stories.length-1} more</span>`;
    }
    return `<div class="acc-info-strip"><span style="width:5px;height:5px;border-radius:50%;background:${dotCol};flex-shrink:0;display:inline-block"></span><span style="font-size:10px;color:var(--text2);font-style:italic;font-family:var(--font);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-left:5px">${summary}</span>${meta}</div>`;
  })();

  return`<div class="accordion${isOpen?' acc-open':''}" id="acc-travel">
    <div class="acc-header" onclick="toggleAccordion('travel')">
      <span class="acc-icon">🗺</span>
      <span class="acc-name">Travel &amp; Expenses</span>
      <span class="acc-summary">${summary}</span>
      <div class="acc-meta">
        ${allBookUnpaid?`<span class="sbadge sb-in-progress">${allBookUnpaid} unpaid</span>`:''}
        ${allBookPaid?`<span class="sbadge sb-in-progress">All paid</span>`:''}
        ${notClaimedCount?`<span class="sbadge sb-in-progress"><span class="badge-dot" style="background:var(--progress)"></span>${notClaimedCount} unclaimed</span>`:''}
        ${allClaimed?`<span class="sbadge sb-in-progress">All claimed</span>`:''}
      </div>
      <span class="acc-chevron${isOpen?' open':''}" id="acc-chev-travel">▾</span>
    </div>
    ${travelStrip}
    <div class="acc-body${isOpen?' open':''}" id="acc-body-travel">
      ${isOpen?_teRenderBody():''}
    </div>
  </div>`;
}

// ── Export / Email ────────────────────────────────────────
function doExportTravelTxt(){
  const entries=state.travelEntries||[];
  if(!entries.length){ toast('No travel entries to export'); return; }
  const hr='─'.repeat(48);
  const pad=(l,v)=>v?(l+':').padEnd(18)+v:'';
  const lines=['TRAVEL & EXPENSES',hr,pad('Exported',new Date().toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})),''];

  // Group by story
  const byStory={};
  entries.forEach(e=>{
    const k=e.storyId||'__general';
    if(!byStory[k]) byStory[k]=[];
    byStory[k].push(e);
  });

  // Story groups first
  _teGetStories().forEach(({s})=>{
    const grp=byStory[s.id]; if(!grp) return;
    lines.push(''); lines.push((s.title||'Untitled').toUpperCase()); lines.push(hr);
    grp.forEach(e=>{
      const d=e.data||{};
      lines.push(''); lines.push('  ['+(_typeName[e.type]||e.type).toUpperCase()+']');
      if(e.type==='cab'){ if(d.from||d.to) lines.push(pad('  Route',[d.from,d.to].filter(Boolean).join(' → '))); if(d.when) lines.push(pad('  Pick-up',_fmtDT(d.when))); if(d.dropWhen) lines.push(pad('  Drop-off',_fmtDT(d.dropWhen))); if(d.driver) lines.push(pad('  Driver',d.driver+(d.phone?' ('+d.phone+')':''))); if(d.cabNum) lines.push(pad('  Cab no.',d.cabNum)); if(d.payment) lines.push(pad('  Payment',_payLabel(d.payment))); if(d.paidBy) lines.push(pad('  Paid by',d.paidBy)); }
      else if(e.type==='flight'){ lines.push(pad('  Direction',d.direction==='inbound'?'Inbound / Return':'Outbound')); if(d.airline) lines.push(pad('  Airline',d.airline)); if(d.flightNum) lines.push(pad('  Flight no.',d.flightNum)); if(d.from||d.to) lines.push(pad('  Route',[d.from,d.to].filter(Boolean).join(' → '))); if(d.when) lines.push(pad('  When',_fmtDT(d.when))); if(d.payment) lines.push(pad('  Payment',_payLabel(d.payment))); if(d.paidBy) lines.push(pad('  Paid by',d.paidBy)); }
      else if(e.type==='hotel'){ if(d.hotelName) lines.push(pad('  Hotel',d.hotelName)); if(d.where) lines.push(pad('  Location',d.where)); if(d.checkIn) lines.push(pad('  Check-in',_fmtD(d.checkIn))); if(d.checkOut) lines.push(pad('  Check-out',_fmtD(d.checkOut))); if(d.priceDay) lines.push(pad('  Price/day',d.priceDay)); if(d.priceTotal) lines.push(pad('  Total',d.priceTotal)); if(d.payment) lines.push(pad('  Payment',_payLabel(d.payment))); if(d.paidBy) lines.push(pad('  Paid by',d.paidBy)); }
      else if(e.type==='expense'){ if(d.what) lines.push(pad('  What',d.what)); if(d.when) lines.push(pad('  Date',_fmtD(d.when))); if(d.where) lines.push(pad('  Location',d.where)); if(d.amount) lines.push(pad('  Amount',d.amount)); if(d.paidBy) lines.push(pad('  Paid by',d.paidBy)); if(d.payment) lines.push(pad('  Payment',_payLabel(d.payment))); lines.push(pad('  Claimed',_teGetClaimed(e)==='yes'?'Yes':'No')); }
      else if(e.type==='fixer'){ if(d.fixerName) lines.push(pad('  Name',d.fixerName)); if(d.where) lines.push(pad('  Location',d.where)); if(d.phone) lines.push(pad('  Phone',d.phone)); if(d.startDate) lines.push(pad('  Start',_fmtD(d.startDate))); if(d.endDate) lines.push(pad('  End',_fmtD(d.endDate))); if(d.fixerDays) lines.push(pad('  Days',d.fixerDays)); if(d.rateDay) lines.push(pad('  Rate/day',d.rateDay)); if(d.fixerTotal) lines.push(pad('  Total',d.fixerTotal)); if(d.payment) lines.push(pad('  Payment',_payLabel(d.payment))); if(d.paidBy) lines.push(pad('  Paid by',d.paidBy)); lines.push(pad('  Paid',_teGetClaimed(e)==='yes'?'Yes':'No')); if(d.fixerNotes) lines.push(pad('  Notes',d.fixerNotes)); }
      (e.remarks||[]).forEach(r=>lines.push(pad('  Note',r.text)));
    });
  });
  // General entries
  const gen=byStory['__general'];
  if(gen){ lines.push(''); lines.push('GENERAL'); lines.push(hr); gen.forEach(e=>{ /* same as above */ }); }

  lines.push(''); lines.push(hr); lines.push('Generated by Newsroom Dashboard');
  const blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='travel-expenses-'+new Date().toISOString().slice(0,10)+'.txt';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('Travel & Expenses exported ✓');
}

function doEmailTravel(){
  const entries=state.travelEntries||[];
  if(!entries.length){ toast('No travel entries to email'); return; }
  const lines=['TRAVEL & EXPENSES',''];
  const byStory={};
  entries.forEach(e=>{ const k=e.storyId||'__general'; if(!byStory[k]) byStory[k]=[]; byStory[k].push(e); });
  _teGetStories().forEach(({s})=>{
    const grp=byStory[s.id]; if(!grp) return;
    lines.push((s.title||'Untitled').toUpperCase());
    grp.forEach(e=>{ const d=e.data||{}; let line='  '+(_typeIco[e.type]||''); if(e.type==='cab') line+=' '+[d.from,d.to].filter(Boolean).join(' → ')+(d.when?' · '+_fmtDShort(d.when.slice(0,10)):''); else if(e.type==='flight') line+=' '+(d.direction==='inbound'?'↩':' →')+' '+(d.from||'')+(d.to?' → '+d.to:''); else if(e.type==='hotel') line+=' '+(d.hotelName||d.where||'')+(d.checkIn?' · '+_fmtDShort(d.checkIn):''); else if(e.type==='expense') line+=' '+(d.what||'')+(d.amount?' · '+d.amount:'')+(_teGetClaimed(e)==='yes'?' · ✅':' · ⏳'); else if(e.type==='fixer') line+=' '+(d.fixerName||'')+(d.where?' · '+d.where:'')+(d.fixerTotal?' · '+d.fixerTotal:'')+(_teGetClaimed(e)==='yes'?' · ✅':' · ⏳'); lines.push(line); });
    lines.push('');
  });
  const gen=byStory['__general']; if(gen){ lines.push('GENERAL'); gen.forEach(e=>{ const d=e.data||{}; lines.push('  '+(_typeIco[e.type]||'')+' '+(d.what||d.from||d.hotelName||'')); }); }
  sendMailto('[BBC Dashboard] Travel & Expenses — '+new Date().toLocaleDateString('en-GB'), lines.join('\n'));
}
