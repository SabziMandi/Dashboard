function startRealtimeSync(){
  if(!fireDb) return;
  if(firestoreUnsub) firestoreUnsub();
  firestoreUnsub=fireDb.collection('nd').doc('data').onSnapshot(snap=>{
    if(snap.exists){
      const incoming=snap.data();
      // Compute merged deletedIds — remote is authoritative base (we clean it intentionally via console/code)
      // Local can only ADD new deletions, never override a remote removal
      const localDeletedIds=state.deletedIds||{};
      const remoteDeletedIds=incoming.deletedIds||{};
      const mergedDeletedIds={};
      // Start with remote as the base — if we cleaned an ID from remote, it stays clean
      Object.keys(remoteDeletedIds).forEach(k=>{
        mergedDeletedIds[k]=[...(remoteDeletedIds[k]||[])];
      });
      // Add any local deletions that aren't already in remote (new local deletes not yet pushed)
      Object.keys(localDeletedIds).forEach(k=>{
        if(!mergedDeletedIds[k]) mergedDeletedIds[k]=[];
        (localDeletedIds[k]||[]).forEach(id=>{
          if(!(remoteDeletedIds[k]||[]).includes(id)&&!mergedDeletedIds[k].includes(id)){
            // Only add if the item doesn't exist in remote sections (genuine delete, not a stale tombstone)
            const existsInRemote=SECTIONS.some(sec=>(incoming.sections?.[sec.key]||[]).some(s=>s.id===id));
            if(!existsInRemote) mergedDeletedIds[k].push(id);
          }
        });
      });
      // Smart merge: for arrays (leaves, tasks, notes, meetings, travelEntries), keep whichever is longer/newer
      // This prevents a device with stale data from wiping entries added on another device
      const arrayKeys=['leaves','tasks','notes','meetings','travelEntries'];
      const mergedArrays={};
      arrayKeys.forEach(k=>{
        const local=state[k]||[];
        const remote=incoming[k]||[];
        const deletedForKey=new Set(mergedDeletedIds[k]||[]); // use merged set — catches remote deletions
        // Merge by ID: union of both, but deletions and _deleted flags are authoritative
        const map=new Map();
        local.forEach(item=>{if(item.id) map.set(item.id,item);});
        remote.forEach(item=>{
          if(!item.id) return;
          if(deletedForKey.has(item.id)) return; // never resurrect locally deleted items
          const existing=map.get(item.id);
          if(existing&&existing._deleted) return; // local tombstone wins over remote live copy
          if(existing){
            // Remote wins only if strictly newer — local wins on tie (same-device push/snapshot)
            const remoteTs=item.updated||item.created||0;
            const localTs=existing.updated||existing.created||0;
            if(remoteTs>localTs) map.set(item.id,item);
          } else {
            map.set(item.id,item); // new entry from remote
          }
        });
        mergedArrays[k]=[...map.values()].filter(item=>{
          if(!deletedForKey.has(item.id)) return true; // not deleted — keep
          // Only remove if remote also doesn't have it (genuine delete, not a stale tombstone)
          const aliveInRemote=(incoming[k]||[]).some(r=>r.id===item.id);
          return aliveInRemote;
        });
      });
      // For archive: deep merge — keep all keys from both
      const localArchive=state.archive||{};
      const remoteArchive=incoming.archive||{};
      const mergedArchive={...localArchive};
      Object.keys(remoteArchive).forEach(dateKey=>{
        if(!mergedArchive[dateKey]){
          // Date only exists in remote — still need to filter out locally deleted entries
          mergedArchive[dateKey]=remoteArchive[dateKey];
          if(mergedArchive[dateKey].sections){
            SECTIONS.forEach(sec=>{
              const archDeletedKey=dateKey+'::'+sec.key;
              const archDeletedIds=new Set((mergedDeletedIds[archDeletedKey]||[]));
              if(archDeletedIds.size&&mergedArchive[dateKey].sections[sec.key]){
                mergedArchive[dateKey].sections[sec.key]=
                  mergedArchive[dateKey].sections[sec.key].filter(s=>!archDeletedIds.has(s.id));
              }
            });
          }
        } else {
          // Merge notesLog and tasksLog arrays by ID
          ['notesLog','tasksLog'].forEach(logKey=>{
            const localLog=mergedArchive[dateKey][logKey]||[];
            const remoteLog=remoteArchive[dateKey][logKey]||[];
            const logMap=new Map();
            localLog.forEach(item=>{if(item.id) logMap.set(item.id,item);});
            remoteLog.forEach(item=>{
              if(!item.id) return;
              const existing=logMap.get(item.id);
              // Local _deleted tombstone always wins — never let remote resurrect a deleted log entry
              if(existing&&existing._deleted) return;
              // Use timestamp comparison — local wins if newer
              if(existing){
                const remoteTs=item.updated||item.deletedOn||item.created||0;
                const localTs=existing.updated||existing.deletedOn||existing.created||0;
                if(remoteTs>localTs) logMap.set(item.id,item);
              } else {
                logMap.set(item.id,item);
              }
            });
            mergedArchive[dateKey][logKey]=[...logMap.values()];
          });
          // Merge story sections
          if(remoteArchive[dateKey].sections){
            SECTIONS.forEach(sec=>{
              const localSec=mergedArchive[dateKey].sections?.[sec.key]||[];
              const remoteSec=remoteArchive[dateKey].sections?.[sec.key]||[];
              // Build a set of IDs that are locally marked as deleted for this archive date
              const archDeletedKey=dateKey+'::'+sec.key;
              const archDeletedIds=new Set((mergedDeletedIds[archDeletedKey]||[]));
              const secMap=new Map();
              localSec.forEach(s=>{if(s.id) secMap.set(s.id,s);});
              remoteSec.forEach(s=>{
                if(!s.id) return;
                if(archDeletedIds.has(s.id)) return; // never resurrect archive-deleted entries
                const existing=secMap.get(s.id);
                // If local copy is marked deleted, keep it (deletion wins over remote live copy)
                if(existing&&existing._deleted) return;
                secMap.set(s.id,s);
              });
              if(!mergedArchive[dateKey].sections) mergedArchive[dateKey].sections={};
              mergedArchive[dateKey].sections[sec.key]=[...secMap.values()];
            });
          }
        }
      });
      // Smart merge state.sections by story ID — newer updated/created wins
      const mergedSections={};
      SECTIONS.forEach(sec=>{
        const localSec=state.sections[sec.key]||[];
        const remoteSec=incoming.sections?.[sec.key]||[];
        const deletedForSec=(mergedDeletedIds[sec.key]||[]);
        const secMap=new Map();
        // Local first, then remote overrides — but compare timestamps for same ID
        localSec.forEach(s=>{ if(s.id) secMap.set(s.id,s); });
        remoteSec.forEach(s=>{
          if(!s.id) return;
          if(deletedForSec.includes(s.id)) return; // never resurrect locally deleted entries
          const existing=secMap.get(s.id);
          if(!existing){
            secMap.set(s.id,s);
          } else {
            // Remote wins only if strictly newer — local wins on tie (prevents own-echo from overwriting local move/delete)
            const remoteTs=s.updated||s.created||0;
            const localTs=existing.updated||existing.created||0;
            if(remoteTs>localTs) secMap.set(s.id,s);
          }
        });
        mergedSections[sec.key]=[...secMap.values()].filter(s=>{
          if(!(mergedDeletedIds[sec.key]||[]).includes(s.id)) return true; // not deleted — keep
          // ID is in deletedIds — but only remove if remote also doesn't have it alive
          // If remote has the story, it means another device explicitly kept/moved it there — respect that
          const aliveInRemote=(incoming.sections?.[sec.key]||[]).some(r=>r.id===s.id);
          return aliveInRemote; // keep if remote has it alive, remove if remote also doesn't have it
        });
      });

      // Apply all other scalar fields from remote — but preserve local-only fields
      const localBackups=state.backupSnapshots; // backups are local-only
      const localLAD=state.lastActiveDate;      // never let cloud roll back lastActiveDate
      const localEodDismissed=state.eodDismissed; // keep whichever dismissal is more recent
      const localDailyBackup=state.lastDailyBackup;
      const localWeeklyBackup=state.lastWeeklyBackup;
      const localMonthlyBackup=state.lastMonthlyBackup;
      const localYearlyBackup=state.lastYearlyBackup;
      // Capture travel state BEFORE Object.assign wipes it — mergedArrays handles travelEntries
      // but travelDismissed and travelRestored are plain arrays not in mergedArrays, so capture them now
      const localTravelDismissed=[...(state.travelDismissed||[])];
      const localTravelRestored=[...(state.travelRestored||[])];
      Object.assign(state, incoming, mergedArrays, {archive:mergedArchive, sections:mergedSections});
      // travelDismissed is a per-device UI preference — keep local state only, don't merge with remote
      // This prevents one device's hide/show from affecting the other device
      state.travelDismissed=localTravelDismissed;
      state.travelRestored=[]; // no longer needed — clear it
      state.backupSnapshots=localBackups; // restore local backups after merge
      state.deletedIds=mergedDeletedIds;  // merged so all devices honour all deletions
      // Keep whichever lastActiveDate is more recent — prevents Firebase from re-triggering checkDateChange
      if(localLAD && (!state.lastActiveDate || localLAD > state.lastActiveDate))
        state.lastActiveDate=localLAD;
      // Keep whichever eodDismissed is more recent (today > older date > null)
      if(localEodDismissed && (!state.eodDismissed || localEodDismissed > state.eodDismissed))
        state.eodDismissed=localEodDismissed;
      // Keep most recent backup timestamps
      if(localDailyBackup && (!state.lastDailyBackup || localDailyBackup > state.lastDailyBackup))
        state.lastDailyBackup=localDailyBackup;
      if(localWeeklyBackup && (!state.lastWeeklyBackup || localWeeklyBackup > state.lastWeeklyBackup))
        state.lastWeeklyBackup=localWeeklyBackup;
      if(localMonthlyBackup && (!state.lastMonthlyBackup || localMonthlyBackup > state.lastMonthlyBackup))
        state.lastMonthlyBackup=localMonthlyBackup;
      if(localYearlyBackup && (!state.lastYearlyBackup || localYearlyBackup > state.lastYearlyBackup))
        state.lastYearlyBackup=localYearlyBackup;
      if(!state.archive) state.archive={};
      saveLocal();
      // Push merged state back to Firebase so all devices get the authoritative merged result.
      // Guard against infinite loop: Firestore echoes our own writes back as snapshots.
      // Only push if this snapshot came from another device (not our own recent push).
      const now=Date.now();
      const timeSinceLastPush=now-(window._lastPushTs||0);
      if(fireDb && timeSinceLastPush > 3000){
        clearTimeout(window._mergeBackPushTimer);
        window._mergeBackPushTimer=setTimeout(()=>pushToCloud(), 1500);
      }
      // Clean up any stuck not-done entries that remote data may have restored,
      // then push the cleaned state back so all devices stay in sync.
      const cleaned=cleanupStuckNotDone();
      if(!cleaned) {
        const hasOpenForm=ui.openForms.size>0||_te.open;
        // Also block render if user is actively typing in a remark field
        const activeEl=document.activeElement;
        const typingInRemark=activeEl&&(activeEl.id&&activeEl.id.startsWith('sr-')||activeEl.closest&&activeEl.closest('.sremark-add'));
        if(hasOpenForm||typingInRemark){
          // Form is open — don't re-render (would lose user's input focus and feel jarring)
          // Mark that a sync arrived so render fires when the form closes
          window._pendingSyncRender=true;
          renderDateStrip(); setSyncUI('live');
        } else {
          render(); renderDateStrip(); setSyncUI('live'); _teRefresh();
          window._pendingSyncRender=false;
        }
      }
    }
    else pushToCloud();
  }, ()=>setSyncUI('offline'));
}
async function pushToCloud(){
  if(!fireDb) return;
  try{
    window._lastPushTs=Date.now();
    setSyncUI('syncing');
    // Strip backupSnapshots — they're large and stored locally only
    // Also strip any undefined/function values that Firestore can't handle
    const {backupSnapshots, ...cloudState} = state;
    // Ensure size safety — estimate payload
    const payload=JSON.stringify(cloudState);
    if(payload.length > 900000){ // ~900KB safety limit (Firestore max is 1MB)
      // Strip archive entries older than 90 days to reduce size
      const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-90);
      const cutoffStr=cutoff.toISOString().slice(0,10);
      const trimmedArchive={};
      Object.entries(cloudState.archive||{}).forEach(([k,v])=>{
        if(k>=cutoffStr || k.startsWith('week-') || k.startsWith('month-')) trimmedArchive[k]=v;
      });
      cloudState.archive=trimmedArchive;
    }
    await fireDb.collection('nd').doc('data').set(cloudState);
    setSyncUI('live');
  }catch(e){
    setSyncUI('offline');
    // Show user-visible error if it looks like a size issue
    if(e.message&&(e.message.includes('size')||e.message.includes('limit')||e.code==='invalid-argument')){
      toast('⚠ Sync failed: data too large. Try clearing old archive entries.');
    }
  }
}
function setSyncUI(s){
  const d=document.getElementById('sync-dot'), l=document.getElementById('sync-label');
  const dm=document.getElementById('sync-dot-mobile'), lm=document.getElementById('sync-label-mobile');
  function applySync(dot,lbl,short){
    if(!dot||!lbl) return; dot.className='sync-dot';
    if(s==='live')         { dot.classList.add('dot-live');    lbl.textContent=short?'Synced':'Synced'; }
    else if(s==='offline') { dot.classList.add('dot-offline'); lbl.textContent=short?'Offline':'Offline'; }
    else if(s==='syncing') { dot.classList.add('dot-syncing'); lbl.textContent=short?'Sync…':'Syncing…'; }
    else                   { dot.classList.add('dot-local');   lbl.textContent=short?'Local':'Local only'; }
  }
  applySync(d,l,false);
  applySync(dm,lm,true);
}
function saveAndPush(){ clearTimeout(window._mergeBackPushTimer); saveLocal(); if(fireDb){ setSyncUI('syncing'); pushToCloud(); } }
function checkDateChange(){
  const today=todayStr();
  if(state.lastActiveDate && state.lastActiveDate!==today){
    const prev=state.lastActiveDate;
    // Auto-snapshot previous day
    if(SECTIONS.some(s=>(state.sections[s.key]||[]).length>0)){
      createSnapshot(prev,'day',false);
      toast('📸 Auto-archived '+archiveLabel(prev));
    }
    // Carry forward notes unless done/pass
    if(!state.notes) state.notes=[];
    state.notes.forEach(note=>{
      if(note.status==='done'||note.status==='pass') return;
      note.carriedForward=true;
      note.carriedFromDate=note.carriedFromDate||prev;
      note.carriedDays=(note.carriedDays||0)+1;
    });
    state.tasks.forEach(task=>{
      if(task.taskStatus==='done') return;
      if(task.taskStatus==='not-done'){
        // Archive the not-done task to the previous day and remove it from active list
        if(!state.archive[prev]){
          state.archive[prev]={type:'day',label:archiveLabel(prev),sections:{},notes:'',created:Date.now()};
          SECTIONS.forEach(s=>{state.archive[prev].sections[s.key]=[];});
        }
        if(!state.archive[prev].tasksLog) state.archive[prev].tasksLog=[];
        if(!state.archive[prev].tasksLog.some(t=>t.id===task.id)){
          state.archive[prev].tasksLog.push({...task, archivedOn:today});
        }
        return; // not-done tasks do NOT carry forward
      }
      if(task.taskStatus==='postponed-to'&&task.postponeTo&&task.postponeTo>today) return;
      task.carriedForward=true;
      task.carriedFromDate=task.carriedFromDate||prev;
      task.carriedDays=(task.carriedDays||0)+1;
    });
    // Remove not-done tasks from the active task list after archiving
    state.tasks=state.tasks.filter(t=>t.taskStatus!=='not-done');

    // Prune completed recurring task occurrences from previous days.
    // Each completed occurrence is already logged in tasksLog — safe to remove from live list.
    // Rule: keep a recurring task in state.tasks only if:
    //   (a) it's not done, OR
    //   (b) it was marked done TODAY (doneAt date === today)
    state.tasks=state.tasks.filter(t=>{
      if(!t.isRecurring) return true;                   // one-off tasks: untouched
      if(t.taskStatus!=='done') return true;            // pending recurring: keep
      const doneDate=t.doneAt?dateStr(new Date(t.doneAt)):null;
      return doneDate===today;                          // done today: keep until midnight; done earlier: remove
    });
    let carried=0;
    const toAutoArchive=[];

    // ── IBU: ALL stories auto-archive on day change (one-day-only section) ──
    // Exception 1: stories moved INTO ibu today should NOT be archived
    // Exception 2: stories moved from another section (movedFrom field) carry forward like 'other' stories
    (state.sections.ibu||[]).forEach(story=>{
      const movedToday=story.movedAt&&dateStr(new Date(story.movedAt))>=today;
      const createdToday=story.created&&dateStr(new Date(story.created))>=today;
      if(movedToday||createdToday) return; // skip — story arrived today, keep it
      // Stories promoted from another section (e.g. Requests → Stories) carry forward
      if(story.movedFrom){
        const terminal=['completed','not-done','shelved'];
        if(terminal.includes(story.status)){
          toAutoArchive.push({story,sec:'ibu'});
        } else {
          story.carriedForward=true;
          story.carriedFromDate=story.carriedFromDate||prev;
          story.carriedDays=(story.carriedDays||0)+1;
          carried++;
        }
        return;
      }
      toAutoArchive.push({story, sec:'ibu'});
    });

    // ── Other Stories: carry forward unless terminal status ──
    (state.sections.other||[]).forEach(story=>{
      const terminal=['completed','not-done','shelved'];
      if(terminal.includes(story.status)){
        toAutoArchive.push({story, sec:'other'});
        return;
      }
      if(story.status==='on-hold') return; // stays, no carry
      if(story.status==='postponed'&&(!story.postponeTo||story.postponeTo>today)) return; // indefinite or future date: stay
      story.carriedForward=true;
      story.carriedFromDate=story.carriedFromDate||prev;
      story.carriedDays=(story.carriedDays||0)+1;
      carried++;
    });

    // ── All other sections (requests, etc): archive terminal, carry active ──
    SECTIONS.filter(s=>!s.isUpcoming&&s.key!=='ibu'&&s.key!=='other').forEach(sec=>{
      (state.sections[sec.key]||[]).forEach(story=>{
        // Always archive terminal-status stories regardless of mode
        const terminal=['completed','not-done','shelved'];
        if(terminal.includes(story.status)){
          toAutoArchive.push({story, sec:sec.key});
          return;
        }
        // on-hold: stays, doesn't carry forward
        if(story.status==='on-hold') return;
        // postponed to a future date: stays
        if(story.status==='postponed'&&(!story.postponeTo||story.postponeTo>today)) return; // indefinite or future date: stay
        // Everything else: carry forward
        story.carriedForward=true;
        story.carriedFromDate=story.carriedFromDate||prev;
        story.carriedDays=(story.carriedDays||0)+1;
        carried++;
      });
    });
    toAutoArchive.forEach(({story,sec})=>{
      if(!state.archive[prev]){
        state.archive[prev]={type:'day',label:archiveLabel(prev),sections:{},notes:'',created:Date.now()};
        SECTIONS.forEach(s=>{state.archive[prev].sections[s.key]=[];});
      }
      if(!state.archive[prev].sections[sec]) state.archive[prev].sections[sec]=[];
      if(!state.archive[prev].sections[sec].some(s=>s.id===story.id)){
        state.archive[prev].sections[sec].push({...story,autoArchivedOn:today});
      }
    });
    // Remove all archived stories from working board
    const archivedIBU=toAutoArchive.filter(x=>x.sec==='ibu').map(x=>x.story.id);
    const archivedOther=toAutoArchive.filter(x=>x.sec==='other').map(x=>x.story.id);
    // IBU: remove only stories that were auto-archived — preserve carried-forward moved stories
    state.sections.ibu=(state.sections.ibu||[]).filter(s=>!archivedIBU.includes(s.id));
    // Other/requests: remove terminal stories (completed, not-done, shelved) — they had their day
    const TERM_MIDNIGHT=['completed','not-done','shelved'];
    state.sections.other=(state.sections.other||[]).filter(s=>!TERM_MIDNIGHT.includes(s.status));
    SECTIONS.filter(s=>!s.isUpcoming&&s.key!=='ibu'&&s.key!=='other').forEach(({key})=>{
      state.sections[key]=(state.sections[key]||[]).filter(s=>!TERM_MIDNIGHT.includes(s.status));
    });
    // Also sweep any terminal stories that slipped through (missing timestamp fields)
    // Safe to run every time: only removes terminal status stories from previous days
    const _sweepDate=today;
    state.sections.other=(state.sections.other||[]).filter(s=>{
      if(!TERM_MIDNIGHT.includes(s.status)) return true;
      const created=s.created?dateStr(new Date(s.created)):null;
      return created&&created>=_sweepDate;
    });
    SECTIONS.filter(s=>!s.isUpcoming&&s.key!=='ibu'&&s.key!=='other').forEach(({key})=>{
      state.sections[key]=(state.sections[key]||[]).filter(s=>{
        if(!TERM_MIDNIGHT.includes(s.status)) return true;
        const created=s.created?dateStr(new Date(s.created)):null;
        return created&&created>=_sweepDate;
      });
    });
    // Also remove any remaining toAutoArchive items not caught above
    toAutoArchive.filter(x=>x.sec!=='ibu'&&x.sec!=='other').forEach(({story,sec})=>{
      state.sections[sec]=(state.sections[sec]||[]).filter(s=>s.id!==story.id);
    });
    if(toAutoArchive.length){
      const storiesCnt=toAutoArchive.filter(x=>x.sec==='ibu'||x.sec==='other').length;
      const otherSecCnt=toAutoArchive.length-storiesCnt;
      const parts=[];
      if(storiesCnt) parts.push(storiesCnt+' stor'+(storiesCnt===1?'y':'ies'));
      if(otherSecCnt) parts.push(otherSecCnt+' other');
      toast(`📦 Auto-archived: ${parts.join(', ')}`);
    }
    // Auto-migrate Upcoming stories whose date has arrived
    let upcomingMigrated=0;
    const upcomingToRemove=[];
    (state.sections.upcoming||[]).forEach(story=>{
      if(story.status==='completed'||story.status==='on-hold') return;
      if(!story.expected_date) return;
      let targetDate=story.expected_date;
      // For week/month, compute first day
      if(story.expected_type==='week') targetDate=weekMondayStr(story.expected_date);
      else if(story.expected_type==='month') targetDate=story.expected_date+'-01';
      if(targetDate < today){   // strictly past — events due TODAY stay visible all day
        // Move to archive entry for target date
        const archKey=story.expected_type==='week'?weekKey(targetDate):story.expected_type==='month'?monthKey(story.expected_date):targetDate;
        if(!state.archive[archKey]){
          state.archive[archKey]={type:story.expected_type||'day',label:archiveLabel(archKey),sections:{ibu:[],other:[],requests:[],upcoming:[]},notes:'',created:Date.now()};
        }
        if(!state.archive[archKey].sections.upcoming) state.archive[archKey].sections.upcoming=[];
        if(!state.archive[archKey].sections.upcoming.some(s=>s.id===story.id)){
          state.archive[archKey].sections.upcoming.push({...story,autoMigratedOn:today});
        }
        upcomingToRemove.push(story.id);
        upcomingMigrated++;
      }
    });
    if(upcomingToRemove.length){
      state.sections.upcoming=state.sections.upcoming.filter(s=>!upcomingToRemove.includes(s.id));
    }
    if(upcomingMigrated>0) toast(`🗓 ${upcomingMigrated} Upcoming stor${upcomingMigrated===1?'y':'ies'} auto-migrated to archive`);
    if(carried>0) saveLocal();

    // ── Backfill skipped days ────────────────────────────────────────────────
    // If the app wasn't opened on intermediate days (e.g. weekends), those days
    // never get archive entries and disappear from the date strip.
    // Create empty stub entries for every calendar day between prev and today
    // so they always appear as navigable pills (count will be 0 but day is visible).
    {
      const msPerDay=86400000;
      const prevMs=new Date(prev+'T00:00:00').getTime();
      const todayMs=new Date(today+'T00:00:00').getTime();
      let cursor=prevMs+msPerDay; // start the day after prev
      while(cursor<todayMs){
        const d=dateStr(new Date(cursor));
        if(!state.archive[d]){
          state.archive[d]={type:'day',label:archiveLabel(d),sections:{},notes:'',created:cursor};
          SECTIONS.forEach(s=>{state.archive[d].sections[s.key]=[];});
        }
        cursor+=msPerDay;
      }
    }
  }
  state.lastActiveDate=today;
  saveLocal();
}
function getCarriedStories(){
  const today=todayStr();
  const r=[];
  SECTIONS.filter(s=>!s.isUpcoming).forEach(sec=>{
    (state.sections[sec.key]||[]).filter(s=>!s._deleted).forEach(s=>{
      if(!s.carriedForward) return;
      if(s.status==='completed'||s.status==='on-hold'||s.status==='not-done'||s.status==='shelved') return;
      if(s.status==='postponed'&&(!s.postponeTo||s.postponeTo>today)) return; // indefinite or future: stay
      r.push({...s,_sec:sec.key});
    });
  });
  return r;
}
function createSnapshot(key,type,showToast=true){
  if(!state.archive[key]){
    state.archive[key]={ type, label:archiveLabel(key), sections:{}, notes:'', created:Date.now() };
    SECTIONS.forEach(s=>{ state.archive[key].sections[s.key]=[]; });
  }
  SECTIONS.forEach(s=>{
    const existing=state.archive[key].sections[s.key]||[];
    const ids=new Set(existing.map(st=>st.id));
    const newOnes=(state.sections[s.key]||[]).filter(st=>!ids.has(st.id)&&!st._deleted);
    state.archive[key].sections[s.key]=[...existing,...newOnes];
  });
  saveAndPush();
  if(showToast) toast('📸 Snapshot saved ✓');
}
function snapshotToday(){
  if(!SECTIONS.some(s=>(state.sections[s.key]||[]).length>0)){ toast('No stories to snapshot'); return; }
  createSnapshot(todayStr(),'day',true);
  renderDateStrip();
}
function checkBackupsDue(){
  if(!state.backupSnapshots) state.backupSnapshots={weekly:[],monthly:[],yearly:[]};
  if(!state.autoBackup) state.autoBackup={weeklyEnabled:true,monthlyEnabled:true,yearlyEnabled:true};
  const today=todayStr();
  const thisWeekMon=weekMondayStr(today);
  const thisMonth=today.slice(0,7);
  const thisYear=today.slice(0,4);
  const due=[];
  if(!state.lastDailyBackup||state.lastDailyBackup<today)
    due.push({type:'daily',label:'Daily backup due',period:today});
  if(state.autoBackup.weeklyEnabled!==false && (!state.lastWeeklyBackup||state.lastWeeklyBackup<thisWeekMon))
    due.push({type:'weekly',label:'Weekly backup due',period:thisWeekMon});
  if(state.autoBackup.monthlyEnabled!==false && (!state.lastMonthlyBackup||state.lastMonthlyBackup<thisMonth))
    due.push({type:'monthly',label:'Monthly backup due',period:thisMonth});
  if(state.autoBackup.yearlyEnabled!==false && (!state.lastYearlyBackup||state.lastYearlyBackup<thisYear))
    due.push({type:'yearly',label:'Yearly backup due',period:thisYear});
  return due;
}

function _triggerJsonDownload(snap, filename){
  const json=JSON.stringify(snap, null, 2);
  const blob=new Blob([json],{type:'application/json;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(a.href);
}

function runBackup(type, period, silent){
  if(!state.backupSnapshots) state.backupSnapshots={daily:[],weekly:[],monthly:[],yearly:[]};
  if(!state.backupSnapshots.daily) state.backupSnapshots.daily=[];
  const snap=makeBackupSnapshot();
  snap._backupMeta.type=type; snap._backupMeta.period=period;
  const limits={daily:7,weekly:52,monthly:12,yearly:5};
  state.backupSnapshots[type].unshift(snap);
  state.backupSnapshots[type]=state.backupSnapshots[type].slice(0,limits[type]||52);
  if(type==='daily')   state.lastDailyBackup=todayStr();
  if(type==='weekly')  state.lastWeeklyBackup=weekMondayStr(todayStr());
  if(type==='monthly') state.lastMonthlyBackup=todayStr().slice(0,7);
  if(type==='yearly')  state.lastYearlyBackup=todayStr().slice(0,4);
  try{ localStorage.setItem('nd_backups', JSON.stringify(state.backupSnapshots)); }catch(e){}
  saveLocal();
  const fname='newsroom-backup-'+type+'-'+period+'.json';
  _triggerJsonDownload(snap, fname);
  if(!silent) toast(capitalize(type)+' backup saved → Downloads/'+fname);
}

function autoRunDueBackups(){
  const due=checkBackupsDue();
  due.forEach(d=>runBackup(d.type,d.period,true));
  if(due.length) toast(due.map(d=>capitalize(d.type)).join(' & ')+' backup'+(due.length>1?'s':'')+' auto-saved to Downloads ✓');
}

function downloadBackupTxt(snap, type, period){
  // Legacy plain-text export — kept for the "human readable" download option in panel
  const lines=[
    'NEWSROOM DASHBOARD — '+capitalize(type).toUpperCase()+' BACKUP',
    'Period: '+period,
    'Created: '+new Date(snap._backupMeta?.created||snap.timestamp||Date.now()).toLocaleString('en-GB',{weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'}),
    '═'.repeat(56),''
  ];
  SECTIONS.forEach(sec=>{
    lines.push(sec.name.toUpperCase()); lines.push('─'.repeat(44));
    const st=snap.sections[sec.key]||[];
    if(!st.length) lines.push('(No stories)');
    else st.forEach(s=>{ lines.push(storyToText(s)); lines.push(''); });
    lines.push('');
  });
  const txt=lines.join('\n');
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='newsroom-backup-'+type+'-'+period+'.txt';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(a.href);
}

let _dragId=null, _dragSec=null, _dragArch=null;
function onDragStart(e,sec,id,archKey){
  _dragId=id; _dragSec=sec; _dragArch=archKey||null;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function onDragEnd(e){ e.currentTarget.classList.remove('dragging','drag-over'); }
function onDragOver(e,id){
  e.preventDefault(); e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.card.drag-over').forEach(c=>c.classList.remove('drag-over'));
  const el=document.querySelector(`.card[data-id="${id}"]`);
  if(el&&id!==_dragId) el.classList.add('drag-over');
}
function onDrop(e,sec,targetId,archKey){
  e.preventDefault();
  document.querySelectorAll('.card.drag-over,.card.dragging').forEach(c=>c.classList.remove('drag-over','dragging'));
  if(!_dragId||_dragId===targetId||_dragSec!==sec) return;
  const arr=getArr(sec,archKey||null);
  if(!arr) return;
  const fromIdx=arr.findIndex(s=>s.id===_dragId);
  const toIdx=arr.findIndex(s=>s.id===targetId);
  if(fromIdx<0||toIdx<0) return;
  const [item]=arr.splice(fromIdx,1);
  arr.splice(toIdx,0,item);
  setArr(sec,archKey||null,arr);
  saveAndPush(); render();
  _dragId=null; _dragSec=null; _dragArch=null;
}

/* ════════════════════════════════════════
   FORM STATE PERSISTENCE
   Captures all form field values before render, restores after.
   This prevents any toggle/filter from wiping open forms.

function captureFormState(){
  const saved={};
  document.querySelectorAll('.form-wrap input,.form-wrap select,.form-wrap textarea,.task-form input,.task-form select,.task-form textarea').forEach(el=>{
    if(el.id){
      if(el.type==='checkbox') saved['__cb_'+el.id]=el.checked;
      else saved[el.id]=el.value;
    }
    // Capture radio buttons
    if(el.type==='radio'&&el.name) saved['__radio_'+el.name]=el.checked?el.value:(saved['__radio_'+el.name]||'');
  });
  // Also capture remark textareas (sr-input-* and sr-edit-*) so sync render doesn't wipe typed text
  document.querySelectorAll('textarea[id^="sr-"]').forEach(el=>{ if(el.id) saved[el.id]=el.value; });
  const slots=[];
  document.querySelectorAll('.bt-row').forEach(row=>{
    const idx=row.dataset.idx;
    const uk=(document.getElementById('bt-uk-'+idx)||{}).value||'';
    const ist=(document.getElementById('bt-ist-'+idx)||{}).value||'';
    const plat=(document.getElementById('bt-plat-'+idx)||{}).value||'';
    const prog=(document.getElementById('bt-prog-'+idx)||{}).value||'';
    const dl_date=(document.getElementById('bt-dl-date-'+idx)||{}).value||'';
    const dl_uk=(document.getElementById('bt-dl-uk-'+idx)||{}).value||'';
    const dl_ist=(document.getElementById('bt-dl-ist-'+idx)||{}).value||'';
    const com_name=(document.getElementById('bt-com-name-'+idx)||{}).value||'';
    const com_team=(document.getElementById('bt-com-team-'+idx)||{}).value||'';
    const com_loc=(document.getElementById('bt-com-loc-'+idx)||{}).value||'';
    slots.push({idx,uk,ist,plat,prog,dl_date,dl_uk,dl_ist,com_name,com_team,com_loc});
  });
  saved.__broadcastSlots=slots;
  return saved;
}
function restoreFormState(saved){
  if(!saved) return;

  // Build set of field IDs that belong to edit-mode forms — these already have correct
  // values inlined from editStoryObj, so we must NOT overwrite them.
  const editFieldPrefixes=new Set();
  Object.entries(ui.editMap||{}).forEach(([k])=>{
    const sec=k.split('::')[0];
    const archKey=k.includes('::')?k.split('::')[1]:null;
    editFieldPrefixes.add('-'+sec+(archKey?'-arch':''));
  });

  Object.entries(saved).forEach(([id,val])=>{
    if(id==='__broadcastSlots') return;
    if(id.startsWith('__radio_')){
      const name=id.replace('__radio_','');
      const el=document.querySelector(`input[name="${name}"][value="${val}"]`);
      if(el) el.checked=true;
      return;
    }
    if(id.startsWith('__cb_')){
      const realId=id.replace('__cb_','');
      const belongsToEdit=[...editFieldPrefixes].some(pfx=>realId.endsWith(pfx));
      if(belongsToEdit) return;
      const el=document.getElementById(realId);
      if(el&&el.type==='checkbox') el.checked=val;
      return;
    }
    if(!val) return;
    // Skip fields that belong to an edit-mode form — they are already correct
    const belongsToEdit=[...editFieldPrefixes].some(pfx=>id.endsWith(pfx));
    if(belongsToEdit) return;
    const el=document.getElementById(id);
    if(el&&el.tagName!=='BUTTON') el.value=val;
  });
  ui.openForms.forEach(k=>{
    const sec=k.split('::')[0];
    const archKey=k.includes('::')?k.split('::')[1]:null;
    showFieldRow(sec,archKey);
  });
  if(saved.__broadcastSlots&&saved.__broadcastSlots.length){
    saved.__broadcastSlots.forEach(({idx,uk,ist,plat,prog,dl_date,dl_uk,dl_ist,com_name,com_team,com_loc})=>{
      const ukEl=document.getElementById('bt-uk-'+idx);
      const istEl=document.getElementById('bt-ist-'+idx);
      const platEl=document.getElementById('bt-plat-'+idx);
      const progEl=document.getElementById('bt-prog-'+idx);
      if(ukEl) ukEl.value=uk;
      if(istEl) istEl.value=ist;
      if(platEl) platEl.value=plat;
      if(progEl) progEl.value=prog||'';
      const dlDateEl=document.getElementById('bt-dl-date-'+idx);
      const dlUKEl=document.getElementById('bt-dl-uk-'+idx);
      const dlISTEl=document.getElementById('bt-dl-ist-'+idx);
      const comNameEl=document.getElementById('bt-com-name-'+idx);
      const comTeamEl=document.getElementById('bt-com-team-'+idx);
      const comLocEl=document.getElementById('bt-com-loc-'+idx);
      if(dlDateEl) dlDateEl.value=dl_date||'';
      if(dlUKEl)   dlUKEl.value=dl_uk||'';
      if(dlISTEl)  dlISTEl.value=dl_ist||'';
      if(comNameEl) comNameEl.value=com_name||'';
      if(comTeamEl) comTeamEl.value=com_team||'';
      if(comLocEl)  comLocEl.value=com_loc||'';
    });
  }
}

/* ── Time field helpers ──────────────────────────────────────────
   Each pair: normalise the typed value → write HH:MM back → convert. */
/* ── Time field handlers ─────────────────────────────────────────────
   _convertIfComplete  → oninput: only converts when value is a full time.
                         Never rewrites the source field mid-type.
   _normaliseAndConvert → onblur: normalises source to HH:MM then converts. */
function _convertIfComplete(srcId, destId, convertFn){
  const src=document.getElementById(srcId); if(!src) return;
  const v=src.value.trim();
  const complete=/^(\d{1,2}):(\d{2})$/.test(v)
               ||/^(\d{1,2})\.(\d{2})$/.test(v)
               ||/^\d{3}$/.test(v)
               ||/^\d{4}$/.test(v);
  if(!complete) return;
  const norm=normaliseTime(v); if(!norm) return;
  const dest=document.getElementById(destId); if(!dest) return;
  const c=convertFn(norm); if(c) dest.value=c;
}
function _normaliseAndConvert(srcId, destId, convertFn){
  const src=document.getElementById(srcId); if(!src) return;
  const norm=normaliseTime(src.value);
  if(norm) src.value=norm;
  const dest=document.getElementById(destId); if(!dest) return;
  const c=convertFn(norm||src.value); if(c) dest.value=c;
}

function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function getArr(sec,archKey){
  if(archKey){ if(!state.archive[archKey]) return null; if(!state.archive[archKey].sections[sec]) state.archive[archKey].sections[sec]=[]; return state.archive[archKey].sections[sec]; }
  return state.sections[sec];
}
function setArr(sec,archKey,arr){
  if(archKey){ if(state.archive[archKey]&&state.archive[archKey].sections) state.archive[archKey].sections[sec]=arr; }
  else state.sections[sec]=arr;
}
function addStory(sec,data,archKey){
  const arr=getArr(sec,archKey); if(!arr) return;
  const s={...data,id:genId(),created:Date.now()};
  arr.push(s);
  if(!archKey) ui.openSections.add(sec);
  // For non-terminal requests/other added to a past archive date:
  // also insert into the live board so it appears on Today
  if(archKey && (sec==='requests'||sec==='other')){
    const terminal=['completed','not-done','shelved'];
    if(!terminal.includes(data.status||'')){
      if(!state.sections[sec]) state.sections[sec]=[];
      // Only add if not already there
      if(!state.sections[sec].some(x=>x.id===s.id)){
        state.sections[sec].push({...s,carriedFromDate:archKey,carriedForward:true,carriedDays:1});
        ui.openSections.add(sec);
      }
    }
  }
  saveAndPush(); scheduleReminder(s);
}
function updateStory(sec,id,data,archKey){
  const arr=getArr(sec,archKey); if(!arr) return;
  const i=arr.findIndex(s=>s.id===id);
  if(i<0) return;
  arr[i]={...arr[i],...data, updated:Date.now()};
  // If this story is (or was) carried forward, propagate the update to every
  // archive entry that holds a copy of the same story id.
  if(!archKey){
    const story=arr[i];
    Object.keys(state.archive).forEach(dateKey=>{
      const secArr=state.archive[dateKey]?.sections?.[sec];
      if(!secArr) return;
      const ai=secArr.findIndex(s=>s.id===id);
      if(ai>=0) secArr[ai]={...secArr[ai],...data, updated:story.updated};
    });
  }
  saveAndPush(); scheduleReminder(arr[i]);
}
function deleteStory(sec,id,archKey){
  const arr=getArr(sec,archKey); if(!arr) return;
  const story=arr.find(s=>s.id===id); if(!story) return;

  // Archive to creation date before permanent deletion
  const createdDate=story.carriedFromDate||(story.created?dateStr(new Date(typeof story.created==='number'?story.created:parseInt(story.created))):todayStr());
  if(!state.archive[createdDate]){
    state.archive[createdDate]={type:'day',label:archiveLabel(createdDate),sections:{},notes:'',created:Date.now()};
    SECTIONS.forEach(s=>{state.archive[createdDate].sections[s.key]=[];});
  }
  if(!state.archive[createdDate].sections[sec]) state.archive[createdDate].sections[sec]=[];
  // Only add if not already there
  if(!state.archive[createdDate].sections[sec].some(s=>s.id===id)){
    state.archive[createdDate].sections[sec].push({...story, deletedOn:Date.now(), _deleted:true});
  }

  // Record deletion so Firestore onSnapshot merge cannot resurrect this entry
  if(!state.deletedIds) state.deletedIds={};
  if(!archKey){
    // Live board deletion
    if(!state.deletedIds[sec]) state.deletedIds[sec]=[];
    if(!state.deletedIds[sec].includes(id)) state.deletedIds[sec].push(id);
  } else {
    // Archive deletion — keyed as "archKey::sec"
    const archDeletedKey=archKey+'::'+sec;
    if(!state.deletedIds[archDeletedKey]) state.deletedIds[archDeletedKey]=[];
    if(!state.deletedIds[archDeletedKey].includes(id)) state.deletedIds[archDeletedKey].push(id);
  }

  // Now remove from working board
  const filtered=arr.filter(s=>s.id!==id);
  if(archKey) state.archive[archKey].sections[sec]=filtered; else state.sections[sec]=filtered;
  ui.openCards.delete(id); ui.complForms.delete(id);
  saveAndPush(); renderDateStrip(); render();
}

function moveStoryToSection(fromSec, id, toSec, archKey, mode){
  if(fromSec===toSec){ toast('Already in that section'); return; }
  const fromArr=getArr(fromSec,archKey); if(!fromArr) return;
  const story=fromArr.find(s=>s.id===id); if(!story) return;
  // Add to destination
  if(archKey && !state.archive[archKey].sections[toSec]) state.archive[archKey].sections[toSec]=[];
  const dest=getArr(toSec,archKey);
  if(!dest){ toast('Destination not available'); return; }
  const movedAt=Date.now();
  if(!dest.some(s=>s.id===id)) dest.push({...story, movedFrom:fromSec, movedAt, updated:movedAt});
  // Clear destination tombstone — story may have been auto-archived at midnight
  // leaving its ID in deletedIds[toSec], which would block it on other devices
  if(!state.deletedIds) state.deletedIds={};
  if(state.deletedIds[toSec]) state.deletedIds[toSec]=state.deletedIds[toSec].filter(id2=>id2!==id);
  // Only remove from source if Move (not Copy)
  if(mode!=='copy'){
    if(archKey) state.archive[archKey].sections[fromSec]=fromArr.filter(s=>s.id!==id);
    else state.sections[fromSec]=fromArr.filter(s=>s.id!==id);
    // Record source deletion so other devices remove it from the source section on sync
    if(!archKey){
      if(!state.deletedIds[fromSec]) state.deletedIds[fromSec]=[];
      if(!state.deletedIds[fromSec].includes(id)) state.deletedIds[fromSec].push(id);
    }
    ui.openCards.delete(id);
  }
  ui.openSections.add(toSec);
  saveAndPush();
  toast(mode==='copy'?`Copied to ${secName(toSec)} ✓`:`Moved to ${secName(toSec)} ✓`);
  render();
  if(mode!=='copy'&&!archKey&&(toSec==='ibu'||toSec==='other')){
    setTimeout(()=>{
      const el=document.getElementById('acc-ibu')||document.getElementById('acc-other');
      if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
    },80);
  }
}

// Helper: archive a story to its original entry date and remove it from the working board.
// Always uses the story's own creation/carry date — never "today" — so the entry
// appears in the archive under the day it was actually created.
function _archiveAndRemoveFromBoard(sec,id){
  const arr=state.sections[sec]||[];
  const story=arr.find(s=>s.id===id); if(!story) return;
  // Determine the correct archive date: original creation date, not today
  const archDate=story.carriedFromDate ||
    (story.created
      ? dateStr(new Date(typeof story.created==='number'?story.created:parseInt(story.created)))
      : todayStr());
  if(!state.archive[archDate]){
    state.archive[archDate]={type:'day',label:archiveLabel(archDate),sections:{},notes:'',created:Date.now()};
    SECTIONS.forEach(s=>{ state.archive[archDate].sections[s.key]=[]; });
  }
  if(!state.archive[archDate].sections[sec]) state.archive[archDate].sections[sec]=[];
  if(!state.archive[archDate].sections[sec].some(s=>s.id===id)){
    state.archive[archDate].sections[sec].push({...story, autoArchivedOn:todayStr()});
  }
  state.sections[sec]=arr.filter(s=>s.id!==id);
  ui.openCards.delete(id);
}

// Startup cleanup: rescue any not-done entries in non-combined sections that were
// stuck before this fix (e.g. marked not-done days ago and never archived).
// Also called after Firebase sync so remote state can't resurrect stuck entries.
function cleanupCompletedStories(){
  // No-op: stories stay on board until midnight.
  // checkDateChange() handles archiving + removal at day rollover.
}
function cleanupStuckNotDone(){
  // No-op: midnight checkDateChange() is the only removal mechanism.
  // Terminal stories stay visible on board until day rolls over.
  return 0;
}
function sweepStaleTerminalStories(){
  // On every app open: remove terminal stories created on a previous day
  // This catches cases where the app was closed at night and checkDateChange
  // couldn't run the midnight sweep (missing timestamp fields on old entries)
  const today=todayStr();
  const TERM=['completed','not-done','shelved'];
  let sweptCount=0;
  if(!state.deletedIds) state.deletedIds={};
  const keepFn=(s,key)=>{
    if(!TERM.includes(s.status)) return true;
    // Keep if created today (user just marked it)
    const created=s.created?dateStr(new Date(s.created)):null;
    if(created&&created>=today) return true;
    // Also keep if any resolution timestamp is today
    const resDate=s.completedOn?dateStr(new Date(s.completedOn)):
      s.notDoneOn?dateStr(new Date(s.notDoneOn)):
      s.shelvedAt?dateStr(new Date(s.shelvedAt)):null;
    if(resDate&&resDate>=today) return true;
    sweptCount++; return false;
  };
  SECTIONS.filter(s=>!s.isUpcoming&&!s.isCombined&&s.key!=='ibu').forEach(({key})=>{
    state.sections[key]=(state.sections[key]||[]).filter(s=>keepFn(s,key));
  });
  // Also sweep other (hidden combined section)
  state.sections.other=(state.sections.other||[]).filter(s=>keepFn(s,'other'));
  // IBU always clears if date changed (handled by checkDateChange)
  if(sweptCount>0){
    saveAndPush();
    // Defer toast until after init() finishes and DOM is ready
    setTimeout(()=>toast(`\uD83D\uDCC2 ${sweptCount} resolved stor${sweptCount===1?'y':'ies'} archived from previous day`),600);
  }
}

/* Send a message to the Service Worker and get a reply */
function _swMsg(data){
  return new Promise(resolve=>{
    if(!navigator.serviceWorker?.controller){ resolve(null); return; }
    const ch=new MessageChannel();
    ch.port1.onmessage=e=>resolve(e.data);
    navigator.serviceWorker.controller.postMessage(data,[ch.port2]);
  });
}

/* ── Compute the UTC ms timestamp at which this reminder should fire ──
   Rules:
   • Meeting   — fires REMINDER_DELAY before meeting date+time (London time)
   • Task      — fires REMINDER_DELAY before 09:00 London on deadline_date
   • Story     — fires REMINDER_DELAY before deadline_date + deadline_uk (London)
                 or 09:00 London on deadline_date if no time given
   • Upcoming  — same as story; falls back to expected_date at 09:00 London
   • No date   — falls back to Date.now() + delay (from-save behaviour)
   Returns null if the computed time is already in the past (skip this one). */
function _computeFireAt(s){
  const delay=REMINDER_DELAYS[s.reminder]; if(!delay) return null;

  /* Helper: build a UTC ms timestamp from a YYYY-MM-DD date string and a
     HH:MM time string that is in London local time (BST or GMT). */
  const londonToUtcMs=(dateStr, timeStr)=>{
    if(!dateStr) return null;
    try{
      const [h,m]=(timeStr||'09:00').split(':').map(Number);
      const ukMin=h*60+m;
      // midnight of that date in UTC
      const midnightUtc=new Date(dateStr+'T00:00:00Z').getTime();
      // convert London local minutes to UTC minutes by subtracting London offset
      const utcMin=ukMin-ukOffMin();
      return midnightUtc+utcMin*60000;
    }catch(e){ return null; }
  };

  let targetMs=null;

  // 1. Meeting — date + time both in London time
  if(s._type==='meeting' && s.date){
    targetMs=londonToUtcMs(s.date, s.time||'09:00');
  }

  // 2. Task — deadline_date, no time; use 09:00 London as working-day start
  else if(s._type==='task' && s.deadline_date){
    targetMs=londonToUtcMs(s.deadline_date, '09:00');
  }

  // 3. Story / Upcoming — prefer deadline_date + deadline_uk; fall back to
  //    deadline_date alone; then expected_date (Upcoming only)
  else {
    if(s.deadline_date&&s.deadline_uk){
      targetMs=londonToUtcMs(s.deadline_date, s.deadline_uk);
    } else if(s.deadline_date){
      targetMs=londonToUtcMs(s.deadline_date, '09:00');
    } else if(s.expected_date){
      targetMs=londonToUtcMs(s.expected_date, '09:00');
    }
  }

  // 4. No date anywhere — fall back to "from save time + delay"
  if(!targetMs) return Date.now()+delay;

  const fireAt=targetMs-delay;
  // Skip if the fire time is already in the past
  if(fireAt<=Date.now()) return null;
  return fireAt;
}

function scheduleReminder(s){
  // Always clear existing in-page timer first
  if(reminderTimers[s.id]){ clearTimeout(reminderTimers[s.id]); delete reminderTimers[s.id]; }
  if(!s.reminder||s.reminder==='off') return;

  const fireAt=_computeFireAt(s);
  if(!fireAt) return;  // past deadline — nothing to schedule

  const delay=fireAt-Date.now();
  const body='⏰ '+( s.title||s.name||'Reminder');

  // Primary path: hand off to Service Worker (works when app is closed)
  if(Notification.permission==='granted' && navigator.serviceWorker?.controller){
    _swMsg({ type:'SCHEDULE', reminder:{ id:s.id, title:s.title||s.name||'', body, fireAt } });
  }

  // Fallback: in-page setTimeout (works while app is open, covers SW not yet ready)
  if(delay>0 && delay<2147483647){  // setTimeout max ~24.8 days
    reminderTimers[s.id]=setTimeout(()=>{
      if(Notification.permission==='granted'){
        new Notification('Dashboard',{body, icon:'./icon-192.png'});
      } else {
        toast(body);
      }
      delete reminderTimers[s.id];
    }, delay);
  }
}

function cancelReminder(id){
  if(reminderTimers[id]){ clearTimeout(reminderTimers[id]); delete reminderTimers[id]; }
  _swMsg({ type:'CANCEL', id });
}

function cancelAllReminders(){
  Object.keys(reminderTimers).forEach(id=>clearTimeout(reminderTimers[id]));
  Object.keys(reminderTimers).forEach(id=>delete reminderTimers[id]);
  _swMsg({ type:'CANCEL_ALL' });
}

function scheduleAllReminders(){
  // Stories — pass full object; _type not needed (no date field ambiguity)
  SECTIONS.forEach(sec=>
    (state.sections[sec.key]||[]).filter(s=>!s._deleted).forEach(s=>scheduleReminder(s))
  );
  // Tasks — tag with _type so _computeFireAt uses deadline_date correctly
  (state.tasks||[]).forEach(t=>{
    if(t.reminder&&t.reminder!=='off'&&t.taskStatus!=='done'){
      scheduleReminder({...t, _type:'task', id:'task-'+t.id});
    }
  });
  // Meetings — tag with _type; pass date+time
  (state.meetings||[]).forEach(m=>{
    if(m.reminder&&m.reminder!=='off'&&m.status!=='done'&&m.status!=='cancelled'){
      scheduleReminder({...m, _type:'meeting', id:'meeting-'+m.id, title:m.name||'Meeting'});
    }
  });
}
function getStories(sec,archKey,includeShelved){
  const secObj=SECTIONS.find(s=>s.key===sec)||{};   // must be first — used in filter guard
  const arr=(archKey?state.archive[archKey]?.sections[sec]:state.sections[sec])||[];
  let a=arr.slice();
  a=a.filter(s=>!s._deleted); // never render tombstone/deleted entries
  if(!includeShelved) a=a.filter(s=>s.status!=='shelved');
  if(ui.search){
    const q=ui.search.toLowerCase();
    a=a.filter(s=>
      (s.title||'').toLowerCase().includes(q)||
      (s.correspondent||'').toLowerCase().includes(q)||
      (s.producer||'').toLowerCase().includes(q)||
      (s.shoot_edit||'').toLowerCase().includes(q)||
      (s.location||'').toLowerCase().includes(q)||
      (s.field_location||'').toLowerCase().includes(q)||
      (s.remarks||'').toLowerCase().includes(q)||
      (s.req_name||'').toLowerCase().includes(q)||
      (s.req_team||'').toLowerCase().includes(q)||
      (s.detail||'').toLowerCase().includes(q)||
      (s.links||'').toLowerCase().includes(q)
    );
  }
  if(ui.filter==='working')  return a.filter(s=>s.mode==='working');
  if(ui.filter==='watching') return a.filter(s=>s.mode==='watching');
  // Upcoming events are not governed by the story status filter bar — skip it
  if(ui.filter!=='all' && !secObj.isUpcoming) return a.filter(s=>s.status===ui.filter);

  // Sort: active stories first (by deadline), then on-hold/postponed at bottom
  const _today=todayStr();
  const _isParked=s=>s.status==='on-hold'||s.status==='postponed';
  a.sort((x,y)=>{
    // Parked stories always sink to the bottom
    const xp=_isParked(x), yp=_isParked(y);
    if(xp&&!yp) return 1;
    if(!xp&&yp) return -1;
    // For upcoming: sort by expected_date (or deadline_date if no expected_date)
    const getDate=s=>{
      if(secObj.isUpcoming) return s.expected_date||s.deadline_date||'';
      if(!s.deadline_date) return '';
      // For recurring: sort by next future occurrence, not original deadline
      if(s.isRecurring&&s.deadline_date){
        const mostRecent=mostRecentRecurOccurrence(s,_today);
        const nxt=nextRecurrenceDate({...s,deadline_date:mostRecent});
        return nxt>=_today?nxt:nextRecurrenceDate({...s,deadline_date:nxt});
      }
      return s.deadline_date;
    };
    const dx=getDate(x), dy=getDate(y);
    if(!dx&&!dy) return 0;
    if(!dx) return 1;   // no date → bottom
    if(!dy) return -1;
    return dx.localeCompare(dy); // earlier date first
  });
  return a;
}

function doMigrate(){
  const selected=[...ui.selectedStories];
  if(!selected.length){ toast('Select at least one story first'); return; }
  let archiveKey=ui.quickDayTarget;
  if(!archiveKey){
    const tvEl=document.getElementById('migrate-target-value');
    if(!tvEl||!tvEl.value){ toast('Pick a destination'); return; }
    const tval=tvEl.value;
    if(ui.migrateTargetType==='day')   archiveKey=tval;
    else if(ui.migrateTargetType==='week') archiveKey=weekKey(tval);
    else archiveKey=monthKey(tval);
  }
  if(!state.archive[archiveKey]){
    const t=archiveKey.startsWith('week-')?'week':archiveKey.startsWith('month-')?'month':'day';
    state.archive[archiveKey]={type:t,label:archiveLabel(archiveKey),sections:{ibu:[],other:[],requests:[],upcoming:[]},notes:'',created:Date.now()};
  }
  const srcKey=ui.migrateSourceKey; // null = today, string = archive date
  const toRemove={};
  selected.forEach(k=>{
    const sep=k.indexOf('::'); const sec=k.slice(0,sep); const id=k.slice(sep+2);
    // Find story in correct source
    let story;
    if(srcKey){
      story=(state.archive[srcKey]?.sections?.[sec]||[]).find(s=>s.id===id);
    } else {
      story=(state.sections[sec]||[]).find(s=>s.id===id);
    }
    if(!story) return;
    // Add to destination
    if(!state.archive[archiveKey].sections[sec]) state.archive[archiveKey].sections[sec]=[];
    if(!state.archive[archiveKey].sections[sec].some(s=>s.id===id))
      state.archive[archiveKey].sections[sec].push({...story,migratedAt:Date.now()});
    // Queue removal if moving
    if(ui.migrateAction==='move'){
      if(!toRemove[sec]) toRemove[sec]=new Set();
      toRemove[sec].add(id);
    }
  });
  // Remove from source
  if(ui.migrateAction==='move'){
    Object.entries(toRemove).forEach(([sec,ids])=>{
      if(srcKey){
        if(state.archive[srcKey]?.sections?.[sec])
          state.archive[srcKey].sections[sec]=state.archive[srcKey].sections[sec].filter(s=>!ids.has(s.id));
      } else {
        state.sections[sec]=(state.sections[sec]||[]).filter(s=>!ids.has(s.id));
      }
    });
  }
  ui.selectedStories.clear(); ui.quickDayTarget=null;
  saveAndPush();
  toast(selected.length+' stor'+(selected.length===1?'y':'ies')+' '+(ui.migrateAction==='move'?'moved':'copied')+' to '+archiveLabel(archiveKey)+' ✓');
  renderDateStrip(); setView('archive',archiveKey);
}

function storyToText(s){
  const ln=[];
  ln.push('['+((s.status||'–').toUpperCase())+'] '+(s.title||'Untitled'));
  if(s.mode&&s.mode!=='none') ln.push('  Mode          : '+(s.mode==='working'?'▶ Working':'👁 Watching'));
  if(s.carriedForward) ln.push('  ⚠ Carried forward '+(s.carriedDays||1)+' day(s) from '+s.carriedFromDate);
  if(s.correspondent) ln.push('  Correspondent : '+s.correspondent);
  if(s.producer)      ln.push('  Producer      : '+s.producer);
  if(s.shoot_edit)    ln.push('  Shoot-Edit    : '+s.shoot_edit);
  if(s.location){
    let l=s.location||''; if(s.field_location) l=(l?l+' — ':'')+s.field_location;
    ln.push('  Location      : '+l);
  }
  if(s.story_type) ln.push('  Story Type    : '+s.story_type.toUpperCase());
  if(s.broadcast_times&&s.broadcast_times.length){
    s.broadcast_times.forEach((t,i)=>{
      const plat=t.plat||t.lbl||('Live '+(i+1));
      const prog=t.prog?(' · '+t.prog):'';
      ln.push(`  ${(plat+prog).padEnd(14)}: GMT ${t.uk||'–'} | IST ${t.ist||'–'}`);
    });
  } else if(s.time_uk||s.time_ist){
    ln.push('  Broadcast     : GMT '+(s.time_uk||'–')+' | IST '+(s.time_ist||'–'));
  }
  if(s.deadline_date){
    let dl='  Deadline      : '+s.deadline_date;
    if(s.deadline_uk) dl+=' at '+s.deadline_uk+' ('+ukLabel()+')';
    if(s.deadline_ist) dl+=' / '+s.deadline_ist+' IST';
    ln.push(dl);
  }
  // Upcoming-specific
  if(s.expected_date) ln.push('  Expected      : '+s.expected_date+(s.expected_type?' ('+s.expected_type+')':''));
  if(s.detail)        ln.push('  Detail        : '+s.detail);
  if(s.req_name||s.req_team) ln.push('  Requested by  : '+[s.req_name,s.req_team,s.req_location].filter(Boolean).join(', '));
  if(s.created)  ln.push('  Logged at     : '+new Date(s.created).toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}));
  if(s.remarks){
    const rLines=s.remarks.split('\n');
    if(rLines.length===1) ln.push('  Remarks       : '+s.remarks);
    else{ ln.push('  Remarks       :'); rLines.forEach(l=>ln.push('    '+l)); }
  }
  if(s.remarksList&&s.remarksList.length){
    s.remarksList.forEach((r,i)=>{
      const dt=new Date(r.created).toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
      ln.push('  Remark '+(i+1)+'      : '+r.text+' ['+dt+']');
    });
  }
  if(s.links)    ln.push('  Links         : '+s.links);
  if(s.completion_note)  ln.push('  Done notes    : '+s.completion_note);
  if(s.completion_links) ln.push('  Done links    : '+s.completion_links);
  const storyTravel=(state.travelEntries||[]).filter(e=>e.storyId===s.id);
  if(storyTravel.length){
    ln.push('  Travel:');
    storyTravel.forEach(e=>{
      const d=e.data||{};
      const icons={cab:'🚕',flight:'✈️',hotel:'🏨',expense:'💳',fixer:'🤝'};
      ln.push('    '+(icons[e.type]||'')+' '+(_typeName[e.type]||e.type).toUpperCase());
      if(e.type==='cab'&&d.from) ln.push('      '+(d.from||'')+(d.to?' → '+d.to:'')+(d.when?' @ '+_fmtDT(d.when):'')+(d.driver?' Driver: '+d.driver+(d.phone?' '+d.phone:''):''));
      if(e.type==='flight') ln.push('      '+(d.direction||'outbound')+' '+(d.from||'')+(d.to?' → '+d.to:'')+(d.when?' @ '+_fmtDT(d.when):''));
      if(e.type==='hotel') ln.push('      '+(d.hotelName||'')+(d.where?', '+d.where:'')+(d.checkIn?' In:'+_fmtD(d.checkIn):'')+(d.checkOut?' Out:'+_fmtD(d.checkOut):''));
      if(e.type==='expense') ln.push('      '+(d.what||'')+(d.amount?' '+d.amount:'')+(d.paidBy?' by '+d.paidBy:''));
      if(e.type==='fixer') ln.push('      '+(d.fixerName||'')+(d.where?', '+d.where:'')+(d.startDate?' '+_fmtD(d.startDate):'')+(d.endDate?' – '+_fmtD(d.endDate):'')+(d.fixerTotal?' Total:'+d.fixerTotal:'')+(d.paidBy?' by '+d.paidBy:''));
    });
  }
  return ln.join('\n');
}
function buildFullText(){
  const hr='─'.repeat(56);
  const now=new Date().toLocaleString('en-GB',{weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
  const ln=['BBC Dashboard',now,'═'.repeat(56),''];

  // Active sections
  SECTIONS.forEach(sec=>{
    ln.push(sec.name.toUpperCase()); ln.push(hr);
    const secStories=(state.sections[sec.key]||[]).filter(s=>!s._deleted);
    secStories.forEach(s=>{ ln.push(storyToText(s)); ln.push(''); });
    if(!secStories.length) ln.push('(No stories)');
    ln.push('');
  });

  // Active notes
  if((state.notes||[]).length){
    ln.push('NOTES'); ln.push(hr);
    state.notes.forEach(n=>{
      const status=n.status==='done'?'[DONE]':n.status==='pass'||n.status==='passed'?'[PASSED]':'[ACTIVE]';
      ln.push('  '+status+' '+n.text);
      if(n.deadline_date) ln.push('  Deadline : '+n.deadline_date);
      if(n.carriedForward) ln.push('  Carried  : '+n.carriedDays+'d');
      ln.push('');
    });
    ln.push('');
  }

  // Tasks
  if((state.tasks||[]).length){
    ln.push('TASKS'); ln.push(hr);
    state.tasks.forEach(t=>{
      const status=t.taskStatus==='done'?'[DONE]':t.taskStatus==='not-done'?'[NOT DONE]':t.taskStatus==='transferred'?'[TRANSFERRED]':'[PENDING]';
      ln.push('  '+status+' '+(t.title||'Untitled'));
      if(t.deadline_date) ln.push('  Deadline : '+t.deadline_date);
      if(t.notes) ln.push('  Notes    : '+t.notes);
      ln.push('');
    });
    ln.push('');
  }

  // Leaves
  if((state.leaves||[]).length){
    ln.push('LEAVES'); ln.push(hr);
    const fmtDate=d=>d?new Date(d+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'}):d;
    state.leaves.forEach(l=>{
      ln.push('  '+(l.employeeName||'Unknown')+' — '+(l.leaveType||'')+' ['+l.status+']');
      ln.push('  From : '+fmtDate(l.dateFrom));
      ln.push('  To   : '+fmtDate(l.dateTo));
      if(l.reason) ln.push('  Note : '+l.reason);
      ln.push('');
    });
    ln.push('');
  }

  // Archive
  const keys=sortedArchiveKeys();
  if(keys.length){
    ln.push('ARCHIVE'); ln.push(hr);
    keys.forEach(k=>{
      ln.push('\n'+archiveLabel(k).toUpperCase());
      const e=state.archive[k]; if(!e) return;
      SECTIONS.forEach(sec=>{
        const st=(e.sections?.[sec.key]||[]).filter(s=>!s._deleted);
        if(!st.length) return;
        ln.push('  '+sec.name.toUpperCase());
        st.forEach(s=>{ ln.push('  '+storyToText(s).replace(/\n/g,'\n  ')); ln.push(''); });
      });
      // Archive notes log
      if(e.notesLog?.length){
        ln.push('  NOTES ON THIS DAY');
        e.notesLog.forEach(n=>{
          const st=n._deleted?'[DELETED]':n.status==='done'?'[DONE]':n.status==='pass'||n.status==='passed'?'[PASSED]':'[ACTIVE]';
          ln.push('  '+st+' '+n.text);
          if(n.deadline_date) ln.push('  Deadline: '+n.deadline_date);
        });
        ln.push('');
      }
      if(e.notes?.trim()){
        ln.push('  FREE NOTES');
        ln.push('  '+e.notes.trim().replace(/\n/g,'\n  '));
        ln.push('');
      }
    });
  }

  return ln.join('\n');
}

function handleImportFile(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      const isExport=data._version&&data.sections;
      const isBackup=data._backupMeta&&data.sections;
      if(!isExport&&!isBackup){
        toast('❌ Unrecognised file — use an export or backup .json from this app');
        input.value=''; return;
      }
      const storyCount=Object.values(data.sections||{}).reduce((s,a)=>s+(a?.length||0),0);
      const archCount=Object.keys(data.archive||{}).length;
      const sourceLabel=isBackup
        ? capitalize(data._backupMeta.type||'manual')+' backup — period: '+(data._backupMeta.period||'—')
        : 'Export — '+(data._exported?.slice(0,10)||'unknown date');
      const msg=`Load this data?\n\nSource: ${sourceLabel}\n• ${storyCount} active stories\n• ${archCount} archive entries\n• ${(data.tasks||[]).length} tasks\n\n⚠ This will replace all current data.`;
      if(!confirm(msg)){ input.value=''; return; }
      const preserved={
        backupSnapshots:   state.backupSnapshots,
        autoBackup:        state.autoBackup,
        lastWeeklyBackup:  state.lastWeeklyBackup,
        lastMonthlyBackup: state.lastMonthlyBackup,
        lastYearlyBackup:  state.lastYearlyBackup,
      };
      state.sections    = data.sections    || state.sections;
      state.remarks     = data.remarks     ?? '';
      state.archive     = data.archive     || {};
      state.tasks       = data.tasks       || [];
      state.meetings    = data.meetings    || [];
      state.notes       = data.notes       || [];
      state.leaves      = data.leaves      || [];
      state.employees   = data.employees   || state.employees;
      state.staffNames  = data.staffNames  || state.staffNames;
      state.sectionNames= data.sectionNames|| {};
      state.customPlatformLabels = data.customPlatformLabels || [];
      state.deletedIds  = data.deletedIds  || {};
      state.lastActiveDate = todayStr();
      Object.assign(state, preserved);
      SECTIONS.forEach(s=>{ if(!state.sections[s.key]) state.sections[s.key]=[]; });
      saveAndPush();
      document.getElementById('import-modal')?.remove();
      document.getElementById('backups-modal')?.remove();
      input.value='';
      render(); renderDateStrip();
      toast('✓ Loaded — '+storyCount+' stories, '+archCount+' archive entries');
    } catch(err){
      toast('❌ Could not read file: '+err.message);
      input.value='';
    }
  };
  reader.readAsText(file);
}
function sendMailto(subject, bodyText){
  const MAX=1800;
  let body=bodyText;
  let truncated=false;
  if(body.length>MAX){ body=body.slice(0,MAX)+'\n\n[... truncated — use Export .txt for full version]'; truncated=true; }
  const href='mailto:?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(body);
  // Try window.open first (works in most browsers), then anchor click
  let opened=false;
  try {
    const win=window.open(href,'_self');
    if(win!==null) opened=true;
  } catch(e){}
  if(!opened){
    try {
      const a=document.createElement('a');
      a.href=href; a.style.display='none';
      document.body.appendChild(a); a.click();
      setTimeout(()=>{ try{document.body.removeChild(a);}catch(e){} },300);
      opened=true;
    } catch(e){}
  }
  // Always show fallback copy dialog so user can paste manually if mail client didn't open
  setTimeout(()=>{ showEmailFallback(subject,bodyText); },400);
  if(truncated) toast('Body was long — full version is in Export .txt');
}

function meetingToText(m){
  const DAY_NAMES={sun:'Sunday',mon:'Monday',tue:'Tuesday',wed:'Wednesday',thu:'Thursday',fri:'Friday',sat:'Saturday'};
  const recurDayLabel=m.isRecurring&&m.recurFreq==='weekly'&&(m.recurDaysOfWeek||[]).length
    ? 'every '+m.recurDaysOfWeek.map(d=>DAY_NAMES[d]||d).join(' / ')
    : m.isRecurring&&m.recurFreq==='daily'?'every day'
    : m.isRecurring&&m.recurFreq==='custom'&&m.recurDays?'every '+m.recurDays+'d':'';
  const timeIST=m.time?ukToIST(m.time):'';
  const timeStr=m.isRecurring&&recurDayLabel
    ? (m.time?m.time+' '+ukLabel()+' / '+timeIST+' IST':'')+' '+recurDayLabel
    : m.time?m.time+' '+ukLabel()+(timeIST?' / '+timeIST+' IST':''):'';
  const ln=[];
  ln.push((m.name||'Untitled').toUpperCase());
  if(timeStr) ln.push('  When     : '+timeStr.trim());
  if(m.date&&!(m.isRecurring&&recurDayLabel)) ln.push('  Date     : '+fmtDate(m.date));
  if(m.status) ln.push('  Status   : '+m.status);
  if(m.venue) ln.push('  Venue    : '+m.venue);
  if(m.agenda) ln.push('  Agenda   : '+m.agenda);
  if((m.participants||[]).length) ln.push('  People   : '+m.participants.map(p=>p.name+(p.isExternal?' (ext)':'')).join(', '));
  if((m.remarks||[]).length){ ln.push('  Remarks:'); m.remarks.forEach(r=>ln.push('    - '+r.text)); }
  return ln.join('\n');
}

function taskToText(t){
  const ln=[];
  ln.push((t.title||'Untitled').toUpperCase());
  if(t.deadline_date) ln.push('  Deadline : '+t.deadline_date+(t.deadline_time?' '+t.deadline_time+' '+ukLabel()+(ukToIST(t.deadline_time)?' / '+ukToIST(t.deadline_time)+' IST':''):''));
  ln.push('  Status   : '+t.taskStatus);
  if(t.notes) ln.push('  Notes    : '+t.notes);
  if(t.isRecurring) ln.push('  Recurs   : '+(t.recurDaysOfWeek?.length?'every '+t.recurDaysOfWeek.join('/'):(t.recurFreq||'recurring')));
  return ln.join('\n');
}

function initScrollHeader(){
  let lastY=0;
  let scrollTimer=null;
  window.addEventListener('scroll',()=>{
    const y=window.scrollY||document.documentElement.scrollTop;
    // Collapse on scroll down past 80px
    if(y>80 && !_headerCollapsed && y>lastY){
      collapseHeader();
    }
    // Only expand when truly back at top — use debounce to avoid flicker
    if(y===0 && _headerCollapsed){
      clearTimeout(scrollTimer);
      scrollTimer=setTimeout(()=>{
        const cur=window.scrollY||document.documentElement.scrollTop;
        if(cur===0) expandHeader();
      }, 120);
    }
    lastY=y;
  },{passive:true});
}

function repairStory(id){
  // Remove story ID from ALL deletedIds keys — clears midnight-sweep tombstones
  if(!state.deletedIds) state.deletedIds={};
  let found=false;
  Object.keys(state.deletedIds).forEach(function(k){
    if((state.deletedIds[k]||[]).includes(id)){
      state.deletedIds[k]=state.deletedIds[k].filter(function(x){return x!==id;});
      found=true;
    }
  });
  // Bump updated timestamp on the story in every section it appears in
  SECTIONS.forEach(function(sec){
    (state.sections[sec.key]||[]).forEach(function(s){
      if(s.id===id) s.updated=Date.now();
    });
  });
  // Write clean state directly to Firebase — bypasses merge
  saveLocal();
  const raw=JSON.parse(localStorage.getItem('nd_v5'));
  fireDb.collection('nd').doc('data').set(raw).then(function(){
    toast('Story repaired ✓ — mobile will show it on next sync');
    render();
  }).catch(function(e){ toast('Repair failed: '+e.message); });
}

function deadlineBadge(s){
  if(!s.deadline_date) return '';
  if(s.status==='completed') return '';
  const today=todayStr();
  if(s.deadline_uk){
    // Time is set — convert London local time → UTC correctly (handles BST/GMT)
    const [h,m]=(s.deadline_uk).split(':').map(Number);
    const ukMin=h*60+m;
    const midnightUtc=new Date(s.deadline_date+'T00:00:00Z').getTime();
    const deadlineUtcMs=midnightUtc+(ukMin-ukOffMin())*60000;
    const diff=deadlineUtcMs-Date.now();
    const abs=Math.abs(diff), mins=Math.round(abs/60000);
    let txt;
    if(mins<60)    txt=(diff<0?'Overdue ':' Due ')+mins+'m';
    else if(mins<1440) txt=(diff<0?'Overdue ':' Due ')+Math.round(mins/60)+'h';
    else           txt=(diff<0?'Overdue ':' Due ')+Math.round(mins/1440)+'d';
    return `<span class="deadline-badge${diff<0?' overdue':''}"><span class="badge-dot" style="background:${diff<0?'#B91C1C':'#B45309'}"></span>${txt}</span>`;
  } else {
    // No time set — compare by date only to avoid UTC offset false overdue
    const dayDiff=Math.round((new Date(s.deadline_date+'T00:00:00').getTime()-new Date(today+'T00:00:00').getTime())/86400000);
    if(dayDiff===0) return `<span class="deadline-badge"><span class="badge-dot" style="background:#B45309"></span>Due today</span>`;
    if(dayDiff>0)   return `<span class="deadline-badge"><span class="badge-dot" style="background:#B45309"></span>Due in ${dayDiff}d</span>`;
    return `<span class="deadline-badge overdue"><span class="badge-dot" style="background:#B91C1C"></span>Overdue ${Math.abs(dayDiff)}d</span>`;
  }
}
function upcomingDueBadge(s){
  if(!s.expected_date) return '';
  const today=todayStr();
  if(s.expected_date<today) return `<span class="deadline-badge overdue">⚠ Overdue expected</span>`;
  if(s.expected_date===today) return `<span class="deadline-badge">📅 Due today</span>`;
  const diff=new Date(s.expected_date+'T00:00:00').getTime()-Date.now();
  const days=Math.ceil(diff/86400000);
  return `<span class="upcoming-due-badge">📅 in ${days}d</span>`;
}
function renderDateStrip(){
  const strip=document.getElementById('date-strip'); if(!strip) return;
  const today=todayStr();
  const yest=yesterdayStr(), tomm=tomorrowStr();

  // Build a complete set of day keys for the last 30 days so no day is missing.
  // Archive entries that exist are used as-is; missing days get stub 0-count pills.
  const allKeys=new Set(sortedArchiveKeys());
  for(let i=2;i<=30;i++){
    const d=addDays(today,-i);
    if(d!==yest&&d!==tomm) allKeys.add(d);
  }
  // Keep week/month keys too but filter plain dates to recent ones only
  const keys=[...allKeys].filter(k=>{
    if(k.startsWith('week-')||k.startsWith('month-')) return true;
    return k<today&&k!==yest&&k!==tomm; // plain dates older than yesterday
  }).sort((a,b)=>{
    const df=k=>k.startsWith('week-')?k.slice(5):k.startsWith('month-')?k.slice(6)+'-01':k;
    return df(b).localeCompare(df(a));
  });

  const todayActive=ui.view==='today';
  const yestActive=ui.view==='archive'&&ui.archiveKey===yest;
  const tommActive=ui.view==='archive'&&ui.archiveKey===tomm;
  const todayCount=SECTIONS.reduce((s,sec)=>s+(state.sections[sec.key]?.filter(x=>!x._deleted).length||0),0);
  const yestCount=state.archive[yest]?archiveStoryCount(yest):0;
  const tommCount=state.archive[tomm]?archiveStoryCount(tomm):0;
  let html='';
  html+=`<div class="dpill dp-yesterday${yestActive?' dp-active':''}" onclick="setView('archive','${yest}')" title="Yesterday">◀ Yesterday<span class="dpill-count">${yestCount}</span></div>`;
  html+=`<div class="dpill dp-today${todayActive?' dp-active':''}" onclick="setView('today',null)">● Today<span class="dpill-count">${todayCount}</span></div>`;
  html+=`<div class="dpill dp-tomorrow${tommActive?' dp-active':''}" onclick="setView('archive','${tomm}')" title="Tomorrow">Tomorrow ▶<span class="dpill-count">${tommCount}</span></div>`;
  const older=keys.filter(k=>k!==yest&&k!==tomm&&k!==today);
  if(older.length){
    html+=`<div class="dpill-sep"></div>`;
    older.forEach(key=>{
      const cnt=state.archive[key]?archiveStoryCount(key):0;
      const active=ui.view==='archive'&&ui.archiveKey===key;
      const cls=key.startsWith('week-')?' dp-week':key.startsWith('month-')?' dp-month':' dp-date';
      html+=`<div class="dpill${cls}${active?' dp-active':''}" onclick="setView('archive','${key}')" title="${archiveLabel(key)}">${archiveShortLabel(key)}<span class="dpill-count">${cnt}</span></div>`;
    });
  }
  html+=`<div style="flex-shrink:0;width:18px"></div>`;
  strip.innerHTML=html;
  setTimeout(()=>{ const ac=strip.querySelector('.dp-active'); if(ac&&!todayActive) ac.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); },80);
}

function injectDataLists(){
  const sn=state.staffNames||{};
  const allStaff=[...new Set([...(sn.correspondents||[]),...(sn.producers||[]),...(sn.shootEdit||[])])].sort();
  // Build a fingerprint — only rebuild DOM datalists when the staff data has actually changed
  const fingerprint=JSON.stringify({c:sn.correspondents||[],p:sn.producers||[],s:sn.shootEdit||[],a:allStaff});
  if(injectDataLists._last===fingerprint) return; // no change — skip expensive DOM rebuild
  injectDataLists._last=fingerprint;
  ['dl-correspondents','dl-producers','dl-shoot','dl-staff-all'].forEach(id=>document.getElementById(id)?.remove());
  const makeList=(id,arr)=>{
    const dl=document.createElement('datalist'); dl.id=id;
    (arr||[]).forEach(n=>{ const opt=document.createElement('option'); opt.value=n; dl.appendChild(opt); });
    document.body.appendChild(dl);
  };
  makeList('dl-correspondents', sn.correspondents||[]);
  makeList('dl-producers',      sn.producers||[]);
  makeList('dl-shoot',          sn.shootEdit||[]);
  makeList('dl-staff-all', allStaff);
}

function storyMatchesSearch(s, q){
  const fields=[
    s.title, s.correspondent, s.producer, s.shoot_edit,
    s.location, s.field_location, s.remarks, s.req_name,
    s.req_team, s.detail, s.links,
    (s.remarksList||[]).map(r=>r.text).join(' '),
    s.completion_note,
  ];
  return fields.some(f=>(f||'').toLowerCase().includes(q));
}
function sectionMatchesSearch(sec, q){
  // Allow searching by section name — e.g. "stories", "requests", "note"
  const secMap={
    ibu:['stories','story','ibu','india business','other','other stories'],
    requests:['request','requests','future'],
    upcoming:['upcoming'],
    notes:['note','notes','remarks'],
    tasks:['task','tasks'],
    leaves:['leave','leaves'],
  };
  for(const [key,terms] of Object.entries(secMap)){
    if(terms.some(t=>t.includes(q)||q.includes(t))) return key;
  }
  return null;
}
function renderSearchHTML(){

  const today=todayStr();

  // Helper: friendly date label
  const dlabel=key=>{
    if(!key||key==='today') return 'Today';
    if(key===yesterdayStr()) return 'Yesterday';
    if(key===tomorrowStr()) return 'Tomorrow';
    return archiveLabel(key);
  };

  // Check if query matches a section name — show all stories from that section across all dates
  const secHit=sectionMatchesSearch('',q);

  // ── Today ──
