/* ── Time field helpers ──────────────────────────────────────────
   Each pair: normalise the typed value → write HH:MM back → convert. */
/* ── Time field handlers ─────────────────────────────────────────────
   _convertIfComplete  → oninput: only converts when value is a full time.
                         Never rewrites the source field mid-type.
   _normaliseAndConvert → onblur: normalises source to HH:MM then converts. */
function _convertIfComplete(srcId, destId, convertFn){
  const src=document.getElementById(srcId); if(!src) return;
  const v=src.value.trim();
  const complete=/^(\d{1,2}):(\d{2})$/.test(v)
               ||/^(\d{1,2})\.(\d{2})$/.test(v)
               ||/^\d{3}$/.test(v)
               ||/^\d{4}$/.test(v);
  if(!complete) return;
  const norm=normaliseTime(v); if(!norm) return;
  const dest=document.getElementById(destId); if(!dest) return;
  const c=convertFn(norm); if(c) dest.value=c;
}
function _normaliseAndConvert(srcId, destId, convertFn){
  const src=document.getElementById(srcId); if(!src) return;
  const norm=normaliseTime(src.value);
  if(norm) src.value=norm;
  const dest=document.getElementById(destId); if(!dest) return;
  const c=convertFn(norm||src.value); if(c) dest.value=c;
}

function addStory(sec,data,archKey){

    if(!terminal.includes(data.status||'')){

function updateStory(sec,id,data,archKey){
  const arr=getArr(sec,archKey); if(!arr) return;
  const i=arr.findIndex(s=>s.id===id);
  if(i<0) return;
  arr[i]={...arr[i],...data, updated:Date.now()};
  // If this story is (or was) carried forward, propagate the update to every
  // archive entry that holds a copy of the same story id.
  if(!archKey){
    const story=arr[i];
    Object.keys(state.archive).forEach(dateKey=>{
      const secArr=state.archive[dateKey]?.sections?.[sec];
      if(!secArr) return;
      const ai=secArr.findIndex(s=>s.id===id);
      if(ai>=0) secArr[ai]={...secArr[ai],...data, updated:story.updated};
    });
  }
  saveAndPush(); scheduleReminder(arr[i]);
}
function deleteStory(sec,id,archKey){
  const arr=getArr(sec,archKey); if(!arr) return;
  const story=arr.find(s=>s.id===id); if(!story) return;

  // Archive to creation date before permanent deletion
  const createdDate=story.carriedFromDate||(story.created?dateStr(new Date(typeof story.created==='number'?story.created:parseInt(story.created))):todayStr());
  if(!state.archive[createdDate]){
    state.archive[createdDate]={type:'day',label:archiveLabel(createdDate),sections:{},notes:'',created:Date.now()};
    SECTIONS.forEach(s=>{state.archive[createdDate].sections[s.key]=[];});
  }
  if(!state.archive[createdDate].sections[sec]) state.archive[createdDate].sections[sec]=[];
  // Only add if not already there
  if(!state.archive[createdDate].sections[sec].some(s=>s.id===id)){
    state.archive[createdDate].sections[sec].push({...story, deletedOn:Date.now(), _deleted:true});
  }

  // Record deletion so Firestore onSnapshot merge cannot resurrect this entry
  if(!state.deletedIds) state.deletedIds={};
  if(!archKey){
    // Live board deletion
    if(!state.deletedIds[sec]) state.deletedIds[sec]=[];
    if(!state.deletedIds[sec].includes(id)) state.deletedIds[sec].push(id);
  } else {
    // Archive deletion — keyed as "archKey::sec"
    const archDeletedKey=archKey+'::'+sec;
    if(!state.deletedIds[archDeletedKey]) state.deletedIds[archDeletedKey]=[];
    if(!state.deletedIds[archDeletedKey].includes(id)) state.deletedIds[archDeletedKey].push(id);
  }

  // Now remove from working board
  const filtered=arr.filter(s=>s.id!==id);
  if(archKey) state.archive[archKey].sections[sec]=filtered; else state.sections[sec]=filtered;
  ui.openCards.delete(id); ui.complForms.delete(id);
  saveAndPush(); renderDateStrip(); render();
}

// Startup cleanup: rescue any not-done entries in non-combined sections that were
// stuck before this fix (e.g. marked not-done days ago and never archived).
// Also called after Firebase sync so remote state can't resurrect stuck entries.
function cleanupCompletedStories(){
  // No-op: stories stay on board until midnight.
  // checkDateChange() handles archiving + removal at day rollover.
}

  // No-op: midnight checkDateChange() is the only removal mechanism.
  // Terminal stories stay visible on board until day rolls over.
  return 0;
}
function sweepStaleTerminalStories(){
  // On every app open: remove terminal stories created on a previous day
  // This catches cases where the app was closed at night and checkDateChange
  // couldn't run the midnight sweep (missing timestamp fields on old entries)
  const today=todayStr();
  const TERM=['completed','not-done','shelved'];
  let swept=false;
  if(!state.deletedIds) state.deletedIds={};
  const keepFn=(s,key)=>{
    if(!TERM.includes(s.status)) return true;
    // Keep if created today (user just marked it)
    const created=s.created?dateStr(new Date(s.created)):null;
    if(created&&created>=today) return true;
    // Also keep if any resolution timestamp is today
    const resDate=s.completedOn?dateStr(new Date(s.completedOn)):
      s.notDoneOn?dateStr(new Date(s.notDoneOn)):
      s.shelvedAt?dateStr(new Date(s.shelvedAt)):null;
    if(resDate&&resDate>=today) return true;
    // Record in deletedIds so sync can't bring it back
    if(key){
      if(!state.deletedIds[key]) state.deletedIds[key]=[];
      if(!state.deletedIds[key].includes(s.id)) state.deletedIds[key].push(s.id);
    }
    swept=true; return false;
  };
  SECTIONS.filter(s=>!s.isUpcoming&&!s.isCombined&&s.key!=='ibu').forEach(({key})=>{
    state.sections[key]=(state.sections[key]||[]).filter(s=>keepFn(s,key));
  });
  // Also sweep other (hidden combined section)
  state.sections.other=(state.sections.other||[]).filter(s=>keepFn(s,'other'));
  // IBU always clears if date changed (handled by checkDateChange)
  if(swept) saveAndPush();
}

/* ════════════════════════════════════════
   REMINDERS
════════════════════════════════════════ */

/* Send a message to the Service Worker and get a reply */
function _swMsg(data){
  return new Promise(resolve=>{
    if(!navigator.serviceWorker?.controller){ resolve(null); return; }
    const ch=new MessageChannel();
    ch.port1.onmessage=e=>resolve(e.data);
    navigator.serviceWorker.controller.postMessage(data,[ch.port2]);
  });
}

/* ── Compute the UTC ms timestamp at which this reminder should fire ──
   Rules:
   • Meeting   — fires REMINDER_DELAY before meeting date+time (London time)
   • Task      — fires REMINDER_DELAY before 09:00 London on deadline_date
   • Story     — fires REMINDER_DELAY before deadline_date + deadline_uk (London)
                 or 09:00 London on deadline_date if no time given
   • Upcoming  — same as story; falls back to expected_date at 09:00 London
   • No date   — falls back to Date.now() + delay (from-save behaviour)
   Returns null if the computed time is already in the past (skip this one). */
function _computeFireAt(s){
  const delay=REMINDER_DELAYS[s.reminder]; if(!delay) return null;

  /* Helper: build a UTC ms timestamp from a YYYY-MM-DD date string and a
     HH:MM time string that is in London local time (BST or GMT). */
  const londonToUtcMs=(dateStr, timeStr)=>{
    if(!dateStr) return null;
    try{
      const [h,m]=(timeStr||'09:00').split(':').map(Number);
      const ukMin=h*60+m;
      // midnight of that date in UTC
      const midnightUtc=new Date(dateStr+'T00:00:00Z').getTime();
      // convert London local minutes to UTC minutes by subtracting London offset
      const utcMin=ukMin-ukOffMin();
      return midnightUtc+utcMin*60000;
    }catch(e){ return null; }
  };

  let targetMs=null;

  // 1. Meeting — date + time both in London time
  if(s._type==='meeting' && s.date){
    targetMs=londonToUtcMs(s.date, s.time||'09:00');
  }

  // 2. Task — deadline_date, no time; use 09:00 London as working-day start
  else if(s._type==='task' && s.deadline_date){
    targetMs=londonToUtcMs(s.deadline_date, '09:00');
  }

  // 3. Story / Upcoming — prefer deadline_date + deadline_uk; fall back to
  //    deadline_date alone; then expected_date (Upcoming only)
  else {
    if(s.deadline_date&&s.deadline_uk){
      targetMs=londonToUtcMs(s.deadline_date, s.deadline_uk);
    } else if(s.deadline_date){
      targetMs=londonToUtcMs(s.deadline_date, '09:00');
    } else if(s.expected_date){
      targetMs=londonToUtcMs(s.expected_date, '09:00');
    }
  }

  // 4. No date anywhere — fall back to "from save time + delay"
  if(!targetMs) return Date.now()+delay;

  const fireAt=targetMs-delay;
  // Skip if the fire time is already in the past
  if(fireAt<=Date.now()) return null;
  return fireAt;
}

function scheduleReminder(s){
  // Always clear existing in-page timer first
  if(reminderTimers[s.id]){ clearTimeout(reminderTimers[s.id]); delete reminderTimers[s.id]; }
  if(!s.reminder||s.reminder==='off') return;

  const fireAt=_computeFireAt(s);
  if(!fireAt) return;  // past deadline — nothing to schedule

  const delay=fireAt-Date.now();
  const body='⏰ '+( s.title||s.name||'Reminder');

  // Primary path: hand off to Service Worker (works when app is closed)
  if(Notification.permission==='granted' && navigator.serviceWorker?.controller){
    _swMsg({ type:'SCHEDULE', reminder:{ id:s.id, title:s.title||s.name||'', body, fireAt } });
  }

  // Fallback: in-page setTimeout (works while app is open, covers SW not yet ready)
  if(delay>0 && delay<2147483647){  // setTimeout max ~24.8 days
    reminderTimers[s.id]=setTimeout(()=>{
      if(Notification.permission==='granted'){
        new Notification('Dashboard',{body, icon:'./icon-192.png'});
      } else {
        toast(body);
      }
      delete reminderTimers[s.id];
    }, delay);
  }
}

function cancelReminder(id){
  if(reminderTimers[id]){ clearTimeout(reminderTimers[id]); delete reminderTimers[id]; }
  _swMsg({ type:'CANCEL', id });
}

function cancelAllReminders(){
  Object.keys(reminderTimers).forEach(id=>clearTimeout(reminderTimers[id]));
  Object.keys(reminderTimers).forEach(id=>delete reminderTimers[id]);
  _swMsg({ type:'CANCEL_ALL' });
}

function scheduleAllReminders(){
  // Stories — pass full object; _type not needed (no date field ambiguity)
  SECTIONS.forEach(sec=>
    (state.sections[sec.key]||[]).filter(s=>!s._deleted).forEach(s=>scheduleReminder(s))
  );
  // Tasks — tag with _type so _computeFireAt uses deadline_date correctly
  (state.tasks||[]).forEach(t=>{
    if(t.reminder&&t.reminder!=='off'&&t.taskStatus!=='done'){
      scheduleReminder({...t, _type:'task', id:'task-'+t.id});
    }
  });
  // Meetings — tag with _type; pass date+time
  (state.meetings||[]).forEach(m=>{
    if(m.reminder&&m.reminder!=='off'&&m.status!=='done'&&m.status!=='cancelled'){
      scheduleReminder({...m, _type:'meeting', id:'meeting-'+m.id, title:m.name||'Meeting'});
    }
  });
}

════════════════════════════════════════ */
function getStories(sec,archKey,includeShelved){
  const secObj=SECTIONS.find(s=>s.key===sec)||{};   // must be first — used in filter guard
  const arr=(archKey?state.archive[archKey]?.sections[sec]:state.sections[sec])||[];
  let a=arr.slice();
  a=a.filter(s=>!s._deleted); // never render tombstone/deleted entries
  if(!includeShelved) a=a.filter(s=>s.status!=='shelved');
  if(ui.search){
    const q=ui.search.toLowerCase();
    a=a.filter(s=>
      (s.title||'').toLowerCase().includes(q)||
      (s.correspondent||'').toLowerCase().includes(q)||
      (s.producer||'').toLowerCase().includes(q)||
      (s.shoot_edit||'').toLowerCase().includes(q)||
      (s.location||'').toLowerCase().includes(q)||
      (s.field_location||'').toLowerCase().includes(q)||
      (s.remarks||'').toLowerCase().includes(q)||
      (s.req_name||'').toLowerCase().includes(q)||
      (s.req_team||'').toLowerCase().includes(q)||
      (s.detail||'').toLowerCase().includes(q)||
      (s.links||'').toLowerCase().includes(q)
    );
  }
  if(ui.filter==='working')  return a.filter(s=>s.mode==='working');
  if(ui.filter==='watching') return a.filter(s=>s.mode==='watching');
  // Upcoming events are not governed by the story status filter bar — skip it
  if(ui.filter!=='all' && !secObj.isUpcoming) return a.filter(s=>s.status===ui.filter);

  // Sort: active stories first (by deadline), then on-hold/postponed at bottom
  const _today=todayStr();
  const _isParked=s=>s.status==='on-hold'||s.status==='postponed';
  a.sort((x,y)=>{
    // Parked stories always sink to the bottom
    const xp=_isParked(x), yp=_isParked(y);
    if(xp&&!yp) return 1;
    if(!xp&&yp) return -1;
    // For upcoming: sort by expected_date (or deadline_date if no expected_date)
    const getDate=s=>{
      if(secObj.isUpcoming) return s.expected_date||s.deadline_date||'';
      if(!s.deadline_date) return '';
      // For recurring: sort by next future occurrence, not original deadline
      if(s.isRecurring&&s.deadline_date){
        const mostRecent=mostRecentRecurOccurrence(s,_today);
        const nxt=nextRecurrenceDate({...s,deadline_date:mostRecent});
        return nxt>=_today?nxt:nextRecurrenceDate({...s,deadline_date:nxt});
      }
      return s.deadline_date;
    };
    const dx=getDate(x), dy=getDate(y);
    if(!dx&&!dy) return 0;
    if(!dx) return 1;   // no date → bottom
    if(!dy) return -1;
    return dx.localeCompare(dy); // earlier date first
  });
  return a;
}
function getStoriesWW(sec,archKey){
  let a=getStories(sec,archKey,false);
  const wwf=ui.wwFilter[sec]||'all';
  if(wwf==='working')  a=a.filter(s=>s.mode==='working');
  if(wwf==='watching') a=a.filter(s=>s.mode==='watching');
  return a;
}

function doMigrate(){
  const selected=[...ui.selectedStories];
  if(!selected.length){ toast('Select at least one story first'); return; }
  let archiveKey=ui.quickDayTarget;
  if(!archiveKey){
    const tvEl=document.getElementById('migrate-target-value');
    if(!tvEl||!tvEl.value){ toast('Pick a destination'); return; }
    const tval=tvEl.value;
    if(ui.migrateTargetType==='day')   archiveKey=tval;
    else if(ui.migrateTargetType==='week') archiveKey=weekKey(tval);
    else archiveKey=monthKey(tval);
  }
  if(!state.archive[archiveKey]){
    const t=archiveKey.startsWith('week-')?'week':archiveKey.startsWith('month-')?'month':'day';
    state.archive[archiveKey]={type:t,label:archiveLabel(archiveKey),sections:{ibu:[],other:[],requests:[],upcoming:[]},notes:'',created:Date.now()};
  }
  const srcKey=ui.migrateSourceKey; // null = today, string = archive date
  const toRemove={};
  selected.forEach(k=>{
    const sep=k.indexOf('::'); const sec=k.slice(0,sep); const id=k.slice(sep+2);
    // Find story in correct source
    let story;
    if(srcKey){
      story=(state.archive[srcKey]?.sections?.[sec]||[]).find(s=>s.id===id);
    } else {
      story=(state.sections[sec]||[]).find(s=>s.id===id);
    }
    if(!story) return;
    // Add to destination
    if(!state.archive[archiveKey].sections[sec]) state.archive[archiveKey].sections[sec]=[];
    if(!state.archive[archiveKey].sections[sec].some(s=>s.id===id))
      state.archive[archiveKey].sections[sec].push({...story,migratedAt:Date.now()});
    // Queue removal if moving
    if(ui.migrateAction==='move'){
      if(!toRemove[sec]) toRemove[sec]=new Set();
      toRemove[sec].add(id);
    }
  });
  // Remove from source
  if(ui.migrateAction==='move'){
    Object.entries(toRemove).forEach(([sec,ids])=>{
      if(srcKey){
        if(state.archive[srcKey]?.sections?.[sec])
          state.archive[srcKey].sections[sec]=state.archive[srcKey].sections[sec].filter(s=>!ids.has(s.id));
      } else {
        state.sections[sec]=(state.sections[sec]||[]).filter(s=>!ids.has(s.id));
      }
    });
  }
  ui.selectedStories.clear(); ui.quickDayTarget=null;
  saveAndPush();
  toast(selected.length+' stor'+(selected.length===1?'y':'ies')+' '+(ui.migrateAction==='move'?'moved':'copied')+' to '+archiveLabel(archiveKey)+' ✓');
  renderDateStrip(); setView('archive',archiveKey);
}

function storyToText(s){
  const ln=[];
  ln.push('['+((s.status||'–').toUpperCase())+'] '+(s.title||'Untitled'));
  if(s.mode&&s.mode!=='none') ln.push('  Mode          : '+(s.mode==='working'?'▶ Working':'👁 Watching'));
  if(s.carriedForward) ln.push('  ⚠ Carried forward '+(s.carriedDays||1)+' day(s) from '+s.carriedFromDate);
  if(s.correspondent) ln.push('  Correspondent : '+s.correspondent);
  if(s.producer)      ln.push('  Producer      : '+s.producer);
  if(s.shoot_edit)    ln.push('  Shoot-Edit    : '+s.shoot_edit);
  if(s.location){
    let l=s.location||''; if(s.field_location) l=(l?l+' — ':'')+s.field_location;
    ln.push('  Location      : '+l);
  }
  if(s.story_type) ln.push('  Story Type    : '+s.story_type.toUpperCase());
  if(s.broadcast_times&&s.broadcast_times.length){
    s.broadcast_times.forEach((t,i)=>{
      const plat=t.plat||t.lbl||('Live '+(i+1));
      const prog=t.prog?(' · '+t.prog):'';
      ln.push(`  ${(plat+prog).padEnd(14)}: GMT ${t.uk||'–'} | IST ${t.ist||'–'}`);
    });
  } else if(s.time_uk||s.time_ist){
    ln.push('  Broadcast     : GMT '+(s.time_uk||'–')+' | IST '+(s.time_ist||'–'));
  }
  if(s.deadline_date){
    let dl='  Deadline      : '+s.deadline_date;
    if(s.deadline_uk) dl+=' at '+s.deadline_uk+' ('+ukLabel()+')';
    if(s.deadline_ist) dl+=' / '+s.deadline_ist+' IST';
    ln.push(dl);
  }
  // Upcoming-specific
  if(s.expected_date) ln.push('  Expected      : '+s.expected_date+(s.expected_type?' ('+s.expected_type+')':''));
  if(s.detail)        ln.push('  Detail        : '+s.detail);
  if(s.req_name||s.req_team) ln.push('  Requested by  : '+[s.req_name,s.req_team,s.req_location].filter(Boolean).join(', '));
  if(s.created)  ln.push('  Logged at     : '+new Date(s.created).toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}));
  if(s.remarks){
    const rLines=s.remarks.split('\n');
    if(rLines.length===1) ln.push('  Remarks       : '+s.remarks);
    else{ ln.push('  Remarks       :'); rLines.forEach(l=>ln.push('    '+l)); }
  }
  if(s.remarksList&&s.remarksList.length){
    s.remarksList.forEach((r,i)=>{
      const dt=new Date(r.created).toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
      ln.push('  Remark '+(i+1)+'      : '+r.text+' ['+dt+']');
    });
  }
  if(s.links)    ln.push('  Links         : '+s.links);
  if(s.completion_note)  ln.push('  Done notes    : '+s.completion_note);
  if(s.completion_links) ln.push('  Done links    : '+s.completion_links);
  if(s.travel&&s.travel.length){
    ln.push('  Travel:');
    s.travel.forEach(e=>{
      const d=e.data||{};
      const icons={cab:'🚕',flight:'✈️',hotel:'🏨',expense:'💳'};
      ln.push('    '+(icons[e.type]||'')+' '+e.type.toUpperCase()+(d.forName?' for '+d.forName:''));
      if(e.type==='cab'&&d.from) ln.push('      '+d.from+(d.to?' → '+d.to:'')+(d.when?' @ '+new Date(d.when).toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):'')+(d.driver?' Driver: '+d.driver+(d.phone?' '+d.phone:''):'')+(d.cabNum?' Cab: '+d.cabNum:''));
      if(e.type==='flight') ln.push('      '+(d.direction||'outbound').toUpperCase()+' '+(d.from||'')+(d.to?' → '+d.to:'')+(d.when?' @ '+new Date(d.when).toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):'')+(d.airline?' '+d.airline:'')+(d.flightNum?' '+d.flightNum:''));
      if(e.type==='hotel') ln.push('      '+(d.hotelName||'')+(d.where?', '+d.where:'')+(d.checkIn?' In:'+d.checkIn:'')+(d.checkOut?' Out:'+d.checkOut:'')+(d.priceDay?' '+d.priceDay+'/day':'')+(d.payment==='counter'?' (at counter)':''));
      if(e.type==='expense') ln.push('      '+(d.what||'')+(d.amount?' '+d.amount:'')+(d.paidBy?' by '+d.paidBy:'')+(d.paidUsing?' via '+d.paidUsing:''));
      if(d.notes) ln.push('      Notes: '+d.notes);
    });
  }
  return ln.join('\n');
}
function buildFullText(){
  const hr='─'.repeat(56);
  const now=new Date().toLocaleString('en-GB',{weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
  const ln=['BBC Dashboard',now,'═'.repeat(56),''];

  // Active sections
  SECTIONS.forEach(sec=>{
    ln.push(sec.name.toUpperCase()); ln.push(hr);
    const secStories=(state.sections[sec.key]||[]).filter(s=>!s._deleted);
    secStories.forEach(s=>{ ln.push(storyToText(s)); ln.push(''); });
    if(!secStories.length) ln.push('(No stories)');
    ln.push('');
  });

  // Active notes
  if((state.notes||[]).length){
    ln.push('NOTES'); ln.push(hr);
    state.notes.forEach(n=>{
      const status=n.status==='done'?'[DONE]':n.status==='pass'||n.status==='passed'?'[PASSED]':'[ACTIVE]';
      ln.push('  '+status+' '+n.text);
      if(n.deadline_date) ln.push('  Deadline : '+n.deadline_date);
      if(n.carriedForward) ln.push('  Carried  : '+n.carriedDays+'d');
      ln.push('');
    });
    ln.push('');
  }

  // Tasks
  if((state.tasks||[]).length){
    ln.push('TASKS'); ln.push(hr);
    state.tasks.forEach(t=>{
      const status=t.taskStatus==='done'?'[DONE]':t.taskStatus==='not-done'?'[NOT DONE]':t.taskStatus==='transferred'?'[TRANSFERRED]':'[PENDING]';
      ln.push('  '+status+' '+(t.title||'Untitled'));
      if(t.deadline_date) ln.push('  Deadline : '+t.deadline_date);
      if(t.notes) ln.push('  Notes    : '+t.notes);
      ln.push('');
    });
    ln.push('');
  }

  // Leaves
  if((state.leaves||[]).length){
    ln.push('LEAVES'); ln.push(hr);
    const fmtDate=d=>d?new Date(d+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'}):d;
    state.leaves.forEach(l=>{
      ln.push('  '+(l.employeeName||'Unknown')+' — '+(l.leaveType||'')+' ['+l.status+']');
      ln.push('  From : '+fmtDate(l.dateFrom));
      ln.push('  To   : '+fmtDate(l.dateTo));
      if(l.reason) ln.push('  Note : '+l.reason);
      ln.push('');
    });
    ln.push('');
  }

  // Archive
  const keys=sortedArchiveKeys();
  if(keys.length){
    ln.push('ARCHIVE'); ln.push(hr);
    keys.forEach(k=>{
      ln.push('\n'+archiveLabel(k).toUpperCase());
      const e=state.archive[k]; if(!e) return;
      SECTIONS.forEach(sec=>{
        const st=(e.sections?.[sec.key]||[]).filter(s=>!s._deleted);
        if(!st.length) return;
        ln.push('  '+sec.name.toUpperCase());
        st.forEach(s=>{ ln.push('  '+storyToText(s).replace(/\n/g,'\n  ')); ln.push(''); });
      });
      // Archive notes log
      if(e.notesLog?.length){
        ln.push('  NOTES ON THIS DAY');
        e.notesLog.forEach(n=>{
          const st=n._deleted?'[DELETED]':n.status==='done'?'[DONE]':n.status==='pass'||n.status==='passed'?'[PASSED]':'[ACTIVE]';
          ln.push('  '+st+' '+n.text);
          if(n.deadline_date) ln.push('  Deadline: '+n.deadline_date);
        });
        ln.push('');
      }
      if(e.notes?.trim()){
        ln.push('  FREE NOTES');
        ln.push('  '+e.notes.trim().replace(/\n/g,'\n  '));
        ln.push('');
      }
    });
  }

  return ln.join('\n');
}

function handleImportFile(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      // Validate it looks like our export
      if(!data._version||!data.sections){
        toast('❌ This doesn\'t look like a Newsroom Dashboard export file');
        input.value=''; return;
      }
      // Confirm before overwriting
      const storyCount=Object.values(data.sections||{}).reduce((s,a)=>s+(a?.length||0),0);
      const archCount=Object.keys(data.archive||{}).length;
      const msg=`Import this data?\n\n• ${storyCount} active stories\n• ${archCount} archive entries\n• ${(data.tasks||[]).length} tasks\n• Exported: ${data._exported?.slice(0,10)||'unknown date'}\n\nThis will replace all current data.`;
      if(!confirm(msg)){ input.value=''; return; }
      // Apply
      state.sections    = data.sections    || state.sections;
      state.remarks     = data.remarks     || '';
      state.archive     = data.archive     || {};
      state.tasks       = data.tasks       || [];
      state.meetings    = data.meetings    || [];
      state.notes       = data.notes       || [];
      state.leaves      = data.leaves      || [];
      state.employees   = data.employees   || state.employees;
      state.staffNames  = data.staffNames  || state.staffNames;
      state.sectionNames= data.sectionNames|| {};
      state.customPlatformLabels = data.customPlatformLabels || [];
      state.deletedIds  = data.deletedIds  || {};
      state.backupSnapshots = data.backupSnapshots || {weekly:[],monthly:[],yearly:[]};
      state.lastWeeklyBackup  = data.lastWeeklyBackup  || null;
      state.lastMonthlyBackup = data.lastMonthlyBackup || null;
      state.lastYearlyBackup  = data.lastYearlyBackup  || null;
      state.lastActiveDate = todayStr();
      // Ensure section arrays exist
      SECTIONS.forEach(s=>{ if(!state.sections[s.key]) state.sections[s.key]=[]; });
      saveAndPush();
      document.getElementById('import-modal')?.remove();
      input.value='';
      render(); renderDateStrip();
      toast('✓ Data imported successfully — '+storyCount+' stories, '+archCount+' archive entries');
    } catch(err){
      toast('❌ Could not read file: '+err.message);
      input.value='';
    }
  };
  reader.readAsText(file);
}
function sendMailto(subject, bodyText){
  const MAX=1800;
  let body=bodyText;
  let truncated=false;
  if(body.length>MAX){ body=body.slice(0,MAX)+'\n\n[... truncated — use Export .txt for full version]'; truncated=true; }
  const href='mailto:?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(body);
  // Try window.open first (works in most browsers), then anchor click
  let opened=false;
  try {
    const win=window.open(href,'_self');
    if(win!==null) opened=true;
  } catch(e){}
  if(!opened){
    try {
      const a=document.createElement('a');
      a.href=href; a.style.display='none';
      document.body.appendChild(a); a.click();
      setTimeout(()=>{ try{document.body.removeChild(a);}catch(e){} },300);
      opened=true;
    } catch(e){}
  }
  // Always show fallback copy dialog so user can paste manually if mail client didn't open
  setTimeout(()=>{ showEmailFallback(subject,bodyText); },400);
  if(truncated) toast('Body was long — full version is in Export .txt');
}
function showEmailFallback(subject,body){
  // Fallback: show copy dialog if mailto is blocked
  if(document.getElementById('email-fallback-modal')) return;
  // Store body on window so the button can access it without encoding issues

      <textarea class="ftextarea" id="email-fallback-body" style="min-height:260px;font-family:var(--mono);font-size:11px" readonly onclick="this.select()">${esc(body)}</textarea>

function copyEmailBodyFromModal(){

function meetingToText(m){
  const DAY_NAMES={sun:'Sunday',mon:'Monday',tue:'Tuesday',wed:'Wednesday',thu:'Thursday',fri:'Friday',sat:'Saturday'};
  const recurDayLabel=m.isRecurring&&m.recurFreq==='weekly'&&(m.recurDaysOfWeek||[]).length
    ? 'every '+m.recurDaysOfWeek.map(d=>DAY_NAMES[d]||d).join(' / ')
    : m.isRecurring&&m.recurFreq==='daily'?'every day'
    : m.isRecurring&&m.recurFreq==='custom'&&m.recurDays?'every '+m.recurDays+'d':'';
  const timeIST=m.time?ukToIST(m.time):'';
  const timeStr=m.isRecurring&&recurDayLabel
    ? (m.time?m.time+' '+ukLabel()+' / '+timeIST+' IST':'')+' '+recurDayLabel
    : m.time?m.time+' '+ukLabel()+(timeIST?' / '+timeIST+' IST':''):'';
  const ln=[];
  ln.push((m.name||'Untitled').toUpperCase());
  if(timeStr) ln.push('  When     : '+timeStr.trim());
  if(m.date&&!(m.isRecurring&&recurDayLabel)) ln.push('  Date     : '+fmtDate(m.date));
  if(m.status) ln.push('  Status   : '+m.status);
  if(m.venue) ln.push('  Venue    : '+m.venue);
  if(m.agenda) ln.push('  Agenda   : '+m.agenda);
  if((m.participants||[]).length) ln.push('  People   : '+m.participants.map(p=>p.name+(p.isExternal?' (ext)':'')).join(', '));
  if((m.remarks||[]).length){ ln.push('  Remarks:'); m.remarks.forEach(r=>ln.push('    - '+r.text)); }
  return ln.join('\n');
}

function taskToText(t){
  const ln=[];
  ln.push((t.title||'Untitled').toUpperCase());
  if(t.deadline_date) ln.push('  Deadline : '+t.deadline_date+(t.deadline_time?' '+t.deadline_time+' '+ukLabel()+(ukToIST(t.deadline_time)?' / '+ukToIST(t.deadline_time)+' IST':''):''));
  ln.push('  Status   : '+t.taskStatus);
  if(t.notes) ln.push('  Notes    : '+t.notes);
  if(t.isRecurring) ln.push('  Recurs   : '+(t.recurDaysOfWeek?.length?'every '+t.recurDaysOfWeek.join('/'):(t.recurFreq||'recurring')));
  return ln.join('\n');
}

function initScrollHeader(){
  let lastY=0;
  let scrollTimer=null;
  window.addEventListener('scroll',()=>{
    const y=window.scrollY||document.documentElement.scrollTop;
    // Collapse on scroll down past 80px
    if(y>80 && !_headerCollapsed && y>lastY){
      collapseHeader();
    }
    // Only expand when truly back at top — use debounce to avoid flicker
    if(y===0 && _headerCollapsed){
      clearTimeout(scrollTimer);
      scrollTimer=setTimeout(()=>{
        const cur=window.scrollY||document.documentElement.scrollTop;
        if(cur===0) expandHeader();
      }, 120);
    }
    lastY=y;
  },{passive:true});
}

let _storyTravelForms={};  // key: storyId+type → 'new'; storyId+type+'_edit' → entryId
let _storyTravelOpen={};   // entryId → bool
function addStoryTravel(sec,sid,type,data,archKey){
  const arr=getArr(sec,archKey); if(!arr) return;
  const s=arr.find(x=>x.id===sid); if(!s) return;
  if(!s.travel) s.travel=[];
  s.travel.push({id:genId(),type,data:{...data},created:Date.now()});
  s.updated=Date.now();
  saveAndPush(); render();
}
function updateStoryTravel(sec,sid,eid,data,archKey){
  const arr=getArr(sec,archKey); if(!arr) return;
  const s=arr.find(x=>x.id===sid); if(!s) return;
  const i=(s.travel||[]).findIndex(e=>e.id===eid);
  if(i>=0){s.travel[i]={...s.travel[i],data:{...s.travel[i].data,...data}};s.updated=Date.now();saveAndPush();render();}
}
function deleteStoryTravel(sec,sid,eid,archKey){
  const arr=getArr(sec,archKey); if(!arr) return;
  const s=arr.find(x=>x.id===sid); if(!s) return;
  s.travel=(s.travel||[]).filter(e=>e.id!==eid);
  s.updated=Date.now();
  saveAndPush(); render();
}
function moveStoryTravel(sec,sid,eid,dir,archKey){
  const arr=getArr(sec,archKey); if(!arr) return;
  const s=arr.find(x=>x.id===sid); if(!s||!s.travel) return;
  const i=s.travel.findIndex(e=>e.id===eid);
  if(dir==='up'&&i>0)[s.travel[i-1],s.travel[i]]=[s.travel[i],s.travel[i-1]];
  else if(dir==='down'&&i<s.travel.length-1)[s.travel[i],s.travel[i+1]]=[s.travel[i+1],s.travel[i]];
  s.updated=Date.now();
  saveAndPush(); render();
}
function copyStoryTravelTo(sec,sid,eid,archKey){
  const arr=getArr(sec,archKey); if(!arr) return;
  const s=arr.find(x=>x.id===sid); if(!s) return;
  const e=(s.travel||[]).find(x=>x.id===eid); if(!e) return;
  const name=prompt('Copy for which person?',''); if(!name||!name.trim()) return;
  s.travel.push({id:genId(),type:e.type,data:{...e.data,forName:name.trim()},created:Date.now()});
  s.updated=Date.now();
  saveAndPush(); render();
}

function exportTravelTxt(sec, storyId, archKey){
  const arr=getArr(sec,archKey);
  const story=arr?.find(s=>s.id===storyId);
  if(!story||!story.travel?.length){ toast('No travel entries to export'); return; }

  const hr='─'.repeat(48);
  const pad=(label,value)=>value?(label+':').padEnd(18)+value:'';
  const ln=[];

  ln.push('FIELD TRIP / TRAVEL DETAILS');
  ln.push(hr);
  ln.push(pad('Story',story.title||'Untitled'));
  if(story.correspondent) ln.push(pad('Correspondent',story.correspondent));
  if(story.location){
    const loc=[story.location,story.field_location].filter(Boolean).join(' — ');
    ln.push(pad('Location',loc));
  }
  ln.push(pad('Exported',new Date().toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})));
  ln.push('');

  // Group by person
  const byPerson={};
  story.travel.forEach(e=>{
    const name=(e.data?.forName||'(Unassigned)');
    if(!byPerson[name]) byPerson[name]=[];
    byPerson[name].push(e);
  });

  Object.entries(byPerson).forEach(([person,entries])=>{
    ln.push('');
    ln.push('PERSON: '+person);
    ln.push(hr);

    entries.forEach(e=>{
      const d=e.data||{};
      const icons={cab:'CAB',flight:'FLIGHT',hotel:'HOTEL',expense:'EXPENSE'};
      ln.push('');
      ln.push('  ['+icons[e.type]+']');

      if(e.type==='cab'){
        if(d.from||d.to)    ln.push(pad('  Route',[d.from,d.to].filter(Boolean).join(' → ')));
        if(d.when)           ln.push(pad('  When',new Date(d.when).toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})));
        if(d.driver)         ln.push(pad('  Driver',d.driver+(d.phone?' ('+d.phone+')':'')));
        if(d.cabNum)         ln.push(pad('  Cab No.',d.cabNum));
        if(d.notes)          ln.push(pad('  Notes',d.notes));
      } else if(e.type==='flight'){
        if(d.direction)      ln.push(pad('  Direction',d.direction==='return'?'Return':'Outbound'));
        if(d.from||d.to)     ln.push(pad('  Route',[d.from,d.to].filter(Boolean).join(' → ')));
        if(d.when)           ln.push(pad('  When',new Date(d.when).toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})));
        if(d.airline)        ln.push(pad('  Airline',d.airline));
        if(d.flightNum)      ln.push(pad('  Flight No.',d.flightNum));
        if(d.notes)          ln.push(pad('  Notes',d.notes));
      } else if(e.type==='hotel'){
        if(d.hotelName)      ln.push(pad('  Hotel',d.hotelName));
        if(d.where)          ln.push(pad('  Location',d.where));
        if(d.checkIn)        ln.push(pad('  Check-in',d.checkIn));
        if(d.checkOut)       ln.push(pad('  Check-out',d.checkOut));
        if(d.priceDay)       ln.push(pad('  Price/day',d.priceDay));
        if(d.payment)        ln.push(pad('  Payment',d.payment==='counter'?'At counter':'Paid'));
        if(d.notes)          ln.push(pad('  Notes',d.notes));
      } else if(e.type==='expense'){
        if(d.what)           ln.push(pad('  What',d.what));
        if(d.when)           ln.push(pad('  Date',d.when));
        if(d.where)          ln.push(pad('  Where',d.where));
        if(d.amount)         ln.push(pad('  Amount',d.amount));
        if(d.paidBy)         ln.push(pad('  Paid by',d.paidBy));
        if(d.paidUsing)      ln.push(pad('  Method',d.paidUsing));
        if(d.notes)          ln.push(pad('  Notes',d.notes));
      }
    });
  });

  // Expense summary
  const expenses=story.travel.filter(e=>e.type==='expense');
  if(expenses.length){
    ln.push('');
    ln.push('');
    ln.push('EXPENSE SUMMARY');
    ln.push(hr);
    expenses.forEach(e=>{
      const d=e.data||{};
      const row=[
        d.what||'—',
        d.amount||'—',
        d.paidBy?'by '+d.paidBy:'',
        d.paidUsing?'via '+d.paidUsing:'',
        d.when?'('+d.when+')':'',
      ].filter(Boolean).join('  ');
      ln.push('  '+row);
    });
  }

  ln.push('');
  ln.push(hr);
  ln.push('Generated by Newsroom Dashboard');

  const blob=new Blob([ln.join('\n')],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const slug=(story.title||'travel').toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,40);
  a.href=url; a.download='travel-'+slug+'.txt';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),2000);
  toast('Travel details downloaded ✓');
}

════════════════════════════════════════ */
function deadlineBadge(s){
  if(!s.deadline_date) return '';
  if(s.status==='completed') return ''; // completed items never show overdue
  const dl=s.deadline_date+(s.deadline_uk?' '+s.deadline_uk:'');
  const diff=new Date(dl).getTime()-Date.now();
  const abs=Math.abs(diff), mins=Math.round(abs/60000);
  let txt;
  if(mins<60)    txt=(diff<0?'Overdue ':' Due ')+mins+'m';
  else if(mins<1440) txt=(diff<0?'Overdue ':' Due ')+Math.round(mins/60)+'h';
  else           txt=(diff<0?'Overdue ':' Due ')+Math.round(mins/1440)+'d';
  return `<span class="deadline-badge${diff<0?' overdue':''}"><span class="badge-dot" style="background:${diff<0?'#B91C1C':'#B45309'}"></span>${txt}</span>`;
}
function upcomingDueBadge(s){
  if(!s.expected_date) return '';
  const today=todayStr();
  if(s.expected_date<today) return `<span class="deadline-badge overdue">⚠ Overdue expected</span>`;
  if(s.expected_date===today) return `<span class="deadline-badge">📅 Due today</span>`;
  const diff=new Date(s.expected_date+'T00:00:00').getTime()-Date.now();
  const days=Math.ceil(diff/86400000);
  return `<span class="upcoming-due-badge">📅 in ${days}d</span>`;
}

/* ════════════════════════════════════════
   DATE STRIP
════════════════════════════════════════ */
function renderDateStrip(){
  const strip=document.getElementById('date-strip'); if(!strip) return;
  const today=todayStr();
  const yest=yesterdayStr(), tomm=tomorrowStr();

  // Build a complete set of day keys for the last 30 days so no day is missing.
  // Archive entries that exist are used as-is; missing days get stub 0-count pills.
  const allKeys=new Set(sortedArchiveKeys());
  for(let i=2;i<=30;i++){
    const d=addDays(today,-i);
    if(d!==yest&&d!==tomm) allKeys.add(d);
  }
  // Keep week/month keys too but filter plain dates to recent ones only
  const keys=[...allKeys].filter(k=>{
    if(k.startsWith('week-')||k.startsWith('month-')) return true;
    return k<today&&k!==yest&&k!==tomm; // plain dates older than yesterday
  }).sort((a,b)=>{
    const df=k=>k.startsWith('week-')?k.slice(5):k.startsWith('month-')?k.slice(6)+'-01':k;
    return df(b).localeCompare(df(a));
  });

  const todayActive=ui.view==='today';
  const yestActive=ui.view==='archive'&&ui.archiveKey===yest;
  const tommActive=ui.view==='archive'&&ui.archiveKey===tomm;
  const todayCount=SECTIONS.reduce((s,sec)=>s+(state.sections[sec.key]?.filter(x=>!x._deleted).length||0),0);
  const yestCount=state.archive[yest]?archiveStoryCount(yest):0;
  const tommCount=state.archive[tomm]?archiveStoryCount(tomm):0;
  let html='';
  html+=`<div class="dpill dp-yesterday${yestActive?' dp-active':''}" onclick="setView('archive','${yest}')" title="Yesterday">◀ Yesterday<span class="dpill-count">${yestCount}</span></div>`;
  html+=`<div class="dpill dp-today${todayActive?' dp-active':''}" onclick="setView('today',null)">● Today<span class="dpill-count">${todayCount}</span></div>`;
  html+=`<div class="dpill dp-tomorrow${tommActive?' dp-active':''}" onclick="setView('archive','${tomm}')" title="Tomorrow">Tomorrow ▶<span class="dpill-count">${tommCount}</span></div>`;
  const older=keys.filter(k=>k!==yest&&k!==tomm&&k!==today);
  if(older.length){
    html+=`<div class="dpill-sep"></div>`;
    older.forEach(key=>{
      const cnt=state.archive[key]?archiveStoryCount(key):0;
      const active=ui.view==='archive'&&ui.archiveKey===key;
      const cls=key.startsWith('week-')?' dp-week':key.startsWith('month-')?' dp-month':' dp-date';
      html+=`<div class="dpill${cls}${active?' dp-active':''}" onclick="setView('archive','${key}')" title="${archiveLabel(key)}">${archiveShortLabel(key)}<span class="dpill-count">${cnt}</span></div>`;
    });
  }
  html+=`<div style="flex-shrink:0;width:18px"></div>`;
  strip.innerHTML=html;
  setTimeout(()=>{ const ac=strip.querySelector('.dp-active'); if(ac&&!todayActive) ac.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); },80);
}

function storyMatchesSearch(s, q){
  const fields=[
    s.title, s.correspondent, s.producer, s.shoot_edit,
    s.location, s.field_location, s.remarks, s.req_name,
    s.req_team, s.detail, s.links,
    (s.remarksList||[]).map(r=>r.text).join(' '),
    s.completion_note,
  ];
  return fields.some(f=>(f||'').toLowerCase().includes(q));
}
function sectionMatchesSearch(sec, q){
  // Allow searching by section name — e.g. "ibu", "other stories", "requests", "note"
  const names=['ibu','other stories','other','requests','upcoming','note','notes','remarks','tasks','leaves'];
  const secMap={
    ibu:['ibu','india business'],
    other:['other','other stories'],
    requests:['request','requests','future'],
    upcoming:['upcoming'],
    notes:['note','notes','remarks'],
    tasks:['task','tasks'],
    leaves:['leave','leaves'],
  };
  for(const [key,terms] of Object.entries(secMap)){
    if(terms.some(t=>t.includes(q)||q.includes(t))) return key;
  }
  return null;
}
function renderSearchHTML(){
  const q=(ui.search||'').trim().toLowerCase();
  if(!q) return `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-msg">Start typing to search</div></div>`;

  const today=todayStr();
  const results=[]; // [{dateLabel, dateKey, section, sectionLabel, story, type}]

  // Helper: friendly date label
  const dlabel=key=>{
    if(!key||key==='today') return 'Today';
    if(key===yesterdayStr()) return 'Yesterday';
    if(key===tomorrowStr()) return 'Tomorrow';
    return archiveLabel(key);
  };

  // Check if query matches a section name — show all stories from that section across all dates
  const secHit=sectionMatchesSearch('',q);

  // ── Today ──
  SECTIONS.forEach(sec=>{
    if(sec.isUpcoming||sec.hidden) return;
    const arr=(state.sections[sec.key]||[]).filter(s=>!s._deleted);
    arr.forEach(s=>{
      if(secHit===sec.key || storyMatchesSearch(s,q)){
        results.push({dateKey:'today',dateLabel:'Today',sec:sec.key,secLabel:secName(sec.key),story:s,type:'story'});
      }
    });
  });
  // Upcoming (today)
  (state.sections.upcoming||[]).filter(s=>!s._deleted).forEach(s=>{
    if(secHit==='upcoming'||storyMatchesSearch(s,q)){
      results.push({dateKey:'today',dateLabel:'Today (Upcoming)',sec:'upcoming',secLabel:'Upcoming',story:s,type:'story'});
    }
  });
  // Notes
  if(secHit==='notes'||(state.notes||[]).some(n=>(n.text||'').toLowerCase().includes(q))){
    (state.notes||[]).filter(n=>secHit==='notes'||(n.text||'').toLowerCase().includes(q)).forEach(n=>{
      results.push({dateKey:'today',dateLabel:'Today',sec:'notes',secLabel:'Note',note:n,type:'note'});
    });
  }
  // Tasks
  if(secHit==='tasks'||(state.tasks||[]).some(t=>(t.title||'').toLowerCase().includes(q)||(t.notes||'').toLowerCase().includes(q))){
    (state.tasks||[]).filter(t=>secHit==='tasks'||(t.title||'').toLowerCase().includes(q)||(t.notes||'').toLowerCase().includes(q)).forEach(t=>{
      results.push({dateKey:'today',dateLabel:'Today',sec:'tasks',secLabel:'Tasks',task:t,type:'task'});
    });
  }
  // Leaves
  if(secHit==='leaves'||(state.leaves||[]).some(l=>(l.employeeName||'').toLowerCase().includes(q)||(l.reason||'').toLowerCase().includes(q))){
    (state.leaves||[]).filter(l=>secHit==='leaves'||(l.employeeName||'').toLowerCase().includes(q)||(l.reason||'').toLowerCase().includes(q)).forEach(l=>{
      results.push({dateKey:'today',dateLabel:'Leaves',sec:'leaves',secLabel:'Leave Tracker',leave:l,type:'leave'});
    });
  }

  // ── Archive ──
  Object.keys(state.archive).sort((a,b)=>b.localeCompare(a)).forEach(archKey=>{
    const entry=state.archive[archKey]; if(!entry) return;
    SECTIONS.forEach(sec=>{
      const arr=(entry.sections?.[sec.key]||[]).filter(s=>!s._deleted);
      arr.forEach(s=>{
        if(secHit===sec.key||storyMatchesSearch(s,q)){
          results.push({dateKey:archKey,dateLabel:dlabel(archKey),sec:sec.key,secLabel:secName(sec.key),story:s,type:'story',archKey});
        }
      });
    });

  if(!results.length){
    return`<div style="padding:24px 0">
      <div class="view-header" style="border:none;padding:0;margin-bottom:20px">

        </div>`;
      } else if(r.type==='leave'&&r.leave){
        const l=r.leave;
        html+=`<div style="padding:11px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;border-left:3px solid ${l.status==='approved'?'var(--done)':'var(--progress)'}">

        </div>`;
      }
    });
    html+=`</div>`;

  html+=`</div>`;

}

    html+=`<div style="background:rgba(99,102,241,.06);border:0.5px solid rgba(99,102,241,.25);border-radius:8px;padding:9px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;">
      <span style="font-size:12.5px;color:#3730A3;font-family:var(--font);">${_eodN} stor${_eodN===1?'y':'ies'} still active — end of day approaching (${eodH}:00 IST)</span>

      </div>
    </div>`;
  }
  // On desktop and mobile: all main sections + Upcoming show on Today page

  SECTIONS.filter(s=>!s.isUpcoming&&!s.hidden).forEach(sec=>{ html+=renderAccordion(sec,null); });

function renderUpcomingView(){
  const today=todayStr();
  const sec=SECTIONS.find(s=>s.key==='upcoming');
  const archKeyJS='null';
  let html='';
  const cur=ui.upcomingDate||today;

  if(cur!==today){
    // Past date — show archived entries with full CRUD
    const entries=((state.archive[cur]?.sections?.upcoming)||[]).filter(s=>!s._deleted);
    if(!entries.length){
      html+=`<div class="empty-state"><div class="empty-icon">🗓</div><div class="empty-msg">No upcoming events on this date</div></div>`;
    } else {
      html+=`<div style="font-size:11px;font-family:var(--font);color:var(--text3);margin-bottom:8px;letter-spacing:.6px">${entries.length} upcoming event${entries.length===1?'':'s'} archived on this date</div>`;
      entries.forEach(s=>{ html+=renderUpcomingRow('upcoming',s,cur); });
    }
  } else {
    // Today — render entries directly (no accordion wrapper needed on dedicated tab)
    const stories=getStories('upcoming',null);
    const fKey='upcoming';
    const isFormOpen=ui.openForms.has(fKey);

    html+=`<div class="acc-header" style="border-radius:10px 10px 0 0;border:0.5px solid var(--border);border-bottom:0">
      <span class="acc-icon">🗓</span>
      <span class="acc-name">Upcoming Events</span>
      <div class="acc-meta">
        <span class="sbadge sb-in-progress">${stories.filter(s=>s.status!=='completed'&&(!s.expected_date||s.expected_date>=today)).length} pending</span>
      </div>
    </div>
    <div style="border:0.5px solid var(--border);border-top:0;border-radius:0 0 10px 10px;padding:12px 16px 14px;margin-bottom:14px;">
      <div style="display:flex;justify-content:flex-end;gap:6px;margin-bottom:10px;">
        <button class="btn btn-ghost btn-sm" onclick="doEmailSection('upcoming',null)">✉ Email</button>
        <button class="btn btn-ghost btn-sm" onclick="doExportSectionTxt('upcoming',null)">⬇ Export</button>
        <button class="btn btn-accent btn-sm" onclick="toggleForm('upcoming',null)">+ Add</button>
      </div>`;

    if(isFormOpen) html+=renderForm('upcoming',null);

    // Bucket logic — same as renderAccordion for upcoming
    const activeUpcoming = stories.filter(s=>
      s.status!=='completed' &&
      (!s.expected_date || s.expected_date >= today)
    );
    const completedUpcoming = stories.filter(s=>s.status==='completed');
    const expiredUpcoming = stories
      .filter(s=>s.expected_date && s.expected_date < today && s.status!=='completed')
      .sort((a,b)=>(b.expected_date||'').localeCompare(a.expected_date||''));

    const allActive=[...activeUpcoming,...completedUpcoming];

    if(!allActive.length && !isFormOpen && !expiredUpcoming.length){
      html+=`<div class="empty-state"><div class="empty-icon">🗓</div><div class="empty-msg">No upcoming events yet — click <strong>+ Add</strong></div></div>`;
    } else {
      allActive.forEach(s=>{ html+=renderCard('upcoming',s,null); });
    }

    if(expiredUpcoming.length){
      html+=`<div style="border-top:1px dashed var(--border);padding-top:8px;margin-top:8px">
        <div style="font-size:11px;font-family:var(--font);color:var(--text3);margin-bottom:6px">📁 ${expiredUpcoming.length} expired</div>
        ${expiredUpcoming.map(s=>renderCard('upcoming',s,null)).join('')}
      </div>`;
    }
  }
  if(html.includes('border-top:0;border-radius:0 0')) html+='</div>'; // close content wrapper
  return`<div style="padding-bottom:80px">${html}</div>`;
}

function renderArchiveHTML(key){
  if(!key){ return `<div class="empty-state"><div class="empty-icon">📂</div><div class="empty-msg">Select a date above.</div></div>`; }
  const isYest=key===yesterdayStr(), isTomm=key===tomorrowStr();
  if(!state.archive[key]){
    if(isTomm){ state.archive[key]={type:'day',label:archiveLabel(key),sections:{ibu:[],other:[],requests:[],upcoming:[]},notes:'',created:Date.now()}; saveLocal(); }
    else return `<div class="view-header vh-archive"><div><div class="avh-label">Archive</div><div class="avh-title">${archiveLabel(key)}</div><div class="avh-meta">No data for this date.</div></div><div class="avh-actions"><button class="btn btn-ghost btn-sm" onclick="setView('today',null)">← Today</button></div></div>`;
  }
  const cnt=archiveStoryCount(key);
  const vhClass=isTomm?'vh-tomorrow':isYest?'vh-yesterday':'vh-archive';
  const lbl=isTomm?'Tomorrow — Pre-planning':isYest?"Yesterday's Board":'Archive';
  let html=`<div class="view-header ${vhClass}">
    <div>
      <div class="avh-label">${lbl}</div>
      <div class="avh-title">${archiveLabel(key)}</div>

    </div>
    <div class="avh-actions">
      <button class="btn btn-ghost btn-sm" onclick="doEmailAll()">✉ Email</button>
      <button class="btn btn-ghost btn-sm" onclick="doExportTxt()">⬇ Export</button>
      ${!isTomm?`<button class="btn btn-ghost btn-sm btn-danger" onclick="deleteArchiveEntry('${key}')">🗑 Delete</button>`:''}
    </div>
  </div>`;
  if(isTomm) html+=`<div style="background:rgba(13,148,136,.07);border:1px solid rgba(13,148,136,.2);border-radius:8px;padding:10px 16px;margin-bottom:14px;font-size:12.5px;color:var(--tomorrow)">📋 <strong>Pre-planning for tomorrow.</strong> Use <strong>⇄ Migrate</strong> to send today's stories here.</div>`;
  SECTIONS.forEach(sec=>{ html+=renderAccordion(sec,key); });

  // Show any notes that were logged on this date (resolved notes archived here)
  const notesLog=state.archive[key]?.notesLog||[];
  const tasksLog=state.archive[key]?.tasksLog||[];
  if(notesLog.length||tasksLog.length){
    const statusLabel=n=>n._deleted?'🗑 Deleted':n.status==='done'?'✅ Done':n.status==='pass'||n.status==='passed'?'↪ Passed':'📌 Active';
    const cardCls=n=>n._deleted?'note-pass':n.status==='done'?'note-done':n.status==='pass'||n.status==='passed'?'note-pass':'';
    html+=`<div class="accordion">
      <div class="acc-header" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.acc-chevron').classList.toggle('open')">
        <span class="acc-icon">📝</span>
        <span class="acc-name">Notes on this day</span>
        <span style="font-size:10px;font-family:var(--font);color:var(--text3);margin-left:8px">${notesLog.length} note${notesLog.length===1?'':'s'}</span>
        <span class="acc-chevron">▾</span>
      </div>
      <div class="acc-body" style="display:flex;flex-direction:column;gap:6px">
        ${notesLog.map(n=>{
          // Use live note from state.notes if it still exists, else use snapshot
          const live=(state.notes||[]).find(x=>x.id===n.id);
          const nd=live||n;
          const isLive=!!live&&!nd._deleted;
          const sLabel=statusLabel(nd);
          const cCls=cardCls(nd);
          const created=nd.created?new Date(nd.created).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})+' · ':'';
          return`<div class="note-card ${cCls}" style="margin-bottom:0">
            <div class="note-text" style="text-decoration:${nd.status==='done'||nd._deleted?'line-through':''};white-space:pre-wrap">${esc(nd.text)}</div>
            <div class="note-meta">
              <span>${created}${sLabel}</span>
              ${nd.deadline_date?`<span>📅 ${fmtDate(nd.deadline_date)}</span>`:''}
            </div>
            ${isLive?`<div class="note-btns" style="margin-top:6px">
              ${nd.status!=='done'?`<button class="btn btn-done-active btn-sm" onclick="setNoteStatus('${nd.id}','done')">✅ Done</button>`:''}
              ${nd.status==='active'?`<button class="btn btn-ghost btn-sm" style="color:var(--text3)" onclick="setNoteStatus('${nd.id}','pass')">↪ Pass</button>`:''}
              ${nd.status!=='active'?`<button class="btn btn-ghost btn-sm" onclick="updateNote('${nd.id}',{status:'active',resolvedOn:null});render()">↩ Restore</button>`:''}

          const live=(state.tasks||[]).find(x=>x.id===t.id);

          const isLive=!!live&&!td._deleted;
          const isOpen2=ui_openTasks.has(td.id);
          const st2=td._deleted?'🗑 Deleted':td.taskStatus==='done'?'✅ Done':td.taskStatus==='not-done'?'⚫ Not Done':td.taskStatus==='transferred'?'⇄ Transferred':'⏳ Pending';

              <div style="font-size:10.5px;color:var(--text3);font-family:var(--font)">Task · ${st2}${td.deadline_date?' · '+fmtDate(td.deadline_date):''}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  html+=`<div class="accordion"><div class="acc-header" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.acc-chevron').classList.toggle('open')"><span class="acc-icon">📓</span><span class="acc-name">Free notes</span><span class="acc-chevron">▾</span></div><div class="acc-body"><textarea class="remarks-area" style="min-height:120px" placeholder="Notes for this entry…" oninput="updateArchiveNotes('${key}',this.value)">${esc(state.archive[key]?.notes||'')}</textarea></div></div>`;
  return html;
}

function getMigrateSourceSections(){

    } else {
      result[sec.key]=(state.sections[sec.key]||[]).filter(s=>!s._deleted);

        html+=`<div class="migrate-story-row${sel?' msr-selected':''}" id="msr-${sk2}" onclick="toggleMigrateStory('${k}')">

/* ─── ACCORDION ─── */
function buildCombinedStoriesHTML(archKey){
  const tab=ui.combinedSubTab||'all';
  const ibuArr=((archKey?state.archive[archKey]?.sections?.ibu:state.sections.ibu)||[]).filter(s=>!s._deleted);
  const otherArr=((archKey?state.archive[archKey]?.sections?.other:state.sections.other)||[]).filter(s=>!s._deleted);
  // Apply search + filter to each
  const filterArr=(arr)=>{
    let a=arr.filter(s=>s.status!=='shelved');
    if(ui.search){ const q=ui.search.toLowerCase(); a=a.filter(s=>(s.title||'').toLowerCase().includes(q)||(s.correspondent||'').toLowerCase().includes(q)||(s.producer||'').toLowerCase().includes(q)||(s.shoot_edit||'').toLowerCase().includes(q)||(s.remarks||'').toLowerCase().includes(q)); }
    if(ui.filter==='working')  return a.filter(s=>s.mode==='working');
    if(ui.filter==='watching') return a.filter(s=>s.mode==='watching');
    if(ui.filter!=='all')      return a.filter(s=>s.status===ui.filter);
    return a;
  };
  const ibuFiltered=filterArr(ibuArr).map(s=>({...s,_subsec:'ibu'}));
  const otherFiltered=filterArr(otherArr).map(s=>({...s,_subsec:'other'}));
  let stories=[];
  if(tab==='ibu')   stories=ibuFiltered;
  else if(tab==='other') stories=otherFiltered;
  else stories=[...ibuFiltered,...otherFiltered];

  if(!stories.length) return`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-msg">No stories here — click <strong>+ Add</strong></div></div>`;
  return stories.map(s=>renderCard(s._subsec||'ibu',s,archKey)).join('');
}

function renderAccordion(sec,archKey){
  const secObj=SECTIONS.find(s=>s.key===sec.key)||sec;
  // Skip hidden sections (they're rendered inside the combined accordion)
  if(secObj.hidden) return '';

  if(secObj.isCombined) return renderCombinedAccordion(archKey);

  const displayName=secName(sec.key);
  const all=((archKey?state.archive[archKey]?.sections[sec.key]:state.sections[sec.key])||[]).filter(s=>!s._deleted);
  const stories=secObj.hasWW?getStoriesWW(sec.key,archKey):getStories(sec.key,archKey);
  const isOpen=ui.openSections.has(sec.key);
  const fKey=sec.key+(archKey?'::'+archKey:'');
  const isFormOpen=ui.openForms.has(fKey);
  const activeStories=all.filter(s=>s.status!=='shelved');
  let summary;
  if(secObj.isUpcoming&&activeStories.length>0){
    // Collapsed ribbon: "X pending · Y done · Z expired"
    const today2=todayStr();
    const pendingCnt=activeStories.filter(s=>s.status!=='completed'&&s.status!=='passed'&&s.status!=='not-done'&&(!s.expected_date||s.expected_date>=today2)).length;
    const doneCnt=activeStories.filter(s=>s.status==='completed').length;
    const expiredCnt=activeStories.filter(s=>s.expected_date&&s.expected_date<today2&&s.status!=='completed').length;
    const parts=[];
    if(pendingCnt) parts.push(pendingCnt+' pending');
    if(doneCnt)    parts.push(doneCnt+' done');
    if(expiredCnt) parts.push(expiredCnt+' expired');
    summary=parts.join(' · ')||'No active events';
  } else {
    summary=activeStories.length>0?activeStories.slice(0,2).map(s=>s.title||'Untitled').join(' · '):'No stories yet';
  }
  const uc=activeStories.filter(s=>s.status==='urgent').length;
  const ic=activeStories.filter(s=>s.status==='in-progress').length;
  const cc=activeStories.filter(s=>s.carriedForward&&s.status!=='completed'&&s.status!=='on-hold').length;
  const shelvedCount=all.filter(s=>s.status==='shelved').length;
  const notDoneCount=all.filter(s=>s.status==='not-done').length;
  const postponedCount=all.filter(s=>s.status==='postponed').length;
  const workCnt=secObj.hasWW?activeStories.filter(s=>s.mode==='working').length:0;
  const watchCnt=secObj.hasWW?activeStories.filter(s=>s.mode==='watching').length:0;
  const showShelved=ui.showShelved.has(sec.key);
  const archKeyJS=archKey?`'${archKey}'`:'null';
  let html=`<div class="accordion${isOpen?' acc-open':''}" id="acc-${sec.key}">
    <div class="acc-header" onclick="toggleAccordion('${sec.key}')">
      <span class="acc-icon">${sec.icon}</span>
      <span class="acc-name">${esc(displayName)}</span>
      ${secObj.renameable&&!archKey?`<button class="btn btn-ghost btn-xs" style="flex-shrink:0;padding:2px 7px;font-size:10px;color:var(--text3)" onclick="event.stopPropagation();startRename('${sec.key}')" title="Rename section">✏ Rename</button>`:''}
      <span class="acc-summary">${(()=>{ if(!activeStories.length)return ''; const today=todayStr(); const sorted=activeStories.slice().sort((a,b)=>{ const da=a.deadline_date?Math.abs(new Date(a.deadline_date+'T00:00:00').getTime()-new Date(today+'T00:00:00').getTime()):Infinity; const db=b.deadline_date?Math.abs(new Date(b.deadline_date+'T00:00:00').getTime()-new Date(today+'T00:00:00').getTime()):Infinity; if(da!==db)return da-db; return (b.created||0)-(a.created||0); }); return esc(sorted[0].title||''); })()}</span>
      <div class="acc-meta">
        ${activeStories.length?`<span class="sbadge sb-in-progress">${activeStories.length} pending</span>`:''}
      </div>
      <span class="acc-chevron${isOpen?' open':''}" id="acc-chev-${sec.key}">▾</span>
    </div>
    <div class="acc-body${isOpen?' open':''}" id="acc-body-${sec.key}">`;
  {
    const wwf=ui.wwFilter[sec.key]||'all';
    const wwTabs=secObj.hasWW&&!archKey
      ? `<button class="ww-tab wt-all${wwf==='all'?' wt-active':''}" data-sec="${sec.key}" data-val="all" onclick="setWWFilter('${sec.key}','all')">All</button>
         <button class="ww-tab wt-working${wwf==='working'?' wt-active':''}" data-sec="${sec.key}" data-val="working" onclick="setWWFilter('${sec.key}','working')">▶ Working</button>
         <button class="ww-tab wt-watching${wwf==='watching'?' wt-active':''}" data-sec="${sec.key}" data-val="watching" onclick="setWWFilter('${sec.key}','watching')">👁 Watching</button>`
      : '';
    html+=`<div class="sec-head" style="flex-wrap:wrap;gap:6px;align-items:center">
      ${wwTabs}
      <div style="margin-left:auto;display:flex;gap:6px;flex-shrink:0">
        <button class="btn btn-ghost btn-sm" onclick="doEmailSection('${sec.key}',${archKeyJS});event.stopPropagation()">✉ Email</button>
        <button class="btn btn-ghost btn-sm" onclick="doExportSectionTxt('${sec.key}',${archKeyJS});event.stopPropagation()">⬇ Export</button>
        <button class="btn btn-accent btn-sm" onclick="toggleForm('${sec.key}',${archKeyJS});event.stopPropagation()">+ Add</button>
      </div>
    </div>`;
  }

  html+=`<div id="stories-wrap-${sec.key}">`;
  if(isFormOpen) html+=renderForm(sec.key,archKey);

  if(secObj.isUpcoming){
    const today=todayStr();
    // Buckets:
    // 1. active    — not completed, expected_date >= today (or no date)
    // 2. completed — faded + struck-through at bottom, sorted by completedOn desc
    // 3. expired   — past expected_date, not completed — faded at bottom
    const activeUpcoming = stories.filter(s=>
      s.status!=='completed' &&
      (!s.expected_date || s.expected_date >= today)
    );
    const completedUpcoming = stories
      .filter(s => s.status === 'completed')
      .sort((a,b) => (b.completedOn||b.created||0)-(a.completedOn||a.created||0));
    const expiredUpcoming = stories
      .filter(s => s.expected_date && s.expected_date < today && s.status !== 'completed')
      .sort((a,b) => (b.expected_date||'').localeCompare(a.expected_date||''));

    if(!activeUpcoming.length && !isFormOpen && !completedUpcoming.length && !expiredUpcoming.length){
      html+=`<div class="empty-state"><div class="empty-icon">🗓</div><div class="empty-msg">No upcoming events yet — click <strong>+ Add</strong></div></div>`;
    } else {
      const upcomingLimit=ui_upcomingPage*10;
      const visibleUpcoming=activeUpcoming.slice(0,upcomingLimit);
      visibleUpcoming.forEach(s=>{ html+=renderCard(sec.key,s,archKey); });
      if(activeUpcoming.length>upcomingLimit){
        const upRemaining=activeUpcoming.length-upcomingLimit;
        html+=`<div style="text-align:center;padding:10px 14px;border-top:0.5px dashed var(--border);margin-top:4px">
          <button class="btn btn-ghost btn-sm" onclick="showMoreUpcoming();event.stopPropagation()" style="color:var(--week);border-color:rgba(99,102,241,.3);font-size:12px">
            ↓ Show 10 more <span style="opacity:.6;font-family:var(--mono);font-size:11px">(${upRemaining} remaining)</span>
          </button>
        </div>`;
      }
    }

    // Completed entries — faded, struck-through, sorted newest first
    if(completedUpcoming.length){
      html+=`<div style="border-top:1px dashed var(--border);padding-top:8px;margin-top:8px">
        <div style="font-size:11px;font-family:var(--font);color:var(--done);margin-bottom:6px">✅ ${completedUpcoming.length} completed</div>
        ${completedUpcoming.map(s=>renderCard(sec.key,s,archKey)).join('')}
      </div>`;
    }

    // Expired entries — past date, not completed — faded at bottom
    if(expiredUpcoming.length){
      html+=`<div style="border-top:1px dashed var(--border);padding-top:8px;margin-top:8px">
        <div style="font-size:11px;font-family:var(--font);color:var(--text3);margin-bottom:6px">📁 ${expiredUpcoming.length} expired</div>
        ${expiredUpcoming.map(s=>renderCard(sec.key,s,archKey)).join('')}
      </div>`;
    }
  } else {
    if(!stories.length&&!isFormOpen) html+=`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-msg">No stories yet — click <strong>+ Add</strong></div></div>`;
    else {
      const _live=stories.filter(s=>!['completed','not-done'].includes(s.status));
      const _done=stories.filter(s=>['completed','not-done'].includes(s.status));
      if(_live.length){ _live.forEach(s=>{ html+=renderCard(sec.key,s,archKey); }); }
      else html+='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-msg">No active entries</div></div>';
      if(_done.length){
        html+=`<div style="font-size:11px;font-family:var(--font);font-weight:500;color:var(--text3);padding:6px 0 4px;margin-top:4px;border-top:1px dashed var(--border)">✓ ${_done.length} done / not done</div>`;
        _done.forEach(s=>{ html+=renderCard(sec.key,s,archKey); });
      }
    }

    // Shelved ribbon — always visible, displayed below active stories
    if(shelvedCount>0){
      html+=`<div style="border-top:1px solid var(--border);padding-top:8px;margin-top:4px">`;
      html+=`<div style="font-size:11px;font-family:var(--font);color:var(--text3);margin-bottom:6px">🗄 Shelved (${shelvedCount})</div>`;
      html+=`<div class="shelved-section">`;
      all.filter(s=>s.status==='shelved').forEach(s=>{ html+=renderCard(sec.key,s,archKey); });
      html+=`</div></div>`;
    }
  }

  html+=`</div></div></div>`;  // close stories-wrap, acc-body, accordion
  return html;
}

let ui_taskForm=false; // is the add-task form open?
let ui_editTaskId=null;
let ui_openTasks=new Set();
let ui_taskPage=1;   // how many batches of 10 to show

function addTask(data){
  if(!state.tasks) state.tasks=[];
  const id=genId();
  const today=todayStr();
  const t={...data, id, created:Date.now(), taskStatus:'pending', carriedForward:false, carriedFromDate:null, carriedDays:0};
  state.tasks.push(t);

  // Log to today's archive so it always appears when browsing that date
  if(!state.archive[today]){
    state.archive[today]={type:'day',label:archiveLabel(today),sections:{},notes:'',created:Date.now()};
    SECTIONS.forEach(s=>{state.archive[today].sections[s.key]=[];});
  }
  if(!state.archive[today].tasksLog) state.archive[today].tasksLog=[];
  if(!state.archive[today].tasksLog.some(x=>x.id===id)){
    state.archive[today].tasksLog.push({...t});
  }
  saveAndPush();
}
function updateTask(id,data){
  if(!state.tasks) return;
  const i=state.tasks.findIndex(t=>t.id===id);
  if(i>=0){ state.tasks[i]={...state.tasks[i],...data, updated:Date.now()}; saveAndPush(); }
}
function deleteTask(id){
  const task=(state.tasks||[]).find(t=>t.id===id); if(!task) return;

  // Archive to creation date before permanent deletion
  const createdDate=task.carriedFromDate||(task.created?dateStr(new Date(typeof task.created==='number'?task.created:parseInt(task.created))):todayStr());
  if(!state.archive[createdDate]){
    state.archive[createdDate]={type:'day',label:archiveLabel(createdDate),sections:{},notes:'',created:Date.now()};
    SECTIONS.forEach(s=>{state.archive[createdDate].sections[s.key]=[];});
  }
  if(!state.archive[createdDate].tasksLog) state.archive[createdDate].tasksLog=[];
  if(!state.archive[createdDate].tasksLog.some(t=>t.id===id)){
    state.archive[createdDate].tasksLog.push({...task, deletedOn:Date.now(), _deleted:true});
  }

  state.tasks=state.tasks.filter(t=>t.id!==id);
  if(!state.deletedIds) state.deletedIds={};
  if(!state.deletedIds.tasks) state.deletedIds.tasks=[];
  if(!state.deletedIds.tasks.includes(id)) state.deletedIds.tasks.push(id);
  ui_openTasks.delete(id);
  saveAndPush(); renderDateStrip(); render();
}
function nextRecurrenceDate(task){
  const base=task.deadline_date||todayStr();
  const d=new Date(base+'T00:00:00');
  if(task.recurFreq==='daily'){
    d.setDate(d.getDate()+1);
  } else if(task.recurFreq==='weekly'){
    d.setDate(d.getDate()+7);
  } else if(task.recurFreq==='monthly'){
    d.setMonth(d.getMonth()+1);
  } else if(task.recurFreq==='custom' && task.recurDays>0){
    d.setDate(d.getDate()+parseInt(task.recurDays));
  }
  return dateStr(d);
}
function recurIntervalDays(task){
  if(task.recurFreq==='daily') return 1;
  if(task.recurFreq==='weekly') return 7;
  if(task.recurFreq==='monthly') return 30; // approximate
  if(task.recurFreq==='custom'&&task.recurDays>0) return parseInt(task.recurDays);
  return 7; // fallback
}
function mostRecentRecurOccurrence(task, today){
  // Returns the most recent expected occurrence date on or before today
  const base=task.deadline_date||today;
  if(base>=today) return base; // not yet overdue
  const interval=recurIntervalDays(task);
  const baseMs=new Date(base+'T00:00:00').getTime();
  const todayMs=new Date(today+'T00:00:00').getTime();
  const daysDiff=Math.floor((todayMs-baseMs)/86400000);
  const periods=Math.floor(daysDiff/interval);
  const mostRecentMs=baseMs+(periods*interval*86400000);
  return dateStr(new Date(mostRecentMs));
}

function setTaskStatus(id, status, postponeTo){
  const upd={taskStatus:status};
  if(status==='done'){ upd.carriedForward=false; upd.doneAt=Date.now(); }
  if(status==='not-done'){ upd.carriedForward=false; upd.notDoneOn=Date.now(); }
  if(status==='pending'){ upd.carriedForward=false; upd.carriedDays=0; upd.carriedFromDate=null; }
  if(status==='postponed-to'&&postponeTo){ upd.postponeTo=postponeTo; }
  updateTask(id,upd);

  // Update archive log entry for this task on its creation date
  const task=(state.tasks||[]).find(t=>t.id===id);
  if(task){
    const createdDate=task.carriedFromDate||(task.created?dateStr(new Date(typeof task.created==='number'?task.created:parseInt(task.created))):todayStr());
    if(!state.archive[createdDate]){
      state.archive[createdDate]={type:'day',label:archiveLabel(createdDate),sections:{},notes:'',created:Date.now()};
      SECTIONS.forEach(s=>{state.archive[createdDate].sections[s.key]=[];});
    }
    if(!state.archive[createdDate].tasksLog) state.archive[createdDate].tasksLog=[];
    const li=state.archive[createdDate].tasksLog.findIndex(x=>x.id===id);
    const updatedTask={...task,...upd};
    if(li>=0) state.archive[createdDate].tasksLog[li]=updatedTask;
    else state.archive[createdDate].tasksLog.push(updatedTask);
    saveAndPush();
  }

  // If recurring task marked done — auto-create next occurrence
  if(status==='done'){
    const task2=(state.tasks||[]).find(t=>t.id===id);
    if(task2&&task2.isRecurring&&task2.recurFreq){
      const nextDate=nextRecurrenceDate(task2);
      const newTask={
        title:       task2.title,
        notes:       task2.notes||'',
        deadline_date: nextDate,
        reminder:    task2.reminder||'off',
        isRecurring: true,
        recurFreq:   task2.recurFreq,
        recurDays:   task2.recurDays||0,
        recurLabel:       task2.recurLabel||'',
        recurDaysOfWeek:  task2.recurDaysOfWeek||[],
      };
      addTask(newTask);
      toast('✓ Done — next occurrence created for '+nextDate);
    }
  }
  render();
}

      <button class="btn btn-ghost btn-sm" onclick="setTransferDate('${addDays(todayStr(),2)}',this)">+2 days</button>
      <button class="btn btn-ghost btn-sm" onclick="setTransferDate('${addDays(todayStr(),7)}',this)">Next week</button>
    </div>
    <div class="fgroup" style="margin-bottom:14px">
      <label class="flabel">Or pick a specific date</label>
      <input class="finput" type="date" id="transfer-date-input" value="${tomorrow}">
    </div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:12px">
      <strong>Transfer</strong> moves it to that date's archive and removes it from today.
      <strong>Copy</strong> keeps it here and also adds it to that date.
    </div>
    <div style="display:flex;gap:7px;flex-wrap:wrap">
      <button class="btn btn-accent btn-sm" onclick="confirmTaskTransfer('${id}','move')">→ Transfer</button>
      <button class="btn btn-ghost btn-sm" onclick="confirmTaskTransfer('${id}','copy')">⎘ Copy</button>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('task-transfer-dlg').remove()">Cancel</button>
    </div>
  </div>`;
  d.addEventListener('click',e=>{ if(e.target===d) d.remove(); });
  document.body.appendChild(d);
}

function setTransferDate(dt, btn){
  const inp=document.getElementById('transfer-date-input');
  if(inp) inp.value=dt;
  document.querySelectorAll('#task-transfer-dlg .btn-ghost').forEach(b=>{
    b.style.background=''; b.style.borderColor=''; b.style.color='';
  });
  if(btn){ btn.style.background='var(--accent-bg)'; btn.style.borderColor='var(--accent)'; btn.style.color='var(--accent)'; }
}

function confirmTaskTransfer(id, mode){
  const dt=(document.getElementById('transfer-date-input')||{}).value;
  if(!dt){ toast('Pick a date first'); return; }
  const task=(state.tasks||[]).find(t=>t.id===id); if(!task) return;
  // Create archive entry for that date if needed
  if(!state.archive[dt]){
    state.archive[dt]={ type:'day', label:archiveLabel(dt), sections:{ibu:[],other:[],requests:[],upcoming:[]}, notes:'', created:Date.now() };
    SECTIONS.forEach(s=>{ if(!state.archive[dt].sections[s.key]) state.archive[dt].sections[s.key]=[]; });
  }
  // Store transferred task in the archive entry's notes (simplest approach — tasks live in state.tasks only)
  // We copy the task data as a new task record tagged to that date
  if(!state.archive[dt].tasks) state.archive[dt].tasks=[];
  const alreadyThere=state.archive[dt].tasks.some(t=>t.id===id);
  if(!alreadyThere){
    state.archive[dt].tasks.push({ ...task, transferredFrom:todayStr(), transferredOn:Date.now() });
  }
  if(mode==='move'){
    // Mark original as 'transferred' (keeps record but stops appearing in active list)
    updateTask(id,{ taskStatus:'transferred', transferredTo:dt });
    toast('Task transferred to '+dt+' ✓');
  } else {
    toast('Task copied to '+dt+' ✓');
  }
  document.getElementById('task-transfer-dlg')?.remove();
  render();
}

function showMoreTasks(){ ui_taskPage++; render(); }
function showMoreUpcoming(){ ui_upcomingPage++; render(); }
function renderTaskCard(t, today){
  const TASK_DAY_NAMES={mon:'Monday',tue:'Tuesday',wed:'Wednesday',thu:'Thursday',fri:'Friday',sat:'Saturday',sun:'Sunday'};
  const isOpen=ui_openTasks.has(t.id);
  // For recurring tasks, calculate overdue from most recent occurrence, not original deadline
  const _recurDue=t.isRecurring&&t.deadline_date?mostRecentRecurOccurrence(t,today):null;
  const isOverdue=t.deadline_date&&t.deadline_date<today&&t.taskStatus!=='done'&&t.taskStatus!=='not-done'&&t.taskStatus!=='transferred';
  const _effectiveDue=t.isRecurring&&_recurDue?_recurDue:t.deadline_date;
  const isCarried=t.carriedForward&&t.taskStatus!=='done';
  const createdDate=new Date(t.created).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});

  // Card left-border class
  let cardCls='task-card ';
  if(t.taskStatus==='done') cardCls+='ts-done';
  else if(t.taskStatus==='not-done'||t.taskStatus==='transferred') cardCls+='ts-postponed';
  else if(isOverdue) cardCls+='ts-overdue';
  else if(t.taskStatus==='postponed-to') cardCls+='ts-postponed';
  else if(isCarried) cardCls+='ts-carried';
  else cardCls+='ts-pending';

  // Status badge — single source of truth on the right
  let sbCls='task-status-badge ', sbTxt='';
  const dot=color=>`<span class="badge-dot" style="background:${color}"></span>`;
  if(t.taskStatus==='done'){       sbCls+='tsb-done';      sbTxt=dot('#15803D')+'Done'; }
  else if(t.taskStatus==='not-done'){  sbCls+='tsb-notdone'; sbTxt=dot('#475569')+'Not done'; }
  else if(t.taskStatus==='transferred'){ sbCls+='tsb-postponed'; sbTxt=dot('#7C3AED')+'Transferred'; }
  else if(t.taskStatus==='postponed-to'){ sbCls+='tsb-postponed'; sbTxt=dot('#0369A1')+'Postponed'; }
  else if(isOverdue&&!t.isRecurring){ sbCls+='tsb-notdone'; const od=Math.abs(Math.round((new Date(today+'T00:00:00').getTime()-new Date(_effectiveDue+'T00:00:00').getTime())/86400000)); sbTxt=dot('#B91C1C')+'Overdue '+od+'d'; }
  else if(isOverdue&&t.isRecurring){ const mostRecent2=_effectiveDue||t.deadline_date; const nxt2=nextRecurrenceDate({...t,deadline_date:mostRecent2}); const nd2=Math.round((new Date(nxt2+'T00:00:00').getTime()-new Date(today+'T00:00:00').getTime())/86400000); sbCls+='tsb-pending'; sbTxt=nd2===0?dot('#B45309')+'Due today':nd2===1?dot('#B45309')+'Due tomorrow':dot('#B45309')+'Due in '+nd2+'d'; }
  else if(isCarried){ sbCls+='tsb-carried'; sbTxt='↻ +'+(t.carriedDays||1)+'d'; }
  else { sbCls+='tsb-pending'; sbTxt=dot('#B45309')+'Pending'; }

  // Build recurring schedule label
  let recurSchedule='';
  if(t.isRecurring){
    const TASK_DAY_NAMES2={mon:'Monday',tue:'Tuesday',wed:'Wednesday',thu:'Thursday',fri:'Friday',sat:'Saturday',sun:'Sunday'};
    if(t.recurFreq==='weekly'&&(t.recurDaysOfWeek||[]).length){
      recurSchedule='every '+t.recurDaysOfWeek.map(d=>TASK_DAY_NAMES2[d]||d).join(' / ');
    } else if(t.recurFreq==='daily'){
      recurSchedule='every day';
    } else if(t.recurFreq==='monthly'){
      recurSchedule='every month';
    } else if(t.recurFreq==='custom'&&t.recurDays){
      recurSchedule='every '+t.recurDays+'d';
    } else {
      recurSchedule=t.recurLabel||t.recurFreq||'recurring';
    }
  }

  // Deadline info — recurring tasks show schedule instead of overdue
  let deadlineChip='';
  if(t.deadline_date){
    const diff=new Date(t.deadline_date+'T00:00:00').getTime()-new Date(today+'T00:00:00').getTime();
    const days=Math.round(diff/86400000);
    if(t.taskStatus==='done') deadlineChip=`<span class="task-chip mono">📅 ${fmtDate(t.deadline_date)}</span>`;
    else if(t.isRecurring){
      // Always show next future occurrence — never show overdue for recurring
      const mostRecent=_effectiveDue||t.deadline_date;
      const alwaysNext=nextRecurrenceDate({...t,deadline_date:mostRecent});
      const nxtDue=alwaysNext>=today?alwaysNext:nextRecurrenceDate({...t,deadline_date:alwaysNext});
      const nxtDiff=Math.round((new Date(nxtDue+'T00:00:00').getTime()-new Date(today+'T00:00:00').getTime())/86400000);
      if(nxtDiff===0) deadlineChip=`<span class="task-chip mono">📅 Today</span>`;
      else if(nxtDiff===1) deadlineChip=`<span class="task-chip mono">📅 Due tomorrow</span>`;
      else deadlineChip=`<span class="task-chip mono">📅 Due in ${nxtDiff}d</span>`;
    }
    else if(days===-1) deadlineChip=`<span class="task-chip mono">📅 Yesterday</span>`;
    else if(days<0) deadlineChip=`<span class="task-chip mono">📅 ${fmtDate(t.deadline_date)}</span>`;
    else if(days===0) deadlineChip=`<span class="task-chip mono">📅 Today</span>`;
    else { const timeStr=t.deadline_time?(' '+t.deadline_time+' '+ukLabel()+(ukToIST(t.deadline_time)?' / '+ukToIST(t.deadline_time)+' IST':'')):''; deadlineChip=`<span class="task-chip mono">📅 ${fmtDate(t.deadline_date)}${timeStr}</span>`; }
  }
  const postponeChip=t.taskStatus==='postponed-to'&&t.postponeTo?`<span class="task-chip">⏸ Postponed to ${t.postponeTo}</span>`:'';
  const carriedChip='';
  const doneChip=t.taskStatus==='done'&&t.doneAt?`<span class="task-chip" style="color:var(--done)">Done ${new Date(t.doneAt).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}</span>`:'';

  const recurBadge=t.isRecurring?`<span class="recurring-badge">🔁 ${recurSchedule}</span>`:'';
  return`<div class="${cardCls}" data-id="${t.id}">
  <div class="task-top" onclick="toggleTaskOpen('${t.id}')">
