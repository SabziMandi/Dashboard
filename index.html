function renderCombinedAccordion(archKey){
  const isOpen=ui.openSections.has('ibu');
  const archKeyJS=archKey?`'${archKey}'`:'null';
  const ibuAll=((archKey?state.archive[archKey]?.sections?.ibu:state.sections.ibu)||[]).filter(s=>!s._deleted);
  const otherAll=((archKey?state.archive[archKey]?.sections?.other:state.sections.other)||[]).filter(s=>!s._deleted);
  const fKeyIbu='ibu'+(archKey?'::'+archKey:'');
  const fKeyOther='other'+(archKey?'::'+archKey:'');
  const isIBUFormOpen=ui.openForms.has(fKeyIbu);
  const isOtherFormOpen=ui.openForms.has(fKeyOther);

  const TERMINAL_S=['completed','not-done'];
  const ibuLive=ibuAll.filter(s=>!TERMINAL_S.includes(s.status)&&s.status!=='shelved');
  const otherLive=otherAll.filter(s=>!TERMINAL_S.includes(s.status)&&s.status!=='shelved');
  const ibuDone=ibuAll.filter(s=>TERMINAL_S.includes(s.status));
  const otherDone=otherAll.filter(s=>TERMINAL_S.includes(s.status));
  const ibuActive=ibuLive;
  const otherActive=otherLive;
  const allActive=[...ibuActive,...otherActive];
  const shelvedAll=[...ibuAll,...otherAll].filter(s=>s.status==='shelved');
  const uc=allActive.filter(s=>s.status==='urgent').length;
  const ic=allActive.filter(s=>s.status==='in-progress').length;
  const cc=allActive.filter(s=>s.carriedForward&&s.status!=='completed'&&s.status!=='on-hold').length;

  // Apply search + global filter
  const applyFilter=(arr)=>{
    let a=[...arr];
    if(ui.search){ const q=ui.search.toLowerCase(); a=a.filter(s=>(s.title||'').toLowerCase().includes(q)||(s.correspondent||'').toLowerCase().includes(q)||(s.producer||'').toLowerCase().includes(q)||(s.shoot_edit||'').toLowerCase().includes(q)||(s.remarks||'').toLowerCase().includes(q)); }
    if(ui.filter==='working')  return a.filter(s=>s.mode==='working');
    if(ui.filter==='watching') return a.filter(s=>s.mode==='watching');
    if(ui.filter!=='all')      return a.filter(s=>s.status===ui.filter);
    return a;
  };
  const combinedFiltered=[
    ...applyFilter(ibuActive).map(s=>({...s,_subsec:'ibu'})),
    ...applyFilter(otherActive).map(s=>({...s,_subsec:'other'})),
  ];

  // Pre-compute bits that would cause template literal nesting issues
  const _types=[...new Set((ibuActive.concat(otherActive)).flatMap(s=>(s.story_type||'').split(',').map(t=>t.trim().toUpperCase()).filter(Boolean)))];
  const _typeBadge=_types.length?`<span class="sbadge" style="background:rgba(79,70,229,.08);color:#4338CA;border:0.5px solid rgba(79,70,229,.25);">${_types.join(' · ')}</span>`:'';
  const _urgentBadge=uc?`<span class="sbadge sb-urgent">${uc} urgent</span>`:'';
  const _progressBadge=ic?`<span class="sbadge sb-in-progress">${ic} in progress</span>`:'';
  const _carryBadge=cc?`<span class="sbadge" style="background:rgba(234,88,12,.08);color:var(--carry);border:0.5px solid rgba(234,88,12,.25);">↻ ${cc} carried</span>`:'';
  const _filterChip=ui.filter!=='all'?`<span style="font-size:10px;font-family:var(--font);color:var(--accent);cursor:pointer" onclick="setFilter('all',null);event.stopPropagation()">✕ ${ui.filter}</span>`:'';
  const _ibuForm=isIBUFormOpen?renderForm('ibu',archKey):'';
  const _otherForm=isOtherFormOpen?renderForm('other',archKey):'';

  let html=`<div class="accordion${isOpen?' acc-open':''}" id="acc-ibu">
    <div class="acc-header" onclick="toggleAccordion('ibu')">
      <span class="acc-icon">📡</span>
      <span class="acc-name">Stories</span>
      <div class="acc-meta">${_urgentBadge}${_progressBadge}${_carryBadge}${_typeBadge}${_filterChip}</div>
      <span class="acc-chevron${isOpen?' open':''}" id="acc-chev-ibu">▾</span>
    </div>
    <div class="acc-body${isOpen?' open':''}" id="acc-body-ibu">
      <div class="sec-head" style="flex-wrap:wrap;gap:6px;align-items:center">
        <button class="btn btn-ghost btn-sm" onclick="doEmailSection('ibu',${archKeyJS});event.stopPropagation()">✉ Email</button>
        <button class="btn btn-ghost btn-sm" onclick="doExportSectionTxt('ibu',${archKeyJS});event.stopPropagation()">⬇ Export</button>
        <button class="btn btn-accent btn-sm" onclick="toggleForm('ibu',${archKeyJS});event.stopPropagation()">+ Add Story</button>
      </div>
      ${_ibuForm}${_otherForm}`;

  if(ui.filter!=='all'||ui.search){
    html+=`<div style="font-size:11.5px;color:var(--accent);background:rgba(207,102,64,.07);border:1px solid rgba(207,102,64,.2);border-radius:7px;padding:7px 10px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between"><span>🔍 Showing ${combinedFiltered.length} of ${ibuActive.length+otherActive.length}</span><button class="btn btn-ghost btn-xs" onclick="setFilter('all',null);ui.search='';const si=document.getElementById('search-input');if(si)si.value='';render();event.stopPropagation()">Clear ✕</button></div>`;
  }

  html+='<div id="stories-wrap-ibu">';
  if(combinedFiltered.length){
    html+=combinedFiltered.map(s=>renderCard(s._subsec||'ibu',s,archKey)).join('');
  } else {
    html+='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-msg">No stories yet</div></div>';
  }
  const _termAll=[...ibuDone.map(s=>({...s,_subsec:'ibu'})),...otherDone.map(s=>({...s,_subsec:'other'}))];
  if(_termAll.length){
    html+=`<div style="font-size:11px;font-family:var(--font);font-weight:500;color:var(--text3);padding:6px 0 4px;margin-top:4px;border-top:1px dashed var(--border)">✓ ${_termAll.length} done / not done</div>`;
    _termAll.forEach(s=>{ html+=renderCard(s._subsec,s,archKey); });
  }
  html+='</div>';
  if(shelvedAll.length){
    html+='<div style="border-top:1px solid var(--border);padding-top:8px;margin-top:4px"><div style="font-size:11px;font-family:var(--font);color:var(--text3);margin-bottom:6px">🗄 Shelved ('+shelvedAll.length+')</div>';
    html+=[...ibuAll.filter(s=>s.status==='shelved').map(s=>renderCard('ibu',s,archKey)),...otherAll.filter(s=>s.status==='shelved').map(s=>renderCard('other',s,archKey))].join('');
    html+='</div>';
  }
  html+='</div></div>';
  return html;
}

let ui_noteForm=false;
let ui_openNotes=new Set();
let ui_editNoteId=null;

function addNote(data){
  if(!state.notes) state.notes=[];
  const id=genId();
  const today=todayStr();
  const note={...data, id, created:Date.now(), status:'active', carriedForward:false, carriedFromDate:null, carriedDays:0};
  state.notes.push(note);

  // Also log to today's archive so it always appears when browsing that date
  if(!state.archive[today]){
    state.archive[today]={type:'day',label:archiveLabel(today),sections:{},notes:'',created:Date.now()};
    SECTIONS.forEach(s=>{state.archive[today].sections[s.key]=[];});
  }
  if(!state.archive[today].notesLog) state.archive[today].notesLog=[];
  // Store reference — we'll refresh this log when status changes
  const existing=state.archive[today].notesLog.findIndex(n=>n.id===id);
  if(existing<0) state.archive[today].notesLog.push({...note});

  saveAndPush();
}
function updateNote(id, data){
  if(!state.notes) return;
  const i=state.notes.findIndex(n=>n.id===id);
  if(i>=0){
    state.notes[i]={...state.notes[i],...data, updated:Date.now()};
    // Keep archive log entry in sync
    const note=state.notes[i];
    const createdDate=note.carriedFromDate||(note.created?dateStr(new Date(typeof note.created==='number'?note.created:parseInt(note.created))):todayStr());
    if(state.archive[createdDate]?.notesLog){
      const li=state.archive[createdDate].notesLog.findIndex(n=>n.id===id);
      if(li>=0) state.archive[createdDate].notesLog[li]={...state.archive[createdDate].notesLog[li],...data};
    }
    saveAndPush();
  }
}
function deleteNote(id){
  const note=(state.notes||[]).find(n=>n.id===id); if(!note) return;

  // Archive to creation date before permanent deletion
  const createdDate=note.carriedFromDate||(note.created?dateStr(new Date(typeof note.created==='number'?note.created:parseInt(note.created))):todayStr());
  if(!state.archive[createdDate]){
    state.archive[createdDate]={type:'day',label:archiveLabel(createdDate),sections:{},notes:'',created:Date.now()};
    SECTIONS.forEach(s=>{state.archive[createdDate].sections[s.key]=[];});
  }
  if(!state.archive[createdDate].notesLog) state.archive[createdDate].notesLog=[];
  if(!state.archive[createdDate].notesLog.some(n=>n.id===id)){
    state.archive[createdDate].notesLog.push({...note, deletedOn:Date.now(), _deleted:true});
  }

  state.notes=(state.notes||[]).filter(n=>n.id!==id);
  if(!state.deletedIds) state.deletedIds={};
  if(!state.deletedIds.notes) state.deletedIds.notes=[];
  if(!state.deletedIds.notes.includes(id)) state.deletedIds.notes.push(id);
  saveAndPush(); renderDateStrip(); render();
}
function setNoteStatus(id, status){
  if(!state.notes) return;
  const note=state.notes.find(n=>n.id===id);
  if(!note) return;

  // Archive the note to its creation date so it's permanently recorded there
  const createdDate=note.carriedFromDate||(note.created?dateStr(new Date(typeof note.created==='number'?note.created:parseInt(note.created))):todayStr());
  if(!state.archive[createdDate]){
    state.archive[createdDate]={type:'day',label:archiveLabel(createdDate),sections:{},notes:'',created:Date.now()};
    SECTIONS.forEach(s=>{state.archive[createdDate].sections[s.key]=[];});
  }
  // Store resolved note in archive entry's notesLog array
  if(!state.archive[createdDate].notesLog) state.archive[createdDate].notesLog=[];
  const alreadyLogged=state.archive[createdDate].notesLog.some(n=>n.id===id);
  if(!alreadyLogged){
    state.archive[createdDate].notesLog.push({...note, status, resolvedOn:Date.now()});
  } else {
    const i=state.archive[createdDate].notesLog.findIndex(n=>n.id===id);
    if(i>=0) state.archive[createdDate].notesLog[i]={...note, status, resolvedOn:Date.now()};
  }

  updateNote(id,{status, resolvedOn:Date.now()});

  // Also update the archive log entry for this note on its creation date
  if(state.archive[createdDate]?.notesLog){
    const li=state.archive[createdDate].notesLog.findIndex(n=>n.id===id);
    if(li>=0) state.archive[createdDate].notesLog[li]={...state.archive[createdDate].notesLog[li], status, resolvedOn:Date.now()};
  }

  toast(status==='done'?'✅ Note marked Done — saved to '+archiveLabel(createdDate):'↪ Note passed — saved to '+archiveLabel(createdDate));
  renderDateStrip();
  render();
}
function toggleNotesResolved(){
  ui.notesResolvedOpen=!ui.notesResolvedOpen;

}
function submitNoteForm(){
  const g=id=>(document.getElementById(id)||{}).value||'';

  } else {
    addNote({ headline, text, deadline_date:g('nf-deadline') });

  }
  ui_noteForm=false;
  render();
}

}

let ui_meetingForm=false;
let ui_editMeetingId=null;
let ui_openMeetings=new Set();
let ui_meetingRemarkForms={}; // meetingId → true/false
let ui_editMeetingRemarkId={}; // meetingId → remarkId

function addMeeting(data){
  if(!state.meetings) state.meetings=[];
  state.meetings.push({...data, id:genId(), created:Date.now(), remarks:[]});
  saveAndPush();
}
function updateMeeting(id,data){
  const i=(state.meetings||[]).findIndex(m=>m.id===id);
  if(i>=0){ state.meetings[i]={...state.meetings[i],...data, updated:Date.now()}; saveAndPush(); }
}
function deleteMeeting(id){
  state.meetings=(state.meetings||[]).filter(m=>m.id!==id);
  if(!state.deletedIds) state.deletedIds={};
  if(!state.deletedIds.meetings) state.deletedIds.meetings=[];
  if(!state.deletedIds.meetings.includes(id)) state.deletedIds.meetings.push(id);
  ui_openMeetings.delete(id);
  saveAndPush(); render();
}
function addMeetingRemark(id, text){
  const m=(state.meetings||[]).find(m=>m.id===id); if(!m) return;
  if(!m.remarks) m.remarks=[];
  m.remarks.push({id:genId(), text, created:Date.now()});
  m.updated=Date.now(); // bump so merge keeps this version
  saveAndPush(); render();
}
function updateMeetingRemark(meetingId, remarkId, text){
  const m=(state.meetings||[]).find(m=>m.id===meetingId); if(!m) return;
  const r=(m.remarks||[]).find(r=>r.id===remarkId); if(!r) return;
  r.text=text; r.edited=Date.now();
  m.updated=Date.now(); // bump so merge keeps this version
  saveAndPush(); render();
}
function deleteMeetingRemark(meetingId, remarkId){
  const m=(state.meetings||[]).find(m=>m.id===meetingId); if(!m) return;
  m.remarks=(m.remarks||[]).filter(r=>r.id!==remarkId);
  m.updated=Date.now(); // bump so merge keeps this version
  saveAndPush(); render();
}
function submitMeetingForm(){
  const g=id=>(document.getElementById(id)||{}).value||'';
  const isRecurring=document.getElementById('mf-recurring')?.checked||false;
  // Collect participants
  const participants=[];
  document.querySelectorAll('.mf-participant-row').forEach(row=>{
    const name=row.querySelector('.mf-p-name')?.value?.trim();
    const isExt=row.querySelector('.mf-p-ext')?.checked||false;
    if(name) participants.push({name, isExternal:isExt});
  });
  // Collect days of week if recurring weekly
  const recurDaysOfWeek=[];
  if(isRecurring){
    ['sun','mon','tue','wed','thu','fri','sat'].forEach(d=>{
      if(document.getElementById('mf-dow-'+d)?.checked) recurDaysOfWeek.push(d);
    });
  }
  const data={
    date:           g('mf-date'),
    name:           g('mf-name').trim(),
    time:           g('mf-time'),
    status:         g('mf-status')||'scheduled',
    isRecurring,
    recurFreq:      isRecurring?g('mf-recur-freq'):'',
    recurDaysOfWeek:isRecurring?recurDaysOfWeek:[],
    recurDays:      isRecurring&&g('mf-recur-freq')==='custom'?parseInt(g('mf-recur-days'))||1:0,
    agenda:         g('mf-agenda').trim(),
    participants,
    venue:          g('mf-venue').trim(),
    reminder:       g('mf-reminder'),
    reminderNote:   g('mf-reminder-note').trim(),
  };
  if(!data.name){ toast('Please enter a meeting name'); return; }
  if(!data.date){ toast('Please set a date'); return; }
  if(ui_editMeetingId){
    updateMeeting(ui_editMeetingId, data);
    toast('Meeting updated ✓');
    ui_editMeetingId=null;
  } else {
    addMeeting(data);
    toast('Meeting added ✓');
  }
  ui_meetingForm=false;
  render();
}
function submitMeetingRemark(meetingId){
  const ta=document.getElementById('mrf-text-'+meetingId);
  const text=(ta?.value||'').trim();
  if(!text){ toast('Enter remark text'); return; }
  addMeetingRemark(meetingId, text);
  ui_meetingRemarkForms[meetingId]=false;
}
function submitMeetingRemarkEdit(meetingId, remarkId){
  const ta=document.getElementById('mref-text-'+meetingId+'-'+remarkId);
  const text=(ta?.value||'').trim();
  if(!text){ toast('Enter remark text'); return; }
  updateMeetingRemark(meetingId, remarkId, text);
  delete ui_editMeetingRemarkId[meetingId];
}
function editMeeting(id){
  const m=(state.meetings||[]).find(m=>m.id===id); if(!m) return;
  ui_meetingForm=true; ui_editMeetingId=id;
  render();
  setTimeout(()=>{
    const set=(eid,val)=>{ const el=document.getElementById(eid); if(el) el.value=val||''; };
    set('mf-date', m.date); set('mf-name', m.name); set('mf-time', m.time); set('mf-time-ist', m.time?ukToIST(m.time):'');
    set('mf-status', m.status||'scheduled'); set('mf-agenda', m.agenda||'');
    set('mf-venue', m.venue||''); set('mf-reminder', m.reminder||'off');
    set('mf-reminder-note', m.reminderNote||'');
    if(m.isRecurring&&document.getElementById('mf-recurring')){
      document.getElementById('mf-recurring').checked=true;
      document.getElementById('mf-recur-fields')&&(document.getElementById('mf-recur-fields').style.display='block');
      set('mf-recur-freq', m.recurFreq||'daily');
      toggleMeetingRecurFields();
      set('mf-recur-days', m.recurDays||1);
      if(m.recurFreq==='weekly'&&m.recurDaysOfWeek?.length){
        m.recurDaysOfWeek.forEach(d=>{
          const cb=document.getElementById('mf-dow-'+d);
          if(cb) cb.checked=true;
        });
      }
    }
    // Restore participants
    const wrap=document.getElementById('mf-participants-wrap');
    if(wrap&&m.participants?.length){
      wrap.innerHTML='';
      m.participants.forEach(p=>addParticipantRow(p.name, p.isExternal));
    }
    document.getElementById('meeting-form-wrap')?.scrollIntoView({behavior:'smooth',block:'start'});
  },0);
}

}

function toggleMeetingRecurFields(){

/* ── Meeting time helpers (module-level so summary/strip can use them) ── */
function meetingUtcDate(dateStr, timeStr){
  if(!dateStr) return null;
  const parts=(timeStr||'00:00').split(':');
  const ukMin=(+parts[0])*60+(+parts[1]||0);
  const utcMin=((ukMin-ukOffMin())+1440)%1440;
  const utcH=Math.floor(utcMin/60), utcM=utcMin%60;
  return new Date(dateStr+'T'+p2(utcH)+':'+p2(utcM)+':00Z');
}
function nextMeetingOccurrenceMs(m){
  // Returns the UTC ms of the meeting's next occurrence after now.
  // Works for both one-time and recurring meetings.
  const now=new Date();
  const today=dateStr(now);
  if(!m.isRecurring){
    if(!m.date) return Infinity;
    const dt=meetingUtcDate(m.date, m.time);
    return dt>now ? dt.getTime() : Infinity;
  }
  // Recurring — scan forward up to 56 days
  const DAYS=['sun','mon','tue','wed','thu','fri','sat'];
  for(let i=0;i<56;i++){
    const tryDate=addDays(today,i);
    const tryDt=meetingUtcDate(tryDate, m.time);
    if(!tryDt||tryDt<=now) continue;
    if(m.recurFreq==='daily') return tryDt.getTime();
    if(m.recurFreq==='weekly'&&(m.recurDaysOfWeek||[]).length){
      const dow=DAYS[new Date(tryDate+'T12:00:00').getDay()];
      if(m.recurDaysOfWeek.includes(dow)) return tryDt.getTime();
    } else if(m.recurFreq==='weekly'){
      const base=new Date((m.date||today)+'T12:00:00');
      const tryD=new Date(tryDate+'T12:00:00');
      if(Math.round((tryD-base)/86400000)%7===0) return tryDt.getTime();
    } else if(m.recurFreq==='monthly'){
      const baseDay=new Date((m.date||today)+'T12:00:00').getDate();
      if(new Date(tryDate+'T12:00:00').getDate()===baseDay) return tryDt.getTime();
    } else if(m.recurFreq==='custom'&&m.recurDays){
      const base=new Date((m.date||today)+'T12:00:00');
      const tryD=new Date(tryDate+'T12:00:00');
      if(Math.round((tryD-base)/86400000)%m.recurDays===0) return tryDt.getTime();
    }
  }
  return Infinity;
}

    ? 'every '+m.recurDaysOfWeek.map(d=>DAY_NAMES[d]||d).join(' / ')
    : m.isRecurring&&m.recurFreq==='daily'?'every day'
    : m.isRecurring&&m.recurFreq==='custom'&&m.recurDays?'every '+m.recurDays+'d':'';
  // Detect device local timezone offset vs IST
  const devOffMin=-(new Date().getTimezoneOffset());
  const isDevIST=devOffMin>=325&&devOffMin<=335; // IST = UTC+5:30, allow small variance
  // Always show IST in the icon block for consistency
  const localTime=m.time?ukToIST(m.time):'';
  const localTZ='IST';
  const istTime=m.time?ukToIST(m.time):'';
  const ukDisplayTime=m.time?(m.time+' '+ukLabel()):'';
  const istDisplayTime=istTime?(istTime+' IST'):'';
  const recurTimeStr=m.isRecurring&&recurDayLabel
    ? [ukDisplayTime,istDisplayTime].filter(Boolean).join(' / ')+' '+recurDayLabel
    : [ukDisplayTime,istDisplayTime].filter(Boolean).join(' / ');
  const dateStr2=m.date?new Date(m.date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'}):'';
  const stCls=m.status==='done'?'mc-done':m.status==='cancelled'?'mc-cancelled':'';
  // Countdown chip for scheduled meetings
  // Helper: build UTC Date from BST/GMT time string + date string
  function meetingUtcDate(dateStr, timeStr){
    if(!dateStr) return null;
    const parts=(timeStr||'00:00').split(':');
    const ukMin=(+parts[0])*60+(+parts[1]||0);
    const utcMin=((ukMin-ukOffMin())+1440)%1440;
    const utcH=Math.floor(utcMin/60), utcM=utcMin%60;
    return new Date(dateStr+'T'+p2(utcH)+':'+p2(utcM)+':00Z');
  }
  // For recurring: find next occurrence date after now
  function nextRecurringDate(m){
    if(!m.isRecurring) return null;
    const now=new Date();
    const today=dateStr(now);
    // Try up to 8 weeks forward
    for(let i=0;i<56;i++){
      const tryDate=addDays(today,i);
      const tryDt=meetingUtcDate(tryDate, m.time);
      if(tryDt>now){
        if(m.recurFreq==='daily') return tryDate;
        if(m.recurFreq==='weekly'&&(m.recurDaysOfWeek||[]).length){
          const DAYS=['sun','mon','tue','wed','thu','fri','sat'];
          const dow=DAYS[new Date(tryDate+'T12:00:00').getDay()];
          if(m.recurDaysOfWeek.includes(dow)) return tryDate;
        } else if(m.recurFreq==='weekly'){
          const base=new Date((m.date||today)+'T12:00:00');
          const tryD=new Date(tryDate+'T12:00:00');
          const diffDays=Math.round((tryD-base)/86400000);
          if(diffDays%7===0) return tryDate;
        } else if(m.recurFreq==='monthly'){
          const baseDay=new Date((m.date||today)+'T12:00:00').getDate();
          if(new Date(tryDate+'T12:00:00').getDate()===baseDay) return tryDate;
        } else if(m.recurFreq==='custom'&&m.recurDays){
          const base=new Date((m.date||today)+'T12:00:00');
          const tryD=new Date(tryDate+'T12:00:00');
          const diffDays=Math.round((tryD-base)/86400000);
          if(diffDays%m.recurDays===0) return tryDate;
        }
      }
    }
    return null;
  }
  let countdownChip='';

  }
  const statusChip=m.status==='done'?`<span style="font-size:10px;padding:2px 8px;border-radius:10px;background:var(--done-bg);color:var(--done);border:1px solid rgba(22,163,74,.2)">✅ Done</span>`:m.status==='cancelled'?`<span style="font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(148,163,184,.1);color:#64748b;border:1px solid rgba(148,163,184,.3)">🚫 Cancelled</span>`:'';
  const pCount=(m.participants||[]).length;
  const venueIsLink=m.venue&&m.venue.startsWith('http');
  const venueMapLink=m.venue&&!venueIsLink?`https://maps.google.com/?q=${encodeURIComponent(m.venue)}`:'';
  const showRemarkForm=ui_meetingRemarkForms[m.id];
  const editingRemarkId=ui_editMeetingRemarkId[m.id];

    </div>
    <div class="meeting-title-wrap">
      <div class="meeting-name" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(m.name||'Untitled')}${m.isRecurring?` <span class="recurring-badge" style="font-size:9px;vertical-align:middle">🔁</span>`:''}</div>
      <div class="meeting-meta">${m.isRecurring&&recurDayLabel?esc(recurTimeStr):(pCount?pCount+' participant'+(pCount>1?'s':''):'')+(pCount&&m.venue?' · ':'')+( m.venue?esc(m.venue.replace(/^https?:\/\//,'').slice(0,40)):'')}</div>
    </div>
    ${statusChip||countdownChip}
    <span class="chevron${isOpen?' open':''}" id="mc-chev-${m.id}" style="margin-left:4px">▾</span>
  </div>
  <div class="meeting-body${isOpen?' open':''}" id="mb-${m.id}">
    <div class="card-fields" style="margin-top:8px">
      ${m.date?`<div><div class="cfield-label">Date</div><div class="cfield-value">${fmtDate(m.date)}</div></div>`:''}
      ${m.time?`<div><div class="cfield-label">Time</div><div class="cfield-value">${esc(ukDisplayTime)}${istDisplayTime?' / '+esc(istDisplayTime):''}</div></div>`:''}
      ${m.agenda?`<div style="grid-column:1/-1"><div class="cfield-label">Agenda</div><div class="cfield-value" style="white-space:pre-wrap">${esc(m.agenda)}</div></div>`:''}
      ${m.venue?`<div><div class="cfield-label">Venue</div><div class="cfield-value">${venueIsLink?`<a href="${esc(m.venue)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:var(--accent)">🔗 Open link</a>`:venueMapLink?`${esc(m.venue)} <a href="${venueMapLink}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:var(--accent);margin-left:6px;font-size:11px">📍 Map</a>`:esc(m.venue)}</div></div>`:''}

function renderRemarksAccordion(){
  if(!state.notes) state.notes=[];

  const isOpen=ui.openSections.has('remarks');
  const today=todayStr();
  const active=state.notes.filter(n=>n.status==='active');
  const resolved=state.notes.filter(n=>n.status!=='active');

  let body='';

  // Add-note form
  if(ui_noteForm){
    body+=`<div class="note-add-form">
      <div style="font-size:12.5px;font-weight:700;color:var(--upcoming);margin-bottom:10px">${ui_editNoteId?'✏ Edit Note':'+ New Note'}</div>
      <div class="fgroup" style="margin-bottom:8px">
        <label class="flabel">Headline *</label>
        <input class="finput" id="nf-headline" placeholder="Short headline for this note…" autocomplete="off">
      </div>
      <div class="fgroup" style="margin-bottom:8px">
        <label class="flabel">Note body</label>
        <textarea class="ftextarea" id="nf-text" placeholder="Write your note…" style="min-height:72px"></textarea>
      </div>
      <div class="fgroup" style="margin-bottom:10px">
        <label class="flabel">Deadline (optional)</label>
        <input class="finput" type="date" id="nf-deadline">
      </div>
      <div style="display:flex;gap:7px">
        <button class="btn btn-accent btn-sm" onclick="submitNoteForm()">${ui_editNoteId?'Update Note':'Add Note'}</button>
        <button class="btn btn-ghost btn-sm" onclick="ui_noteForm=false;ui_editNoteId=null;render()">Cancel</button>
      </div>
    </div>`;
  }

  // Active notes
  if(!active.length && !ui_noteForm){
    body+=`<div class="empty-state" style="padding:16px 0"><div class="empty-icon">📝</div><div class="empty-msg">No notes yet — click <strong>+ Add Note</strong></div></div>`;
  } else {
    active.forEach(n=>{
      const created=new Date(n.created).toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
      let dlChip='';
      if(n.deadline_date){
        const diff=new Date(n.deadline_date+'T00:00:00').getTime()-new Date(today+'T00:00:00').getTime();
        const days=Math.round(diff/86400000);
        if(days===-1)    dlChip=`<span class="note-deadline-chip">⚠ Due yesterday</span>`;
        else if(days<0)  dlChip=`<span class="note-deadline-chip">⚠ Overdue by ${Math.abs(days)}d</span>`;
        else if(days===0)dlChip=`<span class="note-deadline-chip">⚠ Due today</span>`;
        else             dlChip=`<span class="note-deadline-chip ok">📅 Due in ${days}d (${fmtDate(n.deadline_date)})</span>`;
      }
      const carriedChip=n.carriedForward?`<span class="carry-badge">↻ +${n.carriedDays||1}d</span>`:'';
      body+=`<div class="note-card${n.carriedForward?' note-carried':''}">
        ${n.headline?`<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:5px;font-family:var(--font)">${esc(n.headline)}</div>`:''}
        <div class="note-text">${esc(n.text)}</div>
        <div class="note-meta">
          <span>🗓 ${created}</span>
          ${dlChip}
          ${carriedChip}
        </div>
        <div class="note-btns">
          <button class="btn btn-done-active btn-sm" onclick="setNoteStatus('${n.id}','done');event.stopPropagation()">✅ Done</button>
          <button class="btn btn-ghost btn-sm" style="color:var(--text3)" onclick="setNoteStatus('${n.id}','pass');event.stopPropagation()">↪ Pass</button>
          <button class="btn btn-ghost btn-sm" onclick="editNote('${n.id}');event.stopPropagation()">✏ Edit</button>
          <button class="btn btn-ghost btn-sm btn-danger" onclick="deleteNote('${n.id}');event.stopPropagation()">🗑</button>
        </div>
      </div>`;
    });
  }

  // Resolved notes — always visible, faded
  if(resolved.length){
    body+=`<div style="font-size:11px;color:var(--text3);font-family:var(--font);margin:10px 0 6px;padding-top:8px;border-top:1px dashed var(--border)">✓ ${resolved.length} resolved</div>`;
    resolved.forEach(n=>{
      const created=new Date(n.created).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
      body+=`<div class="note-card ${n.status==='done'?'note-done':'note-pass'}">
        <div class="note-text" style="text-decoration:${n.status==='done'?'line-through':''}">${esc(n.text)}</div>
        <div class="note-meta">
          <span>🗓 ${created}</span>
          <span style="color:${n.status==='done'?'var(--done)':'var(--text3)'}">${n.status==='done'?'✅ Done':'↪ Passed'}</span>
        </div>
        <div class="note-btns">
          <button class="btn btn-ghost btn-xs" onclick="updateNote('${n.id}',{status:'active',resolvedOn:null});render()">↩ Restore</button>
          <button class="btn btn-ghost btn-xs" onclick="editNote('${n.id}')">✏ Edit</button>
          <button class="btn btn-ghost btn-xs btn-danger" onclick="if(confirm('Delete this note?'))deleteNote('${n.id}')">🗑</button>
        </div>
      </div>`;
    });
  }

  if(isStandaloneNote){
    const nCount=(active||[]).length;
    return`<div style="padding-bottom:80px">
      <div class="acc-header" style="border-radius:10px 10px 0 0;border:0.5px solid var(--border);border-bottom:0">
        <span class="acc-icon">📝</span>
        <span class="acc-name">Note</span>
        <div class="acc-meta">${nCount?`<span class="sbadge sb-in-progress">${nCount} active</span>`:''}</div>
      </div>
      <div style="border:0.5px solid var(--border);border-top:0;border-radius:0 0 10px 10px;padding:12px 16px 14px;margin-bottom:14px;">
        <div style="display:flex;justify-content:flex-end;gap:6px;margin-bottom:10px;">
          <button class="btn btn-ghost btn-sm" onclick="doEmailNotes()">✉ Email</button>
          <button class="btn btn-ghost btn-sm" onclick="doExportNotesTxt()">⬇ Export</button>
          <button class="btn btn-accent btn-sm" onclick="ui_noteForm=!ui_noteForm;render();setTimeout(()=>document.getElementById('nf-headline')?.focus(),60)">+ Add Note</button>
        </div>
        ${body}
      </div>
    </div>`;
  }
  return`<div class="accordion${isOpen?' acc-open':''}" id="acc-remarks">
    <div class="acc-header" onclick="toggleAccordion('remarks')">
      <span class="acc-icon">📝</span>
      <span class="acc-name">Note</span>
      <span class="acc-summary">${(()=>{ if(!active.length)return ''; const today=todayStr(); const sorted=[...active].sort((a,b)=>{ const da=a.deadline_date?Math.abs(new Date(a.deadline_date+'T00:00:00').getTime()-new Date(today+'T00:00:00').getTime()):Infinity; const db=b.deadline_date?Math.abs(new Date(b.deadline_date+'T00:00:00').getTime()-new Date(today+'T00:00:00').getTime()):Infinity; if(da!==db)return da-db; return (b.created||0)-(a.created||0); }); return esc((sorted[0].headline||sorted[0].text||'').slice(0,60)); })()}</span>
      <div class="acc-meta">
        ${active.length?`<span class="sbadge sb-in-progress">${active.length} active</span>`:''}
      </div>
      <span class="acc-chevron${isOpen?' open':''}" id="acc-chev-remarks">▾</span>
    </div>
    <div class="acc-body${isOpen?' open':''}" id="acc-body-remarks">
      <div class="sec-head">
        <button class="btn btn-ghost btn-sm" onclick="doEmailNotes()">✉ Email</button>
        <button class="btn btn-ghost btn-sm" onclick="doExportNotesTxt()">⬇ Export</button>
        <button class="btn btn-accent btn-sm" onclick="ui_noteForm=!ui_noteForm;render();setTimeout(()=>document.getElementById('nf-headline')?.focus(),60)">+ Add Note</button>
      </div>
      ${body}
    </div>
  </div>`;
}

/* Returns sorted unique staff names for leave dropdown */
function getLeaveStaffNames(){
  const sn=state.staffNames||{};
  const all=[
    ...(sn.correspondents||[]),
    ...(sn.producers||[]),
    ...(sn.shootEdit||[]),
  ];
  // Deduplicate and sort alphabetically
  return [...new Set(all)].sort((a,b)=>a.localeCompare(b));
}
function getLeaveEmployeeOptions(){
  const names=getLeaveStaffNames();
  if(!names.length) return '<option value="">— No staff names set (add via 👥 Staff) —</option>';
  return names.map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join('');
}

const LEAVE_TYPES=[
  {key:'earned',   label:'Earned Leave',              cls:'ltb-earned'},
  {key:'sick',     label:'Sick Leave',                cls:'ltb-sick'},
  {key:'casual',   label:'Casual / Comp Leave',       cls:'ltb-casual'},
  {key:'deployed', label:'Other Department',         cls:'ltb-earned'},
];
let ui_leaveForm=false, ui_editLeaveId=null;
let ui_openLeaves=new Set(), ui_showLeaveSettings=false, ui_showPastLeaves=false;

function leaveDays(from,to){
  if(!from||!to) return 0;
  return Math.max(1,Math.round((new Date(to+'T00:00:00')-new Date(from+'T00:00:00'))/86400000)+1);
}
function getOnLeaveToday(){
  const today=todayStr();
  return(state.leaves||[]).filter(l=>l.dateFrom&&l.dateTo&&l.dateFrom<=today&&l.dateTo>=today);
}
function renderOnLeavePill(){
  const wrap=document.getElementById('onleave-pill-wrap');
  if(!wrap) return;
  const onLeave=getOnLeaveToday();
  if(!onLeave.length){ wrap.innerHTML=''; }
  else {
    const hasPending=onLeave.some(l=>l.status==='pending');
    const names=onLeave.map(l=>(l.employeeName||'?').split(' ')[0]).join(', ');
    wrap.innerHTML=`<div class="onleave-pill${hasPending?' has-pending':''}" onclick="jumpToLeaves()" title="Click to view leave details">🌴 On leave: ${esc(names)}</div>`;
  }
  renderMobileLeaveRow();
}
function addLeave(data){
  if(!state.leaves)state.leaves=[];
  state.leaves.push({...data,id:genId(),created:Date.now()});
  saveAndPush();
}
function updateLeave(id,data){
  if(!state.leaves)return;
  const i=state.leaves.findIndex(l=>l.id===id);
  if(i>=0){state.leaves[i]={...state.leaves[i],...data, updated:Date.now()};saveAndPush();}
}
function deleteLeave(id){
  state.leaves=(state.leaves||[]).filter(l=>l.id!==id);
  if(!state.deletedIds) state.deletedIds={};
  if(!state.deletedIds.leaves) state.deletedIds.leaves=[];
  if(!state.deletedIds.leaves.includes(id)) state.deletedIds.leaves.push(id);
  ui_openLeaves.delete(id);
  // Remove the DOM element immediately without waiting for full render
  const el=document.querySelector('[data-id="'+id+'"]');
  if(el) el.remove();
  saveAndPush();
  renderOnLeavePill();
  // Full render after a tick to sync state
  setTimeout(()=>render(),0);
}
function submitLeaveForm(){
  const g=id=>(document.getElementById(id)||{}).value||'';
  const empName=g('lf-employee');
  const data={
    employeeName: empName,
    leaveType:    g('lf-type'),
    dateFrom:     g('lf-from'),
    dateTo:       g('lf-to'),
    status:       g('lf-status'),
    reason:       g('lf-reason').trim(),
  };
  if(!data.employeeName){ toast('Please select an employee'); return; }
  if(!data.dateFrom||!data.dateTo){ toast('Please set start and end dates'); return; }
  if(data.dateTo<data.dateFrom){ toast('End date must be on or after start date'); return; }
  if(ui_editLeaveId){ updateLeave(ui_editLeaveId,data); toast('Leave updated ✓'); ui_editLeaveId=null; }
  else { addLeave(data); toast('Leave added ✓'); }
  ui_leaveForm=false; render();
  setTimeout(()=>{
    const sec=document.getElementById('leaves-section');
    if(sec){const r=sec.getBoundingClientRect();if(r.top<0||r.top>window.innerHeight) sec.scrollIntoView({behavior:'smooth',block:'start'});}
  },80);
}
function editLeave(id){
  const l=(state.leaves||[]).find(l=>l.id===id);if(!l)return;
  ui_leaveForm=true;ui_editLeaveId=id;render();
  setTimeout(()=>{
    const set=(eid,val)=>{const el=document.getElementById(eid);if(el)el.value=val||'';};
    set('lf-employee', l.employeeName||'');
    set('lf-type',     l.leaveType||'earned');
    set('lf-from',     l.dateFrom||'');
    set('lf-to',       l.dateTo||'');
    set('lf-status',   l.status||'pending');
    set('lf-reason',   l.reason||'');
    // Only scroll to leaves-section if the form is not already in view
    const sec=document.getElementById('leaves-section');
    if(sec){const r=sec.getBoundingClientRect();if(r.top<0||r.top>window.innerHeight) sec.scrollIntoView({behavior:'smooth',block:'start'});}
  },80);
}
function toggleMeetingOpen(id){
  if(ui_openMeetings.has(id)) ui_openMeetings.delete(id); else ui_openMeetings.add(id);
  const body=document.getElementById('mb-'+id);
  const chev=document.getElementById('mc-chev-'+id);
  if(body) body.classList.toggle('open', ui_openMeetings.has(id));
  if(chev) chev.classList.toggle('open', ui_openMeetings.has(id));
}
function toggleLeaveOpen(id){
  if(ui_openLeaves.has(id))ui_openLeaves.delete(id);else ui_openLeaves.add(id);
  const b=document.getElementById('lb-'+id),c=document.getElementById('lc-'+id);
  if(b)b.classList.toggle('open',ui_openLeaves.has(id));
  if(c)c.classList.toggle('open',ui_openLeaves.has(id));
}
function saveEmployeeNames(){
  const names=[];
  for(let i=0;i<5;i++){
    const el=document.getElementById('emp-name-'+i);
    names.push((el?.value||'').trim()||('Employee '+(i+1)));

  state.employees=names;
  const _ts=Date.now();
  (state.leaves||[]).forEach(l=>{if(l.employeeIdx!=null){l.employeeName=names[l.employeeIdx];l.updated=_ts;}});

          <select class="fselect" id="lf-employee">
            ${getLeaveEmployeeOptions()}
          </select>
        </div>
        <div class="fgroup">
          <label class="flabel">Leave Type</label>
          <select class="fselect" id="lf-type">
            ${LEAVE_TYPES.map(t=>`<option value="${t.key}">${t.label}</option>`).join('')}
          </select>
        </div>
        <div class="fgroup"><label class="flabel">From</label><input class="finput" type="date" id="lf-from"></div>
        <div class="fgroup"><label class="flabel">To</label><input class="finput" type="date" id="lf-to"></div>
        <div class="fgroup">
          <label class="flabel">Status</label>
          <select class="fselect" id="lf-status">
            <option value="pending">⏳ Pending (unconfirmed)</option>
            <option value="approved">✅ Approved</option>
          </select>
        </div>
        <div class="fgroup full"><label class="flabel">Reason (optional)</label><input class="finput" id="lf-reason" placeholder="e.g. Family travel, medical appointment…"></div>
      </div>
      <div style="display:flex;gap:7px;margin-top:12px">
        <button class="btn btn-accent" onclick="submitLeaveForm()">${ui_editLeaveId?'Update':'Add Leave'}</button>
        <button class="btn btn-ghost" onclick="ui_leaveForm=false;ui_editLeaveId=null;render()">Cancel</button>
      </div>
    </div>`;
  }

  // Active / upcoming leaves
  if(!activeLeaves.length&&!ui_leaveForm){
    html+=`<div class="empty-state"><div class="empty-icon">🌴</div><div class="empty-msg">No active or upcoming leaves — click <strong>+ Add Leave</strong></div></div>`;
  } else {
    [...activeLeaves].sort((a,b)=>a.dateFrom.localeCompare(b.dateFrom)).forEach(l=>{ html+=renderLeaveCard(l,today,false); });
  }

  // Past leaves
  if(pastLeaves.length){
    html+=`<div class="shelved-toggle" onclick="ui_showPastLeaves=!ui_showPastLeaves;render()">
      <span>${ui_showPastLeaves?'▾':'▸'}</span>
      📁 ${pastLeaves.length} past leave record${pastLeaves.length>1?'s':''} — ${ui_showPastLeaves?'hide':'show'}
    </div>`;
    if(ui_showPastLeaves){
      [...pastLeaves].sort((a,b)=>b.dateFrom.localeCompare(a.dateFrom)).forEach(l=>{ html+=renderLeaveCard(l,today,true); });
    }
  }
  html+=`</div>`;
  if(isStandaloneLeave){
    const lCount=activeLeaves.length;
    return`<div style="padding-bottom:80px">
      <div class="acc-header" style="border-radius:10px 10px 0 0;border:0.5px solid var(--border);border-bottom:0">
        <span class="acc-icon">🌴</span>
        <span class="acc-name">Leaves</span>
        <div class="acc-meta">${lCount?`<span class="sbadge sb-in-progress">${lCount} active</span>`:''}</div>
      </div>
      <div style="border:0.5px solid var(--border);border-top:0;border-radius:0 0 10px 10px;padding:12px 16px 14px;margin-bottom:14px;">
        <div style="display:flex;justify-content:flex-end;gap:6px;margin-bottom:10px;">
          <button class="btn btn-ghost btn-sm" onclick="doEmailLeaves()">✉ Email</button>
          <button class="btn btn-ghost btn-sm" onclick="doExportLeavesTxt()">⬇ Export</button>
          <button class="btn btn-accent btn-sm" onclick="ui_leaveForm=!ui_leaveForm;ui_editLeaveId=null;render();setTimeout(()=>document.getElementById('lf-employee')?.focus(),60)">+ Add Leave</button>
        </div>
        ${html}
      </div>
    </div>`;
  }
  return accHeaderL+html+'</div></div>';
}

function renderLeaveCard(l,today,isPast){
  const isOpen=ui_openLeaves.has(l.id);
  const days=leaveDays(l.dateFrom,l.dateTo);
  const isOnLeave=l.dateFrom<=today&&l.dateTo>=today;
  const isUpcoming=!isPast&&l.dateFrom>today;
  const typeInfo=LEAVE_TYPES.find(t=>t.key===l.leaveType)||LEAVE_TYPES[0];

  // Days left / days until start
  let durationLabel=days+'d';
  if(isOnLeave){
    const left=Math.round((new Date(l.dateTo+'T00:00:00')-new Date(today+'T00:00:00'))/86400000)+1;
    durationLabel=days+'d · '+left+'d remaining';
  } else if(isUpcoming){
    const until=Math.round((new Date(l.dateFrom+'T00:00:00')-new Date(today+'T00:00:00'))/86400000);
    durationLabel=days+'d · starts in '+until+'d';
  }

  // Format date parts separately for column alignment
  const fmtDateParts=d=>{
    if(!d) return {day:'—',month:'',year:'',weekday:''};
    try{
      const dt=new Date(d+'T00:00:00');
      return {
        day:   dt.toLocaleDateString('en-GB',{day:'2-digit'}),
        month: dt.toLocaleDateString('en-GB',{month:'short'}),
        year:  dt.getFullYear(),
        weekday: dt.toLocaleDateString('en-GB',{weekday:'long'}),
      };
    }catch(e){return {day:d,month:'',year:'',weekday:''};}
  };
  const fmtDate=d=>{
    const p=fmtDateParts(d);
    return `${p.day} ${p.month} ${p.year}, ${p.weekday}`;
  };
  const pFrom=fmtDateParts(l.dateFrom);
  const pTo=fmtDateParts(l.dateTo);
  // Single grid: day | month | year | weekday(desktop only)
  // Each row is one date; columns align vertically across both rows
  const dateGrid=`<div class="leave-date-grid" style="display:grid;grid-template-columns:2.2ch 3.2ch 4.2ch auto;gap:0 8px;font-family:var(--mono);font-size:11.5px;color:var(--text2);flex:1;row-gap:5px;min-width:0;align-items:baseline">
    <span style="text-align:right;font-weight:600">${pFrom.day}</span><span>${pFrom.month}</span><span>${pFrom.year}</span><span class="leave-weekday-col" style="color:var(--text3)">${pFrom.weekday}</span>
    <span style="text-align:right;font-weight:600">${pTo.day}</span><span>${pTo.month}</span><span>${pTo.year}</span><span class="leave-weekday-col" style="color:var(--text3)">${pTo.weekday}</span>
  </div>`;
  const cardCls='leave-card'+(l.status==='approved'?' lc-approved':l.status==='pending'?' lc-pending':'')+(isPast?' lc-past':'')+(isOnLeave?' lc-today':'');
  return`<div class="${cardCls}" data-id="${l.id}">
  <div class="leave-top" onclick="toggleLeaveOpen('${l.id}')" style="flex-wrap:nowrap;align-items:flex-start;gap:10px;">
    <div style="flex:1;min-width:0;">
      <div class="leave-employee" style="overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;">${esc(l.employeeName||'Unknown')}</div>
      ${dateGrid}
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;min-width:90px;">
      <span class="leave-type-badge ${typeInfo.cls}">${typeInfo.label}</span>
      <span class="leave-status-badge ${l.status==='approved'?'lsb-approved':'lsb-pending'}">${l.status==='approved'?`<span class="badge-dot" style="background:#15803D"></span>Approved`:`<span class="badge-dot" style="background:#B45309"></span>Pending`}</span>
      <span class="leave-duration" style="font-size:10px;color:var(--text3);font-family:var(--mono);">${durationLabel}</span>
    </div>
    <span class="chevron${isOpen?' open':''} hide-on-mobile-view" id="lc-${l.id}" style="flex-shrink:0;margin-top:2px;">▾</span>
  </div>
  <div class="leave-body${isOpen?' open':''}" id="lb-${l.id}">
    <div class="card-fields" style="margin-top:8px">
      <div><div class="cfield-label">Employee</div><div class="cfield-value">${esc(l.employeeName||'Unknown')}</div></div>
      <div><div class="cfield-label">Type</div><div class="cfield-value">${typeInfo.label}</div></div>
      <div><div class="cfield-label">Start</div><div class="cfield-value">${fmtDate(l.dateFrom)}</div></div>
      <div><div class="cfield-label">End</div><div class="cfield-value">${fmtDate(l.dateTo)}</div></div>
      <div><div class="cfield-label">Duration</div><div class="cfield-value">${days} day${days!==1?'s':''}</div></div>
      <div><div class="cfield-label">Status</div><div class="cfield-value">${l.status==='approved'?'✅ Approved':'⏳ Pending'}</div></div>
    </div>
    <div class="card-remarks" onclick="event.stopPropagation()">
      ${l.reason?`<span style="white-space:pre-wrap">💬 ${esc(l.reason)}</span> <button class="btn btn-ghost btn-xs" style="font-style:normal" onclick="event.stopPropagation();editLeave('${l.id}')" title="Edit reason">✏</button>`:`<button class="btn btn-ghost btn-xs" style="font-style:normal;color:var(--text3)" onclick="event.stopPropagation();editLeave('${l.id}')">+ Add reason</button>`}
    </div>
    <div class="leave-btns">
      ${l.status==='pending'
        ?`<button class="btn btn-done-active btn-sm" onclick="updateLeave('${l.id}',{status:'approved'});render();event.stopPropagation()">✅ Approve</button>`
        :`<button class="btn btn-ghost btn-sm" onclick="updateLeave('${l.id}',{status:'pending'});render();event.stopPropagation()">↩ Set Pending</button>`
      }
      <button class="btn btn-ghost btn-sm" onclick="editLeave('${l.id}');event.stopPropagation()">✏ Edit</button>
      <button class="btn btn-ghost btn-sm btn-danger" onclick="if(confirm('Delete this leave record?'))deleteLeave('${l.id}');event.stopPropagation()">🗑 Delete</button>
    </div>
  </div>
</div>`;
}

/* ─── CARD ─── */
function renderCard(sec,s,archKey){
  const secObj=SECTIONS.find(ss=>ss.key===sec)||{};
  const isUpcoming=secObj.isUpcoming||false;
  if(isUpcoming) return renderUpcomingRow(sec,s,archKey);
  return renderStoryCard(sec,s,archKey);
}

function renderUpcomingRow(sec,s,archKey){
  const isOpen=ui.openCards.has(s.id);
  const isComplOpen=ui.complForms.has(s.id);
  const archKeyJS=archKey?`'${archKey}'`:'null';
  const today=todayStr();

  const isExpired=s.expected_date&&s.expected_date<today&&s.status!=='completed';
  const isCompleted=s.status==='completed';
  const isOverdue=false; // overdue is now just "expired" — handled by isExpired

  const _dot=col=>`<span class="badge-dot" style="background:${col}"></span>`; const sbL=s.status==='urgent'?_dot('#B91C1C')+'Urgent':s.status==='in-progress'?_dot('#B45309')+'In progress':s.status==='completed'?_dot('#15803D')+'Done':s.status==='on-hold'?_dot('#7C3AED')+'On hold':s.status==='passed'||s.status==='not-done'?_dot('#475569')+'Not done':s.status==='postponed'?_dot('#0369A1')+'Postponed':s.status==='shelved'?_dot('#64748B')+'Shelved':'';
  const sbC=s.status==='urgent'?'sb-urgent':s.status==='in-progress'?'sb-in-progress':s.status==='completed'?'sb-completed':s.status==='on-hold'?'sb-on-hold':s.status==='passed'||s.status==='not-done'?'sb-not-done':s.status==='postponed'?'sb-postponed':s.status==='shelved'?'sb-shelved':'sb-not-started';

  // Due chip — prefer deadline_date for overdue calculation; fall back to expected_date
  let dueChip='';
  const deadlineRef=s.deadline_date||s.expected_date;
  const expectedRef=s.expected_date;
  if(expectedRef && !isExpired){
    const diff=new Date(expectedRef+'T00:00:00').getTime()-new Date(today+'T00:00:00').getTime();
    const days=Math.round(diff/86400000);
    if(days===0)      dueChip=`<span class="uc-chip uc-chip-due">📅 Today</span>`;
    else if(days>0)   dueChip=`<span class="uc-chip uc-chip-due">📅 in ${days}d</span>`;
  } else if(isExpired && deadlineRef){
    // Count overdue from deadline_date if set, else expected_date
    const overRef=s.deadline_date||s.expected_date;
    const diff=Math.round((new Date(today+'T00:00:00').getTime()-new Date(overRef+'T00:00:00').getTime())/86400000);
    dueChip=`<span class="uc-chip" style="color:var(--text3)">📁 ${fmtDate(overRef)}</span>`;
  }

  // Border class
  let rowCls='uc-row';
  if(isExpired)                rowCls+=' ucr-past';
  else if(isCompleted)         rowCls+=' ucr-completed';
  else if(s.status==='on-hold') rowCls+=' ucr-on-hold';

  const typeLabel=s.expected_type&&s.expected_type!=='date'?` (${s.expected_type})`:'';

  const field=(lbl,val)=>val?`<div><div class="cfield-label">${lbl}</div><div class="cfield-value">${esc(val)}</div></div>`:'';
  let linksHtml='';
  if(s.links){ const ls=s.links.split(',').map(l=>l.trim()).filter(Boolean); if(ls.length) linksHtml=`<div class="card-links" style="margin-top:8px">${ls.map(l=>`<a class="link-pill" href="${esc(l)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 ${esc(l.replace(/^https?:\/\//,'').slice(0,36))}</a>`).join('')}</div>`; }
  let clHtml='';
  if(s.completion_links){ const ls=s.completion_links.split(',').map(l=>l.trim()).filter(Boolean); if(ls.length) clHtml=`<div class="completion-links">${ls.map(l=>`<a class="link-pill" href="${esc(l)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 ${esc(l.replace(/^https?:\/\//,'').slice(0,36))}</a>`).join('')}</div>`; }

  return`<div class="${rowCls}" data-id="${s.id}">
  <div class="uc-top" onclick="toggleCard('${s.id}')">
    <span class="uc-expand-icon${isOpen?' open':''}">▶</span>
    <div style="flex:1;min-width:0">
      <div class="uc-title${(isExpired||isCompleted)?' uc-title-past':''}" style="${isCompleted?'text-decoration:line-through;opacity:.6;':''}}">${esc(s.title||'Untitled')}</div>
      ${(s.detail||s.correspondent)?`<div style="font-size:11px;color:var(--text3);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-family:var(--font);line-height:1.4">${esc((s.detail||s.correspondent||'')).replace(/\n/g,' ')}</div>`:''}
    </div>
    <div class="uc-meta-line">
      ${s.expected_date?`<span class="uc-chip">${fmtDate(s.expected_date)}${s.expected_date_to?' – '+fmtDate(s.expected_date_to):''}${typeLabel}</span>${s.requested_by?`<span class="uc-chip">👤 ${esc(s.requested_by)}</span>`:''}`:''}
      ${dueChip}
      ${sbL?`<span class="sbadge ${sbC}">${sbL}</span>`:''}
      ${isCompleted&&s.completedOn?`<span class="uc-chip" style="color:var(--done);font-size:10px">✅ ${new Date(s.completedOn).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}</span>`:''}
    </div>
    <span class="chevron${isOpen?' open':''}" id="ch-${s.id}" style="display:none"></span>
  </div>
  <div class="uc-body${isOpen?' open':''}" id="cb-${s.id}">
    <div class="card-fields">
      ${s.description?`<div style="grid-column:1/-1"><div class="cfield-label">Description</div><div class="cfield-value" style="white-space:pre-wrap;line-height:1.55;">${esc(s.description)}</div></div>`:''}
      ${field('Detail',s.detail)}
      ${field('Correspondent',s.correspondent)}
      ${field('Expected',s.expected_date?fmtDate(s.expected_date)+(s.expected_date_to?' – '+fmtDate(s.expected_date_to):'')+' · '+typeLabel:'')}
      ${s.deadline_date?field('Deadline',fmtDate(s.deadline_date)+(s.deadline_uk?' · '+s.deadline_uk+' '+ukLabel():'')+(s.deadline_ist?' / '+s.deadline_ist+' IST':'')):''}
      ${s.reminder&&s.reminder!=='off'?field('Reminder','⏰ '+s.reminder):''}
    </div>
    ${remarksHTML(s.remarks, s.id+'_cr', sec, s.id, archKey)}
    ${linksHtml}
    ${s.completion_note||s.completion_links?`<div class="completion-box"><div class="completion-label">✅ Completion Notes</div>${s.completion_note?`<div class="completion-note">${esc(s.completion_note)}</div>`:''} ${clHtml}</div>`:''}
    <div id="compl-form-${s.id}" style="display:${isComplOpen?'block':'none'}">
      <div class="compl-form">
        <div style="font-size:12px;font-weight:700;color:var(--done);margin-bottom:9px">✅ Completion notes</div>
        <div class="fgroup" style="margin-bottom:8px"><label class="flabel">What was done / outcome</label><textarea class="ftextarea" id="compl-note-${s.id}" style="min-height:52px">${esc(s.completion_note||'')}</textarea></div>
        <div class="fgroup" style="margin-bottom:9px"><label class="flabel">Final links</label><input class="finput" id="compl-links-${s.id}" placeholder="https://…" value="${esc(s.completion_links||'')}"></div>
        <div style="display:flex;gap:7px"><button class="btn btn-done-active btn-sm" onclick="submitComplForm('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">✅ Save &amp; Mark Done</button><button class="btn btn-ghost btn-sm" onclick="toggleComplForm('${s.id}');event.stopPropagation()">Cancel</button></div>
      </div>
    </div>
    <div class="card-btns">
      <button class="btn btn-ghost btn-sm" onclick="editStory('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">✏ Edit</button>
      ${isCompleted
        ?`<button class="btn btn-done-active btn-sm" disabled>✅ Done</button>
          <button class="btn btn-not-done btn-sm" onclick="markNotDone('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">↩ Reopen</button>`
        :`<button class="btn btn-done btn-sm" onclick="toggleComplForm('${s.id}');event.stopPropagation()">Mark Done</button>`
      }
      <button class="btn btn-ghost btn-sm btn-danger" onclick="confirmDelete('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">🗑 Delete</button>
    </div>
  </div>
</div>`;
}

function renderStoryCard(sec,s,archKey){
  const secObj=SECTIONS.find(ss=>ss.key===sec)||{};

  const isComplOpen=ui.complForms.has(s.id);

  const sbC=s.status==='urgent'?'sb-urgent':s.status==='in-progress'?'sb-in-progress':s.status==='completed'?'sb-completed':s.status==='on-hold'?'sb-on-hold':s.status==='not-done'?'sb-not-done':s.status==='postponed'?'sb-postponed':s.status==='shelved'?'sb-shelved':'sb-not-started';

  if(s.field_location) loc=(s.location?s.location+' — ':'')+s.field_location;

  const carried=s.carriedForward&&s.status!=='completed'&&s.status!=='on-hold';
  const archKeyJS=archKey?`'${archKey}'`:'null';
  const mode=s.mode||'none';
  const wwLabel=mode==='working'?'▶ Working':mode==='watching'?'👁 Watching':'● Set mode';

    : '';
  const isIBU=sec==='ibu'&&!archKey;
  const cardBorderCls=carried?'c-carried':s.status?'c-'+s.status:'';
  const cardCls='card '+cardBorderCls;
  const field=(lbl,val)=>val?`<div><div class="cfield-label">${lbl}</div><div class="cfield-value">${esc(val)}</div></div>`:'';
  let linksHtml='';
  if(s.links){ const ls=s.links.split(',').map(l=>l.trim()).filter(Boolean); if(ls.length) linksHtml=`<div class="card-links">${ls.map(l=>`<a class="link-pill" href="${esc(l)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 ${esc(l.replace(/^https?:\/\//,'').slice(0,36))}</a>`).join('')}</div>`; }
  let clHtml='';
  if(s.completion_links){ const ls=s.completion_links.split(',').map(l=>l.trim()).filter(Boolean); if(ls.length) clHtml=`<div class="completion-links">${ls.map(l=>`<a class="link-pill" href="${esc(l)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 ${esc(l.replace(/^https?:\/\//,'').slice(0,36))}</a>`).join('')}</div>`; }

    <div class="card-right" style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;min-width:80px;">
      ${sbL?`<span class="sbadge ${sbC}">${sbL}</span>`:''}
      ${deadlineBadge(s)}
      ${s.story_type?s.story_type.split(',').map(t=>`<span class="sbadge" style="background:rgba(79,70,229,.09);color:#4338CA;border:0.5px solid rgba(79,70,229,.3);font-size:11px;">${t.trim().toUpperCase()}</span>`).join(''):''}
      ${(s.carriedForward&&s.status!=='completed'&&!s.deadline_date)?`<span class="carry-badge">↻ +${s.carriedDays||1}d</span>`:''}
    </div>

    <span class="chevron${isOpen?' open':''}" id="ch-${s.id}">▾</span>
  </div>
  <div class="card-body${isOpen?' open':''}" id="cb-${s.id}">
    <div class="card-fields">
      ${s.description?`<div style="grid-column:1/-1"><div class="cfield-label">Description</div><div class="cfield-value" style="white-space:pre-wrap;line-height:1.55;">${esc(s.description)}</div></div>`:''}
      ${field('Producer',s.producer)}
        ${field('Shoot-Edit',s.shoot_edit)}
        ${field('Location',loc||'–')}
        ${(s.broadcast_times&&s.broadcast_times.length)
          ? s.broadcast_times.map((t,i)=>{
              const platLabel=t.plat||t.lbl||('Slot '+(i+1));
              const progStr=t.prog?` · ${t.prog}`:'';
              const timeStr=[t.uk?`GMT ${t.uk}`:'', t.ist?`IST ${t.ist}`:''].filter(Boolean).join(' / ');
              const slotVal=[timeStr||'–',
                t.dl_date?`⏱ ${t.dl_date}${t.dl_uk?' '+t.dl_uk+' GMT':''}${t.dl_ist?' / '+t.dl_ist+' IST':''}`:null,
                t.com_name?`👤 ${[t.com_name,t.com_team,t.com_loc].filter(Boolean).join(' · ')}`:null,
              ].filter(Boolean).join(' · ');
              return field(platLabel+progStr, slotVal);
            }).join('')
          : (s.time_uk||s.time_ist)?field('GMT',s.time_uk)+field('IST',s.time_ist):''
        }
        ${s.req_name||s.req_team?field('Requested By',[s.req_name,s.req_team,s.req_location].filter(Boolean).join(' · ')):''}
      
      ${s.deadline_date?`<div><div class="cfield-label">Deadline</div><div class="cfield-value">${esc(s.deadline_date)}${s.deadline_uk?' · '+esc(s.deadline_uk)+' '+ukLabel():''}${s.deadline_ist?' / '+esc(s.deadline_ist)+' IST':''}</div></div>`:''}
      ${reqTime?field('Logged At',reqTime):''}
      ${s.reminder&&s.reminder!=='off'?field('Reminder','⏰ '+s.reminder):''}
    </div>
    ${s.remarks?`<div class="card-remarks" onclick="event.stopPropagation()" style="font-size:12px;color:var(--text3);font-style:italic;padding:6px 0">💬 ${esc(s.remarks)} <span style="font-size:10px;font-family:var(--mono)"></span></div>`:''}
    ${buildStoryRemarksHTML(sec,s,archKey)}
    ${s.location==='Field'?buildStoryTravelHTML(sec,s,archKey):''}
    ${linksHtml}
    ${s.completion_note||s.completion_links?`<div class="completion-box"><div class="completion-label">✅ Completion Notes</div>${s.completion_note?`<div class="completion-note">${esc(s.completion_note)}</div>`:''} ${clHtml}</div>`:''}
    <div id="compl-form-${s.id}" style="display:${isComplOpen?'block':'none'}">
      <div class="compl-form">
        <div style="font-size:12px;font-weight:700;color:var(--done);margin-bottom:9px">✅ Completion notes</div>
        <div class="fgroup" style="margin-bottom:8px"><label class="flabel">What was done / outcome</label><textarea class="ftextarea" id="compl-note-${s.id}" style="min-height:52px">${esc(s.completion_note||'')}</textarea></div>
        <div class="fgroup" style="margin-bottom:9px"><label class="flabel">Final links (comma-separated)</label><input class="finput" id="compl-links-${s.id}" placeholder="https://…" value="${esc(s.completion_links||'')}"></div>
        <div style="display:flex;gap:7px"><button class="btn btn-done-active btn-sm" onclick="submitComplForm('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">✅ Save &amp; Mark Done</button><button class="btn btn-ghost btn-sm" onclick="toggleComplForm('${s.id}');event.stopPropagation()">Cancel</button></div>
      </div>
    </div>
    <div class="card-btns">
      <button class="btn btn-ghost btn-sm" onclick="editStory('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">✏ Edit</button>
      ${s.status==='completed'
        ? `<button class="btn btn-done-active btn-sm" disabled>✅ Done</button>
           <button class="btn btn-not-done btn-sm" onclick="markNotDone('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">↩ Reopen</button>`
        : s.status==='not-done'
        ? `<button class="btn btn-ghost btn-sm" style="color:#64748b;border-color:rgba(100,116,139,.3)" disabled>⚫ Not Done</button>
           <button class="btn btn-ghost btn-sm" onclick="markNotDone('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">↩ Reopen</button>`
        : s.status==='postponed'
        ? `<button class="btn btn-postpone btn-sm" disabled>⏸ Postponed${s.postponeTo?' to '+s.postponeTo:''}</button>
           <button class="btn btn-ghost btn-sm" onclick="markNotDone('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">↩ Reopen</button>`
        : s.status==='shelved'
        ? `<button class="btn btn-shelve btn-sm" disabled>🗄 Shelved</button>
           <button class="btn btn-ghost btn-sm" onclick="unshelveStory('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">↩ Unshelf</button>`
        : `<button class="btn btn-done btn-sm" onclick="toggleComplForm('${s.id}');event.stopPropagation()">Mark Done</button>
           <button class="btn btn-not-done btn-sm" onclick="markStoryNotDone('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">⚫ Not Done</button>
           <button class="btn btn-postpone btn-sm" onclick="openStoryPostponeDialog('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">⏸ Postpone…</button>
           <button class="btn btn-shelve btn-sm" onclick="shelveStory('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">🗄 Shelve</button>`
      }
      <div class="move-picker" onclick="event.stopPropagation()" title="Move to another section">
        <select class="fselect" style="padding:4px 24px 4px 8px;font-size:11.5px;height:29px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text3)" id="move-sel-${s.id}" onchange="doMoveSelect('${sec}','${s.id}',${archKeyJS},this)">
          <option value="">Move to…</option>
          ${SECTIONS.filter(ss=>ss.key!==sec&&!ss.isUpcoming).map(ss=>`<option value="${ss.key}">${esc(secName(ss.key))}</option>`).join('')}
        </select>
      </div>
      <button class="btn btn-ghost btn-sm btn-danger" onclick="confirmDelete('${sec}','${s.id}',${archKeyJS});event.stopPropagation()">🗑 Delete</button>
    </div>
  </div>
</div>`;
}

function updateExpectedInput(sec,archKey){
  const sfx='-'+sec+(archKey?'-arch':'');
  const t=(document.getElementById('f-expected-type'+sfx)||{}).value||'date';
  const inp=document.getElementById('f-expected-date'+sfx);
  if(inp){ inp.type=t==='month'?'month':'date'; inp.value=''; }
}

   HELPERS
════════════════════════════════════════ */
function esc(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg){ const w=document.getElementById('toast-wrap'); if(!w) return; const el=document.createElement('div'); el.className='toast'; el.textContent=msg; w.appendChild(el); setTimeout(()=>el.remove(),3800); }
function confirmDelete(sec,id,archKey){ const arr=getArr(sec,archKey); const s=arr?.find(s=>s.id===id); if(!s) return; if(confirm('Delete "'+s.title+'"?')) deleteStory(sec,id,archKey); }

/* ════════════════════════════════════════
   CLOCK
════════════════════════════════════════ */
function updateClock(){
  const el=document.getElementById('live-clock');
  const now=new Date();
  const ukTime=now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/London',hour12:false});
  const ist=now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Kolkata',hour12:false});
  if(el) el.textContent=ukLabel()+' '+ukTime+' · IST '+ist;
  // Mobile times
  const bstEl=document.getElementById('mobile-time-bst');
  const istEl=document.getElementById('mobile-time-ist');
  if(bstEl) bstEl.textContent=ukTime+' '+ukLabel();
  if(istEl) istEl.textContent=ist+' IST';
  // Desktop times (rows 2)
  const dBst=document.getElementById('desktop-time-bst');
  const dIst=document.getElementById('desktop-time-ist');
  if(dBst) dBst.textContent=ukTime+' '+ukLabel();
  if(dIst) dIst.textContent=ist+' IST';
}

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
function init(){
  loadLocal();
  checkDateChange();
  cleanupStuckNotDone();  // archive any not-done entries stuck in non-combined sections
  cleanupCompletedStories(); // archive completed stories from active board
  sweepStaleTerminalStories(); // sweep terminal stories from previous days on every open

  // ── Service Worker registration ──────────────────────────────
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./service-worker.js', {scope:'./'})
      .then(reg=>{
        console.log('[SW] Registered, scope:', reg.scope);
        navigator.serviceWorker.ready.then(()=>{ scheduleAllReminders(); });
        setInterval(()=>_swMsg({type:'PING'}), 30 * 60 * 1000);
      })
      .catch(()=>{}); // silently skip if SW script not available (e.g. single-file deployment)
  }
  // ─────────────────────────────────────────────────────────────

  scheduleAllReminders();
  const cfg=getFireConfig(); if(cfg) initFirebase(cfg, true);
  window.addEventListener('online', ()=>{ if(fireDb){ setSyncUI('syncing'); pushToCloud(); } });
  window.addEventListener('offline', ()=>{ if(fireDb) setSyncUI('offline'); });
  updateDateHeader(); renderDateStrip(); render();
  renderOnLeavePill();
  updateMobileDateLabel();
    initMobileScrollCollapse();
  // Show backup banners after render (only on today view)
  setTimeout(()=>renderBackupBanners(), 100);
  updateClock(); setInterval(updateClock, 30000);
  initScrollHeader();
  // Click outside search to close
  document.addEventListener('click', e=>{
    // Mobile
    const mss=document.getElementById('mobile-search-section');
    const msb=document.getElementById('mobile-search-btn');
    const msbC=document.getElementById('mobile-search-btn-collapsed');
    if(mss&&mss.classList.contains('m-search-open')){
      if(!mss.contains(e.target)&&e.target!==msb&&e.target!==msbC){
        toggleMobileSearch();
      }
    }
    // Desktop
    const dbar=document.getElementById('desktop-search-bar');
    const dbtn=document.getElementById('desktop-search-btn');
    if(dbar&&dbar.style.display!=='none'){
      if(!dbar.contains(e.target)&&e.target!==dbtn){
        toggleDesktopSearch();
      }
    }
  });

  // Hide bottom nav when keyboard is open (iOS)
  const bnb=document.getElementById('bottom-nav-bar');
  if(bnb){
    window.addEventListener('resize',()=>{
      // When keyboard opens, window height shrinks significantly
      const keyboardOpen=window.innerHeight<window.screen.height*0.75;
      bnb.style.display=keyboardOpen?'none':'';
    });
  }

  // Global: Enter in any textarea = new paragraph on both desktop and mobile.
  // Stops propagation so it never triggers accordion toggles or form submits.
  document.addEventListener('keydown', e=>{
    if(e.key==='Enter' && e.target.tagName==='TEXTAREA'){
      e.stopPropagation();
      // Don't preventDefault — let the browser insert the newline naturally.
    }
  }, true); // capture phase so it fires before any inline handlers
  setInterval(()=>{
    const today=todayStr();
    if(state.lastActiveDate && state.lastActiveDate !== today){
      // New day detected while app is open — run the full date-change logic
      checkDateChange();
      updateDateHeader();
      renderDateStrip();
      render();
      setTimeout(()=>renderBackupBanners(), 100);
    }
    // Always refresh the date in the header in case it got stale
    updateDateHeader();
  }, 5 * 60 * 1000);
}
document.addEventListener('DOMContentLoaded', init);
</script>
